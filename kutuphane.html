<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kütüphane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
  <link rel="stylesheet" href="profile-card.css">
  <script src="profile-card.js" defer></script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in (mobile: horizontal, desktop: vertical — CSS picks the axis) -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      /* Core ink & paper — warm cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;       /* main canvas — lightest */
      --paper-warm: #eddbd0;
      --paper-card: #ddc4b5;  /* cards/blocks */
      --paper-banner: #c9ae9a;/* section headers/banners */
      --paper-navbar: #b89b7f;/* top nav bar — darkest */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 1 / -1;
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 28px;
      padding: 14px 28px 10px 28px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
    }
    .section-rule > .masthead { justify-self: start; }
    .section-rule > header { justify-self: center; }
    .section-rule > .datetime-block { justify-self: end; }
    .masthead {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 1.45rem;
      letter-spacing: 0.5px;
      color: var(--ink);
      line-height: 1;
    }
    .masthead .tld { color: var(--muted); font-style: italic; }
    .datetime-block {
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
    }
    .datetime-block .sep { color: var(--muted); opacity: 0.6; }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      font-family: 'Inter', sans-serif;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    .col-left {
      grid-column: 1;
      grid-row: 2;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-banner);
      color: var(--ink-red);
      text-align: left;
      flex-shrink: 0;
    }
    .col-right {
      grid-column: 3;
      grid-row: 2;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    main {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Profile identity section (left column) ── */
    .profile-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .display-name {
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      word-break: break-word;
    }

    .avatar-upload {
      font-size: 0.65rem;
      color: var(--accent);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
    }
    .avatar-upload:hover { text-decoration: underline; }

    .district-select-wrap {
      width: 100%;
      margin-top: 6px;
    }

    .district-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .district-select {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--field-bg);
      border: 1px solid var(--ink);
      color: var(--ink);
      width: 100%;
      cursor: pointer;
    }

    .district-display {
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      color: var(--ink);
    }

    .save-btn {
      width: 100%;
      padding: 8px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
    }
    .save-btn:hover { background: var(--accent); }
    .save-btn:disabled { background: var(--muted); cursor: default; }

    .save-msg {
      font-size: 0.7rem;
      text-align: center;
      min-height: 14px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-signout {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-signout:hover { background: var(--accent-2); }

    /* Signout wrapper (bottom of right column on desktop, below everything on mobile) */
    .profile-signout-wrap {
      padding: 8px 12px;
      display: flex;
      justify-content: center;
      border-top: 1px solid var(--hairline);
      margin-top: auto;
      flex-shrink: 0;
    }
    .profile-signout-wrap .btn-signout { margin-top: 0; padding: 6px 16px; font-size: 0.65rem; }

    /* ── Center: profile board ── */
    .profile-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }

    #sticker-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .board-header {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--paper-dark);
      border-bottom: var(--col-border);
      color: var(--ink);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-header .edit-toggle {
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    .board-header .edit-toggle:hover { color: var(--ink); }

    .sticker-board {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--paper);
      min-height: 0;
    }

    .sticker {
      position: absolute;
      cursor: grab;
      user-select: none;
      width: 120px;
      height: auto;
      filter: grayscale(100%);
      transition: filter 0.2s;
    }
    .sticker:hover { filter: grayscale(60%); }
    .sticker.dragging { cursor: grabbing; z-index: 100; filter: grayscale(0%); }

    /* Sticker tray (shown in edit mode) */
    .sticker-tray {
      display: none;
      padding: 10px 16px;
      background: var(--paper-dark);
      border-top: var(--col-border);
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
      gap: 8px;
    }

    .sticker-tray.active {
      display: flex;
    }

    .tray-sticker {
      width: 64px;
      height: 64px;
      object-fit: contain;
      cursor: pointer;
      filter: grayscale(100%);
      opacity: 0.7;
      transition: all 0.2s;
      flex-shrink: 0;
      padding: 4px;
      border: 2px solid transparent;
    }
    .tray-sticker:hover { filter: grayscale(40%); opacity: 1; }
    .tray-sticker.locked {
      opacity: 0.2;
      cursor: not-allowed;
      filter: grayscale(100%);
    }
    .tray-sticker.locked:hover { opacity: 0.2; filter: grayscale(100%); }

    /* ── Right: stats & info ── */
    .profile-right {
      display: flex;
      flex-direction: column;
      padding: 12px 12px 8px;
      overflow: hidden;
      gap: 10px;
    }

    .right-section-title {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--hairline);
    }

    .info-row {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .info-value {
      font-size: 0.75rem;
      color: var(--ink);
      text-align: right;
      word-break: break-word;
      min-width: 0;
    }

    .scores-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .score-card {
      border: 1px solid var(--rule);
      padding: 6px 4px;
      background: var(--paper);
      text-align: center;
      margin-bottom: 0;
      min-width: 0;
    }

    .score-card .game-name {
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-card .score-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .score-card .score-detail {
      font-size: 0.55rem;
      color: var(--muted);
      margin-top: 2px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 60px 40px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Library shelf (left column) ── */
    .library-shelf {
      padding: 16px 0;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .source-tab {
      padding: 14px 18px;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      text-align: left;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .source-tab:hover { background: var(--hover); color: var(--ink); }
    .source-tab.active {
      color: var(--ink);
      background: var(--paper-dark);
      border-left-color: var(--ink);
    }
    .country-label {
      padding: 14px 18px 4px 18px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .country-label:first-child { padding-top: 4px; }
    .source-tab {
      white-space: normal;
      line-height: 1.25;
    }

    /* ── Counter strip (bottom of left column) ── */
    .counter-strip {
      border-top: 1px solid var(--rule);
      padding: 8px 0 16px 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .counter-card {
      padding: 12px 18px;
      border-bottom: 1px dashed var(--hairline);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .counter-card:last-child { border-bottom: none; }
    .counter-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.3;
    }
    .counter-value {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.5px;
    }
    .counter-value .cv-days {
      font-size: 0.95rem;
    }
    .counter-value .cv-suffix {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--accent);
      margin: 0 8px 0 3px;
    }
    .counter-value .cv-suffix:last-child { margin-right: 0; }
    .shelf-loading {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    /* ── Article display (center) ── */
    .article-area {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      min-height: 0;
    }
    .article-area .empty-state {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 80px 20px;
      font-size: 0.85rem;
    }
    .article-list { display: flex; flex-direction: column; gap: 0; }
    .article-list .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .article-list .source-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sort-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sort-control select {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      padding: 4px 8px;
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink);
      cursor: pointer;
    }
    .article-item .item-byline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin: 2px 0 4px 0;
    }
    .article-item .item-counts {
      display: inline-flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .reaction-bar {
      display: flex;
      gap: 10px;
      margin: 18px 0 8px 0;
    }
    .reaction-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .reaction-btn:hover { background: var(--paper-dark); }
    .reaction-btn.active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--paper);
    }
    .reaction-btn .rx-count { font-weight: 700; }
    .article-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .article-item:hover { background: var(--paper-dark); }
    .article-item .item-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .article-item .item-summary {
      font-size: 0.85rem;
      color: var(--accent);
      line-height: 1.4;
    }
    .article-detail .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0 0 16px 0;
    }
    .article-detail .back-btn:hover { color: var(--ink); }
    .article-detail .detail-source {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .article-detail .detail-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .article-detail .detail-summary {
      font-size: 0.95rem;
      color: var(--accent);
      line-height: 1.5;
      font-style: italic;
      margin-bottom: 20px;
    }
    .article-detail .detail-body {
      font-size: 0.9rem;
      color: var(--ink);
      line-height: 1.6;
    }
    .article-detail .detail-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
    }
    .article-detail .detail-link:hover { color: var(--accent); border-color: var(--accent); }
    .article-detail .detail-byline {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── Comments ── */
    .article-comments {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .comments-heading {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .comments-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
    .comment-row {
      padding: 10px 12px;
      background: var(--paper-dark);
      border-left: 3px solid var(--ink);
    }
    .comment-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .comment-meta .comment-author { font-weight: 700; color: var(--ink); letter-spacing: 0.5px; }
    .comment-meta .comment-when { letter-spacing: 0.5px; }
    .comment-delete {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
    }
    .comment-delete:hover { color: var(--accent); text-decoration: underline; }
    .comment-body {
      font-size: 0.88rem;
      color: var(--ink);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .comment-composer textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 10px 12px;
      border: 1px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      resize: vertical;
      min-height: 64px;
      outline: none;
    }
    .comment-composer textarea:focus { border-color: var(--accent); }
    .composer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .composer-msg {
      font-size: 0.75rem;
      color: var(--accent);
      font-style: italic;
    }
    .composer-submit {
      padding: 8px 18px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .composer-submit:hover { background: var(--accent); }
    .composer-submit:disabled { background: var(--muted); cursor: default; }

    /* ── Profile library card (top of right column) ── */
    .library-card {
      border-bottom: 1px solid var(--hairline);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--paper);
      flex-shrink: 0;
    }
    .library-card .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .library-card .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }
    .library-card .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .library-card .card-id { flex: 1; min-width: 0; }
    .library-card .card-name {
      font-weight: 700;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .library-card .card-meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .copy-kefil-btn {
      font-size: 0.6rem;
      padding: 2px 7px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      vertical-align: middle;
      margin-left: 6px;
    }
    .copy-kefil-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .library-card .edit-btn,
    .library-card .save-btn,
    .library-card .cancel-btn {
      padding: 6px 12px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .library-card .edit-btn:hover,
    .library-card .save-btn:hover { background: var(--accent); }
    .library-card .cancel-btn {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--ink);
    }
    .library-card .cancel-btn:hover { background: var(--paper-dark); }
    .library-card .save-btn:disabled { background: var(--muted); cursor: default; }
    .library-card .edit-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .library-card .edit-row > * { flex: 1; }
    .library-card .card-edit {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .library-card .field-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .library-card .field-input,
    .library-card .field-select {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--field-bg);
      border: 1px solid var(--ink);
      color: var(--ink);
      width: 100%;
      box-sizing: border-box;
    }
    .library-card .field-display {
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      color: var(--ink);
    }
    .library-card .pref-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--rule);
      outline: none;
      margin: 8px 0 4px;
      padding: 0;
      cursor: pointer;
    }
    .library-card .pref-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--ink);
      border: 2px solid var(--paper);
      box-shadow: 0 0 0 1px var(--ink);
      border-radius: 50%;
      cursor: grab;
    }
    .library-card .pref-slider::-webkit-slider-thumb:active { cursor: grabbing; }
    .library-card .pref-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: var(--ink);
      border: 2px solid var(--paper);
      box-shadow: 0 0 0 1px var(--ink);
      border-radius: 50%;
      cursor: grab;
    }
    .library-card .pref-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }
    .library-card .pref-ticks span {
      flex: 1;
      text-align: center;
    }
    .library-card .pref-ticks span:first-child { text-align: left; }
    .library-card .pref-ticks span:last-child { text-align: right; }
    .library-card .pref-ticks span.active { color: var(--ink); }
    .library-card .avatar-upload {
      font-size: 0.6rem;
      color: var(--accent);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      padding: 0;
      text-align: left;
    }
    .library-card .avatar-upload:hover { text-decoration: underline; }
    .library-card .save-msg {
      font-size: 0.7rem;
      min-height: 14px;
      font-style: italic;
      color: var(--muted);
      text-align: center;
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
      }
      body {
        height: auto;
        min-height: 100dvh;
        display: block;
        overflow: visible;
        padding-bottom: 56px;
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Compact top bar */
      .section-rule {
        padding: 10px 14px 8px 14px;
        border-bottom: 1px solid var(--rule);
        background: var(--paper);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .masthead { font-size: 1.05rem; }
      .datetime-block { gap: 8px; font-size: 9px; letter-spacing: 1.5px; }
      .datetime-block .day-line, .datetime-block .sep:nth-of-type(2) { display: none; }

      /* Source tab strip — horizontal, sticky below date bar */
      .col-left {
        border: none;
        border-bottom: 1px solid var(--hairline);
        background: var(--paper-banner);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        padding: 0;
        position: sticky;
        /* top is set by JS to match section-rule height */
        z-index: 9;
      }
      .col-left::-webkit-scrollbar { display: none; }
      .col-left .nb-highlight { display: none; }
      .library-shelf {
        display: flex;
        flex-direction: row;
        padding: 0;
        flex: none;
        overflow: visible;
      }
      .country-label { display: none; }
      .source-tab {
        white-space: nowrap;
        flex-shrink: 0;
        padding: 10px 14px;
        font-size: 10px;
        letter-spacing: 1px;
        border-left: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
      }
      .source-tab:hover { background: none; }
      .source-tab.active {
        color: var(--ink);
        background: var(--paper-card);
        border-left-color: transparent;
        border-bottom-color: var(--ink);
      }
      .counter-strip {
        flex-direction: row;
        border-top: none;
        border-left: 1px solid var(--rule);
        padding: 0;
      }
      .counter-card {
        flex-shrink: 0;
        padding: 8px 14px;
        border-bottom: none;
        border-right: 1px dashed var(--hairline);
        min-width: 140px;
        justify-content: center;
      }
      .counter-card:last-child { border-right: none; }
      .counter-label { font-size: 8px; letter-spacing: 1px; }
      .counter-value .cv-days { font-size: 0.8rem; }
      .counter-value .cv-suffix { font-size: 0.8rem; }

      /* Article area — visible, expands with content */
      main {
        display: block;
        overflow: visible;
        min-height: 0;
      }
      .article-area {
        padding: 16px;
        overflow-y: visible;
        flex: none;
        min-height: 60px;
      }
      .article-area .empty-state { padding: 32px 20px; font-size: 0.8rem; }
      .article-list .list-head { padding-bottom: 8px; margin-bottom: 6px; }
      .article-list .source-heading { font-size: 0.65rem; letter-spacing: 2px; }
      .sort-control { font-size: 0.6rem; gap: 6px; }
      .sort-control select { font-size: 13px; padding: 3px 6px; }
      .article-item { padding: 12px 0; }
      .article-item .item-title { font-size: 0.92rem; }
      .article-item .item-summary { font-size: 0.8rem; }
      .article-item .item-byline { font-size: 0.68rem; }
      .article-item .item-counts { font-size: 0.68rem; gap: 8px; margin-top: 4px; }
      .article-detail .back-btn { font-size: 0.65rem; padding: 0 0 12px 0; }
      .article-detail .detail-title { font-size: 1.2rem; margin-bottom: 8px; }
      .article-detail .detail-summary { font-size: 0.85rem; margin-bottom: 14px; }
      .article-detail .detail-body { font-size: 0.82rem; line-height: 1.55; }
      .reaction-bar { gap: 8px; margin: 12px 0 6px 0; flex-wrap: wrap; }
      .reaction-btn { padding: 5px 12px; font-size: 0.78rem; }
      .comments-heading { font-size: 0.68rem; margin-bottom: 10px; }
      .comment-row { padding: 8px 10px; }
      .comment-meta { font-size: 0.65rem; }
      .comment-body { font-size: 0.82rem; }
      /* 16px prevents iOS Safari zoom-on-focus */
      .comment-composer textarea { font-size: 16px; min-height: 52px; }
      .composer-submit { padding: 7px 14px; font-size: 0.68rem; }
      .loading { padding: 14px; font-size: 12px; }

      /* Profile section — below articles, separated by rule */
      .col-right {
        border: none;
        border-top: 2px solid var(--hairline);
        background: var(--paper-card);
        display: block;
      }
      .library-card { padding: 14px 16px; }
      .library-card .avatar { width: 48px; height: 48px; font-size: 1.2rem; border-width: 2px; }
      .library-card .card-name { font-size: 0.88rem; }
      .library-card .card-meta { font-size: 0.65rem; }
      /* 16px prevents iOS zoom */
      .library-card .field-input,
      .library-card .field-select { font-size: 16px; padding: 8px; }
      .profile-right {
        padding: 12px 16px 14px 16px;
        gap: 10px;
        overflow: visible;
        display: flex;
        flex-direction: column;
        border-top: 1px solid var(--hairline);
      }
      .profile-signout-wrap {
        padding: 14px 16px 20px 16px;
        display: flex;
        justify-content: center;
        border-top: 1px solid var(--hairline);
      }
      .profile-signout-wrap .btn-signout {
        width: 100%;
        max-width: 320px;
        padding: 11px 16px;
        font-size: 12px;
        border-radius: 4px;
      }
      .right-section-title { font-size: 10px; margin-bottom: 6px; padding-bottom: 3px; letter-spacing: 1.2px; }
      .info-row { margin-bottom: 5px; gap: 2px; }
      .info-label { font-size: 9px; letter-spacing: 1px; }
      .info-value { font-size: 12px; }
      .score-card { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; }
      .score-card .game-name { font-size: 9px; margin-bottom: 2px; letter-spacing: 1px; }
      .score-card .score-value { font-size: 16px; }
      .score-card .score-detail { font-size: 10px; margin-top: 1px; }

      /* profile-right border-top was a separator below library-card;
         after moving library-card to #mobile-top, col-right's border-top
         already acts as the section separator */
      .col-right .profile-right {
        border-top: none;
      }

      /* Existing library-card and HESAP column are replaced by the shared
         #ist-pc-mount widget on mobile. When viewing another user's profile
         (?user=ID), keep the legacy layout instead. */
      body:not(.ist-viewing-other) #mobile-top,
      body:not(.ist-viewing-other) .col-right,
      body:not(.ist-viewing-other) .profile-signout-wrap { display: none !important; }
      body.ist-viewing-other #ist-pc-mount { display: none !important; }

      /* ── Mobile top: compact profile card + countdowns ── */
      #mobile-top {
        background: var(--paper-card);
      }
      #mobile-top .library-card {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: none;
      }
      #mobile-top .library-card .card-top {
        flex: 1;
        min-width: 0;
      }
      #mobile-top .library-card .edit-btn {
        width: auto;
        flex-shrink: 0;
        padding: 6px 14px;
        font-size: 0.65rem;
      }
      /* edit form fills full width when expanded */
      #mobile-top .library-card .card-edit,
      #mobile-top .library-card .edit-row,
      #mobile-top .library-card .save-msg {
        width: 100%;
      }
      #mobile-top .library-card .avatar {
        width: 38px;
        height: 38px;
        font-size: 1rem;
        border-width: 2px;
      }
      #mobile-top .library-card .card-name { font-size: 0.85rem; }
      #mobile-top .library-card .card-meta { font-size: 0.62rem; }
      /* Two-column section: countdowns left, article category tabs right */
      #mobile-two-col {
        display: grid;
        grid-template-columns: 2fr 3fr;
        align-items: start;
        border-top: 1px solid var(--rule);
        overflow: hidden; /* prevent grid from widening the page */
      }
      #mobile-col-counts,
      #mobile-col-articles {
        min-width: 0; /* grid items must be allowed to shrink below content width */
        overflow: hidden;
      }
      #mobile-col-counts {
        border-right: 1px solid var(--hairline);
        background: var(--paper-card);
      }
      #mobile-col-counts .counter-strip {
        display: flex;
        flex-direction: column;
        border-top: none;
        border-left: none;
        padding: 0;
      }
      #mobile-col-counts .counter-card {
        min-width: 0;
        padding: 10px 10px;
        border-right: none;
      }
      #mobile-col-counts .counter-label { font-size: 7px; letter-spacing: 0.8px; }
      #mobile-col-counts .counter-value { font-size: 0.72rem; }
      #mobile-col-counts .counter-value .cv-days { font-size: 0.72rem; }
      #mobile-col-counts .counter-value .cv-suffix { font-size: 0.72rem; margin: 0 3px 0 2px; }
      /* Article tabs in right column: static (no sticky), horizontal scroll within column */
      #mobile-col-articles .col-left {
        position: static;
        overflow-x: auto;
        overflow-y: hidden;
      }

      /* Bottom tab bar */
      .section-rule > .masthead,
      .section-rule > header,
      .section-rule > .datetime-block { justify-self: auto; }
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        padding: 0;
        margin: 0;
        border-top: 1px solid var(--hairline);
        border-bottom: none;
        background: var(--paper-navbar);
        z-index: 100;
        box-shadow: 0 -2px 8px rgba(31,27,20,0.08);
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        padding: 0;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: var(--ink); }

      /* Swipe animation — tab strip and profile card slide horizontally between pages */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: full page (map + datetime + columns) slides vertically; nav stays ── */
    @media (min-width: 769px) {
      .col-left, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateY(100vh);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateY(-100vh);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateY(-100vh);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateY(100vh);
      }
    }

    /* ══════════════════════════════════════════════
       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs.
       ══════════════════════════════════════════════ */
    @view-transition { navigation: auto; }

    /* Suppress the default root crossfade — columns handle motion */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    .col-left { view-transition-name: ist-col-left; }
    .col-right { view-transition-name: ist-col-right; }

    @media (min-width: 769px) {
      @keyframes ist-vt-out-up { from { transform: translateY(0); } to { transform: translateY(-100vh); } }
      @keyframes ist-vt-in-up { from { transform: translateY(100vh); } to { transform: translateY(0); } }
      @keyframes ist-vt-out-down { from { transform: translateY(0); } to { transform: translateY(100vh); } }
      @keyframes ist-vt-in-down { from { transform: translateY(-100vh); } to { transform: translateY(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-up;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-up;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-down;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-down;
      }
    }

    @media (max-width: 768px) {
      @keyframes ist-vt-out-left { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-in-left { from { transform: translateX(100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-left;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-left;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-right;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-right;
      }
    }
    .profile-popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .profile-popup-overlay.open { display: flex; }
    .profile-popup {
      background: var(--paper); border: 1px solid var(--ink);
      width: 360px; max-width: calc(100vw - 40px); max-height: calc(100vh - 80px);
      overflow: auto; padding: 24px; position: relative; font-family: 'Inter', sans-serif;
    }
    .profile-popup .close-btn {
      position: absolute; top: 8px; right: 10px; background: none; border: none;
      font-size: 1.4rem; cursor: pointer; color: var(--muted); line-height: 1; padding: 4px 8px;
    }
    .profile-popup .close-btn:hover { color: var(--ink); }
    .profile-popup .pp-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--paper-dark); border: 1px solid #ccc;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 600; color: var(--accent);
      margin: 0 auto 14px; overflow: hidden;
    }
    .profile-popup .pp-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-popup .pp-name {
      text-align: center; font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .profile-popup .pp-meta {
      text-align: center; font-size: 0.72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
    }
    .profile-popup .pp-row {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-top: 1px solid var(--hairline); font-size: 0.8rem;
    }
    .profile-popup .pp-row .pp-label {
      color: var(--muted); text-transform: uppercase;
      font-size: 0.65rem; letter-spacing: 1.5px; align-self: center;
    }
    .profile-popup .pp-row .pp-value { color: var(--ink); font-weight: 500; text-align: right; }
    .profile-popup .pp-loading, .profile-popup .pp-error {
      text-align: center; color: var(--muted); font-size: 0.85rem; padding: 30px 0;
    }
    .kefil-link {
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: inherit; color: inherit;
      font-weight: 600; padding: 0; text-decoration: underline; text-underline-offset: 2px;
    }
    .kefil-link:hover { color: var(--accent); }
  </style>
</head>
<body>

  <!-- Mobile-only compact profile card (mounted by profile-card.js) -->
  <div id="ist-pc-mount"></div>

  <div class="section-rule">
    <div class="masthead">istanbulite<span class="tld">.net</span></div>
    <header>
      <nav>
        <a href="index.html">Anahane</a>
        <a href="kahvehane.html">Kahvehane</a>
        <a href="kutuphane.html" class="active">Kütüphane</a>
      </nav>
    </header>
    <div class="datetime-block">
      <span class="date-line" id="date-line"></span>
      <span class="sep">·</span>
      <span class="day-line" id="day-line"></span>
      <span class="sep">·</span>

  <!-- Mobile-only: compact profile injected here by mobileReorderElements() -->

      <div class="shelf-loading"><span class="spinner"></span></div>

    </div>

      <div class="loading"><span class="spinner"></span></div>
    </div>

      <div class="loading"><span class="spinner"></span></div>
    </div>
    <div class="profile-signout-wrap" id="profile-signout-wrap"></div>
  </aside>

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Anahane → Kahvehane → Kütüphane → Hane with a full-page slide.
// The entire page (map, datetime bar, both columns) translates as one unit;
// only the nav bar stays fixed. Mobile = horizontal touch swipe, desktop =
// vertical wheel swipe; CSS picks the axis per media query. Tab-bar clicks
// trigger the same animation.
// ══════════════════════════════════════════
(function initSwipePagination() {
  const PAGES = ['index.html', 'kahvehane.html', 'kutuphane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function pageFromUrl(url) {
    try { return new URL(url).pathname.split('/').pop() || 'index.html'; }
    catch(e) { return ''; }
  }
  function recordDir(dir) {
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  // Tell the browser which direction to animate by setting a VT type AND
  // toggling a class on <html>. The class is the reliable hook; some
  // browsers don't match :active-view-transition-type() consistently, so
  // our CSS targets html.vt-forward / html.vt-backward instead.
  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
        try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
      });
    });
  }

  // Fallback entry cleanup (runs on every load; releases the offscreen
  // transform that the pre-body script applied for non-VT browsers).
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      // The browser will trigger a view transition on this navigation.
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: '#ffffff',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        const ax = mobile ? 'translateX' : 'translateY';
        const pct = (dir === 'forward' ? i : -i) * 100;
        node.style.transform = ax + '(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const axis = mobile ? 'X' : 'Y';
    const endPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const keyframes = [
      { transform: 'translate' + axis + '(0%)' },
      { transform: 'translate' + axis + '(' + endPct + '%)' },
    ];
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    const a1 = leftStack.stack.animate(keyframes, opts);
    const a2 = rightStack.stack.animate(keyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  // ── Desktop: vertical wheel-based swipe anywhere on the page ──
  // Respects native scrolling: only triggers navigation when there's no
  // more content to scroll in that direction. Wheel delta is accumulated
  // so a single flick doesn't accidentally navigate.
  let wheelAccum = 0, wheelTs = 0;
  const WHEEL_THRESHOLD = 180;
  const WHEEL_RESET_MS = 220;
  function canScrollInDir(target, dy) {
    let el = target;
    while (el && el !== document.body && el !== document.documentElement) {
      if (el.scrollHeight > el.clientHeight + 1) {
        const atTop = el.scrollTop < 0.5;
        const atBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 0.5;
        if (dy > 0 && !atBottom) return true;
        if (dy < 0 && !atTop) return true;
      }
      el = el.parentElement;
    }
    return false;
  }
  document.addEventListener('wheel', (e) => {
    if (isMobile()) return;
    if (navigating) { e.preventDefault(); return; }
    if (e.target.closest && e.target.closest('nav')) { wheelAccum = 0; return; }
    const dy = e.deltaY;
    if (Math.abs(dy) < 1) return;
    if (canScrollInDir(e.target, dy)) {
      wheelAccum = 0;
      return; // let a nested scroll container scroll normally
    }
    // At a scroll boundary — suppress overscroll and accumulate toward navigation.
    e.preventDefault();
    const now = Date.now();
    if (now - wheelTs > WHEEL_RESET_MS) wheelAccum = 0;
    wheelTs = now;
    wheelAccum += dy;
    if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
      const curr = currentIdx();
      const accum = wheelAccum;
      wheelAccum = 0;
      if (accum > 0) navigate(curr + 1, 'forward');
      else           navigate(curr - 1, 'backward');
    }
  }, { passive: false });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const en = I18N.isEnglish();
  const locale = en ? 'en-US' : 'tr-TR';
  const day = now.toLocaleDateString(locale, { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString(locale, { ...opts, month: 'long' });
  const year = now.toLocaleDateString(locale, { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString(locale, { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString(locale, { ...opts, hour: '2-digit', minute: '2-digit', hour12: en });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

// Mobile: pin source tab strip just below the date/time bar.
function updateTabStripOffset() {
  if (window.innerWidth > 768) return;
  const sr = document.querySelector('.section-rule');
  const cl = document.querySelector('.col-left');
  if (sr && cl) cl.style.top = sr.offsetHeight + 'px';
}
updateTabStripOffset();
window.addEventListener('resize', updateTabStripOffset);

// Mobile layout (≤768px):
//   1. profile card  (full width)
//   2. HESAP section (full width, col-right minus library-card)
//   3. two columns:  countdowns (left) | article category tabs (right)
//   4. article area  (full width, below)
// Elements are physically relocated so JS that populates them by id still works.
(function () {
  const MOBILE_BP = 768;
  // When viewing another user's profile (?user=ID), tag the body early so the
  // legacy mobile layout takes effect synchronously instead of waiting for
  // loadProfile() to set the class.
  if (new URLSearchParams(window.location.search).get('user')) {
    document.body.classList.add('ist-viewing-other');
  }
  const mobileTop         = document.getElementById('mobile-top');
  const mobileTwoCol      = document.getElementById('mobile-two-col');
  const mobileColCounts   = document.getElementById('mobile-col-counts');
  const mobileColArticles = document.getElementById('mobile-col-articles');
  const card    = document.getElementById('library-card');
  const strip   = document.getElementById('counter-strip');
  const colLeft = document.querySelector('aside.col-left');
  const colRight = document.querySelector('aside.col-right');

  if (!mobileTop || !mobileTwoCol || !mobileColCounts || !mobileColArticles) return;
  if (!card || !strip || !colLeft || !colRight) return;

  // Capture original positions before any moves.
  const cardBefore  = card.nextSibling; // = .profile-right div (stays in col-right always)

  let inMobile = null;

  function applyLayout() {
    const mobile = window.innerWidth <= MOBILE_BP;
    if (mobile === inMobile) return;
    inMobile = mobile;
    if (mobile) {
      // When viewing another user, fall back to the legacy layout: move the
      // library-card and col-right to the top. Otherwise the shared
      // #ist-pc-mount widget renders the self-profile card and HESAP info, and
      // we leave the library-card / col-right hidden via CSS.
      if (document.body.classList.contains('ist-viewing-other')) {
        mobileTop.appendChild(card);
        document.body.insertBefore(colRight, colLeft);
      }
      mobileColCounts.appendChild(strip);
      mobileColArticles.appendChild(colLeft);
    } else {
      // Restore: col-left back to body before mobile-two-col
      document.body.insertBefore(colLeft, mobileTwoCol);
      // Restore: counter-strip back into col-left
      colLeft.appendChild(strip);
    }
  }

  applyLayout();

  let raf = null;
  window.addEventListener('resize', () => {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(applyLayout);
  });
}());

// ── Kütüphane: topic tabs → article list → article detail ──
// Reads articles, categories, and counters from public.library_articles,
// public.library_categories, public.library_counters (see db/library_categories_v4.sql).
let LIB_CATEGORIES = []; // [{ id, label_tr, position }]
let LIB_CATEGORY_LABELS = {}; // { id: label_tr }
let activeCategoryId = null;

const LIB_SORT_OPTIONS = [
  { value: 'newest', label: 'Yeni → Eski' },
  { value: 'oldest', label: 'Eski → Yeni' },
  { value: 'liked', label: 'En çok beğenilen' },
  { value: 'disliked', label: 'En çok beğenilmeyen' },
  { value: 'commented', label: 'En çok konuşulan' },
  { value: 'contested', label: 'En tartışmalı' },
];
let currentSort = 'newest';

function libEsc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

async function fetchLibraryCategory(categoryId) {
  const { data, error } = await sb.from('library_articles')
    .select('*').eq('category', categoryId)
    .order('position', { ascending: true })
    .order('created_at', { ascending: false });
  if (error) {
    console.error('[kutuphane library fetch]', error);
    return [];
  }
  return data || [];
}

async function loadLibraryCategories() {
  const { data, error } = await sb.from('library_categories')
    .select('*').order('position', { ascending: true });
  if (error) {
    console.error('[kutuphane categories fetch]', error);
    return [];
  }
  LIB_CATEGORIES = data || [];
  LIB_CATEGORY_LABELS = {};
  LIB_CATEGORIES.forEach(c => { LIB_CATEGORY_LABELS[c.id] = c.label_tr; });
  return LIB_CATEGORIES;
}

function renderCategoryTabs() {
  const shelf = document.getElementById('library-shelf');
  if (!shelf) return;
  if (!LIB_CATEGORIES.length) {
    shelf.innerHTML = '<div class="shelf-loading">Kategori yok.</div>';
    return;
  }
  shelf.innerHTML = LIB_CATEGORIES.map(c => `
    <button class="source-tab${c.id === activeCategoryId ? ' active' : ''}" data-category="${libEsc(c.id)}">${libEsc(c.label_tr)}</button>
  `).join('');
  shelf.querySelectorAll('.source-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeCategoryId = tab.dataset.category;
      renderCategoryList(activeCategoryId);
    });
  });
}

// ── Counter strip: live-ticking sidebar counters from library_counters ──
let COUNTERS = [];
let counterTickInterval = null;

async function loadCounters() {
  const { data, error } = await sb.from('library_counters')
    .select('*').order('position', { ascending: true });
  if (error) {
    console.error('[kutuphane counters fetch]', error);
    COUNTERS = [];
    return;
  }
  COUNTERS = data || [];
}

function renderCounterStrip() {
  const strip = document.getElementById('counter-strip');
  if (!strip) return;
  if (!COUNTERS.length) {
    strip.innerHTML = '';
    return;
  }
  strip.innerHTML = COUNTERS.map((c, i) => `
    <div class="counter-card" data-counter-id="${libEsc(c.id)}">
      <div class="counter-label">${libEsc(c.label_tr)}</div>
      <div class="counter-value" id="counter-val-${i}"></div>
    </div>
  `).join('');
  tickCounters();
  if (counterTickInterval) clearInterval(counterTickInterval);
  // Refresh once a minute — counters tick at day granularity, so finer
  // updates would just spin the CPU without changing the rendered text.
  counterTickInterval = setInterval(tickCounters, 60000);
}

function tickCounters() {
  const now = Date.now();
  COUNTERS.forEach((c, i) => {
    const el = document.getElementById('counter-val-' + i);
    if (!el) return;
    el.innerHTML = formatElapsed(c.start_date, now);
  });
}

function formatElapsed(startDateStr, now) {
  if (!startDateStr) return '<span class="cv-suffix">—</span>';
  // Treat the start_date as Istanbul-local midnight so the counter
  // ticks over at midnight there, not UTC.
  const start = new Date(startDateStr + 'T00:00:00+03:00').getTime();
  const diffMs = now - start;
  if (diffMs < 0) return '<span class="cv-suffix">Henüz başlamadı</span>';
  const totalMins = Math.floor(diffMs / 60000);
  const totalDays = Math.floor(totalMins / 1440);
  const years = Math.floor(totalDays / 365);
  const days = totalDays % 365;
  const hours = Math.floor((totalMins % 1440) / 60);
  const mins = totalMins % 60;
  return `
    <span class="cv-days">${years}</span><span class="cv-suffix">${I18N.t('profile.years')}</span>
    <span class="cv-days">${days}</span><span class="cv-suffix">${I18N.t('profile.days')}</span>
    <span class="cv-days">${hours}</span><span class="cv-suffix">${I18N.t('profile.hours')}</span>
    <span class="cv-days">${mins}</span><span class="cv-suffix">${I18N.t('profile.minutes')}</span>
  `;
}

// Pull reaction counts + comment counts for a given set of article ids
// so the client can sort by liked / disliked / commented without an RPC.
async function fetchArticleStats(articleIds) {
  if (!articleIds.length) return { likes: {}, dislikes: {}, comments: {} };
  const [rxRes, cmRes] = await Promise.all([
    sb.from('library_article_reactions').select('article_id, reaction').in('article_id', articleIds),
    sb.from('library_article_comments').select('article_id').in('article_id', articleIds),
  ]);
  const likes = {}, dislikes = {}, comments = {};
  (rxRes.data || []).forEach(r => {
    if (r.reaction === 'like') likes[r.article_id] = (likes[r.article_id] || 0) + 1;
    else if (r.reaction === 'dislike') dislikes[r.article_id] = (dislikes[r.article_id] || 0) + 1;
  });
  (cmRes.data || []).forEach(c => {
    comments[c.article_id] = (comments[c.article_id] || 0) + 1;
  });
  return { likes, dislikes, comments };
}

function sortKey(a) {
  // Newest/oldest prefer published_at, fall back to created_at.
  return new Date(a.published_at || a.created_at || 0).getTime();
}

// Contested score: 0 when one side dominates, 1 at a perfect 50/50.
// Articles with no reactions score 0 so they sink to the bottom.
function contestedScore(likes, dislikes) {
  const total = likes + dislikes;
  if (total === 0) return 0;
  return 1 - Math.abs(likes - dislikes) / total;
}

function applySort(articles, stats, sort) {
  const copy = articles.slice();
  if (sort === 'newest') copy.sort((a, b) => sortKey(b) - sortKey(a));
  else if (sort === 'oldest') copy.sort((a, b) => sortKey(a) - sortKey(b));
  else if (sort === 'liked') copy.sort((a, b) => (stats.likes[b.id] || 0) - (stats.likes[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'disliked') copy.sort((a, b) => (stats.dislikes[b.id] || 0) - (stats.dislikes[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'commented') copy.sort((a, b) => (stats.comments[b.id] || 0) - (stats.comments[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'contested') {
    copy.sort((a, b) => {
      const ca = contestedScore(stats.likes[a.id] || 0, stats.dislikes[a.id] || 0);
      const cb = contestedScore(stats.likes[b.id] || 0, stats.dislikes[b.id] || 0);
      if (cb !== ca) return cb - ca;
      // Tiebreaker: more total reactions wins, then newest.
      const ta = (stats.likes[a.id] || 0) + (stats.dislikes[a.id] || 0);
      const tb = (stats.likes[b.id] || 0) + (stats.dislikes[b.id] || 0);
      return (tb - ta) || (sortKey(b) - sortKey(a));
    });
  }
  return copy;
}

function formatReactionPct(likes, dislikes) {
  const total = likes + dislikes;
  if (total === 0) return { likeLabel: '—', dislikeLabel: '—' };
  const likePct = Math.round((likes / total) * 100);
  return { likeLabel: likePct + '%', dislikeLabel: (100 - likePct) + '%' };
}

async function loadReactions(articleId) {
  const { data: { session } } = await sb.auth.getSession();
  const myUid = session?.user?.id;

  const { data, error } = await sb.from('library_article_reactions')
    .select('user_id, reaction').eq('article_id', articleId);
  if (error) { console.error('[reactions]', error); return; }
  let likes = 0, dislikes = 0, mine = null;
  (data || []).forEach(r => {
    if (r.reaction === 'like') likes++;
    else if (r.reaction === 'dislike') dislikes++;
    if (myUid && r.user_id === myUid) mine = r.reaction;
  });
  const likeEl = document.getElementById('rx-like');
  const dislikeEl = document.getElementById('rx-dislike');
  if (!likeEl || !dislikeEl) return;
  const { likeLabel, dislikeLabel } = formatReactionPct(likes, dislikes);
  document.getElementById('rx-like-count').textContent = likeLabel;
  document.getElementById('rx-dislike-count').textContent = dislikeLabel;
  likeEl.classList.toggle('active', mine === 'like');
  dislikeEl.classList.toggle('active', mine === 'dislike');
}

async function toggleReaction(articleId, reaction) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { alert('Önce giriş yapın.'); return; }
  const uid = session.user.id;

  // Find current reaction (if any).
  const { data: existing } = await sb.from('library_article_reactions')
    .select('reaction').eq('article_id', articleId).eq('user_id', uid).maybeSingle();

  if (existing && existing.reaction === reaction) {
    // Toggle off.
    await sb.from('library_article_reactions').delete()
      .eq('article_id', articleId).eq('user_id', uid);
  } else {
    // Insert or switch via upsert.
    await sb.from('library_article_reactions')
      .upsert({ article_id: articleId, user_id: uid, reaction }, { onConflict: 'article_id,user_id' });
  }
  loadReactions(articleId);
}

function formatRelative(iso) {
  const d = new Date(iso);
  const mins = Math.floor((Date.now() - d.getTime()) / 60000);
  const en = I18N.isEnglish();
  if (mins < 1) return en ? 'now' : 'şimdi';
  if (mins < 60) return en ? `${mins}m ago` : `${mins} dk önce`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return en ? `${hrs}h ago` : `${hrs} saat önce`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return en ? `${days}d ago` : `${days} gün önce`;
  return I18N.formatDate(d, { year:'numeric', month:'short', day:'numeric' });
}

// Read game scores from Supabase's game_results table, aggregating per game.
// Falls back to localStorage if the query fails (table missing, offline, etc.).
async function getGameScores(userId) {
  // Compute per-game current streak from the set of winning dates: count back
  // from today (or yesterday, if today wasn't won) over consecutive days.
  function currentStreakFor(winDates) {
    function seedForOffset(off) {
      const now = new Date();
      const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
      ist.setDate(ist.getDate() - off);
      return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
    }
    let streak = 0;
    let offset = winDates.has(seedForOffset(0)) ? 0 : 1;
    while (winDates.has(seedForOffset(offset))) { streak++; offset++; }
    return streak;
  }
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('game, won, date')
      .eq('user_id', userId);
    if (error) throw error;
    // Dedupe per (game, date): a date counts as "played" if any row exists,
    // and as "won" if any row has won=true. (We insert a "started" row on
    // first interaction with attempts=0, won=false.)
    const byGameDate = {};
    (data || []).forEach(r => {
      const key = r.game + '|' + r.date;
      if (!byGameDate[key]) byGameDate[key] = { game: r.game, date: r.date, won: false };
      if (r.won) byGameDate[key].won = true;
    });
    const agg = {
      bulmacaPlayed: 0, bulmacaWins: 0,
      sozcelPlayed: 0, sozcelWins: 0,
      baglantilarPlayed: 0, baglantilarWins: 0,
    };
    const winDatesByGame = { bulmaca: new Set(), sozcel: new Set(), baglantilar: new Set() };
    Object.values(byGameDate).forEach(entry => {
      if (entry.game === 'bulmaca') {
        agg.bulmacaPlayed++;
        if (entry.won) { agg.bulmacaWins++; winDatesByGame.bulmaca.add(entry.date); }
      } else if (entry.game === 'sozcel') {
        agg.sozcelPlayed++;
        if (entry.won) { agg.sozcelWins++; winDatesByGame.sozcel.add(entry.date); }
      } else if (entry.game === 'baglantilar') {
        agg.baglantilarPlayed++;
        if (entry.won) { agg.baglantilarWins++; winDatesByGame.baglantilar.add(entry.date); }
      }
    });
    agg.sozcelStreak = currentStreakFor(winDatesByGame.sozcel);
    agg.bulmacaStreak = currentStreakFor(winDatesByGame.bulmaca);
    agg.baglantilarStreak = currentStreakFor(winDatesByGame.baglantilar);
    return agg;
  } catch (e) {
    return {
      bulmacaWins: 0, bulmacaPlayed: 0, bulmacaStreak: 0,
      sozcelWins: 0, sozcelPlayed: 0, sozcelStreak: 0,
      baglantilarWins: 0, baglantilarPlayed: 0, baglantilarStreak: 0,
    };
  }
}

  const en = I18N.isEnglish();
  if (diffMins < 1) return en ? 'Online now' : 'Şimdi çevrimiçi';
  if (diffMins < 60) return en ? `${diffMins}m ago` : `${diffMins} dk önce`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return en ? `${diffHours}h ago` : `${diffHours} saat önce`;

  if (diffDays < 7) return en ? `${diffDays}d ago` : `${diffDays} gün önce`;
  return I18N.formatDate(d, { year: 'numeric', month: 'long', day: 'numeric' });
}

function generateReferralCode() {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let out = '';
  for (let i = 0; i < 8; i++) {

        msg.style.color = 'var(--muted)';
        setTimeout(() => window.location.reload(), 600);
        return;
      }
      lastErr = error;
      // 23505 = unique_violation. Retry with a new referral_code.
      if (error && error.code === '23505' && /referral_code/i.test(error.message || '')) continue;
      break;
    }
    btn.disabled = false;
    btn.textContent = 'Oluştur';
    console.error('[hane bootstrap] insert failed', lastErr);
    msg.textContent = 'Oluşturulamadı: ' + (lastErr?.message || 'bilinmeyen hata');
    msg.style.color = 'var(--accent)';
  });
}

console.log('[hane loadProfile] auth user.id =', user.id, 'profile =', profile, 'profileError =', profileError, 'session role =', session?.user?.role, 'access_token len =', session?.access_token?.length);

        .eq('id', prof.referred_by)
        .maybeSingle();
      if (kp) {
        kefilName = capitalizeName((`${kp.first_name || ''} ${kp.last_name || ''}`).trim()) || 'İsimsiz Üye';
        kefilId = kp.id;
      }
    }

    const fullName = capitalizeName((`${prof.first_name || ''} ${prof.last_name || ''}`).trim()) || 'İsimsiz Üye';
    const avatar = prof.avatar_url
      ? `<img src="${prof.avatar_url}" alt="">`
      : (fullName.charAt(0) || '?').toUpperCase();
    const birth = nbLabel(prof.birth_place);

    body.innerHTML = `
      <div class="pp-avatar">${avatar}</div>
      <div class="pp-name">${fullName}</div>
      <div class="pp-meta">${nbLabel(prof.neighborhood)}</div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.birthplace')}</span><span class="pp-value">${birth}</span></div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.membership')}</span><span class="pp-value">${fmtDate(prof.joined_at)}</span></div>
      ${kefilName ? `<div class="pp-row"><span class="pp-label">${I18N.t('profile.kefil')}</span><span class="pp-value"><button class="kefil-link" data-user-id="${kefilId}">${kefilName}</button></span></div>` : ''}
    `;
  }

  // Delegate all .kefil-link clicks to open the popup
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.kefil-link');
    if (!btn) return;
    const id = btn.getAttribute('data-user-id');
    if (id) open(id);
  });
})();
</script>
</body>
</html>
