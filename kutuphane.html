<script>
// Wrapped in a scoping IIFE so this page's top-level declarations (sb,
// neighborhoodNames, etc.) don't leak to the global scope -- a future
// client-side navigation may execute this same script a second time in a
// document that already ran another carousel page's script, and without
// this wrapper a repeated `const` at global scope throws a
// duplicate-declaration SyntaxError.
(function () {
// Mobile: pin source tab strip just below the top nav bar.
function updateTabStripOffset() {
  if (window.innerWidth > 768) return;
  const sr = document.querySelector('.section-rule');
  const cl = document.querySelector('.col-left');
  if (sr && cl) cl.style.top = sr.offsetHeight + 'px';
}
updateTabStripOffset();
window.addEventListener('resize', updateTabStripOffset);

// Mobile layout (≤768px): surface the legacy profile card at the top when
// viewing another user's profile (?user=ID); self-view uses #ist-pc-mount.
(function () {
  const MOBILE_BP = 768;
  if (new URLSearchParams(window.location.search).get('user')) {
    document.body.classList.add('ist-viewing-other');
  }
  const mobileTop = document.getElementById('mobile-top');
  const card      = document.getElementById('library-card');
  const colLeft   = document.querySelector('aside.col-left');

  if (!mobileTop || !card || !colLeft) return;

  let inMobile = null;

  function applyLayout() {
    const mobile = window.innerWidth <= MOBILE_BP;
    if (mobile === inMobile) return;
    inMobile = mobile;
    if (mobile && document.body.classList.contains('ist-viewing-other')) {
      mobileTop.appendChild(card);
    }
  }

  applyLayout();

  let raf = null;
  window.addEventListener('resize', () => {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(applyLayout);
  });
}());

// ── Kütüphane: topic tabs → article list → article detail ──
// Reads articles and categories from public.library_articles,
// public.library_categories (see db/library_categories_v4.sql).
let LIB_CATEGORIES = []; // [{ id, label_tr, position }]
let LIB_CATEGORY_LABELS = {}; // { id: label_tr }
let activeCategoryId = null;

const LIB_SORT_OPTIONS = [
  { value: 'newest', label: 'Yeni → Eski' },
  { value: 'oldest', label: 'Eski → Yeni' },
  { value: 'liked', label: 'En çok beğenilen' },
  { value: 'disliked', label: 'En çok beğenilmeyen' },
  { value: 'commented', label: 'En çok konuşulan' },
  { value: 'contested', label: 'En tartışmalı' },
];
let currentSort = 'newest';

function libEsc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

async function fetchLibraryCategory(categoryId) {
  const { data, error } = await sb.from('library_articles')
    .select('*').eq('category', categoryId)
    .order('position', { ascending: true })
    .order('created_at', { ascending: false });
  if (error) {
    console.error('[kutuphane library fetch]', error);
    return [];
  }
  return data || [];
}

async function loadLibraryCategories() {
  const { data, error } = await sb.from('library_categories')
    .select('*').order('position', { ascending: true });
  if (error) {
    console.error('[kutuphane categories fetch]', error);
    return [];
  }
  LIB_CATEGORIES = data || [];
  LIB_CATEGORY_LABELS = {};
  LIB_CATEGORIES.forEach(c => { LIB_CATEGORY_LABELS[c.id] = c.label_tr; });
  return LIB_CATEGORIES;
}

function renderCategoryTabs() {
  const shelf = document.getElementById('library-shelf');
  if (!shelf) return;
  if (!LIB_CATEGORIES.length) {
    shelf.innerHTML = '<div class="shelf-loading">Kategori yok.</div>';
    return;
  }
  shelf.innerHTML = LIB_CATEGORIES.map(c => `
    <button class="source-tab${c.id === activeCategoryId ? ' active' : ''}" data-category="${libEsc(c.id)}">${libEsc(c.label_tr)}</button>
  `).join('');
  shelf.querySelectorAll('.source-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeCategoryId = tab.dataset.category;
      renderCategoryList(activeCategoryId);
    });
  });
}

// Pull reaction counts + comment counts for a given set of article ids
// so the client can sort by liked / disliked / commented without an RPC.
async function fetchArticleStats(articleIds) {
  if (!articleIds.length) return { likes: {}, dislikes: {}, comments: {} };
  const [rxRes, cmRes] = await Promise.all([
    sb.from('library_article_reactions').select('article_id, reaction').in('article_id', articleIds),
    sb.from('library_article_comments').select('article_id').in('article_id', articleIds),
  ]);
  const likes = {}, dislikes = {}, comments = {};
  (rxRes.data || []).forEach(r => {
    if (r.reaction === 'like') likes[r.article_id] = (likes[r.article_id] || 0) + 1;
    else if (r.reaction === 'dislike') dislikes[r.article_id] = (dislikes[r.article_id] || 0) + 1;
  });
  (cmRes.data || []).forEach(c => {
    comments[c.article_id] = (comments[c.article_id] || 0) + 1;
  });
  return { likes, dislikes, comments };
}

function sortKey(a) {
  // Newest/oldest prefer published_at, fall back to created_at.
  return new Date(a.published_at || a.created_at || 0).getTime();
}

// Contested score: 0 when one side dominates, 1 at a perfect 50/50.
// Articles with no reactions score 0 so they sink to the bottom.
function contestedScore(likes, dislikes) {
  const total = likes + dislikes;
  if (total === 0) return 0;
  return 1 - Math.abs(likes - dislikes) / total;
}

function applySort(articles, stats, sort) {
  const copy = articles.slice();
  if (sort === 'newest') copy.sort((a, b) => sortKey(b) - sortKey(a));
  else if (sort === 'oldest') copy.sort((a, b) => sortKey(a) - sortKey(b));
  else if (sort === 'liked') copy.sort((a, b) => (stats.likes[b.id] || 0) - (stats.likes[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'disliked') copy.sort((a, b) => (stats.dislikes[b.id] || 0) - (stats.dislikes[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'commented') copy.sort((a, b) => (stats.comments[b.id] || 0) - (stats.comments[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'contested') {
    copy.sort((a, b) => {
      const ca = contestedScore(stats.likes[a.id] || 0, stats.dislikes[a.id] || 0);
      const cb = contestedScore(stats.likes[b.id] || 0, stats.dislikes[b.id] || 0);
      if (cb !== ca) return cb - ca;
      // Tiebreaker: more total reactions wins, then newest.
      const ta = (stats.likes[a.id] || 0) + (stats.dislikes[a.id] || 0);
      const tb = (stats.likes[b.id] || 0) + (stats.dislikes[b.id] || 0);
      return (tb - ta) || (sortKey(b) - sortKey(a));
    });
  }
  return copy;
}

function formatReactionPct(likes, dislikes) {
  const total = likes + dislikes;
  if (total === 0) return { likeLabel: '—', dislikeLabel: '—' };
  const likePct = Math.round((likes / total) * 100);
  return { likeLabel: likePct + '%', dislikeLabel: (100 - likePct) + '%' };
}

async function renderCategoryList(categoryId) {
  const area = document.getElementById('article-area');
  const name = LIB_CATEGORY_LABELS[categoryId];
  if (!area || !name) return;
  activeCategoryId = categoryId;
  document.querySelectorAll('.source-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.category === categoryId);
  });
  area.innerHTML = `
    <div class="article-list">
      <div class="list-head">
        <div class="source-heading">${name}</div>
        <label class="sort-control">
          <span>Sırala</span>
          <select id="sort-select">
            ${LIB_SORT_OPTIONS.map(o => `<option value="${o.value}"${o.value === currentSort ? ' selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </label>
      </div>
      <div class="empty-state"><span class="spinner"></span></div>
    </div>
  `;
  document.getElementById('sort-select').addEventListener('change', (e) => {
    currentSort = e.target.value;
    renderCategoryList(categoryId);
  });
  const articles = await fetchLibraryCategory(categoryId);
  if (!articles.length) {
    area.querySelector('.empty-state').textContent = 'Henüz makale yok.';
    return;
  }
  const stats = await fetchArticleStats(articles.map(a => a.id));
  const sorted = applySort(articles, stats, currentSort);
  const items = sorted.map(a => {
    const meta = [
      a.author ? libEsc(a.author) : null,
      a.published_at ? libEsc(formatLibDate(a.published_at)) : null,
    ].filter(Boolean).join(' · ');
    const likes = stats.likes[a.id] || 0;
    const dislikes = stats.dislikes[a.id] || 0;
    const { likeLabel, dislikeLabel } = formatReactionPct(likes, dislikes);
    const counts = `
      <span class="item-counts">
        <span title="Beğenenler">👍 ${likeLabel}</span>
        <span title="Beğenmeyenler">👎 ${dislikeLabel}</span>
        <span title="Yorumlar">💬 ${stats.comments[a.id] || 0}</span>
      </span>
    `;
    return `
      <div class="article-item" data-id="${a.id}">
        <div class="item-title">${libEsc(a.title)}</div>
        ${meta ? `<div class="item-byline">${meta}</div>` : ''}
        <div class="item-summary">${libEsc(a.summary || '')}</div>
        ${counts}
      </div>
    `;
  }).join('');
  area.innerHTML = `
    <div class="article-list">
      <div class="list-head">
        <div class="source-heading">${name}</div>
        <label class="sort-control">
          <span>Sırala</span>
          <select id="sort-select">
            ${LIB_SORT_OPTIONS.map(o => `<option value="${o.value}"${o.value === currentSort ? ' selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </label>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('sort-select').addEventListener('change', (e) => {
    currentSort = e.target.value;
    renderCategoryList(categoryId);
  });
  area.querySelectorAll('.article-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const article = articles.find(x => x.id === id);
      if (article) renderArticleDetail(categoryId, article);
    });
  });
}

function formatLibDate(iso) {
  if (!iso) return '';
  try {
    return I18N.formatDate(iso, { year:'numeric', month:'long', day:'numeric' });
  } catch { return ''; }
}

// Plain (non-paginated) article body: escapes text and turns newlines into
// <br>, except lines that are just an [[img::URL]] token, which become an
// inline image instead.
function renderPlainBodyWithImages(text) {
  const imgLineRe = /^\s*\[\[img::(\S+?)\]\]\s*$/;
  return String(text).replace(/\r\n/g, '\n').split('\n').map(line => {
    const m = line.match(imgLineRe);
    return m ? `<img class="body-img" src="${libEsc(m[1])}" alt="" loading="lazy">` : libEsc(line);
  }).join('<br>');
}

function renderArticleDetail(categoryId, article) {
  const area = document.getElementById('article-area');
  const name = LIB_CATEGORY_LABELS[categoryId];
  if (!area || !article) return;
  const byline = [
    article.author ? libEsc(article.author) : null,
    article.published_at ? libEsc(formatLibDate(article.published_at)) : null,
  ].filter(Boolean).join(' · ');
  area.innerHTML = `
    <div class="article-detail">
      <button class="back-btn" id="back-to-list">← ${name}</button>
      <div class="detail-source">${name}</div>
      <div class="detail-title">${libEsc(article.title)}</div>
      ${byline ? `<div class="detail-byline">${byline}</div>` : ''}
      ${article.summary ? `<div class="detail-summary">${libEsc(article.summary)}</div>` : ''}
      ${article.body ? `<div class="detail-body">${renderPlainBodyWithImages(article.body)}</div>` : ''}
      ${article.url ? `<a class="detail-link" href="${article.url}" target="_blank" rel="noopener">Kaynakta Oku ↗</a>` : ''}

      <div class="reaction-bar" id="reaction-bar">
        <button class="reaction-btn" data-rx="like" id="rx-like">
          <span class="rx-icon">👍</span>
          <span class="rx-count" id="rx-like-count">—</span>
        </button>
        <button class="reaction-btn" data-rx="dislike" id="rx-dislike">
          <span class="rx-icon">👎</span>
          <span class="rx-count" id="rx-dislike-count">—</span>
        </button>
      </div>

      <section class="article-comments" id="article-comments">
        <h3 class="comments-heading">Yorumlar</h3>
        <div class="comments-list" id="comments-list">
          <div class="empty-state" style="padding:12px;"><span class="spinner"></span></div>
        </div>
        <form class="comment-composer" id="comment-composer">
          <textarea id="comment-body" maxlength="5000" placeholder="Yorumunuzu yazın..." rows="3"></textarea>
          <div class="composer-row">
            <span class="composer-msg" id="composer-msg"></span>
            <button type="submit" class="composer-submit" id="comment-submit">Gönder</button>
          </div>
        </form>
      </section>
    </div>
  `;
  document.getElementById('back-to-list').addEventListener('click', () => renderCategoryList(categoryId));
  loadComments(article.id);
  loadReactions(article.id);
  document.getElementById('comment-composer').addEventListener('submit', (e) => {
    e.preventDefault();
    submitComment(article.id);
  });
  document.querySelectorAll('#reaction-bar .reaction-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleReaction(article.id, btn.dataset.rx));
  });
}

async function loadReactions(articleId) {
  const { data: { session } } = await sb.auth.getSession();
  const myUid = session?.user?.id;

  const { data, error } = await sb.from('library_article_reactions')
    .select('user_id, reaction').eq('article_id', articleId);
  if (error) { console.error('[reactions]', error); return; }
  let likes = 0, dislikes = 0, mine = null;
  (data || []).forEach(r => {
    if (r.reaction === 'like') likes++;
    else if (r.reaction === 'dislike') dislikes++;
    if (myUid && r.user_id === myUid) mine = r.reaction;
  });
  const likeEl = document.getElementById('rx-like');
  const dislikeEl = document.getElementById('rx-dislike');
  if (!likeEl || !dislikeEl) return;
  const { likeLabel, dislikeLabel } = formatReactionPct(likes, dislikes);
  document.getElementById('rx-like-count').textContent = likeLabel;
  document.getElementById('rx-dislike-count').textContent = dislikeLabel;
  likeEl.classList.toggle('active', mine === 'like');
  dislikeEl.classList.toggle('active', mine === 'dislike');
}

async function toggleReaction(articleId, reaction) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { alert('Önce giriş yapın.'); return; }
  const uid = session.user.id;

  // Find current reaction (if any).
  const { data: existing } = await sb.from('library_article_reactions')
    .select('reaction').eq('article_id', articleId).eq('user_id', uid).maybeSingle();

  if (existing && existing.reaction === reaction) {
    // Toggle off.
    await sb.from('library_article_reactions').delete()
      .eq('article_id', articleId).eq('user_id', uid);
  } else {
    // Insert or switch via upsert.
    await sb.from('library_article_reactions')
      .upsert({ article_id: articleId, user_id: uid, reaction }, { onConflict: 'article_id,user_id' });
  }
  loadReactions(articleId);
}

async function loadComments(articleId) {
  const listEl = document.getElementById('comments-list');
  if (!listEl) return;
  const { data: { session } } = await sb.auth.getSession();
  const currentUid = session?.user?.id;

  const { data: comments, error } = await sb.from('library_article_comments')
    .select('*').eq('article_id', articleId)
    .order('created_at', { ascending: true });
  if (error) { listEl.innerHTML = `<div class="empty-state" style="padding:12px;">Yorumlar yüklenemedi.</div>`; return; }
  if (!comments || !comments.length) {
    listEl.innerHTML = '<div class="empty-state" style="padding:12px;">Henüz yorum yok.</div>';
    return;
  }

  const authorIds = [...new Set(comments.map(c => c.author_id))];
  const { data: authors } = await sb.from('profiles_public')
    .select('id, first_name, last_name, neighborhood')
    .in('id', authorIds);
  const authorMap = {};
  (authors || []).forEach(p => { authorMap[p.id] = p; });

  listEl.innerHTML = comments.map(c => {
    const a = authorMap[c.author_id] || {};
    const name = capitalizeName(((a.first_name || '') + ' ' + (a.last_name || '')).trim()) || 'Üye';
    const nb = a.neighborhood ? (' · ' + libEsc(a.neighborhood)) : '';
    const when = formatRelative(c.created_at);
    const own = currentUid && c.author_id === currentUid;
    return `
      <div class="comment-row">
        <div class="comment-meta">
          <span class="comment-author">${libEsc(name)}</span>
          <span class="comment-when">${when}${nb}</span>
          ${own ? `<button class="comment-delete" data-id="${c.id}" type="button">Sil</button>` : ''}
        </div>
        <div class="comment-body">${libEsc(c.body).replace(/\n/g, '<br>')}</div>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.comment-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Yorumu sil?')) return;
      const { error } = await sb.from('library_article_comments').delete().eq('id', btn.dataset.id);
      if (error) { alert('Silinemedi: ' + error.message); return; }
      loadComments(articleId);
    });
  });
}

function formatRelative(iso) {
  const d = new Date(iso);
  const mins = Math.floor((Date.now() - d.getTime()) / 60000);
  const en = I18N.isEnglish();
  if (mins < 1) return en ? 'now' : 'şimdi';
  if (mins < 60) return en ? `${mins}m ago` : `${mins} dk önce`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return en ? `${hrs}h ago` : `${hrs} saat önce`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return en ? `${days}d ago` : `${days} gün önce`;
  return I18N.formatDate(d, { year:'numeric', month:'short', day:'numeric' });
}

async function submitComment(articleId) {
  const ta = document.getElementById('comment-body');
  const btn = document.getElementById('comment-submit');
  const msg = document.getElementById('composer-msg');
  const body = ta.value.trim();
  if (!body) { msg.textContent = 'Boş bırakılamaz.'; return; }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { msg.textContent = 'Önce giriş yapın.'; return; }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';
  msg.textContent = '';

  const { error } = await sb.from('library_article_comments')
    .insert([{ article_id: articleId, author_id: session.user.id, body }]);

  btn.disabled = false;
  btn.textContent = 'Gönder';

  if (error) { msg.textContent = 'Hata: ' + error.message; return; }
  ta.value = '';
  loadComments(articleId);
}

// ══════════════════════════════════════════
// Kütüphane v5 reader: shelves → article path → article reader
// ══════════════════════════════════════════
let SHELVES_CACHE = [];
let SHELF_COUNTS = {};
let SHELF_ARTICLE_IDS = {};
let LIB_USER_ID = null;

async function loadShelvesUI() {
  const shelvesEl = document.getElementById('shelves');
  if (!shelvesEl) return;
  const [shRes, artRes, userId] = await Promise.all([
    sb.from('library_shelves').select('*').order('id', { ascending: true }),
    sb.from('library_articles').select('id, shelf_id'),
    libGetCurrentUserId(),
  ]);
  if (shRes.error) {
    shelvesEl.innerHTML = `<div class="empty-state" style="padding:20px;font-size:0.78rem;">Raflar yüklenemedi.</div>`;
    return;
  }
  SHELVES_CACHE = shRes.data || [];
  LIB_USER_ID = userId;
  SHELF_COUNTS = {};
  SHELF_ARTICLE_IDS = {};
  (artRes.data || []).forEach(r => {
    if (r.shelf_id == null) return;
    SHELF_COUNTS[r.shelf_id] = (SHELF_COUNTS[r.shelf_id] || 0) + 1;
    (SHELF_ARTICLE_IDS[r.shelf_id] || (SHELF_ARTICLE_IDS[r.shelf_id] = [])).push(r.id);
  });

  if (!SHELVES_CACHE.length) {
    shelvesEl.innerHTML = `<div class="empty-state" style="padding:20px;font-size:0.78rem;">Henüz raf yok.</div>`;
    return;
  }

  renderShelfButtons();
}

// Chapters read vs. total for a shelf, for the "3/6" style progress badge
// on its button. Reads localStorage fresh each call so it stays accurate
// right after a chapter is completed, without a full shelves refetch.
function shelfProgress(shelfId) {
  const ids = SHELF_ARTICLE_IDS[shelfId] || [];
  if (!ids.length) return null;
  const completed = libReadCompletedSet(LIB_USER_ID);
  const done = ids.filter(id => completed.has(id)).length;
  return { done, total: ids.length };
}

// Slides a column's current cards out toward its outer screen edge, then
// rebuilds it and slides the fresh cards back in from that same edge.
// `direction` is 'left' (profile/scores, left column) or 'right' (shelves,
// right column) -- see the .card-entering-*/.card-leaving-* CSS. Renders
// immediately (no leave animation) on first paint, when the container
// starts out empty. Cards enter with a staggered delay by list position,
// so the topmost card arrives first and lower ones follow. Same pattern
// as Hane's news/events and Kahvehane's discussion feed/scoreboard.
const CARD_SWAP_MS = 300;
const CARD_STAGGER_MS = 160;
function animateFeedSwap(container, direction, buildFn) {
  const enterClass = direction === 'left' ? 'card-entering-left' : 'card-entering-right';
  const leaveClass = direction === 'left' ? 'card-leaving-left' : 'card-leaving-right';
  const playEnter = () => {
    buildFn();
    staggerEntrance(Array.from(container.children), direction);
  };
  const existing = Array.from(container.children);
  if (!existing.length) { playEnter(); return; }
  existing.forEach(el => el.classList.add(leaveClass));
  setTimeout(playEnter, CARD_SWAP_MS);
}

// Applies the staggered slide-in entrance to an already-rendered list of
// elements (used directly by loadProfile() for the left column's fixed
// set of blocks, which only render once rather than repeatedly swapping
// like a feed) -- also the tail end of animateFeedSwap() above.
function staggerEntrance(elements, direction) {
  const enterClass = direction === 'left' ? 'card-entering-left' : 'card-entering-right';
  elements.filter(Boolean).forEach((el, i) => {
    el.style.animationDelay = `${i * CARD_STAGGER_MS}ms`;
    el.classList.add(enterClass);
    el.addEventListener('animationend', () => {
      el.classList.remove(enterClass);
      el.style.animationDelay = '';
    }, { once: true });
  });
}

function renderShelfButtons(activeShelfId = null) {
  const shelvesEl = document.getElementById('shelves');
  if (!shelvesEl) return;
  animateFeedSwap(shelvesEl, 'right', () => {
    shelvesEl.innerHTML = SHELVES_CACHE.map(s => {
      const count = SHELF_COUNTS[s.id] || 0;
      const empty = count === 0;
      const active = s.id === activeShelfId;
      const name = (s.name_tr || '').trim();
      const subtitle = (s.subtitle_tr || '').trim();
      const display = empty ? 'Çok Yakında' : (name || `Raf ${s.id}`);
      const subtitleHtml = !empty && subtitle ? `<div class="shelf-subtitle">${libEsc(subtitle)}</div>` : '';
      const progress = !empty ? shelfProgress(s.id) : null;
      const progressHtml = progress
        ? `<div class="shelf-progress">${progress.done}/${progress.total}</div>`
        : '';
      return `
        <a class="shelf-btn ${empty ? 'shelf-empty' : ''}${active ? ' shelf-active' : ''}" data-shelf="${s.id}" href="#">
          <div>
            <div class="shelf-title">${libEsc(display)}</div>
            ${subtitleHtml}
            ${progressHtml}
          </div>
        </a>
      `;
    }).join('');
    shelvesEl.querySelectorAll('.shelf-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (btn.classList.contains('shelf-empty')) return;
        const id = Number(btn.dataset.shelf);
        shelvesEl.querySelectorAll('.shelf-btn').forEach(b => b.classList.toggle('shelf-active', b === btn));
        openShelfPath(id);
      });
    });
  });
}

// ── Sequential chapter unlock state (per-user, localStorage) ──
// Members must read chapters in order: chapter N+1 stays locked until
// chapter N is finished. Completion is recorded when the reader reaches
// the "Tamamlandı" terminal step. Stored client-side per user id; a DB
// table can replace this later if cross-device sync becomes a need.
async function libGetCurrentUserId() {
  const { data: { session } } = await sb.auth.getSession();
  return session?.user?.id || null;
}
function libCompletionStorageKey(userId) {
  return 'lib_chapter_completed_' + userId;
}
function libReadCompletedSet(userId) {
  if (!userId) return new Set();
  try {
    const raw = localStorage.getItem(libCompletionStorageKey(userId));
    const arr = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(arr) ? arr : []);
  } catch (e) {
    return new Set();
  }
}
function libWriteArticleCompleted(userId, articleId) {
  if (!userId || !articleId) return;
  const set = libReadCompletedSet(userId);
  if (set.has(articleId)) return;
  set.add(articleId);
  try {
    localStorage.setItem(libCompletionStorageKey(userId), JSON.stringify([...set]));
  } catch (e) {}
}

// Chapter intro modal: previews the chapter (number, title, description)
// before the reader pane mounts, so the reader knows what they're entering.
function showChapterIntro(article, index, onStart) {
  const overlay = document.createElement('div');
  overlay.className = 'chapter-intro-overlay';
  const description = (article.summary && article.summary.trim())
    ? libEsc(article.summary)
    : 'Bu bölüm için henüz bir açıklama yazılmadı.';
  overlay.innerHTML = `
    <div class="chapter-intro" role="dialog" aria-modal="true" aria-label="Bölüm ${index + 1}">
      <div class="chapter-intro-step">Bölüm ${index + 1}</div>
      <h3 class="chapter-intro-title">${libEsc(article.title)}</h3>
      <div class="chapter-intro-body">${description}</div>
      <div class="chapter-intro-actions">
        <button class="chapter-intro-btn secondary" type="button" data-act="cancel">İptal</button>
        <button class="chapter-intro-btn" type="button" data-act="start">Okumaya Başla</button>
      </div>
    </div>
  `;
  function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
  function onKey(e) { if (e.key === 'Escape') close(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('[data-act="cancel"]').addEventListener('click', close);
  overlay.querySelector('[data-act="start"]').addEventListener('click', () => {
    close();
    onStart();
  });
  document.addEventListener('keydown', onKey);
  document.body.appendChild(overlay);
}

// On mobile the sheet should rise right up under the profile card
// floating over the map (#ist-pc-mount), with the same gap below the
// card as the sheet's own left/right gap -- the card's height varies
// with its content (name/neighborhood length), so that gap has to be
// measured rather than hardcoded. No-ops (clears the inline override)
// above the mobile breakpoint, where the sheet is centered/floating
// and doesn't sit under the card at all.
function positionReaderSheet() {
  const area = document.getElementById('reader-overlay-sheet');
  if (!area) return;
  if (!window.matchMedia('(max-width: 768px)').matches) { area.style.top = ''; return; }
  const framePad = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--frame-pad')) || 10;
  const pcMount = document.getElementById('ist-pc-mount');
  const cardBottom = pcMount ? pcMount.getBoundingClientRect().bottom : 0;
  area.style.top = `${Math.max(cardBottom, 0) + framePad}px`;
}
window.addEventListener('resize', () => {
  const overlay = document.getElementById('reader-overlay');
  if (overlay && overlay.classList.contains('open')) positionReaderSheet();
});

async function openShelfPath(shelfId) {
  const overlay = document.getElementById('reader-overlay');
  const area = document.getElementById('reader-overlay-sheet');
  if (!overlay || !area) return;
  const shelf = SHELVES_CACHE.find(s => s.id === shelfId);

  // Rise the sheet right away with a spinner — the chapter list (or the
  // reader directly, for a single-article shelf) fills it in once the
  // fetch resolves, so this gets the same page-rising treatment as the
  // reader itself instead of appearing flat in the center column.
  area.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  positionReaderSheet();
  overlay.hidden = false;
  requestAnimationFrame(() => overlay.classList.add('open'));
  _closeReaderOverlay = closeReaderOverlay;

  const { data: articles, error } = await sb.from('library_articles')
    .select('*').eq('shelf_id', shelfId)
    .order('position', { ascending: true })
    .order('created_at', { ascending: false });
  if (error) {
    area.innerHTML = `
      <div class="shelf-path">
        <div class="path-head"><button class="path-back" type="button" id="path-back">← Raflar</button></div>
        <div class="empty-state">Yüklenemedi.</div>
      </div>
    `;
    document.getElementById('path-back').addEventListener('click', closeReaderOverlay);
    return;
  }
  if (!articles || !articles.length) {
    area.innerHTML = `
      <div class="shelf-path">
        <div class="path-head">
          <button class="path-back" type="button" id="path-back">← Raflar</button>
          <h2 class="path-title">${libEsc((shelf && shelf.name_tr && shelf.name_tr.trim()) || `Raf ${shelfId}`)}</h2>
        </div>
        <div class="empty-state">Bu rafta henüz makale yok.</div>
      </div>
    `;
    document.getElementById('path-back').addEventListener('click', closeReaderOverlay);
    return;
  }

  // Compute lock state: a chapter unlocks only after the previous one
  // has been completed. The first chapter is always open.
  const userId = await libGetCurrentUserId();
  const completedSet = libReadCompletedSet(userId);
  const lockState = articles.map((a, i) => {
    if (i === 0) return false;
    return !completedSet.has(articles[i - 1].id);
  });

  if (articles.length === 1) {
    // Chapters aren't mandatory: a shelf with a single article (e.g. a
    // standalone letter) has nothing to pick between, so it skips the
    // table of contents and opens straight into the reader.
    openArticleReader(articles[0], shelf, shelfId, articles, lockState, completedSet);
    return;
  }

  renderShelfPathView(shelf, shelfId, articles, lockState, completedSet);
}

// Closes the reader overlay entirely, whichever view (table of contents or
// reader) is currently showing, and restores the plain shelves grid.
function closeReaderOverlay() {
  const overlay = document.getElementById('reader-overlay');
  const area = document.getElementById('reader-overlay-sheet');
  if (!overlay || !area) return;
  overlay.classList.remove('open');
  // Matches the sheet's own 0.55s transition (see .reader-overlay-sheet)
  // so hiding doesn't cut the closing slide-down short.
  setTimeout(() => { overlay.hidden = true; area.innerHTML = ''; }, 550);
  renderShelfButtons();
}

// Table of contents view, rendered into the reader overlay sheet so it
// rises from the bottom like the reader itself. Reused both when a shelf
// is first opened and when the reader's back button returns here without
// closing the sheet.
function renderShelfPathView(shelf, shelfId, articles, lockState, completedSet) {
  const area = document.getElementById('reader-overlay-sheet');
  if (!area) return;
  const title = (shelf && shelf.name_tr && shelf.name_tr.trim()) || `Raf ${shelfId}`;
  const subtitle = shelf && shelf.subtitle_tr ? shelf.subtitle_tr.trim() : '';

  area.innerHTML = `
    <div class="shelf-path">
      <div class="path-head">
        <button class="path-back" type="button" id="path-back">← Raflar</button>
        <h2 class="path-title">${libEsc(title)}</h2>
        ${subtitle ? `<p class="path-subtitle">${libEsc(subtitle)}</p>` : ''}
      </div>
      <div class="path-list">
        ${articles.map((a, i) => {
          const meta = [
            a.author ? libEsc(a.author) : null,
          ].filter(Boolean).join(' · ');
          const locked = lockState[i];
          const completed = completedSet.has(a.id);
          const badge = locked
            ? `<div class="path-lock">Kilitli</div>`
            : (completed ? `<div class="path-done">Okundu</div>` : '');
          return `
            <button class="path-node${locked ? ' locked' : ''}" data-art="${a.id}" data-locked="${locked ? '1' : '0'}" type="button"${locked ? ' aria-disabled="true"' : ''}>
              ${badge}
              <div class="path-step">Bölüm ${i + 1}</div>
              <div class="path-art-title">${libEsc(a.title)}</div>
              ${a.summary ? `<div class="path-art-summary">${libEsc(a.summary)}</div>` : ''}
              ${meta ? `<div class="path-art-meta">${meta}</div>` : ''}
            </button>
          `;
        }).join('')}
      </div>
    </div>
  `;
  area.querySelectorAll('.path-node').forEach(node => {
    node.addEventListener('click', () => {
      if (node.dataset.locked === '1') return;
      const a = articles.find(x => x.id === node.dataset.art);
      if (!a) return;
      const i = articles.indexOf(a);
      showChapterIntro(a, i, () => openArticleReader(a, shelf, shelfId, articles, lockState, completedSet));
    });
  });
  document.getElementById('path-back').addEventListener('click', closeReaderOverlay);
  _closeReaderOverlay = closeReaderOverlay;
  renderShelfButtons(shelf ? shelf.id : null);
  const pathEl = area.querySelector('.shelf-path');
  if (pathEl) pathEl.scrollTop = 0;
}

// Body parser: splits on lines that contain only --- into sections,
// then within each section converts [[word::definition]] into vocab tooltips.
function parseArticleSections(body) {
  if (!body) return [];
  const raw = String(body).replace(/\r\n/g, '\n');
  const parts = raw.split(/\n\s*---\s*\n/);
  return parts.map(p => p.trim()).filter(p => p.length > 0);
}

// Body parser: vote widgets (must sit on their own line) are block-level,
// vocab tooltips are inline. Splitting by line first keeps the vote block
// out of any wrapping <p> tag — block elements inside <p> would render
// fine in most browsers but break the source-order assumption when the
// browser auto-closes the paragraph.
function renderInlineBody(text) {
  const lines = String(text).replace(/\r\n/g, '\n').split('\n');
  const voteLineRe = /^\s*\[\[vote::([^\]]+?)::(-?\d+)::(-?\d+)\]\]\s*$/;
  const imgLineRe = /^\s*\[\[img::(\S+?)\]\]\s*$/;
  const parts = [];
  let buf = [];
  function flushText() {
    if (!buf.length) return;
    const escaped = libEsc(buf.join('\n'));
    const withVocab = escaped.replace(/\[\[([^|\]]+?)::([^\]]+?)\]\]/g, (_m, word, def) =>
      `<span class="vocab-term" tabindex="0">${word.trim()}<span class="vocab-pop">${def.trim()}</span></span>`
    );
    parts.push(withVocab.split(/\n{2,}/).map(p =>
      p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : ''
    ).join(''));
    buf = [];
  }
  for (const line of lines) {
    const voteMatch = line.match(voteLineRe);
    const imgMatch = !voteMatch && line.match(imgLineRe);
    if (voteMatch) {
      flushText();
      parts.push(`<div class="vote-widget" data-q="${libEsc(voteMatch[1].trim())}" data-min="${voteMatch[2]}" data-max="${voteMatch[3]}" data-answered="0"></div>`);
    } else if (imgMatch) {
      flushText();
      parts.push(`<img class="body-img" src="${libEsc(imgMatch[1])}" alt="" loading="lazy">`);
    } else {
      buf.push(line);
    }
  }
  flushText();
  return parts.join('');
}

// Build the inner UI for every empty .vote-widget container in `root`.
// Each widget is a row of person icons (one per vote slot) + a slider
// 0..count. Moving the slider flips the leftmost N icons green ("yes")
// while the rest stay red ("no"); reader-next is gated on the widget
// being answered (any interaction sets data-answered = "1").
function hydrateVoteWidgets(root, onAnswerChange) {
  root.querySelectorAll('.vote-widget[data-q]').forEach(w => {
    if (w.dataset.hydrated === '1') return;
    w.dataset.hydrated = '1';
    const q = w.dataset.q;
    const min = Number(w.dataset.min || 0);
    const max = Number(w.dataset.max || 10);
    const count = Math.max(0, max - min);
    const peopleHtml = Array.from({ length: count }, () =>
      `<svg class="vote-person" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M3 22c0-5 4-8 9-8s9 3 9 8z"/></svg>`
    ).join('');
    w.innerHTML = `
      <div class="vote-q">${q}</div>
      <div class="vote-people">${peopleHtml}</div>
      <div class="vote-controls">
        <input type="range" class="vote-slider" min="${min}" max="${max}" step="1" value="${min}" aria-label="${q}"/>
        <div class="vote-readout">${min} / ${max}</div>
      </div>
    `;
    const slider = w.querySelector('.vote-slider');
    const readout = w.querySelector('.vote-readout');
    const persons = w.querySelectorAll('.vote-person');
    function paint(markAnswered) {
      const v = Number(slider.value);
      readout.textContent = `${v} / ${max}`;
      persons.forEach((p, i) => p.classList.toggle('yes', i < (v - min)));
      if (markAnswered) {
        w.dataset.answered = '1';
        if (onAnswerChange) onAnswerChange();
      }
    }
    slider.addEventListener('input', () => paint(true));
    slider.addEventListener('change', () => paint(true));
    // Track-click that lands on the default value doesn't fire 'input';
    // pointerdown ensures we still register the interaction as an answer.
    slider.addEventListener('pointerdown', () => paint(true));
    paint(false);
  });
}

function openArticleReader(article, shelf, shelfId, articles, lockState, completedSet) {
  const overlay = document.getElementById('reader-overlay');
  const area = document.getElementById('reader-overlay-sheet');
  if (!overlay || !area) return;

  // Multi-chapter shelves: the in-sheet back button returns to the table
  // of contents (still inside the same sheet, no close/reopen) so a
  // freshly-completed chapter's unlock state shows immediately. A
  // single-article shelf has no table of contents to return to, so its
  // back button closes the sheet outright. Backdrop click / Esc always
  // close the sheet fully, regardless of which view is showing.
  const hasChapters = articles && articles.length > 1;
  function backToPath() {
    if (hasChapters) {
      renderShelfPathView(shelf, shelfId, articles, lockState, completedSet);
    } else {
      closeReaderOverlay();
    }
  }
  _closeReaderOverlay = closeReaderOverlay;

  const sections = parseArticleSections(article.body || '');
  // Always render at least one section so the reader has something to show.
  if (!sections.length) sections.push(article.summary || '');

  // Track which step the reader is on; the poll lives one step past the
  // last section so progress shows 100% once they reach it.
  let step = 0;
  const lastSectionIdx = sections.length - 1;
  const hasPoll = article.poll && article.poll.question && Array.isArray(article.poll.options) && article.poll.options.length >= 2;
  const totalSteps = sections.length + (hasPoll ? 1 : 0);

  function renderStep() {
    const onPoll = hasPoll && step === sections.length;
    const progressPct = Math.round(((step + 1) / totalSteps) * 100);
    const remainingPct = 100 - progressPct;
    const byline = [
      article.author ? libEsc(article.author) : null,
      article.published_at ? libEsc(formatLibDate(article.published_at)) : null,
    ].filter(Boolean).join(' · ');

    const stepLabel = onPoll
      ? 'Anket'
      : `Bölüm ${step + 1} / ${sections.length}`;

    let content;
    if (onPoll) {
      content = `<div class="reader-poll" id="poll-mount"></div>`;
    } else {
      const sectionHtml = renderInlineBody(sections[step]);
      const isFirst = step === 0;
      content = `
        ${isFirst ? `
          ${byline ? `<div class="reader-byline">${byline}</div>` : ''}
          <h1 class="reader-title">${libEsc(article.title)}</h1>
          ${article.summary ? `<div class="reader-summary">${libEsc(article.summary)}</div>` : ''}
        ` : ''}
        <div class="reader-section-body">${sectionHtml}</div>
      `;
    }

    const isLastSection = step === lastSectionIdx && !hasPoll;
    const nextLabel = onPoll ? 'Bitti' : (isLastSection ? 'Bitti' : 'İleri →');

    area.innerHTML = `
      <div class="reader">
        <div class="reader-top">
          <button class="reader-back" type="button" id="reader-back">${hasChapters ? '← Raf' : '← Raflar'}</button>
          <div class="reader-progress"><div class="reader-progress-fill" style="width:${remainingPct}%"></div></div>
          <div class="reader-step-count">${libEsc(stepLabel)}</div>
        </div>
        <div class="reader-scroll">
          ${content}
        </div>
        <div class="reader-actions">
          <button class="reader-btn secondary" type="button" id="reader-prev" ${step === 0 ? 'disabled' : ''}>← Geri</button>
          <button class="reader-btn" type="button" id="reader-next">${nextLabel}</button>
        </div>
      </div>
    `;

    // Re-evaluate the Next button: gated when any vote widget in the
    // current step still has data-answered="0".
    function refreshNextGate() {
      const next = document.getElementById('reader-next');
      if (!next) return;
      const widgets = area.querySelectorAll('.vote-widget[data-q]');
      const allAnswered = Array.from(widgets).every(w => w.dataset.answered === '1');
      next.disabled = !allAnswered;
    }

    document.getElementById('reader-back').addEventListener('click', backToPath);
    document.getElementById('reader-prev').addEventListener('click', () => {
      if (step > 0) { step--; renderStep(); }
    });
    document.getElementById('reader-next').addEventListener('click', async () => {
      if (!onPoll && step < lastSectionIdx) { step++; renderStep(); return; }
      if (!onPoll && hasPoll) { step = sections.length; renderStep(); return; }
      // Last action: surface a "finished" notice and mark the chapter
      // completed so the next one unlocks on the shelf path.
      const done = document.createElement('div');
      done.className = 'reader-done';
      done.textContent = '✓ Tamamlandı';
      area.querySelector('.reader-actions').replaceWith(done);
      const uid = await libGetCurrentUserId();
      libWriteArticleCompleted(uid, article.id);
      // Reflect the unlock live in the chapter nav without waiting for the
      // sheet to close: mark this chapter read and open the next one.
      if (hasChapters) {
        completedSet.add(article.id);
        const idx = articles.indexOf(article);
        if (idx > -1 && idx + 1 < articles.length) lockState[idx + 1] = false;
        renderChapterNav(shelfId, articles, article.id, lockState, completedSet, shelf);
      }
    });

    // Vocab-pop on tap (mobile keeps tooltips open until next tap).
    area.querySelectorAll('.vocab-term').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.vocab-term.vocab-open').forEach(o => {
          if (o !== el) o.classList.remove('vocab-open');
        });
        el.classList.toggle('vocab-open');
      });
    });

    hydrateVoteWidgets(area, refreshNextGate);
    refreshNextGate();

    if (onPoll) mountPoll(article);
    const scrollEl = area.querySelector('.reader-scroll');
    if (scrollEl) scrollEl.scrollTop = 0;
  }

  renderStep();
  positionReaderSheet();
  overlay.hidden = false;
  requestAnimationFrame(() => overlay.classList.add('open'));

  // Contextual swap: while the reader sheet is up, the right column shows
  // this article's own chapter list instead of the shelves grid, mirroring
  // how the map swaps news/events on Hane and the game swaps the
  // scoreboard on Kahvehane. A single-article shelf has no chapters to
  // list, so the shelves grid (already showing, already highlighted by
  // the click that got us here) just stays put.
  if (hasChapters) {
    renderChapterNav(shelfId, articles, article.id, lockState, completedSet, shelf);
  }
}

// Right column, while the reader sheet is open: this article's own table
// of contents in place of the shelves grid. Clicking an unlocked chapter
// jumps straight to it (via the same intro modal) without closing the sheet.
function renderChapterNav(shelfId, articles, currentArticleId, lockState, completedSet, shelf) {
  const shelvesEl = document.getElementById('shelves');
  if (!shelvesEl) return;
  const title = (shelf && shelf.name_tr && shelf.name_tr.trim()) || `Raf ${shelfId}`;
  animateFeedSwap(shelvesEl, 'right', () => {
    shelvesEl.innerHTML = `
      <div class="chapter-nav-title">${libEsc(title)}</div>
      ${articles.map((a, i) => {
        const locked = lockState[i];
        const current = a.id === currentArticleId;
        const completed = completedSet.has(a.id);
        const badge = locked ? 'Kilitli' : (current ? 'Şu an burada' : (completed ? 'Okundu' : ''));
        return `
          <button class="chapter-nav-item${current ? ' current' : ''}${locked ? ' locked' : ''}"
                  data-art="${a.id}" type="button" ${(locked || current) ? 'aria-disabled="true"' : ''}>
            <span class="chapter-nav-step">Bölüm ${i + 1}</span>
            <span class="chapter-nav-art-title">${libEsc(a.title)}</span>
            ${badge ? `<span class="chapter-nav-badge">${badge}</span>` : ''}
          </button>
        `;
      }).join('')}
    `;
    shelvesEl.querySelectorAll('.chapter-nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('locked') || btn.classList.contains('current')) return;
        const a = articles.find(x => x.id === btn.dataset.art);
        if (!a) return;
        const i = articles.indexOf(a);
        showChapterIntro(a, i, () => openArticleReader(a, shelf, shelfId, articles, lockState, completedSet));
      });
    });
  });
}

// Wires the reader overlay's backdrop-click/Escape close once; which
// chapter is currently open (and how to close it) is set by
// openArticleReader each time it runs, via _closeReaderOverlay.
let _closeReaderOverlay = null;
(function initReaderOverlay() {
  const overlay = document.getElementById('reader-overlay');
  const backdrop = document.getElementById('reader-overlay-backdrop');
  if (!overlay || !backdrop) return;
  backdrop.addEventListener('click', () => { if (_closeReaderOverlay) _closeReaderOverlay(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open') && _closeReaderOverlay) _closeReaderOverlay();
  });
})();

async function mountPoll(article) {
  const mount = document.getElementById('poll-mount');
  if (!mount) return;
  const { question, options } = article.poll;
  mount.innerHTML = `
    <div class="poll-q">${libEsc(question)}</div>
    <div class="poll-options" id="poll-options">
      ${options.map((o, i) => `
        <button class="poll-option" data-idx="${i}" type="button">
          <span class="opt-bar" style="width:0%"></span>
          <span class="opt-text">${libEsc(o)}</span>
          <span class="opt-pct"></span>
        </button>
      `).join('')}
    </div>
  `;
  const { data: { session } } = await sb.auth.getSession();
  const uid = session?.user?.id || null;

  async function refresh() {
    const [{ data: votes }, mineRes] = await Promise.all([
      sb.from('library_article_poll_votes').select('option_index').eq('article_id', article.id),
      uid ? sb.from('library_article_poll_votes')
        .select('option_index').eq('article_id', article.id).eq('user_id', uid).maybeSingle()
        : Promise.resolve({ data: null }),
    ]);
    const counts = options.map(() => 0);
    (votes || []).forEach(v => { if (counts[v.option_index] != null) counts[v.option_index]++; });
    const total = counts.reduce((a, b) => a + b, 0);
    const mine = mineRes && mineRes.data ? mineRes.data.option_index : null;
    mount.querySelectorAll('.poll-option').forEach(btn => {
      const idx = Number(btn.dataset.idx);
      const pct = total > 0 ? Math.round((counts[idx] / total) * 100) : 0;
      btn.classList.toggle('mine', mine === idx);
      btn.querySelector('.opt-bar').style.width = (mine != null ? pct + '%' : '0%');
      btn.querySelector('.opt-pct').textContent = (mine != null) ? (pct + '%') : '';
    });
  }
  refresh();

  mount.querySelectorAll('.poll-option').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = Number(btn.dataset.idx);
      const { data: { session: s2 } } = await sb.auth.getSession();
      if (!s2) { alert('Önce giriş yapın.'); return; }
      await sb.from('library_article_poll_votes')
        .upsert({ article_id: article.id, user_id: s2.user.id, option_index: idx },
                { onConflict: 'article_id,user_id' });
      refresh();
    });
  });
}

// ── Interactive map — cosmetic parity with Hane/Kahvehane ──
// library_shelves content isn't neighborhood-scoped, so clicking a
// district here only gives the same visual feedback (active tint,
// map-label text) as the other two pages; it doesn't filter shelves or
// articles. Unlike Hane/Kahvehane, this map doesn't highlight the user's
// home neighborhood — Kütüphane is moving to a Turkey-wide map, where a
// single home *district* has no obvious analogue.
(function initLibraryMap() {
  // Delegated on document and re-queried fresh each time rather than
  // bound per-node once -- a virtual navigation (see router.js) replaces
  // #ist-content's whole subtree on every revisit to this page, including
  // the map's .neighborhood elements, so listeners bound once to the
  // original nodes would go stale after the first navigate-away-and-back.
  function getMapNeighborhoods() { return document.querySelectorAll('.neighborhood'); }
  if (!getMapNeighborhoods().length) return;

  let activeMapNeighborhood = null;

  function baseMapLabel() {
    if (!activeMapNeighborhood) return 'İstanbul';
    const active = document.getElementById(activeMapNeighborhood);
    return (active && active.getAttribute('data-name')) || activeMapNeighborhood;
  }

  document.addEventListener('click', (e) => {
    const mapLabel = document.getElementById('map-label');
    const nb = e.target.closest('.neighborhood');
    if (nb) {
      // data-neighborhood covers multi-polygon districts (e.g. Şişli's
      // exclave piece) whose element id must stay unique but which still
      // count as the same neighborhood.
      const nbId = nb.dataset.neighborhood || nb.id;
      getMapNeighborhoods().forEach(n => n.classList.toggle('active', (n.dataset.neighborhood || n.id) === nbId));
      if (mapLabel) mapLabel.textContent = nb.getAttribute('data-name') || nbId;
      activeMapNeighborhood = nbId;
      return;
    }
    // Snap back to Tüm İstanbul only when clicking empty space inside the
    // map panel itself — clicking the shelves, reading area or other UI
    // that floats over the map must not reset it.
    if (!e.target.closest('.map-panel') || e.target.closest('.map-label')) return;
    getMapNeighborhoods().forEach(n => n.classList.remove('active'));
    if (mapLabel) mapLabel.textContent = 'İstanbul';
    activeMapNeighborhood = null;
  });
  document.addEventListener('mouseover', (e) => {
    const nb = e.target.closest('.neighborhood');
    if (!nb) return;
    const mapLabel = document.getElementById('map-label');
    if (mapLabel) mapLabel.textContent = nb.getAttribute('data-name') || nb.id;
  });
  document.addEventListener('mouseout', (e) => {
    const nb = e.target.closest('.neighborhood');
    if (!nb || nb.contains(e.relatedTarget)) return;
    const mapLabel = document.getElementById('map-label');
    if (mapLabel) mapLabel.textContent = baseMapLabel();
  });
})();

// Generate an 8-char uppercase referral code (matches the format the
// handle_new_user trigger uses for new accounts).
function generateReferralCode() {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let out = '';
  for (let i = 0; i < 8; i++) {
    out += alphabet[Math.floor(Math.random() * alphabet.length)];
  }
  return out;
}

    btn.textContent = 'Oluştur';
    console.error('[hane bootstrap] insert failed', lastErr);
    msg.textContent = 'Oluşturulamadı: ' + (lastErr?.message || 'bilinmeyen hata');
    msg.style.color = 'var(--accent)';

  const istNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const todayISO = `${istNow.getFullYear()}-${String(istNow.getMonth()+1).padStart(2,'0')}-${String(istNow.getDate()).padStart(2,'0')}`;
  const { count: szc } = await sb
    .from('sozcel_sozcul_assignments')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', user.id)
    .lte('game_date', todayISO);
  ownSozculCount = szc || 0;
}

// Resolve the name of the person who referred this user (their kefil)
let kefilOfUser = null;
if (profile?.referred_by) {
  const { data: kp } = await sb
    .from('profiles')
    .select('id, first_name, last_name')
    .eq('id', profile.referred_by)
    .maybeSingle();
  if (kp) kefilOfUser = kp;
}

// Accounts that predate the handle_new_user trigger don't have a profiles
// row. Surface this clearly instead of silently rendering empty fields and
// then accepting "saves" that update zero rows.
const profileMissing = !isViewingOther && !profile;
const isAdminUser = user.email === 'cemwozturk@gmail.com';
console.log('[hane loadProfile] auth user.id =', user.id, 'profile =', profile, 'profileError =', profileError, 'session role =', session?.user?.role, 'access_token len =', session?.access_token?.length);
if (profileMissing) {
  console.warn('[hane] No profiles row for auth user', user.id);
  if (isAdminUser) {
    renderProfileBootstrap(user);
    return;
  }
  const banner = document.createElement('div');
  banner.textContent = 'Profil kaydı bulunamadı. Bu hesabın profiles tablosunda satırı yok — yöneticiyle iletişime geçin.';
  Object.assign(banner.style, {
    position: 'fixed', top: '0', left: '0', right: '0',
    background: '#000', color: '#fff', padding: '10px 16px',
    fontSize: '0.8rem', fontFamily: "'Inter', sans-serif",
    textAlign: 'center', zIndex: '9999', letterSpacing: '0.5px'
  });
  document.body.appendChild(banner);
}

// The layered avatar (bald base + hair overlay) and the picker renderer
// live on IstProfileCard/IstAvatar so the desktop library-card here and the
// mobile widget stay in sync.
let avatarUrl = profile?.avatar_url || null;
let avatarHair = profile?.avatar_hair || null;
let avatarHat = profile?.avatar_hat || null;
let avatarAccessory = profile?.avatar_accessory || null;
let avatarShirt = profile?.avatar_shirt || null;

const firstName = profile?.first_name || '';
const lastName = profile?.last_name || '';

const displayName =
  `${firstName} ${lastName}`.trim() ||
  user.email.split('@')[0];

const yasadigiIlce = profile?.neighborhood || '';
const dogumYeri = profile?.birth_place || '';
const phone = profile?.phone || '';
// Two-option toggles. Legacy `more_turkish` / `system` get folded into
// their nearest neighbour so existing rows still pick a valid tick.
// palette_pref reuses the column written by onboarding.js: 'mono' = siyah-beyaz, 'earth' = kahverengi.
function normalizeLang(v)    { return v === 'more_english' ? 'more_english' : 'default'; }
function normalizeTheme(v)   { return v === 'dark' ? 'dark' : 'light'; }
function normalizePalette(v) { return v === 'earth' ? 'earth' : 'mono'; }

const languagePref = normalizeLang(profile?.language_pref);
const themePref = normalizeTheme(profile?.theme_pref);
const palettePref = normalizePalette(profile?.palette_pref);

// Apply the saved language immediately so labels render in the right tongue.
I18N.setLang(languagePref);
// Apply the saved palette too (palette.js already booted from the cached value).
Palette.setPalette(palettePref);

  function avatarDisplayHTML() {
    return IstAvatar.html(avatarUrl, avatarHair, avatarHat, avatarAccessory, avatarShirt);
  }

  // Birth place display (read-only)
  let dogumDisplay = '—';
  if (dogumYeri === 'istanbul_disi') dogumDisplay = 'İstanbul Dışı';
  else if (dogumYeri && neighborhoodNames[dogumYeri]) dogumDisplay = neighborhoodNames[dogumYeri];
  else if (dogumYeri) dogumDisplay = dogumYeri;

  // ── PROFILE LIBRARY CARD (top of right column) ──
  const cardEl = document.getElementById('library-card');
  const yasadigiDisplay = yasadigiIlce ? (neighborhoodNames[yasadigiIlce] || yasadigiIlce) : '—';

  // Editing/settings/badges all live in the shared profile-overlay bottom
  // sheet (IstProfileCard.openProfileOverlay) — same one anahane.html and
  // kahvehane.html open — instead of swapping this card to an edit form.
  function renderCardView() {
    cardEl.innerHTML = `
      <div class="card-top">
        <div class="avatar" id="avatar-display">${avatarDisplayHTML()}</div>
        <div class="card-id">
          <div class="card-name">${displayName}</div>
          <div class="card-meta">${yasadigiDisplay}</div>
        </div>
        ${isViewingOther ? '' : `<button type="button" class="edit-btn" id="edit-profile-btn" aria-label="${I18N.t('profile.toggle')}" title="${I18N.t('profile.toggle')}">${IstProfileCard.GEAR_SVG}</button>`}
      </div>
    `;
    if (!isViewingOther) {
      document.getElementById('edit-profile-btn').addEventListener('click', () => {
        IstProfileCard.openProfileOverlay({
          sb, I18N, user, profile,
          sozculCount: ownSozculCount, kefaletCount, kefilOfUser,
          avatarUrl,
          avatarHair,
          avatarHat,
          avatarAccessory,
          avatarShirt,
          onAvatarChange(hair, hat, accessory, shirt) {
            avatarHair = hair;
            avatarHat = hat;
            avatarAccessory = accessory;
            avatarShirt = shirt;
            const av = document.getElementById('avatar-display');
            if (av) av.innerHTML = avatarDisplayHTML();
          },
        });
      });
    }
  }

  renderCardView();

  // Self-view: account info, game scores, and sign-out already live in the
  // shared settings overlay (gear icon on the library card above), so the
  // rest of the left column stays empty here to avoid duplicating them.
  // ── RIGHT: kefil & sponsored count (only shown when viewing another user) ──
  if (isViewingOther) {
    document.querySelector('.profile-right').innerHTML = `
      <div class="info-card">
        <div class="right-section-title">${I18N.t('profile.kefil')}</div>
        ${kefilOfUser ? `<div class="info-row">
          <div class="info-label">${I18N.t('profile.kefil')}</div>
          <div class="info-value"><button class="kefil-link" data-user-id="${kefilOfUser.id}">${capitalizeName((`${kefilOfUser.first_name || ''} ${kefilOfUser.last_name || ''}`).trim()) || I18N.t('profile.unnamed')}</button></div>
        </div>` : ''}
        <div class="info-row">
          <div class="info-label">${I18N.t('profile.sponsoredcount')}</div>
          <div class="info-value">${kefaletCount ?? 0} ${I18N.t('profile.people')}</div>
        </div>
      </div>
    `;
  }

  // Left column entrance: profile card slides in from the left edge — same
  // treatment as Hane's news feed / Kahvehane's discussion feed.
  staggerEntrance([
    document.getElementById('library-card'),
    document.querySelector('.profile-right .info-card'),
  ], 'left');
}

// This page's repeatable "become the active page" work -- the part that
// re-runs on every virtual re-entry into kutuphane, not just the first
// real load. No timers or page-specific top-level listeners get set up
// by either call (both re-render their target elements via innerHTML,
// which is self-cleaning), so there's nothing for unmount() to undo.
function mount() {
  loadProfile();
  bootstrapLibraryNav();
}
function unmount() {}

// Skipped when this script is being injected by a virtual navigation (see
// router.js's navigateTo) -- that path calls the registered mount()
// directly instead, since the user's already authenticated and the
// profile card's already mounted from the real page load that got them
// into the app in the first place.
if (!window.__istVirtualNavInjecting) mount();

// Mount the shared mobile profile card (hidden on desktop via CSS).
// profile-card.js is deferred, so wait until it's loaded. Also skipped
// when injected by a virtual navigation, for the same reason as mount()
// above -- the card is already mounted and onboarding/admin-notification
// already had their one-time chance on the real page load.
function __mountIstPc() {
  if (window.IstProfileCard) IstProfileCard.mount({ sb, I18N, page: 'kutuphane' });
  // Resume the onboarding flow if the user is mid-tour. onboarding.js is
  // deferred — poll briefly in case it hasn't landed yet.
  (function tryOnb(tries) {
    if (window.IstOnboarding) {
      sb.auth.getSession().then(({ data }) => {
        if (data?.session?.user) IstOnboarding.maybeRun({ sb, user: data.session.user, page: 'kutuphane' });
      });
    } else if (tries > 0) {
      setTimeout(() => tryOnb(tries - 1), 60);
    }
  })(40);

  // Admin one-shot notification popup — mascot bubble, shown once per user.
  (function tryNotif(tries) {
    if (window.IstAdminNotification) {
      IstAdminNotification.show({ sb });
    } else if (tries > 0) {
      setTimeout(() => tryNotif(tries - 1), 60);
    }
  })(40);
}
if (!window.__istVirtualNavInjecting) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', __mountIstPc);
  } else {
    __mountIstPc();
  }
}

// ── Profile popup — opens on any .kefil-link click, navigates in-place for the chain ──
(function() {
  const overlay = document.createElement('div');
  overlay.className = 'profile-popup-overlay';
  // Belt-and-suspenders like the game/reader overlays elsewhere: this
  // element is created once, up front, and lives in the DOM for the rest
  // of the session (outside #ist-content) -- once a virtual navigation
  // (see router.js) disables this page's own stylesheet, the CSS class
  // alone (.profile-popup-overlay{display:none}) stops applying and it'd
  // render as bare, unstyled content. The `hidden` attribute's display:
  // none comes from the browser's own built-in stylesheet, not this
  // page's, so it stays correct regardless.
  overlay.hidden = true;
  overlay.innerHTML = `
    <div class="profile-popup" role="dialog" aria-modal="true">
      <button class="close-btn" type="button" aria-label="Kapat"><img class="close-icon" src="assets/cross.png" alt=""></button>
      <div class="pp-body"><div class="pp-loading">Yükleniyor…</div></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const body = overlay.querySelector('.pp-body');

  function close() { overlay.classList.remove('open'); overlay.hidden = true; }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.close-btn').addEventListener('click', close);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) close();
  });

  function nbLabel(id) {
    if (!id) return '—';
    if (id === 'istanbul_disi') return 'İstanbul Dışı';
    return neighborhoodNames[id] || id;
  }

  async function open(userId) {
    overlay.hidden = false;
    overlay.classList.add('open');
    body.innerHTML = '<div class="pp-loading">Yükleniyor…</div>';

    const [{ data: prof, error }, weekStatus] = await Promise.all([
      sb.from('profiles')
        .select('id, first_name, last_name, neighborhood, avatar_url, avatar_hair, avatar_hat, avatar_accessory, avatar_shirt, cover_badges, joined_at, referred_by')
        .eq('id', userId)
        .maybeSingle(),
      IstProfileCard.getWeekGameStatus(sb, userId),
    ]);

    if (error || !prof) {
      body.innerHTML = '<div class="pp-error">Profil yüklenemedi.</div>';
      return;
    }

    let kefilName = null, kefilId = null;
    if (prof.referred_by) {
      const { data: kp } = await sb
        .from('profiles')
        .select('id, first_name, last_name')
        .eq('id', prof.referred_by)
        .maybeSingle();
      if (kp) {
        kefilName = capitalizeName((`${kp.first_name || ''} ${kp.last_name || ''}`).trim()) || 'İsimsiz Üye';
        kefilId = kp.id;
      }
    }

    const fullName = capitalizeName((`${prof.first_name || ''} ${prof.last_name || ''}`).trim()) || 'İsimsiz Üye';

    // Cover (avatar + placed rozetler) and the weekly game grid reuse the
    // same shared markup/logic as the self-editing Profil tab (see
    // IstProfileCard.coverHTML/getWeekGameStatus/weekGridHTML in
    // profile-card.js) instead of a page-local avatar circle.
    body.innerHTML = `
      ${IstProfileCard.coverHTML({ profile: prof, avatarUrl: prof.avatar_url, avatarHair: prof.avatar_hair, avatarHat: prof.avatar_hat, avatarAccessory: prof.avatar_accessory, avatarShirt: prof.avatar_shirt, displayName: fullName, metaText: nbLabel(prof.neighborhood) })}
      ${IstProfileCard.weekGridHTML(weekStatus, I18N)}
      <div class="pp-since">
        <div>${I18N.formatMemberSince(prof.joined_at)}</div>
        ${kefilName ? `<div class="pp-since-kefil">${I18N.t('profile.kefil')}: <button class="kefil-link" data-user-id="${kefilId}">${kefilName}</button></div>` : ''}
      </div>
    `;
  }

  // Delegate all .kefil-link clicks to open the popup
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.kefil-link');
    if (!btn) return;
    const id = btn.getAttribute('data-user-id');
    if (id) open(id);
  });
})();

IstRouter.registerPage('kutuphane', { mount, unmount });
})();
</script>
</body>
</html>
