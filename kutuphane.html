<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Prefetch sibling tabs so the View Transitions API can swap instantly -->
  <link rel="prefetch" href="index.html">
  <link rel="prefetch" href="kahvehane.html">
  <link rel="prefetch" href="hane.html">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kütüphane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SPA guard: direct loads redirect to the shell. Iframe loads with
       ?embed=left|middle|right flag this document so only that panel is
       visible and the tab's own swipe/click pagination stays dormant
       (the shell drives routing). -->
  <script>
    (function(){
      var embed = new URLSearchParams(location.search).get('embed');
      if (['left','middle','right'].indexOf(embed) < 0) {
        location.replace('index.html#kutuphane'); return;
      }
      var h = document.documentElement;
      h.classList.add('embedded');
      h.classList.add('embed-' + embed);
    })();
  </script>
  <!-- Nav hijack: inside the shell's middle iframe, nav clicks are
       forwarded to the shell via postMessage so it can slide the
       left/right strips instead of reloading the iframe. -->
  <script>
    if (document.documentElement.classList.contains('embed-middle')) {
      document.addEventListener('click', function(e){
        var a = e.target.closest && e.target.closest('nav a[href]');
        if (!a) return;
        var href = a.getAttribute('href') || '';
        var map = {
          'index.html': 'anahane', '#anahane': 'anahane',
          'anahane.html': 'anahane',
          'kahvehane.html': 'kahvehane', '#kahvehane': 'kahvehane',
          'kutuphane.html': 'kutuphane', '#kutuphane': 'kutuphane',
          'hane.html': 'hane', '#hane': 'hane'
        };
        var tab = map[href];
        if (!tab) return;
        e.preventDefault();
        window.parent.postMessage({ type: 'ist-nav', tab: tab }, '*');
      });
    }
  </script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in (mobile: horizontal, desktop: vertical — CSS picks the axis). Also seeds the VT direction class so the cross-document transition knows which way to slide before it captures the snapshot. -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --success: #555555;
      --star: #888888;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { }
    .datetime-block .time-line { }

    header {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper);
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAP PANEL ── */
    .map-panel {
      display: flex;
      flex-direction: column;
      padding: 12px;
      overflow: hidden;
      background: var(--paper);
      flex: 1;
      min-height: 0;
    }

    .map-panel svg {
      width: 100%;
      height: auto;
      display: block;
      flex: 1;
      pointer-events: painted;
      min-height: 0;
    }

    .neighborhood {
      cursor: pointer;
      fill: transparent;
      stroke: var(--accent);
      stroke-width: 2;
      opacity: 0.6;
      transition: opacity 0.2s, fill 0.2s;
      pointer-events: all;
    }

    .neighborhood:hover { opacity: 1; fill: rgba(0,0,0,0.08); }
    .neighborhood.home {
      fill: rgba(0,0,0,0.40);
      stroke: var(--ink);
      stroke-width: 3;
      opacity: 1;
    }
    .neighborhood.home:hover { fill: rgba(0,0,0,0.45); }
    .neighborhood.active {
      opacity: 1;
      fill: rgba(0,0,0,0.15);
      stroke: #333333;
      stroke-width: 2;
    }
    /* Home neighborhood: darkest, always visible */
    .neighborhood.home {
      fill: rgba(0,0,0,0.40);
      stroke: var(--ink);
      stroke-width: 3;
      opacity: 1;
    }
    .neighborhood.home:hover { fill: rgba(0,0,0,0.45); }
    .neighborhood.home.active { fill: rgba(0,0,0,0.45); stroke: var(--ink); }

    .map-label {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink);
      padding: 5px 8px;
      background: var(--paper-dark);
      border: 1px solid var(--ink);
      margin-top: 8px;
      flex-shrink: 0;
    }

    .articles-list {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .article-detail {
      padding: 24px;
      overflow-y: auto;
    }

    /* Article card */
    .article-card {
      background: white;
      border: 1px solid #ccc;
      padding: 16px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .article-card:hover { border-color: var(--accent); }
    .article-card.active { border: 2px solid var(--accent); padding: 15px; }

    .article-category {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .article-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .article-card .meta {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .article-rating {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .star {
      color: var(--star);
      font-size: 1rem;
    }

    /* Article detail view */
    .detail-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--ink);
    }

    .detail-category {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .detail-meta {
      display: flex;
      gap: 16px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .detail-body {
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .detail-body p {
      margin-bottom: 16px;
    }

    /* Rating section */
    .rating-section {
      background: var(--paper-dark);
      border: 1px solid var(--ink);
      padding: 20px;
      margin-bottom: 30px;
    }

    .rating-section h3 {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .rating-display {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .rating-avg {
      font-size: 2.5rem;
      font-weight: 700;
    }

    .rating-stars {
      display: flex;
      gap: 4px;
    }

    .rating-count {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .rate-buttons {
      display: flex;
      gap: 8px;
    }

    .rate-btn {
      padding: 8px 16px;
      background: white;
      border: 1px solid var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .rate-btn:hover { background: var(--star); color: white; border-color: var(--star); }

    .rate-status {
      margin-top: 10px;
      font-size: 0.8rem;
      text-align: center;
      min-height: 18px;
      font-style: italic;
    }

    /* Comments section */
    .comments-section {
      border-top: 2px solid var(--ink);
      padding-top: 20px;
    }

    .comments-section h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .comment-form {
      background: var(--paper-dark);
      border: 1px solid var(--ink);
      padding: 16px;
      margin-bottom: 20px;
    }

    .comment-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid #bbb;
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 10px;
    }

    .comment-form button {
      width: 100%;
      padding: 10px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .comment-form button:hover { background: var(--accent); }

    .comment-status {
      margin-top: 8px;
      font-size: 0.8rem;
      text-align: center;
      min-height: 18px;
      font-style: italic;
    }
    .comment-status.ok { color: var(--success); }
    .comment-status.err { color: var(--accent); }

    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .comment {
      background: white;
      border: 1px solid #ccc;
      padding: 14px;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .comment-author {
      font-weight: 700;
      color: var(--ink);
    }

    .comment-body {
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 60px 30px;
      font-style: italic;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto 1fr;
        overflow: hidden;
        padding-bottom: 56px; /* reserve space for fixed bottom tab bar */
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Compact top brand bar */
      .section-rule {
        grid-column: 1 / -1;
        grid-row: 1;
        padding: 9px 16px;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.8px;
      }
      .datetime-block { flex-direction: row; gap: 8px; }
      .datetime-block .day-line { display: none; }

      /* Map: fills horizontally, height determined by aspect ratio */
      main {
        grid-column: 1 / -1;
        grid-row: 2;
        overflow: hidden;
        display: block;
      }
      .map-panel {
        padding: 0;
        display: block;
        overflow: hidden;
      }
      .map-panel svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .map-label {
        margin: 4px 0 6px 0;
        padding: 4px 14px;
        font-size: 11px;
        letter-spacing: 1px;
        text-align: center;
      }

      /* Left column below map: article list */
      .col-left {
        grid-column: 1;
        grid-row: 3;
        min-height: 0;
        overflow: hidden;
        border-right: 1px solid #e5e5e5;
        border-top: 1px solid #e5e5e5;
        display: flex;
        flex-direction: column;
      }
      .col-left .nb-highlight {
        padding: 6px 12px;
        font-size: 10px;
        letter-spacing: 1.2px;
        flex-shrink: 0;
      }
      .articles-list {
        padding: 6px 12px;
        overflow: hidden;
        flex: 1;
        min-height: 0;
      }
      .article-card {
        padding: 8px 10px;
        margin-bottom: 6px;
        border-radius: 4px;
      }
      .article-category {
        font-size: 9px;
        margin-bottom: 3px;
        letter-spacing: 1px;
      }
      .article-card h3 {
        font-size: 12px;
        margin-bottom: 3px;
        line-height: 1.25;
      }
      .article-card .meta {
        font-size: 10px;
        gap: 8px;
        margin-top: 3px;
      }

      /* Right column below map: article detail */
      .col-right {
        grid-column: 2;
        grid-row: 3;
        min-height: 0;
        overflow: hidden;
        border-left: none;
        border-top: 1px solid #e5e5e5;
      }
      .article-detail {
        padding: 8px 12px;
        overflow: hidden;
      }
      .detail-header {
        margin-bottom: 6px;
        padding-bottom: 6px;
      }
      .detail-category {
        font-size: 9px;
        margin-bottom: 3px;
        letter-spacing: 1px;
      }
      .detail-title {
        font-size: 14px;
        margin-bottom: 4px;
        line-height: 1.25;
      }
      .detail-meta {
        font-size: 10px;
        gap: 8px;
      }
      .detail-body {
        font-size: 11px;
        line-height: 1.4;
        margin-bottom: 8px;
      }
      .detail-body p { margin-bottom: 5px; }
      .rating-section {
        padding: 6px 8px;
        margin-bottom: 6px;
        border-radius: 4px;
      }
      .rating-section h3 {
        font-size: 10px;
        margin-bottom: 5px;
        letter-spacing: 1px;
      }
      .rating-display { gap: 8px; margin-bottom: 5px; }
      .rating-avg { font-size: 16px; }
      .rating-count { font-size: 10px; }
      .rate-btn {
        padding: 6px 10px;
        font-size: 12px;
        min-width: 32px;
        border-radius: 4px;
      }
      .rate-buttons { flex-wrap: wrap; gap: 5px; }
      .comments-section { padding-top: 6px; }
      .comments-section h3 {
        font-size: 11px;
        margin-bottom: 5px;
      }
      .comment-form {
        padding: 6px;
        margin-bottom: 6px;
      }
      .comment-form textarea {
        min-height: 32px;
        padding: 6px;
        font-size: 12px;
        margin-bottom: 5px;
        border-radius: 4px;
      }
      .comment-form button {
        padding: 8px;
        font-size: 11px;
        border-radius: 4px;
      }
      .comment {
        padding: 6px;
        margin-bottom: 5px;
        border-radius: 4px;
      }
      .comment-header {
        font-size: 10px;
        margin-bottom: 3px;
      }
      .comment-body {
        font-size: 11px;
        line-height: 1.4;
      }
      .empty-state {
        padding: 16px 10px;
        font-size: 12px;
      }

      /* Bottom tab bar — fixed at bottom */
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        padding: 0;
        margin: 0;
        border-top: 1px solid #e5e5e5;
        border-bottom: none;
        background: #ffffff;
        z-index: 100;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        padding: 0;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #888888;
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: #000000; }

      /* ── Mobile swipe pagination: full page (map + datetime + columns) slides; fixed bottom nav stays ── */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: full page (map + datetime + columns) slides vertically; nav stays ── */
    @media (min-width: 769px) {
      .col-left, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateY(100vh);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateY(-100vh);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateY(-100vh);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateY(100vh);
      }
    }

    /* ══════════════════════════════════════════════
       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs.
       Direction comes from a class on <html> seeded by
       the outgoing page via sessionStorage, so the class
       is present before VT captures the new snapshot.
       ══════════════════════════════════════════════ */
    @view-transition { navigation: auto; }

    /* Suppress the default root crossfade — columns handle motion */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    .col-left { view-transition-name: ist-col-left; }
    .col-right { view-transition-name: ist-col-right; }

    /* SPA embed modes: the shell loads this document three times in
       iframes (?embed=left|middle|right). Each mode shows only its
       panel; the grid collapses so the visible column fills the
       viewport. Middle still shows its nav+header — the shell
       intercepts clicks via postMessage. */

    /* Force desktop layout inside every embed iframe. The shell sizes
       each iframe under 768px so the mobile breakpoint would otherwise
       misfire. CLAUDE.md specifies the site is desktop-only. */
    html.embedded body {
      position: static !important;
      padding-bottom: 0 !important;
      display: grid !important;
      grid-template-columns: 1fr 2.2fr 1fr !important;
      grid-template-rows: auto auto 1fr !important;
    }
    html.embedded .col-left  {
      grid-column: 1 !important; grid-row: 1 / -1 !important;
      border-top: none !important;
      border-right: 1px solid #cccccc !important;
      display: flex !important; flex-direction: column !important;
      overflow: hidden !important;
    }
    html.embedded .col-right {
      grid-column: 3 !important; grid-row: 1 / -1 !important;
      border-top: none !important;
      border-left: 1px solid #cccccc !important;
      display: flex !important; flex-direction: column !important;
      overflow-y: auto !important;
    }
    html.embedded .section-rule { grid-column: 2 !important; grid-row: 1 !important; }
    html.embedded header {
      grid-column: 2 !important; grid-row: 2 !important;
      position: static !important;
      height: auto !important;
      box-shadow: none !important;
      border-top: none !important;
      border-bottom: 4px double var(--ink) !important;
    }
    html.embedded main {
      grid-column: 2 !important; grid-row: 3 !important;
      display: flex !important; flex-direction: column !important;
      overflow: hidden !important;
    }
    html.embedded .datetime-block { flex-direction: column !important; gap: 0 !important; }
    html.embedded .datetime-block .day-line { display: block !important; }

    html.embed-left body { grid-template-columns: 1fr 0 0 !important; }
    html.embed-left .col-right,
    html.embed-left .section-rule,
    html.embed-left header,
    html.embed-left main { display: none !important; }
    html.embed-left .col-left { border-right: none; }

    html.embed-middle body { grid-template-columns: 0 1fr 0 !important; }
    html.embed-middle .col-left,
    html.embed-middle .col-right { display: none !important; }

    html.embed-right body { grid-template-columns: 0 0 1fr !important; }
    html.embed-right .col-left,
    html.embed-right .section-rule,
    html.embed-right header,
    html.embed-right main { display: none !important; }
    html.embed-right .col-right { border-left: none; }

    @media (min-width: 769px) {
      @keyframes ist-vt-out-up { from { transform: translateY(0); } to { transform: translateY(-100vh); } }
      @keyframes ist-vt-in-up { from { transform: translateY(100vh); } to { transform: translateY(0); } }
      @keyframes ist-vt-out-down { from { transform: translateY(0); } to { transform: translateY(100vh); } }
      @keyframes ist-vt-in-down { from { transform: translateY(-100vh); } to { transform: translateY(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-up;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-up;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-down;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-down;
      }
    }

    @media (max-width: 768px) {
      @keyframes ist-vt-out-left { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-in-left { from { transform: translateX(100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {

      html.vt-forward::view-transition-new(ist-col-left),

      html.vt-backward::view-transition-old(ist-col-left),

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Anahane → Kahvehane → Kütüphane → Hane with a full-page slide.
// The entire page (map, datetime bar, both columns) translates as one unit;
// only the nav bar stays fixed. Mobile = horizontal touch swipe, desktop =
// vertical wheel swipe; CSS picks the axis per media query. Tab-bar clicks
// trigger the same animation.
// ══════════════════════════════════════════
(function initSwipePagination() {
  // In SPA embed mode the shell drives routing — skip all self-navigation.
  if (document.documentElement.classList.contains('embedded')) return;
  const PAGES = ['index.html', 'kahvehane.html', 'kutuphane.html', 'hane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function recordDir(dir) {
    // Seed the direction for the incoming page. The pre-body script
    // reads this and sets vt-<dir> on <html> before VT captures the
    // new snapshot, so the CSS slide keyframes can match.
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
      });
    });
  }

  // Entry handler — runs on every page load. Cleans up direction state
  // and, for non-VT browsers, releases the manual offscreen transform.
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: '#ffffff',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        const ax = mobile ? 'translateX' : 'translateY';
        const pct = (dir === 'forward' ? i : -i) * 100;
        node.style.transform = ax + '(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const axis = mobile ? 'X' : 'Y';
    const endPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const keyframes = [
      { transform: 'translate' + axis + '(0%)' },
      { transform: 'translate' + axis + '(' + endPct + '%)' },
    ];
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    const a1 = leftStack.stack.animate(keyframes, opts);
    const a2 = rightStack.stack.animate(keyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  // ── Desktop: vertical wheel-based swipe anywhere on the page ──
  // Respects native scrolling: only triggers navigation when there's no
  // more content to scroll in that direction. Wheel delta is accumulated
  // so a single flick doesn't accidentally navigate.
  let wheelAccum = 0, wheelTs = 0;
  const WHEEL_THRESHOLD = 180;
  const WHEEL_RESET_MS = 220;
  function canScrollInDir(target, dy) {
    let el = target;
    while (el && el !== document.body && el !== document.documentElement) {
      if (el.scrollHeight > el.clientHeight + 1) {
        const atTop = el.scrollTop < 0.5;
        const atBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 0.5;
        if (dy > 0 && !atBottom) return true;
        if (dy < 0 && !atTop) return true;
      }
      el = el.parentElement;
    }
    return false;
  }
  document.addEventListener('wheel', (e) => {
    if (isMobile()) return;
    if (navigating) { e.preventDefault(); return; }
    if (e.target.closest && e.target.closest('nav')) { wheelAccum = 0; return; }
    const dy = e.deltaY;
    if (Math.abs(dy) < 1) return;
    if (canScrollInDir(e.target, dy)) {
      wheelAccum = 0;
      return; // let a nested scroll container scroll normally
    }
    // At a scroll boundary — suppress overscroll and accumulate toward navigation.
    e.preventDefault();
    const now = Date.now();
    if (now - wheelTs > WHEEL_RESET_MS) wheelAccum = 0;
    wheelTs = now;
    wheelAccum += dy;
    if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
      const curr = currentIdx();
      const accum = wheelAccum;
      wheelAccum = 0;
      if (accum > 0) navigate(curr + 1, 'forward');
      else           navigate(curr - 1, 'backward');
    }
  }, { passive: false });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const day = now.toLocaleDateString('tr-TR', { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString('tr-TR', { ...opts, month: 'long' });
  const year = now.toLocaleDateString('tr-TR', { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString('tr-TR', { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString('tr-TR', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

// LOAD ARTICLES
// ══════════════════════════════════════════
async function loadArticles() {
  const listEl = document.getElementById('articles-list');
  
  const { data, error } = await sb
    .from('library_articles')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (error || !data || data.length === 0) {
    listEl.innerHTML = '<div class="empty-state">Henüz makale eklenmedi</div>';
    return;
  }
  
  listEl.innerHTML = data.map(article => `
    <div class="article-card" onclick="loadArticleDetail('${article.id}')">
      <div class="article-category">${article.category || 'GENEL'}</div>
      <h3>${article.title}</h3>
      <div class="meta">
        <div class="article-rating">
          <span class="star">★</span>
          <span>${article.avg_rating ? article.avg_rating.toFixed(1) : 'N/A'}</span>
        </div>
        <span>${new Date(article.created_at).toLocaleDateString('tr-TR')}</span>
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// LOAD ARTICLE DETAIL
// ══════════════════════════════════════════
async function loadArticleDetail(articleId) {
  currentArticleId = articleId;
  const detailEl = document.getElementById('article-detail');
  detailEl.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  
  // Highlight selected card
  document.querySelectorAll('.article-card').forEach(card => card.classList.remove('active'));
  event.target.closest('.article-card').classList.add('active');
  
  const { data: article, error } = await sb
    .from('library_articles')
    .select('*')
    .eq('id', articleId)
    .single();
  
  if (error || !article) {
    detailEl.innerHTML = '<div class="empty-state">Makale yüklenemedi</div>';
    return;
  }
  
  // Load ratings
  const { data: ratings } = await sb
    .from('article_ratings')
    .select('rating')
    .eq('article_id', articleId);
  
  const avgRating = ratings && ratings.length > 0 
    ? (ratings.reduce((sum, r) => sum + r.rating, 0) / ratings.length).toFixed(1)
    : 'N/A';
  const ratingCount = ratings ? ratings.length : 0;
  
  // Load comments
  const { data: comments } = await sb
    .from('article_comments')
    .select('*')
    .eq('article_id', articleId)
    .eq('approved', true)
    .order('created_at', { ascending: false });
  
  detailEl.innerHTML = `
    <div class="detail-header">
      <div class="detail-category">${article.category || 'GENEL'}</div>
      <h1 class="detail-title">${article.title}</h1>
      <div class="detail-meta">
        <span>${new Date(article.created_at).toLocaleDateString('tr-TR', {year:'numeric',month:'long',day:'numeric'})}</span>
        ${article.author ? `<span>Yazar: ${article.author}</span>` : ''}
      </div>
    </div>
    
    <div class="detail-body">
      ${article.content.split('\n').map(p => `<p>${p}</p>`).join('')}
    </div>
    
    <div class="rating-section">
      <h3>Makaleyi Değerlendir</h3>
      <div class="rating-display">
        <div class="rating-avg">${avgRating}</div>
        <div>
          <div class="rating-stars">
            ${[1,2,3,4,5].map(n => `<span class="star">${n <= Math.round(avgRating) ? '★' : '☆'}</span>`).join('')}
          </div>
          <div class="rating-count">${ratingCount} değerlendirme</div>
        </div>
      </div>
      <div class="rate-buttons">
        ${[1,2,3,4,5].map(n => `<button class="rate-btn" onclick="rateArticle(${n})">★ ${n}</button>`).join('')}
      </div>
      <div class="rate-status" id="rate-status"></div>
    </div>
    
    <div class="comments-section">
      <h3>Yorumlar (${comments ? comments.length : 0})</h3>
      
      <div class="comment-form">
        <textarea id="comment-text" placeholder="Yorumunuzu yazın..."></textarea>
        <button onclick="submitComment()">Yorum Gönder</button>
        <div class="comment-status" id="comment-status"></div>
      </div>
      
      <div class="comments-list">
        ${comments && comments.length > 0 ? comments.map(c => `
          <div class="comment">
            <div class="comment-header">
              <span class="comment-author">Anonim</span>
              <span>${new Date(c.created_at).toLocaleDateString('tr-TR')}</span>
            </div>
            <div class="comment-body">${c.content}</div>
          </div>
        `).join('') : '<div class="empty-state" style="padding:20px;">Henüz yorum yok</div>'}
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════
// RATE ARTICLE
// ══════════════════════════════════════════
async function rateArticle(rating) {
  const statusEl = document.getElementById('rate-status');
  
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    statusEl.textContent = 'Değerlendirme yapmak için giriş yapın';
    statusEl.style.color = 'var(--accent)';
    return;
  }
  
  // Check if user already rated
  const { data: existing } = await sb
    .from('article_ratings')
    .select('*')
    .eq('article_id', currentArticleId)
    .eq('user_id', user.id);
  
  if (existing && existing.length > 0) {
    // Update existing rating
    await sb
      .from('article_ratings')
      .update({ rating })
      .eq('article_id', currentArticleId)
      .eq('user_id', user.id);
  } else {
    // Insert new rating
    await sb
      .from('article_ratings')
      .insert([{ article_id: currentArticleId, user_id: user.id, rating }]);
  }
  
  statusEl.textContent = '✓ Değerlendirmeniz kaydedildi';
  statusEl.style.color = 'var(--success)';
  setTimeout(() => { loadArticleDetail(currentArticleId); }, 1000);
}

// ══════════════════════════════════════════
// SUBMIT COMMENT
// ══════════════════════════════════════════
async function submitComment() {
  const content = document.getElementById('comment-text').value.trim();
  const statusEl = document.getElementById('comment-status');
  
  if (!content) {
    statusEl.textContent = 'Lütfen bir yorum yazın';
    statusEl.className = 'comment-status err';
    return;
  }
  
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    statusEl.textContent = 'Yorum yapmak için giriş yapın';
    statusEl.className = 'comment-status err';
    return;
  }
  
  const { error } = await sb
    .from('article_comments')
    .insert([{
      article_id: currentArticleId,
      user_id: user.id,
      content: content,
      approved: false
    }]);
  
  if (error) {
    statusEl.textContent = error.message;
    statusEl.className = 'comment-status err';
  } else {
    statusEl.textContent = 'Yorumunuz onay bekliyor!';
    statusEl.className = 'comment-status ok';
    document.getElementById('comment-text').value = '';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);
  }
}
