          <input class="field-input" id="edit-lastname" type="text" value="${lastName}" placeholder="${I18N.t('profile.lastname')}">
        </div>
        <div>
          <div class="field-label">${I18N.t('profile.district')}</div>
          <select class="field-select" id="edit-yasadigi">
            <option value="">— ${I18N.t('profile.district')} —</option>
            ${districtOptions}
          </select>
        </div>
        <div>
          <div class="field-label">${I18N.t('profile.birthplace')}</div>
          <div class="field-display">${dogumDisplay}</div>
        </div>
        <div>
          <div class="field-label">${I18N.t('profile.langpref')}</div>
          <input class="pref-slider" id="edit-language" type="range" min="0" max="1" step="1" value="${LANG_VALUES.indexOf(languagePref)}">
          <div class="pref-ticks" id="edit-language-ticks">
            <span data-idx="0">Daha İngilizce</span>
            <span data-idx="1">Daha Türkçe</span>
          </div>
        </div>
        <div>
          <div class="field-label">${I18N.t('profile.colortheme')}</div>
          <input class="pref-slider" id="edit-palette" type="range" min="0" max="1" step="1" value="${PALETTE_VALUES.indexOf(palettePref)}">
          <div class="pref-ticks" id="edit-palette-ticks">
            <span data-idx="0">Siyah-Beyaz</span>
            <span data-idx="1">Kahverengi</span>
          </div>
        </div>
        <div>
          <div class="field-label">${I18N.t('profile.appearance')}</div>
          <input class="pref-slider" id="edit-theme" type="range" min="0" max="1" step="1" value="${THEME_VALUES.indexOf(themePref)}">
          <div class="pref-ticks" id="edit-theme-ticks">
            <span data-idx="0">Açık</span>
            <span data-idx="1">Koyu</span>
          </div>
        </div>
      </div>
      <div class="edit-row">
        <button class="cancel-btn" id="cancel-btn">${I18N.t('profile.cancel')}</button>
        <button class="save-btn" id="save-btn">${I18N.t('profile.save')}</button>
      </div>
      <div class="save-msg" id="save-msg"></div>
    `;
    document.getElementById('cancel-btn').addEventListener('click', renderCardView);
    document.getElementById('save-btn').addEventListener('click', handleSave);
    document.querySelectorAll('#avatar-picker .avatar-option').forEach(btn => {
      btn.addEventListener('click', () => handleAvatarPick(btn.dataset.url));
    });

    // Highlight active tick label as the user drags either slider
    function syncTicks(sliderId, ticksId) {
      const slider = document.getElementById(sliderId);
      const ticks = document.getElementById(ticksId);
      const update = () => {
        const v = parseInt(slider.value, 10);
        ticks.querySelectorAll('span').forEach(s => {
          s.classList.toggle('active', parseInt(s.dataset.idx, 10) === v);
        });
      };
      slider.addEventListener('input', update);
      ticks.querySelectorAll('span').forEach(s => {
        s.addEventListener('click', () => {
          slider.value = s.dataset.idx;
          slider.dispatchEvent(new Event('input'));
        });
      });
      update();
    }
    syncTicks('edit-language', 'edit-language-ticks');
    syncTicks('edit-palette', 'edit-palette-ticks');
    syncTicks('edit-theme', 'edit-theme-ticks');
  }

  async function handleSave() {
    const msgEl = document.getElementById('save-msg');
    const btn = document.getElementById('save-btn');
    const newYasadigi = document.getElementById('edit-yasadigi').value;
    const newFirstName = capitalizeName(document.getElementById('edit-firstname').value.trim());
    const newLastName = capitalizeName(document.getElementById('edit-lastname').value.trim());

    if (!newYasadigi) {
      msgEl.textContent = 'Lütfen bir ilçe seçin.';
      msgEl.style.color = 'var(--accent)';
      return;
    }

    btn.textContent = I18N.t('profile.saving');
    btn.disabled = true;
    msgEl.textContent = '';

    try {
      // `neighborhood` is admin-controlled — the protect_profile_columns trigger
      // silently reverts it for non-admin users, so only send it for the admin.
      const newLanguage = LANG_VALUES[parseInt(document.getElementById('edit-language').value, 10)] || 'default';
      const newTheme = THEME_VALUES[parseInt(document.getElementById('edit-theme').value, 10)] || 'light';
      const newPalette = PALETTE_VALUES[parseInt(document.getElementById('edit-palette').value, 10)] || 'mono';

      const payload = {
        first_name: newFirstName,
        last_name: newLastName,
        language_pref: newLanguage,
        theme_pref: newTheme,
        palette_pref: newPalette,
      };
      const isAdminUser = user.email === 'cemwozturk@gmail.com';
      if (isAdminUser) payload.neighborhood = newYasadigi;

      const { data, error } = await sb
        .from('profiles')
        .update(payload)
        .eq('id', user.id)
        .select('id, first_name, last_name, neighborhood');

      if (error) throw error;
      if (!data || data.length === 0) {
        throw new Error('Profil kaydı bulunamadı. Yönetici ile iletişime geçin.');
      }

      setTimeout(() => window.location.reload(), 400);
    } catch (err) {
      console.error('Profile save error:', err);
      btn.textContent = I18N.t('profile.save');
      btn.disabled = false;
      msgEl.textContent = err && err.message ? err.message : 'Kaydedilemedi.';
      msgEl.style.color = 'var(--accent)';
    }
  }

  let _avatarMsgTimer = null;
  function showAvatarMsg(text) {
    const el = document.getElementById('avatar-msg');
    if (!el) return;
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(_avatarMsgTimer);
    _avatarMsgTimer = setTimeout(() => el.classList.remove('show'), 5000);
  }

  async function handleAvatarPick(url) {
    if (!url || url === avatarUrl) return;
    const opt = AVATAR_OPTIONS.find(o => o.url === url);
    if (opt?.requiresSozculCount && ownSozculCount < opt.requiresSozculCount) {
      const need = opt.requiresSozculCount;
      showAvatarMsg(
        `Bu avatar kilitli — ${need} kez Sözcü olmak gerekiyor (${ownSozculCount}/${need}).`
      );
      return;
    }
    const { data, error } = await sb
      .from('profiles')
      .update({ avatar_url: url })
      .eq('id', user.id)
      .select('id');

    if (error) {
      console.error('[kutuphane avatar save]', error);
      alert('Avatar kaydedilemedi: ' + error.message);
      return;
    }
    if (!data || data.length === 0) {
      alert('Profil kaydı bulunamadı. Yönetici ile iletişime geçin.');
      return;
    }
    avatarUrl = url;
    const av = document.getElementById('avatar-display');
    if (av) av.innerHTML = `<img src="${url}" alt="Profile">`;
    document.querySelectorAll('#avatar-picker .avatar-option').forEach(b => {
      b.classList.toggle('selected', b.dataset.url === url);
    });
  }

  renderCardView();

  if (!isViewingOther) {
    document.getElementById('profile-signout-wrap').innerHTML = `
      <button class="btn-signout" id="signout-btn">${I18N.t('profile.signout')}</button>
    `;
    document.getElementById('signout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });
  }

  // ── RIGHT: stats & account info ──
  if (isViewingOther) {
    document.querySelector('.profile-right').innerHTML = `
      <div>
        <div class="right-section-title">${I18N.t('profile.kefil')}</div>
        ${kefilOfUser ? `<div class="info-row">
          <div class="info-label">${I18N.t('profile.kefil')}</div>
          <div class="info-value"><button class="kefil-link" data-user-id="${kefilOfUser.id}">${capitalizeName((`${kefilOfUser.first_name || ''} ${kefilOfUser.last_name || ''}`).trim()) || I18N.t('profile.unnamed')}</button></div>
        </div>` : ''}
        <div class="info-row">
          <div class="info-label">${I18N.t('profile.sponsoredcount')}</div>
          <div class="info-value">${kefaletCount ?? 0} ${I18N.t('profile.people')}</div>
        </div>
      </div>
    `;
  } else {
    document.querySelector('.profile-right').innerHTML = `
      <div>
        <div class="right-section-title">${I18N.t('profile.account')}</div>
        <div class="info-row">
          <div class="info-label">${I18N.t('profile.email')}</div>
          <div class="info-value">${user.email}</div>
        </div>
        <div class="info-row">
          <div class="info-label">${I18N.t('profile.membership')}</div>
          <div class="info-value">${joinedDate}</div>
        </div>
        <div class="info-row">
          <div class="info-label">${I18N.t('profile.lastseen')}</div>
          <div class="info-value">${lastSeenText}</div>
        </div>
        ${kefilOfUser ? `<div class="info-row">
          <div class="info-label">${I18N.t('profile.kefil')}</div>
          <div class="info-value"><button class="kefil-link" data-user-id="${kefilOfUser.id}">${capitalizeName((`${kefilOfUser.first_name || ''} ${kefilOfUser.last_name || ''}`).trim()) || I18N.t('profile.unnamed')}</button></div>
        </div>` : ''}
        ${referralCode ? `<div class="info-row">
          <div class="info-label">${I18N.t('profile.referralcode')}</div>
          <div class="info-value" style="font-family:'Courier New',monospace;letter-spacing:2px;">${referralCode}<button class="copy-kefil-btn" style="margin-left:8px;" onclick="navigator.clipboard.writeText('${referralCode}').then(()=>{const c=I18N.t('profile.copied');const k=I18N.t('profile.copy');this.textContent=c;setTimeout(()=>this.textContent=k,1500)})">${I18N.t('profile.copy')}</button></div>
        </div>` : ''}
        <div class="info-row">
          <div class="info-label">${I18N.t('profile.sponsoredcount')}</div>
          <div class="info-value">${kefaletCount ?? 0} ${I18N.t('profile.people')}</div>
        </div>
      </div>
      <div id="scores-section">
        <div class="right-section-title">${I18N.t('profile.gamescores')}</div>
        <div class="loading" style="padding:8px;font-size:11px;"><span class="spinner"></span></div>
      </div>
    `;
    renderScoresSection(scores);
  }
}

loadProfile();
bootstrapLibraryNav();

// Mount the shared mobile profile card (hidden on desktop via CSS).
// profile-card.js is deferred, so wait until it's loaded.
function __mountIstPc() {
  if (window.IstProfileCard) IstProfileCard.mount({ sb, I18N, page: 'kutuphane' });
  // Resume the onboarding flow if the user is mid-tour. onboarding.js is
  // deferred — poll briefly in case it hasn't landed yet.
  (function tryOnb(tries) {
    if (window.IstOnboarding) {
      sb.auth.getSession().then(({ data }) => {
        if (data?.session?.user) IstOnboarding.maybeRun({ sb, user: data.session.user, page: 'kutuphane' });
      });
    } else if (tries > 0) {
      setTimeout(() => tryOnb(tries - 1), 60);
    }
  })(40);
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', __mountIstPc);
} else {
  __mountIstPc();
}

// ── Profile popup — opens on any .kefil-link click, navigates in-place for the chain ──
(function() {
  const overlay = document.createElement('div');
  overlay.className = 'profile-popup-overlay';
  overlay.innerHTML = `
    <div class="profile-popup" role="dialog" aria-modal="true">
      <button class="close-btn" type="button" aria-label="Kapat">×</button>
      <div class="pp-body"><div class="pp-loading">Yükleniyor…</div></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const body = overlay.querySelector('.pp-body');

  function close() { overlay.classList.remove('open'); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.close-btn').addEventListener('click', close);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) close();
  });

  function nbLabel(id) {
    if (!id) return '—';
    if (id === 'istanbul_disi') return 'İstanbul Dışı';
    return neighborhoodNames[id] || id;
  }

  function fmtDate(s) {
    if (!s) return '—';
    try { return I18N.formatDate(s, { year:'numeric', month:'long', day:'numeric' }); }
    catch { return '—'; }
  }

  function istanbulTodayISO() {
    const now = new Date();
    const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
    const y = ist.getFullYear();
    const m = String(ist.getMonth() + 1).padStart(2, '0');
    const d = String(ist.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  async function open(userId) {
    overlay.classList.add('open');
    body.innerHTML = '<div class="pp-loading">Yükleniyor…</div>';

    const today = istanbulTodayISO();
    const [{ data: prof, error }, { count: sozculCount }] = await Promise.all([
      sb.from('profiles')
        .select('id, first_name, last_name, neighborhood, birth_place, avatar_url, joined_at, referred_by')
        .eq('id', userId)
        .maybeSingle(),
      sb.from('sozcel_sozcul_assignments')
        .select('*', { count: 'exact', head: true })
        .eq('user_id', userId)
        .lte('game_date', today),
    ]);

    if (error || !prof) {
      body.innerHTML = '<div class="pp-error">Profil yüklenemedi.</div>';
      return;
    }

    let kefilName = null, kefilId = null;
    if (prof.referred_by) {
      const { data: kp } = await sb
        .from('profiles')
        .select('id, first_name, last_name')
        .eq('id', prof.referred_by)
        .maybeSingle();
      if (kp) {
        kefilName = capitalizeName((`${kp.first_name || ''} ${kp.last_name || ''}`).trim()) || 'İsimsiz Üye';
        kefilId = kp.id;
      }
    }

    const fullName = capitalizeName((`${prof.first_name || ''} ${prof.last_name || ''}`).trim()) || 'İsimsiz Üye';
    const avatar = prof.avatar_url
      ? `<img src="${prof.avatar_url}" alt="">`
      : (fullName.charAt(0) || '?').toUpperCase();
    const birth = nbLabel(prof.birth_place);

    body.innerHTML = `
      <div class="pp-avatar">${avatar}</div>
      <div class="pp-name">${fullName.toLocaleUpperCase('tr-TR')}</div>
      <div class="pp-meta">${nbLabel(prof.neighborhood)}</div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.birthplace')}</span><span class="pp-value">${birth}</span></div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.membership')}</span><span class="pp-value">${fmtDate(prof.joined_at)}</span></div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.sozculcount')}</span><span class="pp-value">${sozculCount ?? 0} ${I18N.t('profile.times')}</span></div>
      ${kefilName ? `<div class="pp-row"><span class="pp-label">${I18N.t('profile.kefil')}</span><span class="pp-value"><button class="kefil-link" data-user-id="${kefilId}">${kefilName}</button></span></div>` : ''}
    `;
  }

  // Delegate all .kefil-link clicks to open the popup
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.kefil-link');
    if (!btn) return;
    const id = btn.getAttribute('data-user-id');
    if (id) open(id);
  });
})();
</script>
