<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kütüphane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
  <link rel="stylesheet" href="profile-card.css">
  <script src="profile-card.js" defer></script>
  <link rel="stylesheet" href="onboarding.css">
  <script src="onboarding.js" defer></script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in (mobile: horizontal, desktop: vertical — CSS picks the axis) -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      /* Core ink & paper — warm cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;       /* main canvas — lightest */
      --paper-warm: #eddbd0;
      --paper-card: #ddc4b5;  /* cards/blocks */
      --paper-banner: #c9ae9a;/* section headers/banners */
      --paper-navbar: #b89b7f;/* top nav bar — darkest */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 1 / -1;
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 28px;
      padding: 14px 28px 10px 28px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
    }
    .section-rule > .masthead { justify-self: start; }
    .section-rule > header { justify-self: center; }
    .section-rule > .datetime-block { justify-self: end; }
    .masthead {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 1.45rem;
      letter-spacing: 0.5px;
      color: var(--ink);
      line-height: 1;
    }
    .masthead .tld { color: var(--muted); font-style: italic; }
    .datetime-block {
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
    }
    .datetime-block .sep { color: var(--muted); opacity: 0.6; }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      font-family: 'Inter', sans-serif;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    .col-left {
      grid-column: 1;
      grid-row: 2;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-banner);
      color: var(--ink-red);
      text-align: left;
      flex-shrink: 0;
    }
    .col-right {
      grid-column: 3;
      grid-row: 2;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Profile identity section (left column) ── */
    .profile-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .display-name {
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      word-break: break-word;
    }

    .district-select-wrap {
      width: 100%;
      margin-top: 6px;
    }

    .district-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .district-select {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--field-bg);
      border: 1px solid var(--ink);
      color: var(--ink);
      width: 100%;
      cursor: pointer;
    }

    .district-display {
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      color: var(--ink);
    }

    .save-btn {
      width: 100%;
      padding: 8px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
    }
    .save-btn:hover { background: var(--accent); }
    .save-btn:disabled { background: var(--muted); cursor: default; }

    .save-msg {
      font-size: 0.7rem;
      text-align: center;
      min-height: 14px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-signout {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-signout:hover { background: var(--accent-2); }

    /* Signout wrapper (bottom of right column on desktop, below everything on mobile) */
    .profile-signout-wrap {
      padding: 8px 12px;
      display: flex;
      justify-content: center;
      border-top: 1px solid var(--hairline);
      margin-top: auto;
      flex-shrink: 0;
    }
    .profile-signout-wrap .btn-signout { margin-top: 0; padding: 6px 16px; font-size: 0.65rem; }

    /* ── Center: profile board ── */
    .profile-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }

    #sticker-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .board-header {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--paper-dark);
      border-bottom: var(--col-border);
      color: var(--ink);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-header .edit-toggle {
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    .board-header .edit-toggle:hover { color: var(--ink); }

    .sticker-board {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--paper);
      min-height: 0;
    }

    .sticker {
      position: absolute;
      cursor: grab;
      user-select: none;
      width: 120px;
      height: auto;
      filter: grayscale(100%);
      transition: filter 0.2s;
    }
    .sticker:hover { filter: grayscale(60%); }
    .sticker.dragging { cursor: grabbing; z-index: 100; filter: grayscale(0%); }

    /* Sticker tray (shown in edit mode) */
    .sticker-tray {
      display: none;
      padding: 10px 16px;
      background: var(--paper-dark);
      border-top: var(--col-border);
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
      gap: 8px;
    }

    .sticker-tray.active {
      display: flex;
    }

    .tray-sticker {
      width: 64px;
      height: 64px;
      object-fit: contain;
      cursor: pointer;
      filter: grayscale(100%);
      opacity: 0.7;
      transition: all 0.2s;
      flex-shrink: 0;
      padding: 4px;
      border: 2px solid transparent;
    }
    .tray-sticker:hover { filter: grayscale(40%); opacity: 1; }
    .tray-sticker.locked {
      opacity: 0.2;
      cursor: not-allowed;
      filter: grayscale(100%);
    }
    .tray-sticker.locked:hover { opacity: 0.2; filter: grayscale(100%); }

    /* ── Right: stats & info ── */
    .profile-right {
      display: flex;
      flex-direction: column;
      padding: 12px 12px 8px;
      overflow: hidden;
      gap: 10px;
    }

    .right-section-title {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--hairline);
    }

    .info-row {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .info-value {
      font-size: 0.75rem;
      color: var(--ink);
      text-align: right;
      word-break: break-word;
      min-width: 0;
    }

    .scores-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .score-card {
      border: 1px solid var(--rule);
      padding: 6px 4px;
      background: var(--paper);
      text-align: center;
      margin-bottom: 0;
      min-width: 0;
    }

    .score-card .game-name {
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-card .score-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .score-card .score-detail {
      font-size: 0.55rem;
      color: var(--muted);
      margin-top: 2px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 60px 40px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Library shelf (left column) ── */
    .library-shelf {
      padding: 16px 0;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .source-tab {
      padding: 14px 18px;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      text-align: left;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .source-tab:hover { background: var(--hover); color: var(--ink); }
    .source-tab.active {
      color: var(--ink);
      background: var(--paper-dark);
      border-left-color: var(--ink);
    }
    .country-label {
      padding: 14px 18px 4px 18px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .country-label:first-child { padding-top: 4px; }
    .source-tab {
      white-space: normal;
      line-height: 1.25;
    }

    .shelf-loading {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    /* ── Reading area (center) — where shelf contents will render ── */
    .reading-area {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      min-height: 0;
    }
    .reading-area .empty-state {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 80px 20px;
      font-size: 0.85rem;
    }

    /* ── Shelves (right column) — 6 horizontal rectangle buttons styled like bookshelves ── */
    .shelves {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      overflow-y: auto;
      min-height: 0;
    }
    .shelf-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper-warm);
      border: 2px solid var(--ink);
      border-bottom: 5px solid var(--ink);
      padding: 16px 14px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.2s, transform 0.2s;
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      font-family: 'Source Serif 4', Georgia, serif;
    }
    .shelf-btn::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }
    .shelf-btn:hover {
      background: var(--paper-dark);
      transform: translateX(-4px);
    }
    .shelf-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .shelf-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 4px;
    }
    .shelf-countdown {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      color: var(--accent);
      letter-spacing: 1px;
      margin-top: 6px;
      text-transform: uppercase;
      font-style: normal;
    }
    .shelf-btn.shelf-active {
      background: var(--paper-banner);
      transform: translateX(-4px);
    }
    .shelf-btn.shelf-empty {
      background: var(--paper-dark);
      color: var(--muted);
      cursor: default;
      opacity: 0.7;
    }
    .shelf-btn.shelf-empty:hover { transform: none; background: var(--paper-dark); }
    .shelf-btn.shelf-empty .shelf-title { color: var(--muted); }

    /* ── Shelf path (article list inside a shelf) ── */
    .shelf-path { padding: 8px 0; }
    .path-head {
      padding-bottom: 14px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    /* Back-to-shelves button is mobile-only; desktop keeps the shelves visible
       in the right column so no in-pane back button is needed. */
    .path-back-mobile { display: none; }
    @media (max-width: 768px) {
      .path-back-mobile {
        display: inline-flex;
        align-items: center;
        background: none;
        border: none;
        margin: 0 0 10px 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
        cursor: pointer;
      }
      .path-back-mobile:hover { color: var(--ink); }
    }
    .path-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin: 0 0 6px;
    }
    .path-subtitle {
      font-size: 0.9rem;
      color: var(--accent);
      font-style: italic;
      margin: 0 0 6px;
    }
    .path-deadline {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 4px;
    }
    .path-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-top: 8px;
    }
    /* Duolingo-style vertical path: nodes alternate offset to feel like a winding road. */
    .path-node {
      background: var(--paper-card);
      border: 2px solid var(--ink);
      border-bottom: 5px solid var(--ink);
      padding: 16px 22px;
      width: 80%;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      color: var(--ink);
      position: relative;
      transition: transform 0.15s, background 0.15s;
    }
    .path-node:nth-child(odd) { transform: translateX(-30px); }
    .path-node:nth-child(even) { transform: translateX(30px); }
    .path-node:hover { background: var(--paper-banner); }
    .path-node:nth-child(odd):hover { transform: translateX(-34px); }
    .path-node:nth-child(even):hover { transform: translateX(34px); }
    /* Sequential lock: every node beyond the next-unread is dimmed and
       click-disabled until the prior chapter is completed. */
    .path-node.locked {
      background: var(--paper-dark);
      opacity: 0.55;
      cursor: not-allowed;
      border-color: var(--rule);
      border-bottom-color: var(--rule);
    }
    .path-node.locked:hover { background: var(--paper-dark); }
    .path-node.locked:nth-child(odd):hover { transform: translateX(-30px); }
    .path-node.locked:nth-child(even):hover { transform: translateX(30px); }
    .path-node .path-lock {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .path-node .path-done {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-2);
    }

    /* Chapter intro modal: shown when a chapter is tapped — gives the
       reader the chapter description before the reader actually opens. */
    .chapter-intro-overlay {
      position: fixed;
      inset: 0;
      background: rgba(35, 25, 18, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .chapter-intro {
      background: var(--paper);
      border: 2px solid var(--ink);
      border-bottom-width: 5px;
      max-width: 480px;
      width: 100%;
      padding: 26px 30px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chapter-intro-step {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-red);
    }
    .chapter-intro-title {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink);
      margin: 0;
    }
    .chapter-intro-body {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--accent);
      font-style: italic;
      white-space: pre-wrap;
    }
    .chapter-intro-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }
    .chapter-intro-btn {
      padding: 10px 22px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ── Desktop swipe pagination: full page (map + datetime + columns) slides vertically; nav stays ── */

       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's

      @keyframes ist-vt-out-down { from { transform: translateY(0); } to { transform: translateY(100vh); } }
      @keyframes ist-vt-in-down { from { transform: translateY(-100vh); } to { transform: translateY(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-up;
      }
      html.vt-forward::view-transition-new(ist-col-left),

      html.vt-backward::view-transition-old(ist-col-left),

      html.vt-backward::view-transition-new(ist-col-left),

    @media (max-width: 768px) {

      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      html.vt-forward::view-transition-old(ist-col-left),

      html.vt-backward::view-transition-old(ist-col-left),

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Anahane → Kahvehane → Kütüphane → Hane with a full-page slide.
// The entire page (map, datetime bar, both columns) translates as one unit;
// only the nav bar stays fixed. Mobile = horizontal touch swipe, desktop =
// vertical wheel swipe; CSS picks the axis per media query. Tab-bar clicks
// trigger the same animation.
// ══════════════════════════════════════════
(function initSwipePagination() {
  const PAGES = ['kutuphane.html', 'anahane.html', 'kahvehane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function pageFromUrl(url) {
    try { return new URL(url).pathname.split('/').pop() || 'index.html'; }
    catch(e) { return ''; }
  }
  function recordDir(dir) {
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  // Tell the browser which direction to animate by setting a VT type AND
  // toggling a class on <html>. The class is the reliable hook; some
  // browsers don't match :active-view-transition-type() consistently, so
  // our CSS targets html.vt-forward / html.vt-backward instead.
  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
        try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
      });
    });
  }

  // Fallback entry cleanup (runs on every load; releases the offscreen
  // transform that the pre-body script applied for non-VT browsers).
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      // The browser will trigger a view transition on this navigation.
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: '#ffffff',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        const ax = mobile ? 'translateX' : 'translateY';
        const pct = (dir === 'forward' ? i : -i) * 100;
        node.style.transform = ax + '(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const axis = mobile ? 'X' : 'Y';
    const endPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const keyframes = [
      { transform: 'translate' + axis + '(0%)' },
      { transform: 'translate' + axis + '(' + endPct + '%)' },
    ];
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    const a1 = leftStack.stack.animate(keyframes, opts);
    const a2 = rightStack.stack.animate(keyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  // ── Desktop: vertical wheel-based swipe anywhere on the page ──
  // Respects native scrolling: only triggers navigation when there's no
  // more content to scroll in that direction. Wheel delta is accumulated
  // so a single flick doesn't accidentally navigate.
  let wheelAccum = 0, wheelTs = 0;
  const WHEEL_THRESHOLD = 180;
  const WHEEL_RESET_MS = 220;
  function canScrollInDir(target, dy) {
    let el = target;
    while (el && el !== document.body && el !== document.documentElement) {
      if (el.scrollHeight > el.clientHeight + 1) {
        const atTop = el.scrollTop < 0.5;
        const atBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 0.5;
        if (dy > 0 && !atBottom) return true;
        if (dy < 0 && !atTop) return true;
      }
      el = el.parentElement;
    }
    return false;
  }
  document.addEventListener('wheel', (e) => {
    if (isMobile()) return;
    if (navigating) { e.preventDefault(); return; }
    if (e.target.closest && e.target.closest('nav')) { wheelAccum = 0; return; }
    const dy = e.deltaY;
    if (Math.abs(dy) < 1) return;
    if (canScrollInDir(e.target, dy)) {
      wheelAccum = 0;
      return; // let a nested scroll container scroll normally
    }
    // At a scroll boundary — suppress overscroll and accumulate toward navigation.
    e.preventDefault();
    const now = Date.now();
    if (now - wheelTs > WHEEL_RESET_MS) wheelAccum = 0;
    wheelTs = now;
    wheelAccum += dy;
    if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
      const curr = currentIdx();
      const accum = wheelAccum;
      wheelAccum = 0;
      if (accum > 0) navigate(curr + 1, 'forward');
      else           navigate(curr - 1, 'backward');
    }
  }, { passive: false });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

  document.getElementById('day-line').textContent = weekday.toUpperCase();

function libEsc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

// Pull reaction counts + comment counts for a given set of article ids
// so the client can sort by liked / disliked / commented without an RPC.
async function fetchArticleStats(articleIds) {
  if (!articleIds.length) return { likes: {}, dislikes: {}, comments: {} };
  const [rxRes, cmRes] = await Promise.all([
    sb.from('library_article_reactions').select('article_id, reaction').in('article_id', articleIds),
    sb.from('library_article_comments').select('article_id').in('article_id', articleIds),
  ]);
  const likes = {}, dislikes = {}, comments = {};
  (rxRes.data || []).forEach(r => {
    if (r.reaction === 'like') likes[r.article_id] = (likes[r.article_id] || 0) + 1;
    else if (r.reaction === 'dislike') dislikes[r.article_id] = (dislikes[r.article_id] || 0) + 1;
  });
  (cmRes.data || []).forEach(c => {
    comments[c.article_id] = (comments[c.article_id] || 0) + 1;
  });
  return { likes, dislikes, comments };
}

function sortKey(a) {
  // Newest/oldest prefer published_at, fall back to created_at.
  return new Date(a.published_at || a.created_at || 0).getTime();
}

// Contested score: 0 when one side dominates, 1 at a perfect 50/50.
// Articles with no reactions score 0 so they sink to the bottom.
function contestedScore(likes, dislikes) {
  const total = likes + dislikes;
  if (total === 0) return 0;
  return 1 - Math.abs(likes - dislikes) / total;
}

function applySort(articles, stats, sort) {
  const copy = articles.slice();
  if (sort === 'newest') copy.sort((a, b) => sortKey(b) - sortKey(a));
  else if (sort === 'oldest') copy.sort((a, b) => sortKey(a) - sortKey(b));
  else if (sort === 'liked') copy.sort((a, b) => (stats.likes[b.id] || 0) - (stats.likes[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'disliked') copy.sort((a, b) => (stats.dislikes[b.id] || 0) - (stats.dislikes[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'commented') copy.sort((a, b) => (stats.comments[b.id] || 0) - (stats.comments[a.id] || 0) || sortKey(b) - sortKey(a));
  else if (sort === 'contested') {
    copy.sort((a, b) => {
      const ca = contestedScore(stats.likes[a.id] || 0, stats.dislikes[a.id] || 0);
      const cb = contestedScore(stats.likes[b.id] || 0, stats.dislikes[b.id] || 0);
      if (cb !== ca) return cb - ca;
      // Tiebreaker: more total reactions wins, then newest.
      const ta = (stats.likes[a.id] || 0) + (stats.dislikes[a.id] || 0);
      const tb = (stats.likes[b.id] || 0) + (stats.dislikes[b.id] || 0);
      return (tb - ta) || (sortKey(b) - sortKey(a));
    });
  }
  return copy;
}

function formatReactionPct(likes, dislikes) {
  const total = likes + dislikes;
  if (total === 0) return { likeLabel: '—', dislikeLabel: '—' };
  const likePct = Math.round((likes / total) * 100);
  return { likeLabel: likePct + '%', dislikeLabel: (100 - likePct) + '%' };
}

async function renderCategoryList(categoryId) {
  const area = document.getElementById('article-area');
  const name = LIB_CATEGORY_LABELS[categoryId];
  if (!area || !name) return;
  activeCategoryId = categoryId;
  document.querySelectorAll('.source-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.category === categoryId);
  });
  area.innerHTML = `
    <div class="article-list">
      <div class="list-head">
        <div class="source-heading">${name}</div>
        <label class="sort-control">
          <span>Sırala</span>
          <select id="sort-select">
            ${LIB_SORT_OPTIONS.map(o => `<option value="${o.value}"${o.value === currentSort ? ' selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </label>
      </div>
      <div class="empty-state"><span class="spinner"></span></div>
    </div>
  `;
  document.getElementById('sort-select').addEventListener('change', (e) => {
    currentSort = e.target.value;
    renderCategoryList(categoryId);
  });
  const articles = await fetchLibraryCategory(categoryId);
  if (!articles.length) {
    area.querySelector('.empty-state').textContent = 'Henüz makale yok.';
    return;
  }
  const stats = await fetchArticleStats(articles.map(a => a.id));
  const sorted = applySort(articles, stats, currentSort);
  const items = sorted.map(a => {
    const meta = [
      a.author ? libEsc(a.author) : null,
      a.published_at ? libEsc(formatLibDate(a.published_at)) : null,
    ].filter(Boolean).join(' · ');
    const likes = stats.likes[a.id] || 0;
    const dislikes = stats.dislikes[a.id] || 0;
    const { likeLabel, dislikeLabel } = formatReactionPct(likes, dislikes);
    const counts = `
      <span class="item-counts">
        <span title="Beğenenler">👍 ${likeLabel}</span>
        <span title="Beğenmeyenler">👎 ${dislikeLabel}</span>
        <span title="Yorumlar">💬 ${stats.comments[a.id] || 0}</span>
      </span>
    `;
    return `
      <div class="article-item" data-id="${a.id}">
        <div class="item-title">${libEsc(a.title)}</div>
        ${meta ? `<div class="item-byline">${meta}</div>` : ''}
        <div class="item-summary">${libEsc(a.summary || '')}</div>
        ${counts}
      </div>
    `;
  }).join('');
  area.innerHTML = `
    <div class="article-list">
      <div class="list-head">
        <div class="source-heading">${name}</div>
        <label class="sort-control">
          <span>Sırala</span>
          <select id="sort-select">
            ${LIB_SORT_OPTIONS.map(o => `<option value="${o.value}"${o.value === currentSort ? ' selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </label>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('sort-select').addEventListener('change', (e) => {
    currentSort = e.target.value;
    renderCategoryList(categoryId);
  });
  area.querySelectorAll('.article-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const article = articles.find(x => x.id === id);
      if (article) renderArticleDetail(categoryId, article);
    });
  });
}

function formatLibDate(iso) {
  if (!iso) return '';
  try {
    return I18N.formatDate(iso, { year:'numeric', month:'long', day:'numeric' });
  } catch { return ''; }
}

      ${article.url ? `<a class="detail-link" href="${article.url}" target="_blank" rel="noopener">Kaynakta Oku ↗</a>` : ''}

      <div class="reaction-bar" id="reaction-bar">

      <section class="article-comments" id="article-comments">

async function loadReactions(articleId) {
  const { data: { session } } = await sb.auth.getSession();
  const myUid = session?.user?.id;

  const { data, error } = await sb.from('library_article_reactions')
    .select('user_id, reaction').eq('article_id', articleId);
  if (error) { console.error('[reactions]', error); return; }
  let likes = 0, dislikes = 0, mine = null;
  (data || []).forEach(r => {
    if (r.reaction === 'like') likes++;
    else if (r.reaction === 'dislike') dislikes++;
    if (myUid && r.user_id === myUid) mine = r.reaction;
  });
  const likeEl = document.getElementById('rx-like');
  const dislikeEl = document.getElementById('rx-dislike');
  if (!likeEl || !dislikeEl) return;
  const { likeLabel, dislikeLabel } = formatReactionPct(likes, dislikes);
  document.getElementById('rx-like-count').textContent = likeLabel;
  document.getElementById('rx-dislike-count').textContent = dislikeLabel;
  likeEl.classList.toggle('active', mine === 'like');
  dislikeEl.classList.toggle('active', mine === 'dislike');
}

async function toggleReaction(articleId, reaction) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { alert('Önce giriş yapın.'); return; }
  const uid = session.user.id;

  // Find current reaction (if any).
  const { data: existing } = await sb.from('library_article_reactions')
    .select('reaction').eq('article_id', articleId).eq('user_id', uid).maybeSingle();

  if (existing && existing.reaction === reaction) {
    // Toggle off.
    await sb.from('library_article_reactions').delete()
      .eq('article_id', articleId).eq('user_id', uid);
  } else {
    // Insert or switch via upsert.
    await sb.from('library_article_reactions')
      .upsert({ article_id: articleId, user_id: uid, reaction }, { onConflict: 'article_id,user_id' });
  }
  loadReactions(articleId);
}

async function loadComments(articleId) {
  const listEl = document.getElementById('comments-list');
  if (!listEl) return;
  const { data: { session } } = await sb.auth.getSession();
  const currentUid = session?.user?.id;

  const { data: comments, error } = await sb.from('library_article_comments')
    .select('*').eq('article_id', articleId)
    .order('created_at', { ascending: true });
  if (error) { listEl.innerHTML = `<div class="empty-state" style="padding:12px;">Yorumlar yüklenemedi.</div>`; return; }
  if (!comments || !comments.length) {
    listEl.innerHTML = '<div class="empty-state" style="padding:12px;">Henüz yorum yok.</div>';
    return;
  }

  const authorIds = [...new Set(comments.map(c => c.author_id))];
  const { data: authors } = await sb.from('profiles_public')
    .select('id, first_name, last_name, neighborhood')
    .in('id', authorIds);
  const authorMap = {};
  (authors || []).forEach(p => { authorMap[p.id] = p; });

  listEl.innerHTML = comments.map(c => {
    const a = authorMap[c.author_id] || {};
    const name = capitalizeName(((a.first_name || '') + ' ' + (a.last_name || '')).trim()) || 'Üye';
    const nb = a.neighborhood ? (' · ' + libEsc(a.neighborhood)) : '';
    const when = formatRelative(c.created_at);
    const own = currentUid && c.author_id === currentUid;
    return `
      <div class="comment-row">
        <div class="comment-meta">
          <span class="comment-author">${libEsc(name)}</span>
          <span class="comment-when">${when}${nb}</span>
          ${own ? `<button class="comment-delete" data-id="${c.id}" type="button">Sil</button>` : ''}
        </div>
        <div class="comment-body">${libEsc(c.body).replace(/\n/g, '<br>')}</div>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.comment-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Yorumu sil?')) return;
      const { error } = await sb.from('library_article_comments').delete().eq('id', btn.dataset.id);
      if (error) { alert('Silinemedi: ' + error.message); return; }
      loadComments(articleId);
    });
  });
}

function formatRelative(iso) {
  const d = new Date(iso);
  const mins = Math.floor((Date.now() - d.getTime()) / 60000);
  const en = I18N.isEnglish();
  if (mins < 1) return en ? 'now' : 'şimdi';
  if (mins < 60) return en ? `${mins}m ago` : `${mins} dk önce`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return en ? `${hrs}h ago` : `${hrs} saat önce`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return en ? `${days}d ago` : `${days} gün önce`;
  return I18N.formatDate(d, { year:'numeric', month:'short', day:'numeric' });
}

async function submitComment(articleId) {
  const ta = document.getElementById('comment-body');
  const btn = document.getElementById('comment-submit');
  const msg = document.getElementById('composer-msg');
  const body = ta.value.trim();
  if (!body) { msg.textContent = 'Boş bırakılamaz.'; return; }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { msg.textContent = 'Önce giriş yapın.'; return; }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';
  msg.textContent = '';

  const { error } = await sb.from('library_article_comments')
    .insert([{ article_id: articleId, author_id: session.user.id, body }]);

  btn.disabled = false;
  btn.textContent = 'Gönder';

  if (error) { msg.textContent = 'Hata: ' + error.message; return; }
  ta.value = '';
  loadComments(articleId);
}

// Shelves are loaded after the supabase client is ready
// (see the bootstrap call at the end of this script).
async function bootstrapLibraryNav() {
  await loadShelvesUI();
}

// ══════════════════════════════════════════
// Kütüphane v5 reader: shelves → article path → article reader
// ══════════════════════════════════════════
let SHELVES_CACHE = [];
let SHELF_COUNTS = {};
let SHELF_COUNTDOWN_TIMER = null;

async function loadShelvesUI() {
  const shelvesEl = document.getElementById('shelves');
  if (!shelvesEl) return;
  const [shRes, artRes] = await Promise.all([
    sb.from('library_shelves').select('*').order('id', { ascending: true }),
    sb.from('library_articles').select('shelf_id'),
  ]);
  if (shRes.error) {
    shelvesEl.innerHTML = `<div class="empty-state" style="padding:20px;font-size:0.78rem;">Raflar yüklenemedi.</div>`;
    return;
  }
  SHELVES_CACHE = shRes.data || [];
  SHELF_COUNTS = {};
  (artRes.data || []).forEach(r => {
    if (r.shelf_id != null) SHELF_COUNTS[r.shelf_id] = (SHELF_COUNTS[r.shelf_id] || 0) + 1;
  });

  if (!SHELVES_CACHE.length) {
    shelvesEl.innerHTML = `<div class="empty-state" style="padding:20px;font-size:0.78rem;">Henüz raf yok.</div>`;
    return;
  }

  renderShelfButtons();
  startShelfCountdownTicker();
}

function renderShelfButtons() {
  const shelvesEl = document.getElementById('shelves');
  if (!shelvesEl) return;
  shelvesEl.innerHTML = SHELVES_CACHE.map(s => {
    const count = SHELF_COUNTS[s.id] || 0;
    const empty = count === 0;
    const name = (s.name_tr || '').trim();
    const subtitle = (s.subtitle_tr || '').trim();
    const display = empty ? 'Çok Yakında' : (name || `Raf ${s.id}`);
    const subtitleHtml = !empty && subtitle ? `<div class="shelf-subtitle">${libEsc(subtitle)}</div>` : '';
    const countdownHtml = !empty && s.deadline
      ? `<div class="shelf-countdown" data-deadline="${libEsc(s.deadline)}">…</div>`
      : '';
    return `
      <a class="shelf-btn ${empty ? 'shelf-empty' : ''}" data-shelf="${s.id}" href="#">
        <div>
          <div class="shelf-title">${libEsc(display)}</div>
          ${subtitleHtml}
          ${countdownHtml}
        </div>
      </a>
    `;
  }).join('');
  shelvesEl.querySelectorAll('.shelf-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      if (btn.classList.contains('shelf-empty')) return;
      const id = Number(btn.dataset.shelf);
      shelvesEl.querySelectorAll('.shelf-btn').forEach(b => b.classList.toggle('shelf-active', b === btn));
      openShelfPath(id);
    });
  });
  tickShelfCountdowns();
}

// Counter ticks for shelf deadlines: refresh every minute so the
// hours/minutes update without spinning the CPU.
function startShelfCountdownTicker() {
  if (SHELF_COUNTDOWN_TIMER) clearInterval(SHELF_COUNTDOWN_TIMER);
  SHELF_COUNTDOWN_TIMER = setInterval(tickShelfCountdowns, 60000);
}

function tickShelfCountdowns() {
  document.querySelectorAll('.shelf-countdown').forEach(el => {
    const iso = el.getAttribute('data-deadline');
    el.textContent = formatCountdown(iso);
  });
}

function formatCountdown(iso) {
  if (!iso) return '';
  const ms = new Date(iso).getTime() - Date.now();
  if (ms <= 0) return 'Erişim kapandı';
  const totalMins = Math.floor(ms / 60000);
  const days = Math.floor(totalMins / 1440);
  const hours = Math.floor((totalMins % 1440) / 60);
  const mins = totalMins % 60;
  if (days > 0) return `Erişime ${days} gün ${hours} saat boyunca açık`;
  if (hours > 0) return `Erişime ${hours} saat ${mins} dakika boyunca açık`;
  return `Erişime ${mins} dakika boyunca açık`;
}

// ── Sequential chapter unlock state (per-user, localStorage) ──
// Members must read chapters in order: chapter N+1 stays locked until
// chapter N is finished. Completion is recorded when the reader reaches
// the "Tamamlandı" terminal step. Stored client-side per user id; a DB
// table can replace this later if cross-device sync becomes a need.
async function libGetCurrentUserId() {
  const { data: { session } } = await sb.auth.getSession();
  return session?.user?.id || null;
}
function libCompletionStorageKey(userId) {
  return 'lib_chapter_completed_' + userId;
}
function libReadCompletedSet(userId) {
  if (!userId) return new Set();
  try {
    const raw = localStorage.getItem(libCompletionStorageKey(userId));
    const arr = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(arr) ? arr : []);
  } catch (e) {
    return new Set();
  }
}
function libWriteArticleCompleted(userId, articleId) {
  if (!userId || !articleId) return;
  const set = libReadCompletedSet(userId);
  if (set.has(articleId)) return;
  set.add(articleId);
  try {
    localStorage.setItem(libCompletionStorageKey(userId), JSON.stringify([...set]));
  } catch (e) {}
}

// Chapter intro modal: previews the chapter (number, title, description)
// before the reader pane mounts, so the reader knows what they're entering.
function showChapterIntro(article, index, onStart) {
  const overlay = document.createElement('div');
  overlay.className = 'chapter-intro-overlay';
  const description = (article.summary && article.summary.trim())
    ? libEsc(article.summary)
    : 'Bu bölüm için henüz bir açıklama yazılmadı.';
  overlay.innerHTML = `
    <div class="chapter-intro" role="dialog" aria-modal="true" aria-label="Bölüm ${index + 1}">
      <div class="chapter-intro-step">Bölüm ${index + 1}</div>
      <h3 class="chapter-intro-title">${libEsc(article.title)}</h3>
      <div class="chapter-intro-body">${description}</div>
      <div class="chapter-intro-actions">
        <button class="chapter-intro-btn secondary" type="button" data-act="cancel">İptal</button>
        <button class="chapter-intro-btn" type="button" data-act="start">Okumaya Başla</button>
      </div>
    </div>
  `;
  function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
  function onKey(e) { if (e.key === 'Escape') close(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('[data-act="cancel"]').addEventListener('click', close);
  overlay.querySelector('[data-act="start"]').addEventListener('click', () => {
    close();
    onStart();
  });
  document.addEventListener('keydown', onKey);
  document.body.appendChild(overlay);
}

async function openShelfPath(shelfId) {
  const area = document.getElementById('reading-area');
  if (!area) return;
  // Mobile: swap the shelves grid for the reader pane
  document.body.classList.add('mobile-reading');
  area.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  const { data: articles, error } = await sb.from('library_articles')
    .select('*').eq('shelf_id', shelfId)
    .order('position', { ascending: true })
    .order('created_at', { ascending: false });
  if (error) {
    area.innerHTML = '<div class="empty-state">Yüklenemedi.</div>';
    return;
  }
  const shelf = SHELVES_CACHE.find(s => s.id === shelfId);
  const title = (shelf && shelf.name_tr && shelf.name_tr.trim()) || `Raf ${shelfId}`;
  const subtitle = shelf && shelf.subtitle_tr ? shelf.subtitle_tr.trim() : '';
  const deadlineHtml = shelf && shelf.deadline
    ? `<div class="path-deadline">${libEsc(formatCountdown(shelf.deadline))}</div>` : '';
  const backBtnHtml = `<button class="path-back-mobile" type="button" id="path-back-mobile">← Raflar</button>`;

  if (!articles || !articles.length) {
    area.innerHTML = `
      <div class="shelf-path">
        <div class="path-head">
          ${backBtnHtml}
          <h2 class="path-title">${libEsc(title)}</h2>
          ${subtitle ? `<p class="path-subtitle">${libEsc(subtitle)}</p>` : ''}
          ${deadlineHtml}
        </div>
        <div class="empty-state">Bu rafta henüz makale yok.</div>
      </div>
    `;
    const back = document.getElementById('path-back-mobile');
    if (back) back.addEventListener('click', closeMobileReading);
    return;
  }

  // Compute lock state: a chapter unlocks only after the previous one
  // has been completed. The first chapter is always open.
  const userId = await libGetCurrentUserId();
  const completedSet = libReadCompletedSet(userId);
  const lockState = articles.map((a, i) => {
    if (i === 0) return false;
    return !completedSet.has(articles[i - 1].id);
  });

  area.innerHTML = `
    <div class="shelf-path">
      <div class="path-head">
        ${backBtnHtml}
        <h2 class="path-title">${libEsc(title)}</h2>
        ${subtitle ? `<p class="path-subtitle">${libEsc(subtitle)}</p>` : ''}
        ${deadlineHtml}
      </div>
      <div class="path-list">
        ${articles.map((a, i) => {
          const meta = [
            a.author ? libEsc(a.author) : null,
            a.deadline ? 'Son: ' + libEsc(formatCountdown(a.deadline)) : null,
          ].filter(Boolean).join(' · ');
          const locked = lockState[i];
          const completed = completedSet.has(a.id);
          const badge = locked
            ? `<div class="path-lock">Kilitli</div>`
            : (completed ? `<div class="path-done">Okundu</div>` : '');
          return `
            <button class="path-node${locked ? ' locked' : ''}" data-art="${a.id}" data-locked="${locked ? '1' : '0'}" type="button"${locked ? ' aria-disabled="true"' : ''}>
              ${badge}
              <div class="path-step">Bölüm ${i + 1}</div>
              <div class="path-art-title">${libEsc(a.title)}</div>
              ${a.summary ? `<div class="path-art-summary">${libEsc(a.summary)}</div>` : ''}
              ${meta ? `<div class="path-art-meta">${meta}</div>` : ''}
            </button>
          `;
        }).join('')}
      </div>
    </div>
  `;
  area.querySelectorAll('.path-node').forEach(node => {
    node.addEventListener('click', () => {
      if (node.dataset.locked === '1') return;
      const a = articles.find(x => x.id === node.dataset.art);
      if (!a) return;
      const i = articles.indexOf(a);
      showChapterIntro(a, i, () => openArticleReader(a, shelf, shelfId));
    });
  });
  const back = document.getElementById('path-back-mobile');
  if (back) back.addEventListener('click', closeMobileReading);
  area.scrollTop = 0;
}

// Mobile: exit the article reader and return to the shelves grid.
function closeMobileReading() {
  document.body.classList.remove('mobile-reading');
  const area = document.getElementById('reading-area');
  if (area) area.innerHTML = '';
  const shelvesEl = document.getElementById('shelves');
  if (shelvesEl) {
    shelvesEl.querySelectorAll('.shelf-btn.shelf-active').forEach(b => b.classList.remove('shelf-active'));
  }
}

// Body parser: splits on lines that contain only --- into sections,
// then within each section converts [[word::definition]] into vocab tooltips.
function parseArticleSections(body) {
  if (!body) return [];
  const raw = String(body).replace(/\r\n/g, '\n');
  const parts = raw.split(/\n\s*---\s*\n/);
  return parts.map(p => p.trim()).filter(p => p.length > 0);
}

// Body parser: vote widgets (must sit on their own line) are block-level,
// vocab tooltips are inline. Splitting by line first keeps the vote block
// out of any wrapping <p> tag — block elements inside <p> would render
// fine in most browsers but break the source-order assumption when the
// browser auto-closes the paragraph.
function renderInlineBody(text) {
  const lines = String(text).replace(/\r\n/g, '\n').split('\n');
  const voteLineRe = /^\s*\[\[vote::([^\]]+?)::(-?\d+)::(-?\d+)\]\]\s*$/;
  const parts = [];
  let buf = [];
  function flushText() {
    if (!buf.length) return;
    const escaped = libEsc(buf.join('\n'));
    const withVocab = escaped.replace(/\[\[([^|\]]+?)::([^\]]+?)\]\]/g, (_m, word, def) =>
      `<span class="vocab-term" tabindex="0">${word.trim()}<span class="vocab-pop">${def.trim()}</span></span>`
    );
    parts.push(withVocab.split(/\n{2,}/).map(p =>
      p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : ''
    ).join(''));
    buf = [];
  }
  for (const line of lines) {
    const m = line.match(voteLineRe);
    if (m) {
      flushText();
      parts.push(`<div class="vote-widget" data-q="${libEsc(m[1].trim())}" data-min="${m[2]}" data-max="${m[3]}" data-answered="0"></div>`);
    } else {
      buf.push(line);
    }
  }
  flushText();
  return parts.join('');
}

// Build the inner UI for every empty .vote-widget container in `root`.
// Each widget is a row of person icons (one per vote slot) + a slider
// 0..count. Moving the slider flips the leftmost N icons green ("yes")
// while the rest stay red ("no"); reader-next is gated on the widget
// being answered (any interaction sets data-answered = "1").
function hydrateVoteWidgets(root, onAnswerChange) {
  root.querySelectorAll('.vote-widget[data-q]').forEach(w => {
    if (w.dataset.hydrated === '1') return;
    w.dataset.hydrated = '1';
    const q = w.dataset.q;
    const min = Number(w.dataset.min || 0);
    const max = Number(w.dataset.max || 10);
    const count = Math.max(0, max - min);
    const peopleHtml = Array.from({ length: count }, () =>
      `<svg class="vote-person" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M3 22c0-5 4-8 9-8s9 3 9 8z"/></svg>`
    ).join('');
    w.innerHTML = `
      <div class="vote-q">${q}</div>
      <div class="vote-people">${peopleHtml}</div>
      <div class="vote-controls">
        <input type="range" class="vote-slider" min="${min}" max="${max}" step="1" value="${min}" aria-label="${q}"/>
        <div class="vote-readout">${min} / ${max}</div>
      </div>
    `;
    const slider = w.querySelector('.vote-slider');
    const readout = w.querySelector('.vote-readout');
    const persons = w.querySelectorAll('.vote-person');
    function paint(markAnswered) {
      const v = Number(slider.value);
      readout.textContent = `${v} / ${max}`;
      persons.forEach((p, i) => p.classList.toggle('yes', i < (v - min)));
      if (markAnswered) {
        w.dataset.answered = '1';
        if (onAnswerChange) onAnswerChange();
      }
    }
    slider.addEventListener('input', () => paint(true));
    slider.addEventListener('change', () => paint(true));
    // Track-click that lands on the default value doesn't fire 'input';
    // pointerdown ensures we still register the interaction as an answer.
    slider.addEventListener('pointerdown', () => paint(true));
    paint(false);
  });
}

function openArticleReader(article, shelf, shelfId) {
  const area = document.getElementById('reading-area');
  if (!area) return;
  const sections = parseArticleSections(article.body || '');
  // Always render at least one section so the reader has something to show.
  if (!sections.length) sections.push(article.summary || '');

  // Track which step the reader is on; the poll lives one step past the
  // last section so progress shows 100% once they reach it.
  let step = 0;
  const lastSectionIdx = sections.length - 1;
  const hasPoll = article.poll && article.poll.question && Array.isArray(article.poll.options) && article.poll.options.length >= 2;
  const totalSteps = sections.length + (hasPoll ? 1 : 0);

  function renderStep() {
    const onPoll = hasPoll && step === sections.length;
    const progressPct = Math.round(((step + 1) / totalSteps) * 100);
    const byline = [
      article.author ? libEsc(article.author) : null,
      article.published_at ? libEsc(formatLibDate(article.published_at)) : null,
    ].filter(Boolean).join(' · ');

    const stepLabel = onPoll
      ? 'Anket'
      : `Bölüm ${step + 1} / ${sections.length}`;

    let content;
    if (onPoll) {
      content = `<div class="reader-poll" id="poll-mount"></div>`;
    } else {
      const sectionHtml = renderInlineBody(sections[step]);
      const isFirst = step === 0;
      content = `
        ${isFirst ? `
          ${byline ? `<div class="reader-byline">${byline}</div>` : ''}
          <h1 class="reader-title">${libEsc(article.title)}</h1>
          ${article.summary ? `<div class="reader-summary">${libEsc(article.summary)}</div>` : ''}
        ` : ''}
        <div class="reader-section-body">${sectionHtml}</div>
      `;
    }

    const isLastSection = step === lastSectionIdx && !hasPoll;
    const nextLabel = onPoll ? 'Bitti' : (isLastSection ? 'Bitti' : 'İleri →');

    area.innerHTML = `
      <div class="reader">
        <div class="reader-top">
          <button class="reader-back" type="button" id="reader-back">← Raf</button>
          <div class="reader-progress"><div class="reader-progress-fill" style="width:${progressPct}%"></div></div>
          <div class="reader-step-count">${libEsc(stepLabel)}</div>
        </div>
        ${content}
        <div class="reader-actions">
          <button class="reader-btn secondary" type="button" id="reader-prev" ${step === 0 ? 'disabled' : ''}>← Geri</button>
          <button class="reader-btn" type="button" id="reader-next">${nextLabel}</button>
        </div>
      </div>
    `;

    // Re-evaluate the Next button: gated when any vote widget in the
    // current step still has data-answered="0".
    function refreshNextGate() {
      const next = document.getElementById('reader-next');
      if (!next) return;
      const widgets = area.querySelectorAll('.vote-widget[data-q]');
      const allAnswered = Array.from(widgets).every(w => w.dataset.answered === '1');
      next.disabled = !allAnswered;
    }

    document.getElementById('reader-back').addEventListener('click', () => openShelfPath(shelfId));
    document.getElementById('reader-prev').addEventListener('click', () => {
      if (step > 0) { step--; renderStep(); }
    });
    document.getElementById('reader-next').addEventListener('click', async () => {
      if (!onPoll && step < lastSectionIdx) { step++; renderStep(); return; }
      if (!onPoll && hasPoll) { step = sections.length; renderStep(); return; }
      // Last action: surface a "finished" notice and mark the chapter
      // completed so the next one unlocks on the shelf path.
      const done = document.createElement('div');
      done.className = 'reader-done';
      done.textContent = '✓ Tamamlandı';
      area.querySelector('.reader-actions').replaceWith(done);
      const uid = await libGetCurrentUserId();
      libWriteArticleCompleted(uid, article.id);
    });

    // Vocab-pop on tap (mobile keeps tooltips open until next tap).
    area.querySelectorAll('.vocab-term').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.vocab-term.vocab-open').forEach(o => {
          if (o !== el) o.classList.remove('vocab-open');
        });
        el.classList.toggle('vocab-open');
      });
    });

    hydrateVoteWidgets(area, refreshNextGate);
    refreshNextGate();

    if (onPoll) mountPoll(article);
    area.scrollTop = 0;
  }

  renderStep();
}

async function mountPoll(article) {
  const mount = document.getElementById('poll-mount');
  if (!mount) return;
  const { question, options } = article.poll;
  mount.innerHTML = `
    <div class="poll-q">${libEsc(question)}</div>
    <div class="poll-options" id="poll-options">
      ${options.map((o, i) => `
        <button class="poll-option" data-idx="${i}" type="button">
          <span class="opt-bar" style="width:0%"></span>
          <span class="opt-text">${libEsc(o)}</span>
          <span class="opt-pct"></span>
        </button>
      `).join('')}
    </div>
  `;
  const { data: { session } } = await sb.auth.getSession();
  const uid = session?.user?.id || null;

  async function refresh() {
    const [{ data: votes }, mineRes] = await Promise.all([
      sb.from('library_article_poll_votes').select('option_index').eq('article_id', article.id),
      uid ? sb.from('library_article_poll_votes')
        .select('option_index').eq('article_id', article.id).eq('user_id', uid).maybeSingle()
        : Promise.resolve({ data: null }),
    ]);
    const counts = options.map(() => 0);
    (votes || []).forEach(v => { if (counts[v.option_index] != null) counts[v.option_index]++; });
    const total = counts.reduce((a, b) => a + b, 0);
    const mine = mineRes && mineRes.data ? mineRes.data.option_index : null;
    mount.querySelectorAll('.poll-option').forEach(btn => {
      const idx = Number(btn.dataset.idx);
      const pct = total > 0 ? Math.round((counts[idx] / total) * 100) : 0;
      btn.classList.toggle('mine', mine === idx);
      btn.querySelector('.opt-bar').style.width = (mine != null ? pct + '%' : '0%');
      btn.querySelector('.opt-pct').textContent = (mine != null) ? (pct + '%') : '';
    });
  }
  refresh();

  mount.querySelectorAll('.poll-option').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = Number(btn.dataset.idx);
      const { data: { session: s2 } } = await sb.auth.getSession();
      if (!s2) { alert('Önce giriş yapın.'); return; }

// Read game scores from Supabase's game_results table, aggregating per game.
// Falls back to localStorage if the query fails (table missing, offline, etc.).
async function getGameScores(userId) {
  // Compute per-game current streak from the set of winning dates: count back
  // from today (or yesterday, if today wasn't won) over consecutive days.
  function currentStreakFor(winDates) {
    function seedForOffset(off) {
      const now = new Date();
      const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
      ist.setDate(ist.getDate() - off);
      return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
    }
    let streak = 0;
    let offset = winDates.has(seedForOffset(0)) ? 0 : 1;
    while (winDates.has(seedForOffset(offset))) { streak++; offset++; }
    return streak;
  }
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('game, won, date')
      .eq('user_id', userId);
    if (error) throw error;
    // Dedupe per (game, date): a date counts as "played" if any row exists,
    // and as "won" if any row has won=true. (We insert a "started" row on
    // first interaction with attempts=0, won=false.)
    const byGameDate = {};
    (data || []).forEach(r => {
      const key = r.game + '|' + r.date;
      if (!byGameDate[key]) byGameDate[key] = { game: r.game, date: r.date, won: false };
      if (r.won) byGameDate[key].won = true;
    });
    const agg = {
      bulmacaPlayed: 0, bulmacaWins: 0,
      sozcelPlayed: 0, sozcelWins: 0,
      tumcelPlayed: 0, tumcelWins: 0,
    };
    const winDatesByGame = { bulmaca: new Set(), sozcel: new Set(), tumcel: new Set() };
    Object.values(byGameDate).forEach(entry => {
      if (entry.game === 'bulmaca') {
        agg.bulmacaPlayed++;
        if (entry.won) { agg.bulmacaWins++; winDatesByGame.bulmaca.add(entry.date); }
      } else if (entry.game === 'sozcel') {
        agg.sozcelPlayed++;
        if (entry.won) { agg.sozcelWins++; winDatesByGame.sozcel.add(entry.date); }
      } else if (entry.game === 'tumcel') {
        agg.tumcelPlayed++;
        if (entry.won) { agg.tumcelWins++; winDatesByGame.tumcel.add(entry.date); }
      }
    });
    agg.sozcelStreak = currentStreakFor(winDatesByGame.sozcel);
    agg.bulmacaStreak = currentStreakFor(winDatesByGame.bulmaca);
    agg.tumcelStreak = currentStreakFor(winDatesByGame.tumcel);
    return agg;
  } catch (e) {
    return {
      bulmacaWins: 0, bulmacaPlayed: 0, bulmacaStreak: 0,
      sozcelWins: 0, sozcelPlayed: 0, sozcelStreak: 0,
      tumcelWins: 0, tumcelPlayed: 0, tumcelStreak: 0,
    };
  }
}

function formatLastSeen(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMins = Math.floor(diffMs / 60000);
  const en = I18N.isEnglish();
  if (diffMins < 1) return en ? 'Online now' : 'Şimdi çevrimiçi';
  if (diffMins < 60) return en ? `${diffMins}m ago` : `${diffMins} dk önce`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return en ? `${diffHours}h ago` : `${diffHours} saat önce`;
  const diffDays = Math.floor(diffHours / 24);
  if (diffDays < 7) return en ? `${diffDays}d ago` : `${diffDays} gün önce`;
  return I18N.formatDate(d, { year: 'numeric', month: 'long', day: 'numeric' });
}

// Generate an 8-char uppercase referral code (matches the format the
// handle_new_user trigger uses for new accounts).
function generateReferralCode() {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let out = '';
  for (let i = 0; i < 8; i++) {
    out += alphabet[Math.floor(Math.random() * alphabet.length)];
  }
  return out;
}
