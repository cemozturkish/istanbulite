<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>istanbulite.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --border: #cccccc;
      --hover: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(3px);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.hidden { display: none; }
    #login-overlay .masthead-login {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    #login-overlay .tagline {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
    }
    .login-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 320px;
      max-width: 100%;
    }
    .login-box input {
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      border: 1px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
    }
    .login-box button {
      padding: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
    }
    .login-box button:hover { background: var(--accent); }
    .login-box .error-msg {
      font-size: 0.75rem;
      color: #cc0000;
      font-style: italic;
      text-align: center;
      min-height: 16px;
    }

    /* ── Shell ── */
    #shell {
      display: none;
      height: 100vh;
      width: 100vw;
      position: relative;
      overflow: hidden;
    }
    #shell.active { display: block; }

    #strip-wrap {
      position: absolute;
      inset: 0 0 48px 0;
      overflow: hidden;
    }
    #strip {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 400%;
      transition: transform 420ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .tab-slot {
      width: 100%;
      height: 25%;
      flex: 0 0 25%;
      position: relative;
      background: var(--paper);
    }
    .tab-slot iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--paper);
    }
    .tab-slot .slot-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    #shell-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      border-top: 1px solid var(--border);
      background: var(--paper);
      z-index: 10;
    }
    #shell-nav a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s, background 0.2s;
    }
    #shell-nav a:hover { color: var(--accent); background: var(--paper-dark); }
    #shell-nav a.active { color: var(--paper); background: var(--ink); }

    @media (max-width: 768px) {
      #strip { flex-direction: row; width: 400%; height: 100%; }
      .tab-slot { width: 25%; height: 100%; flex: 0 0 25%; }
      #login-overlay .masthead-login { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="masthead-login">istanbulite</div>
  <div class="tagline">İstanbul Toplumu</div>
  <form class="login-box" id="signin-form" autocomplete="on">
    <input type="email" id="signin-email" placeholder="E-posta" required autocomplete="email">
    <input type="password" id="signin-password" placeholder="Şifre" required autocomplete="current-password">
    <button type="submit">Giriş</button>
    <div class="error-msg" id="signin-error"></div>
  </form>
</div>

<div id="shell">
  <div id="strip-wrap">
    <div id="strip">
      <section class="tab-slot" data-tab="anahane"><div class="slot-loading">Yükleniyor…</div></section>
      <section class="tab-slot" data-tab="kahvehane"><div class="slot-loading">Yükleniyor…</div></section>
      <section class="tab-slot" data-tab="kutuphane"><div class="slot-loading">Yükleniyor…</div></section>
      <section class="tab-slot" data-tab="hane"><div class="slot-loading">Yükleniyor…</div></section>
    </div>
  </div>
  <nav id="shell-nav">
    <a href="#anahane" data-tab="anahane">Anahane</a>
    <a href="#kahvehane" data-tab="kahvehane">Kahvehane</a>
    <a href="#kutuphane" data-tab="kutuphane">Kütüphane</a>
    <a href="#hane" data-tab="hane">Hane</a>
  </nav>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// SPA shell: hosts the 4 tabs as iframes in a sliding strip so
// cross-tab navigation (including multi-step jumps) animates
// smoothly through intermediate tabs. Each tab is its own full
// document (anahane.html / kahvehane.html / kutuphane.html /
// hane.html) loaded with ?embed=1 so the tab's built-in nav bar
// and swipe-pagination stay dormant while the shell drives
// routing via the hash.
// ══════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TABS = ['anahane', 'kahvehane', 'kutuphane', 'hane'];
const TAB_URLS = {
  anahane: 'anahane.html?embed=1',
  kahvehane: 'kahvehane.html?embed=1',
  kutuphane: 'kutuphane.html?embed=1',
  hane: 'hane.html?embed=1',
};

const loginOverlay = document.getElementById('login-overlay');
const shell = document.getElementById('shell');
const strip = document.getElementById('strip');
const signinForm = document.getElementById('signin-form');
const signinError = document.getElementById('signin-error');

function currentTab() {
  const h = (location.hash || '#anahane').slice(1);
  return TABS.includes(h) ? h : 'anahane';
}

function showTab(name, animate) {
  const idx = TABS.indexOf(name);
  if (idx < 0) return;
  const axis = window.innerWidth <= 768 ? 'X' : 'Y';
  strip.style.transition = animate ? 'transform 420ms cubic-bezier(0.4, 0, 0.2, 1)' : 'none';
  strip.style.transform = 'translate' + axis + '(-' + (idx * 25) + '%)';
  document.querySelectorAll('#shell-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.tab === name);
  });
  ensureIframe(name);
}

function ensureIframe(tab) {
  const slot = document.querySelector('.tab-slot[data-tab="' + tab + '"]');
  if (!slot || slot.querySelector('iframe')) return;
  const iframe = document.createElement('iframe');
  iframe.src = TAB_URLS[tab];
  iframe.title = tab;
  iframe.setAttribute('loading', 'eager');
  iframe.addEventListener('load', () => {
    const loading = slot.querySelector('.slot-loading');
    if (loading) loading.remove();
  });
  slot.appendChild(iframe);
}

function mountAllIframes() {
  TABS.forEach(ensureIframe);
}

// Nav clicks → update hash, which drives showTab via hashchange.
document.addEventListener('click', (e) => {
  const a = e.target.closest('#shell-nav a[data-tab]');
  if (!a) return;
  e.preventDefault();
  const name = a.dataset.tab;
  if (currentTab() === name) return;
  history.pushState(null, '', '#' + name);
  showTab(name, true);
});

window.addEventListener('hashchange', () => showTab(currentTab(), true));
window.addEventListener('resize', () => showTab(currentTab(), false));

// Iframes can ask the shell to navigate via postMessage, e.g. from
// a profile button or a map link that should switch tabs.
window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'ist-nav') return;
  const tab = e.data.tab;
  if (!TABS.includes(tab)) return;
  if (currentTab() === tab) return;
  history.pushState(null, '', '#' + tab);
  showTab(tab, true);
});

// ── Auth ──
async function enterShell() {
  loginOverlay.classList.add('hidden');
  shell.classList.add('active');
  showTab(currentTab(), false);
  mountAllIframes();
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) enterShell();
}

signinForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  signinError.textContent = '';
  const email = document.getElementById('signin-email').value;
  const password = document.getElementById('signin-password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { signinError.textContent = error.message; return; }
  enterShell();
});

// If an iframe signs the user out, full-reload so we return to login.
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') location.reload();
});

checkSession();
</script>

</body>
</html>
