<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>istanbulite.net</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      /* Core ink & paper — warm cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;        /* main canvas */
      --paper-warm: #eddbd0;
      --paper-card: #ddc4b5;   /* cards/blocks */
      --paper-banner: #c9ae9a; /* section headers/banners */
      --paper-navbar: #b89b7f; /* top nav (darkest) */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background: var(--paper);
      color: var(--ink);
    }

    /* ── Login overlay ──
       Hidden until the async session check confirms no session, so
       authenticated reloads don't flash the login form for a frame. */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.show { display: flex; }
    #login-overlay.hidden { display: none !important; }
    #login-overlay .masthead-login {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--ink);
      margin-bottom: 48px;
    }
    .login-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
      width: 280px;
      max-width: 100%;
    }
    .login-panel.active { display: flex; }
    .login-panel input,
    .login-panel select {
      padding: 10px 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--ink);
      outline: none;
      transition: border-color 160ms;
    }
    .login-panel input:focus { border-bottom-color: var(--ink); }
    .login-panel input::placeholder { color: var(--muted); font-weight: 300; }
    .login-panel .primary-btn {
      margin-top: 16px;
      padding: 11px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      transition: background 160ms;
    }
    .login-panel .primary-btn:hover { background: var(--accent); }
    .login-panel .text-btn {
      margin-top: 4px;
      padding: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: color 160ms;
    }
    .login-panel .text-btn:hover { color: var(--ink); }
    .login-panel .error-msg {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      min-height: 14px;
      letter-spacing: 0.5px;
    }
    .login-panel .kefil-note {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .login-panel .kefil-confirmed {
      font-size: 0.7rem;
      color: var(--ink);
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="masthead-login">istanbulite</div>

  <!-- Sign-in panel -->
  <form class="login-panel active" id="signin-form" autocomplete="on">
    <input type="email" id="signin-email" placeholder="E-posta" required autocomplete="email">
    <input type="password" id="signin-password" placeholder="Şifre" required autocomplete="current-password">
    <button type="submit" class="primary-btn">Giriş Yap</button>
    <div class="error-msg" id="signin-error"></div>
    <button type="button" class="text-btn" id="show-kefil">Kayıt Ol</button>
  </form>

  <!-- Referral code prompt -->
  <form class="login-panel" id="kefil-form" autocomplete="off">
    <div class="kefil-note">Kayıt için kefil kodu</div>
    <input type="text" id="kefil-code" placeholder="Kefil Kodu" required autocapitalize="characters" autocomplete="off">
    <button type="submit" class="primary-btn">Devam</button>
    <div class="error-msg" id="kefil-error"></div>
    <button type="button" class="text-btn" data-back="signin">Geri</button>
  </form>

  <!-- Sign-up panel (shown after kefil verified) -->
  <form class="login-panel" id="signup-form" autocomplete="off">
    <div class="kefil-confirmed" id="kefil-confirmed"></div>
    <input type="text" id="signup-first-name" placeholder="Ad" required>
    <input type="text" id="signup-last-name" placeholder="Soyad" required>
    <input type="tel" id="signup-phone" placeholder="Telefon" required>
    <select id="signup-neighborhood" required>
      <option value="">Yaşadığın Mahalle</option>
    </select>
    <select id="signup-birth-neighborhood" required>
      <option value="">Doğduğun Mahalle</option>
    </select>
    <input type="email" id="signup-email" placeholder="E-posta" required autocomplete="email">
    <input type="password" id="signup-password" placeholder="Şifre" required autocomplete="new-password" minlength="6">
    <button type="submit" class="primary-btn">Kayıt Ol</button>
    <div class="error-msg" id="signup-error"></div>
    <button type="button" class="text-btn" data-back="signin">Geri</button>
  </form>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// Auth gate: this page is a thin entry point. When the user has
// a session we send them to anahane.html (the real home). When
// they don't, we show the sign-in / kefil / sign-up overlay.
// ══════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginOverlay = document.getElementById('login-overlay');
const signinForm = document.getElementById('signin-form');
const signinError = document.getElementById('signin-error');
const kefilForm = document.getElementById('kefil-form');
const kefilError = document.getElementById('kefil-error');
const kefilConfirmed = document.getElementById('kefil-confirmed');
const signupForm = document.getElementById('signup-form');
const signupError = document.getElementById('signup-error');

// Referral state — populated after a kefil code is verified
let verifiedKefil = null; // { id, display_name, neighborhood, code }

function showPanel(name) {
  document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(name + '-form');
  if (panel) panel.classList.add('active');
}

document.getElementById('show-kefil').addEventListener('click', () => {
  kefilError.textContent = '';
  document.getElementById('kefil-code').value = '';
  showPanel('kefil');
});

document.querySelectorAll('[data-back]').forEach(btn => {
  btn.addEventListener('click', () => showPanel(btn.dataset.back));
});

// ── Auth ──
function enterSite() {
  window.location.href = 'anahane.html';
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) enterSite();
  else loginOverlay.classList.add('show');
}

signinForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  signinError.textContent = '';
  const email = document.getElementById('signin-email').value;
  const password = document.getElementById('signin-password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { signinError.textContent = error.message; return; }
  enterSite();
});

function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

// Format the kefil display string, e.g. "BAKIRKÖY'DEN CEM"
function formatKefilLabel(profile) {
  const name = ((profile.first_name || '') + ' ' + (profile.last_name || '')).trim().toUpperCase();
  const hoodId = (profile.neighborhood || '').trim();
  const hoodName = (NEIGHBORHOOD_NAMES[hoodId] || hoodId).toUpperCase();
  if (hoodName && name) return hoodName + "'DEN " + name;
  return name || hoodName || '';
}

// Populate the neighborhood dropdowns from the neighborhoods table.
// Current-residence excludes 'istanbul_disi' (you must live in Istanbul);
// birth-neighborhood includes it.
const NEIGHBORHOOD_NAMES = {};
async function loadNeighborhoods() {
  const { data, error } = await sb
    .from('neighborhoods')
    .select('id, name_tr')
    .order('name_tr');
  if (error || !data) return;
  const residenceSel = document.getElementById('signup-neighborhood');
  const birthSel = document.getElementById('signup-birth-neighborhood');
  data.forEach(n => {
    NEIGHBORHOOD_NAMES[n.id] = n.name_tr;
    const birthOpt = document.createElement('option');
    birthOpt.value = n.id;
    birthOpt.textContent = n.name_tr;
    birthSel.appendChild(birthOpt);
    if (n.id !== 'istanbul_disi') {
      const resOpt = document.createElement('option');
      resOpt.value = n.id;
      resOpt.textContent = n.name_tr;
      residenceSel.appendChild(resOpt);
    }
  });
}
loadNeighborhoods();

// Verify referral code via SECURITY DEFINER RPC so we don't expose
// the profiles table to anonymous readers.
kefilForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  kefilError.textContent = '';
  const code = document.getElementById('kefil-code').value.trim().toUpperCase();
  if (!code) return;
  const { data, error } = await sb.rpc('verify_kefil_code', { code });
  if (error) { kefilError.textContent = 'Kod doğrulanamadı.'; return; }
  const profile = Array.isArray(data) ? data[0] : data;
  if (!profile) { kefilError.textContent = 'Geçersiz kefil kodu.'; return; }
  verifiedKefil = { ...profile, code };
  kefilConfirmed.textContent = 'Kefil: ' + formatKefilLabel(profile);
  signupError.textContent = '';
  showPanel('signup');
});

signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  signupError.textContent = '';
  if (!verifiedKefil) { showPanel('kefil'); return; }
  const firstName = capitalizeName(document.getElementById('signup-first-name').value.trim());
  const lastName = capitalizeName(document.getElementById('signup-last-name').value.trim());
  const phone = document.getElementById('signup-phone').value.trim();
  const neighborhood = document.getElementById('signup-neighborhood').value;
  const birthPlace = document.getElementById('signup-birth-neighborhood').value;
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  // The handle_new_user trigger reads this metadata, validates the
  // referral code, and atomically creates the matching profile row.
  // birth_place is the FK column (renamed from birth_neighborhood in DB).
  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        first_name: firstName,
        last_name: lastName,
        phone,
        neighborhood,
        birth_place: birthPlace,
        referral_code: verifiedKefil.code,
      },
    },
  });
  if (error) {
    const detail = [error.message, error.code, error.details, error.hint].filter(Boolean).join(' | ');
    signupError.textContent = detail;
    return;
  }

  if (data.session) enterSite();
  else { signupError.textContent = 'Kayıt alındı. Onay sonrası giriş yapabilirsiniz.'; showPanel('signin'); }
});

// If the user signs out from any other page, return to this login screen.
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') location.reload();
});

checkSession();
</script>

</body>
</html>
