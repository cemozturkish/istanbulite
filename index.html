<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>istanbulite.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --border: #cccccc;
      --hover: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    /* ── Login overlay ──
       Hidden until the async session check confirms no session, so
       authenticated reloads don't flash the login form for a frame. */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.show { display: flex; }
    #login-overlay.hidden { display: none !important; }
    #login-overlay .masthead-login {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--ink);
      margin-bottom: 48px;
    }
    .login-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
      width: 280px;
      max-width: 100%;
    }
    .login-panel.active { display: flex; }
    .login-panel input,
    .login-panel select {
      padding: 10px 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--ink);
      outline: none;
      transition: border-color 160ms;
    }
    .login-panel input:focus { border-bottom-color: var(--ink); }
    .login-panel input::placeholder { color: var(--muted); font-weight: 300; }
    .login-panel .primary-btn {
      margin-top: 16px;
      padding: 11px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      transition: background 160ms;
    }
    .login-panel .primary-btn:hover { background: var(--accent); }
    .login-panel .text-btn {
      margin-top: 4px;
      padding: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: color 160ms;
    }
    .login-panel .text-btn:hover { color: var(--ink); }
    .login-panel .error-msg {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      min-height: 14px;
      letter-spacing: 0.5px;
    }
    .login-panel .kefil-note {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .login-panel .kefil-confirmed {
      font-size: 0.7rem;
      color: var(--ink);
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* ── Shell ──
       3-column grid mirrors each tab's own 1fr 2.2fr 1fr layout. The
       left and right columns each contain a vertical strip of 4
       iframes (one per tab) that slide on tab change. The middle
       column stacks 4 iframes absolutely; only the active one is
       visible — swapped instantly so the map/datetime stay static
       during the side-strip slide. */
    #shell {
      display: none;
      grid-template-columns: 1fr 2.2fr 1fr;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    #shell.active { display: grid; }

    .shell-col {
      position: relative;
      overflow: hidden;
      background: var(--paper);
    }

    .shell-left .strip,
    .shell-right .strip {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      height: 400%;
      will-change: transform;
      transition: transform 840ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .shell-left .strip > section,
    .shell-right .strip > section {
      flex: 0 0 25%;
      height: 25%;
      position: relative;
      background: var(--paper);
    }

    .shell-middle > .middle-slot {
      position: absolute;
      inset: 0;
      visibility: hidden;
    }
    .shell-middle > .middle-slot.active {
      visibility: visible;
    }

    section > iframe,
    .middle-slot > iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--paper);
    }

    .slot-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="masthead-login">istanbulite</div>

  <!-- Sign-in panel -->
  <form class="login-panel active" id="signin-form" autocomplete="on">
    <input type="email" id="signin-email" placeholder="E-posta" required autocomplete="email">
    <input type="password" id="signin-password" placeholder="Şifre" required autocomplete="current-password">
    <button type="submit" class="primary-btn">Giriş Yap</button>
    <div class="error-msg" id="signin-error"></div>
    <button type="button" class="text-btn" id="show-kefil">Kayıt Ol</button>
  </form>

  <!-- Referral code prompt -->
  <form class="login-panel" id="kefil-form" autocomplete="off">
    <div class="kefil-note">Kayıt için kefil kodu</div>
    <input type="text" id="kefil-code" placeholder="Kefil Kodu" required autocapitalize="characters" autocomplete="off">
    <button type="submit" class="primary-btn">Devam</button>
    <div class="error-msg" id="kefil-error"></div>
    <button type="button" class="text-btn" data-back="signin">Geri</button>
  </form>

  <!-- Sign-up panel (shown after kefil verified) -->
  <form class="login-panel" id="signup-form" autocomplete="off">
    <div class="kefil-confirmed" id="kefil-confirmed"></div>
    <input type="text" id="signup-first-name" placeholder="Ad" required>
    <input type="text" id="signup-last-name" placeholder="Soyad" required>
    <input type="tel" id="signup-phone" placeholder="Telefon" required>
  <input type="text" id="signup-birth-place" placeholder="Doğum Yeri" required>
    <select id="signup-neighborhood" required>
  <option value="">Mahalle Seç</option>
  <option value="kadikoy">Kadıköy</option>
  <option value="besiktas">Beşiktaş</option>
  <option value="uskudar">Üsküdar</option>
  <option value="beyoglu">Beyoğlu</option>
  <option value="bakirkoy">Bakırköy</option>
</select>
    <input type="email" id="signup-email" placeholder="E-posta" required autocomplete="email">
    <input type="password" id="signup-password" placeholder="Şifre" required autocomplete="new-password" minlength="6">
    <button type="submit" class="primary-btn">Kayıt Ol</button>
    <div class="error-msg" id="signup-error"></div>
    <button type="button" class="text-btn" data-back="signin">Geri</button>
  </form>
</div>

<div id="shell">
  <div class="shell-col shell-left">
    <div class="strip" id="strip-left">
      <section data-tab="anahane"><div class="slot-loading">…</div></section>
      <section data-tab="kahvehane"><div class="slot-loading">…</div></section>
      <section data-tab="kutuphane"><div class="slot-loading">…</div></section>
      <section data-tab="hane"><div class="slot-loading">…</div></section>
    </div>
  </div>

  <div class="shell-col shell-middle" id="shell-middle">
    <div class="middle-slot" data-tab="anahane"><div class="slot-loading">…</div></div>
    <div class="middle-slot" data-tab="kahvehane"><div class="slot-loading">…</div></div>
    <div class="middle-slot" data-tab="kutuphane"><div class="slot-loading">…</div></div>
    <div class="middle-slot" data-tab="hane"><div class="slot-loading">…</div></div>
  </div>

  <div class="shell-col shell-right">
    <div class="strip" id="strip-right">
      <section data-tab="anahane"><div class="slot-loading">…</div></section>
      <section data-tab="kahvehane"><div class="slot-loading">…</div></section>
      <section data-tab="kutuphane"><div class="slot-loading">…</div></section>
      <section data-tab="hane"><div class="slot-loading">…</div></section>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// SPA shell: each tab is split across three iframes (?embed=left,
// ?embed=middle, ?embed=right). Left + right iframes live in
// sliding strips that animate on tab change. Middle iframes stack
// and swap instantly so the map / datetime / nav stay static
// during the side slide. Nav clicks inside the middle iframe are
// forwarded to this shell via postMessage (see each tab file).
// ══════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TABS = ['anahane', 'kahvehane', 'kutuphane', 'hane'];
const TAB_FILES = {
  anahane: 'anahane.html',
  kahvehane: 'kahvehane.html',
  kutuphane: 'kutuphane.html',
  hane: 'hane.html',
};

const loginOverlay = document.getElementById('login-overlay');
const shell = document.getElementById('shell');
const stripLeft = document.getElementById('strip-left');
const stripRight = document.getElementById('strip-right');
const shellMiddle = document.getElementById('shell-middle');
const signinForm = document.getElementById('signin-form');
const signinError = document.getElementById('signin-error');
const kefilForm = document.getElementById('kefil-form');
const kefilError = document.getElementById('kefil-error');
const kefilConfirmed = document.getElementById('kefil-confirmed');
const signupForm = document.getElementById('signup-form');
const signupError = document.getElementById('signup-error');

// Referral state — populated after a kefil code is verified
let verifiedKefil = null; // { id, display_name, neighborhood, code }

function showPanel(name) {
  document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(name + '-form');
  if (panel) panel.classList.add('active');
}

document.getElementById('show-kefil').addEventListener('click', () => {
  kefilError.textContent = '';
  document.getElementById('kefil-code').value = '';
  showPanel('kefil');
});

document.querySelectorAll('[data-back]').forEach(btn => {
  btn.addEventListener('click', () => showPanel(btn.dataset.back));
});

function currentTab() {
  const h = (location.hash || '#anahane').slice(1);
  return TABS.includes(h) ? h : 'anahane';
}

function showTab(name, animate) {
  const idx = TABS.indexOf(name);
  if (idx < 0) return;
  const t = animate ? 'transform 840ms cubic-bezier(0.16, 1, 0.3, 1)' : 'none';
  [stripLeft, stripRight].forEach(strip => {
    strip.style.transition = t;
    strip.style.transform = 'translateY(-' + (idx * 25) + '%)';
  });
  shellMiddle.querySelectorAll('.middle-slot').forEach(slot => {
    slot.classList.toggle('active', slot.dataset.tab === name);
  });
  ensureIframes(name);
}

function ensureIframes(tab) {
  ['left', 'middle', 'right'].forEach(mode => {
    const container = mode === 'middle'
      ? shellMiddle.querySelector('.middle-slot[data-tab="' + tab + '"]')
      : document.querySelector('#strip-' + mode + ' > section[data-tab="' + tab + '"]');
    if (!container || container.querySelector('iframe')) return;
    const iframe = document.createElement('iframe');
    iframe.src = TAB_FILES[tab] + '?embed=' + mode;
    iframe.title = tab + '-' + mode;
    iframe.setAttribute('loading', 'eager');
    iframe.addEventListener('load', () => {
      const loading = container.querySelector('.slot-loading');
      if (loading) loading.remove();
    });
    container.appendChild(iframe);
  });
}

function mountAllIframes() {
  TABS.forEach(ensureIframes);
}

// Hash drives routing; internal pushState calls trigger hashchange.
window.addEventListener('hashchange', () => showTab(currentTab(), true));
window.addEventListener('resize', () => showTab(currentTab(), false));

// Middle iframes forward their nav clicks here so we can slide
// the left/right strips without reloading the middle itself.
window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'ist-nav') return;
  const tab = e.data.tab;
  if (!TABS.includes(tab)) return;
  if (currentTab() === tab) return;
  history.pushState(null, '', '#' + tab);
  showTab(tab, true);
});

// ── Auth ──
async function enterShell() {
  loginOverlay.classList.add('hidden');
  shell.classList.add('active');
  showTab(currentTab(), false);
  mountAllIframes();
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) enterShell();
  else loginOverlay.classList.add('show');
}

signinForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  signinError.textContent = '';
  const email = document.getElementById('signin-email').value;
  const password = document.getElementById('signin-password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { signinError.textContent = error.message; return; }
  enterShell();
});

// Format the kefil display string, e.g. "BAKIRKÖY'DEN CEM"
function formatKefilLabel(profile) {
  const name = (profile.display_name || '').trim().toUpperCase();
  const hood = (profile.neighborhood || '').trim().toUpperCase();
  if (hood && name) return hood + "'DEN " + name;
  return name || hood || '';
}

// Verify referral code against profiles table.
// Each profile has a unique `referral_code` column; entering it
// links the new signup to that profile as their kefil.
kefilForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  kefilError.textContent = '';
  const code = document.getElementById('kefil-code').value.trim().toUpperCase();
  if (!code) return;
  const { data, error } = await sb
    .from('profiles')
    .select('id, display_name, neighborhood, referral_code')
    .eq('referral_code', code)
    .maybeSingle();
  if (error) { kefilError.textContent = 'Kod doğrulanamadı.'; return; }
  if (!data) { kefilError.textContent = 'Geçersiz kefil kodu.'; return; }
  verifiedKefil = data;
  kefilConfirmed.textContent = 'Kefil: ' + formatKefilLabel(data);
  signupError.textContent = '';
  showPanel('signup');
});

signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  signupError.textContent = '';
  if (!verifiedKefil) { showPanel('kefil'); return; }
    const firstName = document.getElementById('signup-first-name').value.trim();
    const lastName = document.getElementById('signup-last-name').value.trim();
    const phone = document.getElementById('signup-phone').value.trim();
    const birthPlace = document.getElementById('signup-birth-place').value.trim();
    const neighborhood = document.getElementById('signup-neighborhood').value;
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;

const { data, error } = await sb.auth.signUp({
  email,
  password,
  options: {
    data: {
      first_name: firstName,
      last_name: lastName,
      phone: phone,
      neighborhood: neighborhood,
      birth_place: birthPlace
    },
  },
});
  if (error) { signupError.textContent = error.message; return; }

  // Persist the referral link on the new profile. The admin assigns
  // the user's neighborhood and unique referral_code separately.

  if (data.session) enterShell();
  else { signupError.textContent = 'Kayıt alındı. Onay sonrası giriş yapabilirsiniz.'; showPanel('signin'); }
});

// If an iframe signs the user out, full-reload so we return to login.
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') location.reload();
});

checkSession();
</script>

</body>
</html>
