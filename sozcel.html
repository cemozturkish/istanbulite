<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sözcel — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --success: #444444;
      --present: #999999;
      --absent: #cccccc;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    header {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    .section-rule {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { padding-left: 20px; }
    .datetime-block .time-line { padding-left: 50px; }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* Left: personal stats */
    .stats-left {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .panel-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .stat-big {
      text-align: center;
      padding: 8px 0;
    }
    .stat-big .num {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-big .label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      padding: 3px 0;
    }
    .stat-row .stat-label { color: var(--muted); }
    .stat-row .stat-val { font-weight: 700; }

    /* ── Center: game ── */
    .game-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      overflow: hidden;
      min-height: 0;
      gap: 6px;
    }

    .word-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: min(240px, 38vh);
      flex-shrink: 0;
    }

    .word-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
    }

    .letter-box {
      aspect-ratio: 1;
      border: 2px solid #cccccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.7rem, 2vh, 1.1rem);
      font-weight: 700;
      text-transform: uppercase;
      background: white;
      transition: all 0.2s;
    }

    .letter-box.filled { border-color: #666666; }
    .letter-box.correct {
      background: var(--success);
      border-color: var(--success);
      color: white;
      animation: flip 0.5s ease;
    }
    .letter-box.present {
      background: var(--present);
      border-color: var(--present);
      color: white;
      animation: flip 0.5s ease;
    }
    .letter-box.absent {
      background: var(--absent);
      border-color: var(--absent);
      color: white;
      animation: flip 0.5s ease;
    }

    @keyframes flip {
      0%, 100% { transform: rotateX(0); }
      50% { transform: rotateX(90deg); }
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 100%;
      max-width: 420px;
      flex-shrink: 0;
    }

    .keyboard-row {
      display: flex;
      gap: 2px;
      justify-content: center;
    }

    .key {
      padding: 7px 2px;
      min-width: 28px;
      background: #dddddd;
      border: none;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      user-select: none;
    }

    .key:hover { background: #bbb; }
    .key.wide { min-width: 42px; font-size: 0.6rem; }
    .key.correct { background: var(--success); color: white; }
    .key.present { background: var(--present); color: white; }
    .key.absent { background: var(--absent); color: white; }

    .game-message {
      text-align: center;
      font-size: 0.85rem;
      min-height: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .game-message.win { color: var(--success); }
    .game-message.lose { color: var(--accent); }

    .reset-info {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      flex-shrink: 0;
    }

    /* ── Right: community stats ── */
    .stats-right {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .dist-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      margin-bottom: 4px;
    }
    .dist-bar-wrap .dist-label {
      min-width: 12px;
      text-align: right;
      font-weight: 700;
      color: var(--muted);
    }
    .dist-bar-outer {
      flex: 1;
      height: 14px;
      background: var(--paper-dark);
      border: 1px solid #ddd;
      position: relative;
    }
    .dist-bar-inner {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .dist-bar-wrap .dist-pct {
      min-width: 30px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .district-rank {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0;
      border-bottom: 1px solid #eee;
    }
    .district-rank:last-child { border-bottom: none; }
    .district-rank .rank-name { font-weight: 600; }
    .district-rank .rank-pct { color: var(--muted); font-weight: 700; }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: auto;
        overflow: auto;
        position: static;
      }

      body {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
      }

      header { padding: 8px 12px; }

      nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }
      nav a { font-size: 0.65rem; letter-spacing: 1px; }

      .col-left {
        order: 2;
        border-right: none;
        border-top: var(--col-border);
      }

      .col-right {
        order: 4;
        border-left: none;
        border-top: var(--col-border);
      }

      .section-rule {
        padding: 5px 12px;
        font-size: 0.6rem;
      }

      main {
        order: 3;
        overflow: auto;
        min-height: auto;
      }

      .game-panel {
        padding: 8px;
      }

      .word-grid {
        width: min(240px, 50vw);
      }

      .keyboard {
        max-width: 100%;
      }

      .key {
        min-width: 24px;
        padding: 10px 2px;
        font-size: 0.6rem;
      }

      .key.wide {
        min-width: 36px;
      }
    }
  </style>
</head>
<body>

  <aside class="col-left">
    <div class="nb-highlight" id="user-nb-badge"></div>
    <section class="stats-left" id="stats-left"></section>
  </aside>

  <header>
    <nav>
      <a href="index.html">Anahane</a>

      <a href="kutuphane.html">Kütüphane</a>

  </header>

  <div class="section-rule">
    <div class="datetime-block">
      <div class="date-line" id="date-line"></div>

  <aside class="col-right">
    <section class="stats-right" id="stats-right"></section>

<script>
// ── Supabase init ──
const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Get user neighborhood from session ──
let userNeighborhood = '';
const neighborhoodNames = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      userNeighborhood = session.user.user_metadata?.yasadigi_ilce
        || session.user.user_metadata?.neighborhood || '';
      if (userNeighborhood) {
        const badgeEl = document.getElementById('user-nb-badge');
        if (badgeEl) badgeEl.textContent = neighborhoodNames[userNeighborhood] || userNeighborhood;
      }
    }
  } catch(e) {}
})();

// ── Record game result to Supabase ──
async function recordGameResult(game, date, attempts, won, neighborhood) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: game,
      date: date,
      attempts: attempts,
      won: won,
      neighborhood: neighborhood
    }]);
  } catch (e) { /* table may not exist yet */ }
}

// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const day = now.toLocaleDateString('tr-TR', { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString('tr-TR', { ...opts, month: 'long' });
  const year = now.toLocaleDateString('tr-TR', { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString('tr-TR', { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString('tr-TR', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

// ── Turkish letter normalization ──
// Treat İ/I and ı/i correctly for Turkish
function turkishUpper(str) {
  return str.replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
}

// Compare two Turkish letters — İ and I are distinct
function lettersMatch(a, b) {
  return a === b;
}

// ── Daily seed ──
function getDailySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return `Yeni oyun ${hours} saat ${minutes} dakika sonra`;
}

const WORD_LIST = [
  'KOLAY', 'SOKAK', 'HABER', 'KÖŞEK', 'ŞEHİR', 'PASTA', 'GÜZEL', 'KİTAP',
  'YEMEK', 'DÜNYA', 'BAHÇE', 'ÇANTA', 'DENİZ', 'GÜNEŞ', 'İSTEK', 'KALEM',
  'LİMON', 'MEYVE', 'NEFES', 'ÖĞLEN', 'PAZAR', 'SABAH', 'TABAK',
  'VAPUR', 'YAĞMR', 'ZAMAN', 'AKŞAM', 'BIÇAK', 'CADDE', 'DÖNER',
  'MASAL', 'ÇIÇEK', 'BAYAT', 'DOLAP', 'FİLİZ', 'HAYAL', 'IŞLIK',
  'KALIP', 'NAMAZ', 'REÇEL', 'TATLI', 'UFACIK'
];

function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % WORD_LIST.length);
}

const dailySeed = getDailySeed();
const TARGET_WORD = WORD_LIST[seededRandom(dailySeed)];

let currentRow = 0;
let currentGuess = '';
let gameOver = false;
const keyStates = {};

const SAVE_KEY = 'sozcel_state_' + dailySeed;

function saveState() {
  const state = { currentRow, currentGuess, gameOver, guesses: [] };
  for (let r = 0; r < currentRow; r++) {
    let word = '';
    for (let c = 0; c < 5; c++) {
      word += document.getElementById(`box-${r}-${c}`).textContent;
    }
    state.guesses.push(word);
  }
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function restoreState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.guesses || state.guesses.length === 0) return false;

    state.guesses.forEach((word, rowIdx) => {
      currentRow = rowIdx;
      currentGuess = word;
      for (let i = 0; i < 5; i++) {
        const box = document.getElementById(`box-${rowIdx}-${i}`);
        box.textContent = word[i] || '';
        box.className = 'letter-box filled';
      }
      const result = checkWord(word);
      for (let i = 0; i < 5; i++) {
        const box = document.getElementById(`box-${rowIdx}-${i}`);
        box.className = `letter-box filled ${result[i]}`;
        const letter = word[i];
        const keyBtn = document.getElementById(`key-${letter}`);
        if (keyBtn) {
          const cur = keyStates[letter] || '';
          if (result[i] === 'correct') { keyStates[letter] = 'correct'; keyBtn.className = 'key correct'; }
          else if (result[i] === 'present' && cur !== 'correct') { keyStates[letter] = 'present'; keyBtn.className = 'key present'; }
          else if (!cur) { keyStates[letter] = 'absent'; keyBtn.className = 'key absent'; }
        }
      }
    });

    gameOver = state.gameOver;
    if (gameOver) {
      const lastGuess = state.guesses[state.guesses.length - 1];
      if (lastGuess === TARGET_WORD) {
        document.getElementById('game-message').textContent = 'Tebrikler!';
        document.getElementById('game-message').className = 'game-message win';
      } else {
        document.getElementById('game-message').textContent = `Kelime: ${TARGET_WORD}`;
        document.getElementById('game-message').className = 'game-message lose';
      }
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
      currentRow = state.guesses.length;
    } else {
      currentRow = state.guesses.length;
      currentGuess = '';
    }
    return true;
  } catch (e) { return false; }
}

// ── Keyboard ──
const KEYBOARD_LAYOUT = [
  ['E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P', 'Ğ', 'Ü'],
  ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'Ş', 'İ'],
  ['GİR', 'Z', 'C', 'V', 'B', 'N', 'M', 'Ö', 'Ç', '←']
];

function initWordGrid() {
  const grid = document.getElementById('word-grid');
  for (let i = 0; i < 6; i++) {
    const row = document.createElement('div');
    row.className = 'word-row';
    for (let j = 0; j < 5; j++) {
      const box = document.createElement('div');
      box.className = 'letter-box';
      box.id = `box-${i}-${j}`;
      row.appendChild(box);
    }
    grid.appendChild(row);
  }
}

function initKeyboard() {
  const keyboard = document.getElementById('keyboard');
  KEYBOARD_LAYOUT.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'keyboard-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.onclick = () => handleKey(key);
      btn.id = `key-${key}`;
      rowDiv.appendChild(btn);
    });
    keyboard.appendChild(rowDiv);
  });
}

// Physical keyboard — handle Turkish İ/I/ı/i properly
document.addEventListener('keydown', (e) => {
  if (gameOver) return;

  const rawKey = e.key;

  // Turkish-specific mapping
  if (rawKey === 'Backspace') { handleKey('←'); return; }
  if (rawKey === 'Enter') { handleKey('GİR'); return; }

  // Handle Turkish letters directly
  const turkishLetters = 'ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZabcçdefgğhıijklmnoöprsştuüvyz';
  if (rawKey.length === 1 && turkishLetters.includes(rawKey)) {
    // Turkish uppercase: i → İ, ı → I (not standard toUpperCase)
    let upper = rawKey;
    if (rawKey === 'i') upper = 'İ';
    else if (rawKey === 'ı') upper = 'I';
    else upper = rawKey.toUpperCase();
    handleKey(upper);
  }
});

function handleKey(key) {
  if (gameOver) return;

  if (key === '←') {
    if (currentGuess.length > 0) {
      currentGuess = currentGuess.slice(0, -1);
      updateDisplay();
    }
  } else if (key === 'GİR') {
    if (currentGuess.length === 5) {
      submitGuess();
    }
  } else if (currentGuess.length < 5) {
    currentGuess += key;
    updateDisplay();
  }
}

function updateDisplay() {
  for (let i = 0; i < 5; i++) {
    const box = document.getElementById(`box-${currentRow}-${i}`);
    box.textContent = currentGuess[i] || '';
    box.className = 'letter-box' + (currentGuess[i] ? ' filled' : '');
  }
}

function submitGuess() {
  const guessSnap = currentGuess;
  const rowSnap = currentRow;
  const result = checkWord(guessSnap);

  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const box = document.getElementById(`box-${rowSnap}-${i}`);
      const letter = guessSnap[i];
      box.className = `letter-box filled ${result[i]}`;

      const keyBtn = document.getElementById(`key-${letter}`);
      if (keyBtn) {
        const cs = keyStates[letter] || '';
        if (result[i] === 'correct') { keyStates[letter] = 'correct'; keyBtn.className = 'key correct'; }
        else if (result[i] === 'present' && cs !== 'correct') { keyStates[letter] = 'present'; keyBtn.className = 'key present'; }
        else if (!cs) { keyStates[letter] = 'absent'; keyBtn.className = 'key absent'; }
      }
    }, i * 100);
  }

  setTimeout(() => {
    if (guessSnap === TARGET_WORD) {
      document.getElementById('game-message').textContent = 'Tebrikler!';
      document.getElementById('game-message').className = 'game-message win';
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
      gameOver = true;
      localStorage.setItem('sozcel_played', parseInt(localStorage.getItem('sozcel_played') || '0') + 1);
      localStorage.setItem('sozcel_wins', parseInt(localStorage.getItem('sozcel_wins') || '0') + 1);
      localStorage.setItem('sozcel_streak', parseInt(localStorage.getItem('sozcel_streak') || '0') + 1);
      recordGuessDistribution(rowSnap + 1);
      recordGameResult('sozcel', dailySeed, rowSnap + 1, true, userNeighborhood);
      saveState();
      renderStats();
    } else if (rowSnap === 5) {
      document.getElementById('game-message').textContent = `Kelime: ${TARGET_WORD}`;
      document.getElementById('game-message').className = 'game-message lose';
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
      gameOver = true;
      localStorage.setItem('sozcel_played', parseInt(localStorage.getItem('sozcel_played') || '0') + 1);
      localStorage.setItem('sozcel_streak', '0');
      recordGameResult('sozcel', dailySeed, 7, false, userNeighborhood);
      saveState();
      renderStats();
    } else {
      currentRow++;
      currentGuess = '';
      saveState();
    }
  }, 500);
}

function checkWord(guess) {
  const result = Array(5).fill('absent');
  const targetLetters = TARGET_WORD.split('');
  const guessLetters = guess.split('');

  // First pass: exact matches
  guessLetters.forEach((letter, i) => {
    if (lettersMatch(letter, targetLetters[i])) {
      result[i] = 'correct';
      targetLetters[i] = null;
    }
  });

  // Second pass: present but wrong position
  guessLetters.forEach((letter, i) => {
    if (result[i] === 'absent') {
      const targetIndex = targetLetters.findIndex(t => t !== null && lettersMatch(letter, t));
      if (targetIndex !== -1) {
        result[i] = 'present';
        targetLetters[targetIndex] = null;
      }
    }
  });

  return result;
}

// ── Load community stats from Supabase, fall back to seeded data ──
async function loadCommunityStats() {
  try {
    const { data, error } = await sb.from('game_results')
      .select('attempts, won, neighborhood')
      .eq('game', 'sozcel')
      .eq('date', dailySeed);

    if (error || !data || data.length === 0) throw new Error('no data');

    // Build real distribution
    const dist = [0, 0, 0, 0, 0, 0, 0]; // attempts 1-6 + failed
    data.forEach(r => {
      if (r.won && r.attempts >= 1 && r.attempts <= 6) {
        dist[r.attempts - 1]++;
      } else {
        dist[6]++;
      }
    });

    // Build district success rates
    const districtMap = {};
    data.forEach(r => {
      if (!r.neighborhood) return;
      if (!districtMap[r.neighborhood]) districtMap[r.neighborhood] = { wins: 0, total: 0 };
      districtMap[r.neighborhood].total++;
      if (r.won) districtMap[r.neighborhood].wins++;
    });

    const neighborhoodNames = {
      bakirkoy:'Bakırköy', besiktas:'Beşiktaş', kadikoy:'Kadıköy',
      uskudar:'Üsküdar', fatih:'Fatih', beyoglu:'Beyoğlu',
      sisli:'Şişli', sariyer:'Sarıyer', maltepe:'Maltepe', atasehir:'Ataşehir',
      umraniye:'Ümraniye', kagithane:'Kağıthane', bahcelievler:'Bahçelievler',
      bagcilar:'Bağcılar', eyupsultan:'Eyüpsultan', bayrampasa:'Bayrampaşa',
      basaksehir:'Başakşehir', gungoren:'Güngören', esenler:'Esenler',
      gop:'Gaziosmanpaşa', kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi',
      beykoz:'Beykoz', cekmekoy:'Çekmeköy', zeytinburnu:'Zeytinburnu'
    };

    const topDistricts = Object.entries(districtMap)
      .map(([k, v]) => ({ name: neighborhoodNames[k] || k, pct: Math.round(v.wins / v.total * 100) }))
      .sort((a, b) => b.pct - a.pct)
      .slice(0, 5);

    return { dist, topDistricts, isReal: true };
  } catch (e) {
    // Fall back to deterministic seeded data
    return { dist: generateCommunityDist(), topDistricts: generateTopDistricts(), isReal: false };
  }
}

// ── Stats rendering ──
async function renderStats() {
  const played = parseInt(localStorage.getItem('sozcel_played') || '0');
  const wins = parseInt(localStorage.getItem('sozcel_wins') || '0');
  const streak = parseInt(localStorage.getItem('sozcel_streak') || '0');
  const maxStreak = parseInt(localStorage.getItem('sozcel_max_streak') || '0');
  const winPct = played > 0 ? Math.round(wins / played * 100) : 0;

  // Update max streak
  if (streak > maxStreak) {
    localStorage.setItem('sozcel_max_streak', streak);
  }
  const displayMaxStreak = Math.max(streak, maxStreak);

  // Personal guess distribution (stored as sozcel_dist_1 through sozcel_dist_6)
  const dist = [];
  for (let i = 1; i <= 6; i++) {
    dist.push(parseInt(localStorage.getItem('sozcel_dist_' + i) || '0'));
  }
  const maxDist = Math.max(...dist, 1);

  // Left panel: personal stats
  document.getElementById('stats-left').innerHTML = `
    <div>
      <div class="panel-title">Kişisel İstatistikler</div>
    </div>
    <div class="stat-big">
      <div class="num">${streak}</div>
      <div class="label">Seri</div>
    </div>
    <div class="stat-row">
      <span class="stat-label">Oynanan</span>
      <span class="stat-val">${played}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanılan</span>
      <span class="stat-val">${wins}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanma %</span>
      <span class="stat-val">${winPct}%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">En Uzun Seri</span>
      <span class="stat-val">${displayMaxStreak}</span>
    </div>
    <div style="margin-top:8px;">
      <div class="panel-title">Tahmin Dağılımı</div>
    </div>
    ${dist.map((d, i) => `
      <div class="dist-bar-wrap">
        <span class="dist-label">${i + 1}</span>
        <div class="dist-bar-outer">
          <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxDist * 100, 5) : 0}%"></div>
        </div>
        <span class="dist-pct">${d}</span>
      </div>
    `).join('')}
  `;

  // Right panel: community stats from Supabase (falls back to seeded data)
  const community = await loadCommunityStats();
  const communityDist = community.dist;
  const totalCommunity = communityDist.reduce((a, b) => a + b, 0);
  const maxCommunityDist = Math.max(...communityDist, 1);
  const topDistricts = community.topDistricts;

  document.getElementById('stats-right').innerHTML = `
    <div>
      <div class="panel-title">Günün İstatistikleri</div>
    </div>
    ${communityDist.map((d, i) => {
      const pct = totalCommunity > 0 ? Math.round(d / totalCommunity * 100) : 0;
      const label = i < 6 ? (i + 1) + '. tahmin' : 'Bilemedi';
      return `
        <div class="dist-bar-wrap">
          <span class="dist-label" style="min-width:56px;text-align:left;font-size:0.6rem;">${label}</span>
          <div class="dist-bar-outer">
            <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxCommunityDist * 100, 3) : 0}%"></div>
          </div>
          <span class="dist-pct">${pct}%</span>
        </div>
      `;
    }).join('')}
    <div style="margin-top:8px;">
      <div class="panel-title">En Başarılı İlçeler</div>
    </div>
    ${topDistricts.map((d, i) => `
      <div class="district-rank">
        <span class="rank-name">${i + 1}. ${d.name}</span>
        <span class="rank-pct">${d.pct}%</span>
      </div>
    `).join('')}
  `;
}

// Generate deterministic community stats from daily seed
function generateCommunityDist() {
  let hash = 0;
  for (let i = 0; i < dailySeed.length; i++) {
    hash = ((hash << 5) - hash) + dailySeed.charCodeAt(i);
    hash = hash & hash;
  }
  // Distribution: 1st try rare, 3rd-4th most common, 6th and fail less
  const base = [3, 12, 25, 28, 18, 9, 5];
  return base.map((b, i) => {
    const noise = ((hash >> (i * 4)) & 0xF) - 8;
    return Math.max(1, b + noise);
  });
}

function generateTopDistricts() {
  const names = {
    bakirkoy:'Bakırköy', besiktas:'Beşiktaş', kadikoy:'Kadıköy',
    uskudar:'Üsküdar', fatih:'Fatih', beyoglu:'Beyoğlu',
    sisli:'Şişli', sariyer:'Sarıyer', maltepe:'Maltepe', atasehir:'Ataşehir',
    umraniye:'Ümraniye', kagithane:'Kağıthane', bahcelievler:'Bahçelievler',
    bagcilar:'Bağcılar', eyupsultan:'Eyüpsultan'
  };
  const keys = Object.keys(names);
  let hash = 0;
  for (let i = 0; i < dailySeed.length; i++) {
    hash = ((hash << 3) - hash) + dailySeed.charCodeAt(i);
    hash = hash & hash;
  }
  // Shuffle deterministically and pick top 5
  const shuffled = keys.map((k, i) => ({
    name: names[k],
    pct: 60 + Math.abs((hash >> (i * 2)) % 35)
  })).sort((a, b) => b.pct - a.pct).slice(0, 5);
  return shuffled;
}

// ── Track guess distribution ──
function recordGuessDistribution(row) {
  // row is 1-indexed (1 = first guess, 6 = sixth, 7 = fail)
  const key = 'sozcel_dist_' + Math.min(row, 6);
  localStorage.setItem(key, parseInt(localStorage.getItem(key) || '0') + 1);
}

// ── Init ──
initWordGrid();
initKeyboard();
restoreState();
renderStats();
</script>
