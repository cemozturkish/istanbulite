<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Sözcel — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      /* Core ink & paper */
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --hover: #e0e0e0;
      --field-bg: #f5f5f5;
      /* Grayscale neutrals */
      --accent: #333333;
      --accent-2: #555555;
      --muted: #888888;
      --rule: #cccccc;
      --hairline: #bbbbbb;
      --whisper: #e6e6e6;
      /* Newspaper accents (reserve — use sparingly) */
      --ink-red: #D41717;
      --brown-1: #8a6f53;
      --brown-2: #6b5640;
      --brown-3: #4e3f2e;
      --brown-4: #38301f;
      /* Semantic aliases */
      --border: var(--rule);
      --danger: var(--ink-red);
      /* Sözcel keeps its tile-tone overrides */
      --success: #444444;
      --present: #999999;
      --absent: #cccccc;
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: pan-y;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { }
    .datetime-block .time-line { }

    header {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* Left: personal stats */
    .stats-left {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .panel-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .stat-big {
      text-align: center;
      padding: 8px 0;
    }
    .stat-big .num {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-big .label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      padding: 3px 0;
    }
    .stat-row .stat-label { color: var(--muted); }
    .stat-row .stat-val { font-weight: 700; }

    /* ── Center: game ── */
    .game-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      overflow: hidden;
      min-height: 0;
      gap: 6px;
    }

    .word-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: min(240px, 38vh);
      flex-shrink: 0;
    }

    .word-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
    }

    .letter-box {
      aspect-ratio: 1;
      border: 2px solid #cccccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.7rem, 2vh, 1.1rem);
      font-weight: 700;
      text-transform: uppercase;
      background: white;
      transition: all 0.2s;
    }

    .letter-box.filled { border-color: #666666; }
    .letter-box.correct {
      background: var(--success);
      border-color: var(--success);
      color: white;
      animation: flip 0.5s ease;
    }
    .letter-box.present {
      background: var(--present);
      border-color: var(--present);
      color: white;
      animation: flip 0.5s ease;
    }
    .letter-box.absent {
      background: var(--absent);
      border-color: var(--absent);
      color: white;
      animation: flip 0.5s ease;
    }

    @keyframes flip {
      0%, 100% { transform: rotateX(0); }
      50% { transform: rotateX(90deg); }
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 100%;
      max-width: 420px;
      flex-shrink: 0;
    }

    .keyboard-row {
      display: flex;
      gap: 2px;
      justify-content: center;
    }

    .key {
      padding: 7px 2px;
      min-width: 28px;
      background: #dddddd;
      border: none;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      user-select: none;
    }

    .key:hover { background: #bbb; }
    .key.wide { min-width: 42px; font-size: 0.6rem; }
    .key.correct { background: var(--success); color: white; }
    .key.present { background: var(--present); color: white; }
    .key.absent { background: var(--absent); color: white; }

    .game-message {
      text-align: center;
      font-size: 0.85rem;
      min-height: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .game-message.win { color: var(--success); }
    .game-message.lose { color: var(--accent); }

    .reset-info {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      flex-shrink: 0;
    }

    /* ── Right: community stats ── */
    .stats-right {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .dist-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      margin-bottom: 4px;
    }
    .dist-bar-wrap .dist-label {
      min-width: 12px;
      text-align: right;
      font-weight: 700;
      color: var(--muted);
    }
    .dist-bar-outer {
      flex: 1;
      height: 14px;
      background: var(--paper-dark);
      border: 1px solid #ddd;
      position: relative;
    }
    .dist-bar-inner {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .dist-bar-wrap .dist-pct {
      min-width: 30px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .district-rank {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0;
      border-bottom: 1px solid #eee;
    }
    .district-rank:last-child { border-bottom: none; }
    .district-rank .rank-name { font-weight: 600; }
    .district-rank .rank-pct { color: var(--muted); font-weight: 700; }

    /* ── MOBILE RESPONSIVE ── */
    /* Back button hidden on desktop (overridden in mobile @media below) */
    .game-back-btn { display: none; }

    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
        overflow: hidden;
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Hide everything except the game itself for immersive fullscreen */
      .section-rule, .col-left, .col-right, header { display: none !important; }

      /* Floating back button (top-left) */
      .game-back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 10px;
        left: 10px;
        width: 38px;
        height: 38px;
        background: #ffffff;
        border: 1px solid #000000;
        border-radius: 50%;
        color: #000000;
        font-size: 18px;
        font-weight: 700;
        text-decoration: none;
        z-index: 200;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .game-back-btn:hover { background: #f0f0f0; }

      /* Main: fullscreen game area */
      main {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        height: 100dvh;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        -webkit-overflow-scrolling: touch;
      }
      .game-panel {
        padding: 60px 12px 24px 12px;
        gap: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
      }
      .word-grid {
        width: min(72vw, 52vh);
        gap: 6px;
      }
      .word-row { gap: 6px; }
      .letter-box {
        border-width: 3px;
        font-size: clamp(1.35rem, 4.5vh, 2.15rem);
        border-radius: 5px;
      }
      .keyboard { max-width: 100%; gap: 6px; }
      .keyboard-row { gap: 4px; }
      .key {
        min-width: 7.2vw;
        padding: 16px 2px;
        font-size: 16px;
        font-weight: 700;
        border-radius: 6px;
        flex: 1;
      }
      .key.wide { min-width: 12.6vw; font-size: 13px; flex: 1.5; }
      .game-message { font-size: 15px; min-height: 18px; }
      .reset-info { font-size: 12px; }

    }
  </style>
</head>

  <header>
    <nav>

    <section class="stats-right" id="stats-right"></section>

<script>
// ── Supabase init ──
const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Get user neighborhood from session ──
let userNeighborhood = '';
const neighborhoodNames = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      userNeighborhood = session.user.user_metadata?.yasadigi_ilce
        || session.user.user_metadata?.neighborhood || '';
      if (userNeighborhood) {
        const badgeEl = document.getElementById('user-nb-badge');
        if (badgeEl) badgeEl.textContent = neighborhoodNames[userNeighborhood] || userNeighborhood;
      }
    }
  } catch(e) {}
})();

// ── Record game result to Supabase ──
async function recordGameResult(game, date, attempts, won, neighborhood) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: game,
      date: date,
      attempts: attempts,
      won: won,
      neighborhood: neighborhood
    }]);
  } catch (e) { /* table may not exist yet */ }
}

// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const day = now.toLocaleDateString('tr-TR', { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString('tr-TR', { ...opts, month: 'long' });
  const year = now.toLocaleDateString('tr-TR', { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString('tr-TR', { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString('tr-TR', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

// ── Turkish letter normalization ──
// Treat İ/I and ı/i correctly for Turkish
function turkishUpper(str) {
  return str.replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
}

// Compare two Turkish letters — İ and I are distinct
function lettersMatch(a, b) {
  return a === b;
}

// ── Daily seed ──
function getDailySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return `Yeni oyun ${hours} saat ${minutes} dakika sonra`;
}

const WORD_LIST = [
  'KOLAY', 'SOKAK', 'HABER', 'KÖŞEK', 'ŞEHİR', 'PASTA', 'GÜZEL', 'KİTAP',
  'YEMEK', 'DÜNYA', 'BAHÇE', 'ÇANTA', 'DENİZ', 'GÜNEŞ', 'İSTEK', 'KALEM',
  'LİMON', 'MEYVE', 'NEFES', 'ÖĞLEN', 'PAZAR', 'SABAH', 'TABAK',
  'VAPUR', 'YAĞMR', 'ZAMAN', 'AKŞAM', 'BIÇAK', 'CADDE', 'DÖNER',
  'MASAL', 'ÇIÇEK', 'BAYAT', 'DOLAP', 'FİLİZ', 'HAYAL', 'IŞLIK',
  'KALIP', 'NAMAZ', 'REÇEL', 'TATLI', 'UFACIK'
];

function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % WORD_LIST.length);
}

const dailySeed = getDailySeed();
const TARGET_WORD = WORD_LIST[seededRandom(dailySeed)];

let currentRow = 0;
let currentGuess = '';
let gameOver = false;
const keyStates = {};

const SAVE_KEY = 'sozcel_state_' + dailySeed;

function saveState() {
  const state = { currentRow, currentGuess, gameOver, guesses: [] };
  // When the game ends on a winning/losing guess, currentRow is NOT incremented
  // (only the "wrong, try again" branch increments it), so we must explicitly
  // include the current row in the save when gameOver is true.
  const lastSavedRow = gameOver ? currentRow + 1 : currentRow;
  for (let r = 0; r < lastSavedRow; r++) {
    let word = '';
    for (let c = 0; c < 5; c++) {
      word += document.getElementById(`box-${r}-${c}`).textContent;
    }
    state.guesses.push(word);
  }
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function restoreState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.guesses || state.guesses.length === 0) return false;

    state.guesses.forEach((word, rowIdx) => {
      currentRow = rowIdx;
      currentGuess = word;
      for (let i = 0; i < 5; i++) {
        const box = document.getElementById(`box-${rowIdx}-${i}`);
        box.textContent = word[i] || '';
        box.className = 'letter-box filled';
      }
      const result = checkWord(word);
      for (let i = 0; i < 5; i++) {
        const box = document.getElementById(`box-${rowIdx}-${i}`);
        box.className = `letter-box filled ${result[i]}`;
        const letter = word[i];
        const keyBtn = document.getElementById(`key-${letter}`);
        if (keyBtn) {
          const cur = keyStates[letter] || '';
          if (result[i] === 'correct') { keyStates[letter] = 'correct'; keyBtn.className = 'key correct'; }
          else if (result[i] === 'present' && cur !== 'correct') { keyStates[letter] = 'present'; keyBtn.className = 'key present'; }
          else if (!cur) { keyStates[letter] = 'absent'; keyBtn.className = 'key absent'; }
        }
      }
    });

    gameOver = state.gameOver;
    if (gameOver) {
      const lastGuess = state.guesses[state.guesses.length - 1];
      if (lastGuess === TARGET_WORD) {
        document.getElementById('game-message').textContent = 'Tebrikler!';
        document.getElementById('game-message').className = 'game-message win';
      } else {
        document.getElementById('game-message').textContent = `Kelime: ${TARGET_WORD}`;
        document.getElementById('game-message').className = 'game-message lose';
      }
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
      currentRow = state.guesses.length;
    } else {
      currentRow = state.guesses.length;
      currentGuess = '';
    }
    return true;
  } catch (e) { return false; }
}

// ── Keyboard ──
const KEYBOARD_LAYOUT = [
  ['E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P', 'Ğ', 'Ü'],
  ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'Ş', 'İ'],
  ['GİR', 'Z', 'C', 'V', 'B', 'N', 'M', 'Ö', 'Ç', '←']
];

function initWordGrid() {
  const grid = document.getElementById('word-grid');
  for (let i = 0; i < 6; i++) {
    const row = document.createElement('div');
    row.className = 'word-row';
    for (let j = 0; j < 5; j++) {
      const box = document.createElement('div');
      box.className = 'letter-box';
      box.id = `box-${i}-${j}`;
      row.appendChild(box);
    }
    grid.appendChild(row);
  }
}

function initKeyboard() {
  const keyboard = document.getElementById('keyboard');
  KEYBOARD_LAYOUT.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'keyboard-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.onclick = () => handleKey(key);
      btn.id = `key-${key}`;
      rowDiv.appendChild(btn);
    });
    keyboard.appendChild(rowDiv);
  });
}

// Physical keyboard — handle Turkish İ/I/ı/i properly
document.addEventListener('keydown', (e) => {
  if (gameOver) return;

  const rawKey = e.key;

  // Turkish-specific mapping
  if (rawKey === 'Backspace') { handleKey('←'); return; }
  if (rawKey === 'Enter') { handleKey('GİR'); return; }

  // Handle Turkish letters directly
  const turkishLetters = 'ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZabcçdefgğhıijklmnoöprsştuüvyz';
  if (rawKey.length === 1 && turkishLetters.includes(rawKey)) {
    // Turkish uppercase: i → İ, ı → I (not standard toUpperCase)
    let upper = rawKey;
    if (rawKey === 'i') upper = 'İ';
    else if (rawKey === 'ı') upper = 'I';
    else upper = rawKey.toUpperCase();
    handleKey(upper);
  }
});

function handleKey(key) {
  if (gameOver) return;

  if (key === '←') {
    if (currentGuess.length > 0) {
      currentGuess = currentGuess.slice(0, -1);
      updateDisplay();
    }
  } else if (key === 'GİR') {
    if (currentGuess.length === 5) {
      submitGuess();
    }
  } else if (currentGuess.length < 5) {
    currentGuess += key;
    updateDisplay();
    markAsPlayed();
  }
}

// Record an "in progress" game_results row on first interaction so Kahvehane
// can show the game as played even when the user doesn't finish it today.
async function markAsPlayed() {
  const flagKey = 'sozcel_started_' + dailySeed;
  if (localStorage.getItem(flagKey)) return;
  localStorage.setItem(flagKey, '1');
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: 'sozcel',
      date: dailySeed,
      attempts: 0,
      won: false,
      neighborhood: userNeighborhood
    }]);
  } catch (e) { /* table may not exist yet */ }
}

function updateDisplay() {
  for (let i = 0; i < 5; i++) {
    const box = document.getElementById(`box-${currentRow}-${i}`);
    box.textContent = currentGuess[i] || '';
    box.className = 'letter-box' + (currentGuess[i] ? ' filled' : '');
  }
}

function submitGuess() {
  const guessSnap = currentGuess;
  const rowSnap = currentRow;
  const result = checkWord(guessSnap);

  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const box = document.getElementById(`box-${rowSnap}-${i}`);
      const letter = guessSnap[i];
      box.className = `letter-box filled ${result[i]}`;

      const keyBtn = document.getElementById(`key-${letter}`);
      if (keyBtn) {
        const cs = keyStates[letter] || '';
        if (result[i] === 'correct') { keyStates[letter] = 'correct'; keyBtn.className = 'key correct'; }
        else if (result[i] === 'present' && cs !== 'correct') { keyStates[letter] = 'present'; keyBtn.className = 'key present'; }
        else if (!cs) { keyStates[letter] = 'absent'; keyBtn.className = 'key absent'; }
      }
    }, i * 100);
  }

  setTimeout(async () => {
    if (guessSnap === TARGET_WORD) {
      document.getElementById('game-message').textContent = 'Tebrikler!';
      document.getElementById('game-message').className = 'game-message win';
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
      gameOver = true;
      // Insert the winning row first so renderStats() (which reads from
      // Supabase) reflects this game immediately.
      await recordGameResult('sozcel', dailySeed, rowSnap + 1, true, userNeighborhood);
      saveState();
      renderStats();
    } else if (rowSnap === 5) {
      document.getElementById('game-message').textContent = `Kelime: ${TARGET_WORD}`;
      document.getElementById('game-message').className = 'game-message lose';
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
      gameOver = true;
      await recordGameResult('sozcel', dailySeed, 7, false, userNeighborhood);
      saveState();
      renderStats();
    } else {
      currentRow++;
      currentGuess = '';
      saveState();
    }
  }, 500);
}

function checkWord(guess) {
  const result = Array(5).fill('absent');
  const targetLetters = TARGET_WORD.split('');
  const guessLetters = guess.split('');

  // First pass: exact matches
  guessLetters.forEach((letter, i) => {
    if (lettersMatch(letter, targetLetters[i])) {
      result[i] = 'correct';
      targetLetters[i] = null;
    }
  });

  // Second pass: present but wrong position
  guessLetters.forEach((letter, i) => {
    if (result[i] === 'absent') {
      const targetIndex = targetLetters.findIndex(t => t !== null && lettersMatch(letter, t));
      if (targetIndex !== -1) {
        result[i] = 'present';
        targetLetters[targetIndex] = null;
      }
    }
  });

  return result;
}

// ── Personal stats from Supabase ──
// Dedupe per (user, date): a date is "played" if any row exists, "won" if
// any row has won=true. For winning dates we keep the smallest `attempts`
// value as that day's score (used for the personal guess distribution).
async function loadPersonalStats() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return null;
    const { data, error } = await sb.from('game_results')
      .select('date, attempts, won')
      .eq('user_id', session.user.id)
      .eq('game', 'sozcel');
    if (error) return null;
    const byDate = new Map();
    (data || []).forEach(r => {
      const prev = byDate.get(r.date) || { date: r.date, won: false, attempts: null };
      if (r.won) {
        prev.won = true;
        if (prev.attempts === null || r.attempts < prev.attempts) prev.attempts = r.attempts;
      }
      byDate.set(r.date, prev);
    });
    const entries = Array.from(byDate.values());
    const played = entries.length;
    const wins = entries.filter(e => e.won).length;
    // Guess distribution: attempts 1-6 -> indices 0-5; failures (no won row) -> index 6.
    const dist = [0, 0, 0, 0, 0, 0, 0];
    entries.forEach(e => {
      if (e.won && e.attempts >= 1 && e.attempts <= 6) dist[e.attempts - 1]++;
      else dist[6]++;
    });
    // Streaks. Compare Istanbul-local YYYY-M-D seeds (matches dailySeed format).
    const winDateSet = new Set(entries.filter(e => e.won).map(e => e.date));
    function seedForOffset(off) {
      const now = new Date();
      const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
      ist.setDate(ist.getDate() - off);
      return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
    }
    // Current streak: count back from today; if today wasn't won, start at yesterday.
    let currentStreak = 0;
    let offset = winDateSet.has(seedForOffset(0)) ? 0 : 1;
    while (winDateSet.has(seedForOffset(offset))) { currentStreak++; offset++; }
    // Max streak: longest run of consecutive winning days.
    const DAY = 86400000;
    const winTimes = entries.filter(e => e.won).map(e => {
      const [y, m, d] = e.date.split('-').map(Number);
      return Date.UTC(y, m - 1, d);
    }).sort((a, b) => a - b);
    let maxStreak = 0, cur = 0, prev = null;
    for (const t of winTimes) {
      cur = (prev !== null && t - prev === DAY) ? cur + 1 : 1;
      if (cur > maxStreak) maxStreak = cur;
      prev = t;
    }
    return { played, wins, currentStreak, maxStreak, dist };
  } catch (e) { return null; }
}

// ── Community stats from Supabase. Returns null when no data for today. ──
async function loadCommunityStats() {
  try {
    const { data, error } = await sb.from('game_results')
      .select('user_id, attempts, won, neighborhood')
      .eq('game', 'sozcel')
      .eq('date', dailySeed);

    if (error || !data || data.length === 0) return null;

    // Dedupe per user: one entry per player for today.
    const byUser = new Map();
    data.forEach(r => {
      const prev = byUser.get(r.user_id) || { won: false, attempts: null, neighborhood: r.neighborhood };
      if (r.neighborhood) prev.neighborhood = r.neighborhood;
      if (r.won) {
        prev.won = true;
        if (prev.attempts === null || r.attempts < prev.attempts) prev.attempts = r.attempts;
      }
      byUser.set(r.user_id, prev);
    });

    const dist = [0, 0, 0, 0, 0, 0, 0]; // attempts 1-6 + failed
    const districtMap = {};
    byUser.forEach(e => {
      if (e.won && e.attempts >= 1 && e.attempts <= 6) dist[e.attempts - 1]++;
      else dist[6]++;
      if (e.neighborhood) {
        if (!districtMap[e.neighborhood]) districtMap[e.neighborhood] = { wins: 0, total: 0 };
        districtMap[e.neighborhood].total++;
        if (e.won) districtMap[e.neighborhood].wins++;
      }
    });

    const topDistricts = Object.entries(districtMap)
      .map(([k, v]) => ({ name: neighborhoodNames[k] || k, pct: Math.round(v.wins / v.total * 100), total: v.total }))
      .sort((a, b) => b.pct - a.pct || b.total - a.total)
      .slice(0, 5);

    return { dist, topDistricts };
  } catch (e) {
    return null;
  }
}

// ── Stats rendering ──
async function renderStats() {
  // Supabase is the source of truth. Cache the last successful payload in
  // localStorage so first paint isn't blank on flaky networks.
  const cacheKey = 'sozcel_stats_cache';
  let personal = await loadPersonalStats();
  if (personal) {
    localStorage.setItem(cacheKey, JSON.stringify(personal));
  } else {
    try { personal = JSON.parse(localStorage.getItem(cacheKey) || 'null'); } catch { personal = null; }
  }
  const played = personal ? personal.played : 0;
  const wins = personal ? personal.wins : 0;
  const streak = personal ? personal.currentStreak : 0;
  const displayMaxStreak = personal ? Math.max(personal.maxStreak, personal.currentStreak) : 0;
  const winPct = played > 0 ? Math.round(wins / played * 100) : 0;

  // Personal guess distribution: indices 0..5 = attempts 1..6 (index 6 = failed, not shown).
  const distFull = personal ? personal.dist : [0,0,0,0,0,0,0];
  const dist = distFull.slice(0, 6);
  const maxDist = Math.max(...dist, 1);

  // Left panel: personal stats
  document.getElementById('stats-left').innerHTML = `
    <div>
      <div class="panel-title">Kişisel İstatistikler</div>
    </div>
    <div class="stat-big">
      <div class="num">${streak}</div>
      <div class="label">Seri</div>
    </div>
    <div class="stat-row">
      <span class="stat-label">Oynanan</span>
      <span class="stat-val">${played}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanılan</span>
      <span class="stat-val">${wins}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanma %</span>
      <span class="stat-val">${winPct}%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">En Uzun Seri</span>
      <span class="stat-val">${displayMaxStreak}</span>
    </div>
    <div style="margin-top:8px;">
      <div class="panel-title">Tahmin Dağılımı</div>
    </div>
    ${dist.map((d, i) => `
      <div class="dist-bar-wrap">
        <span class="dist-label">${i + 1}</span>
        <div class="dist-bar-outer">
          <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxDist * 100, 5) : 0}%"></div>
        </div>
        <span class="dist-pct">${d}</span>
      </div>
    `).join('')}
  `;

  // Right panel: community stats from Supabase (no fake fallback).
  const community = await loadCommunityStats();
  const rightEl = document.getElementById('stats-right');
  if (!community) {
    rightEl.innerHTML = `
      <div><div class="panel-title">Günün İstatistikleri</div></div>
      <div class="stat-row"><span class="stat-label">Henüz veri yok</span></div>
    `;
    return;
  }
  const communityDist = community.dist;
  const totalCommunity = communityDist.reduce((a, b) => a + b, 0);
  const maxCommunityDist = Math.max(...communityDist, 1);
  const topDistricts = community.topDistricts;

  rightEl.innerHTML = `
    <div>
      <div class="panel-title">Günün İstatistikleri</div>
    </div>
    ${communityDist.map((d, i) => {
      const pct = totalCommunity > 0 ? Math.round(d / totalCommunity * 100) : 0;
      const label = i < 6 ? (i + 1) + '. tahmin' : 'Bilemedi';
      return `
        <div class="dist-bar-wrap">
          <span class="dist-label" style="min-width:56px;text-align:left;font-size:0.6rem;">${label}</span>
          <div class="dist-bar-outer">
            <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxCommunityDist * 100, 3) : 0}%"></div>
          </div>
          <span class="dist-pct">${pct}%</span>
        </div>
      `;
    }).join('')}
    <div style="margin-top:8px;">
      <div class="panel-title">En Başarılı İlçeler</div>
    </div>
    ${topDistricts.length === 0
      ? `<div class="stat-row"><span class="stat-label">Henüz veri yok</span></div>`
      : topDistricts.map((d, i) => `
        <div class="district-rank">
          <span class="rank-name">${i + 1}. ${d.name}</span>
          <span class="rank-pct">${d.pct}%</span>
        </div>
      `).join('')}
  `;
}

// ── Init ──
initWordGrid();
initKeyboard();
restoreState();
renderStats();

// ── Disable browser zoom (Ctrl+wheel, Ctrl+=/-/0, pinch gestures) ──
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey) e.preventDefault();
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) &&
      (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0' ||
       e.key === '_' || e.key === 'Add' || e.key === 'Subtract')) {
    e.preventDefault();
  }
});
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('gestureend', (e) => e.preventDefault());
</script>
