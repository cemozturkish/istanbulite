<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kahvehane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
  <script src="palette.js"></script>
  <link rel="stylesheet" href="palette.css">
  <script src="game-locks.js"></script>
  <link rel="stylesheet" href="profile-card.css">
  <script src="profile-card.js" defer></script>
  <link rel="stylesheet" href="onboarding.css">
  <script src="onboarding.js" defer></script>
  <script src="sozcul-mascot.js" defer></script>
  <script src="admin-notification.js" defer></script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in. Also seeds the VT direction class so the cross-document transition knows which way to slide before it captures the snapshot, and a one-shot flag so the posts/scoreboard card-entrance animation (see animateFeedSwap) skips its first run here -- the column itself is already sliding in from the same edge, so animating the cards inside it too would look like the content arriving twice. -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
          window.__istSuppressFirstCardAnim = { left: true, right: true };
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      /* Core ink & paper — warm cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;        /* main canvas */
      --paper-warm: #eddbd0;
      --paper-card: #b8947a;   /* cards/blocks — darker, for contrast over the map photo */
      --paper-banner: #c9ae9a; /* section headers/banners */
      --paper-navbar: #b89b7f; /* top nav (darkest) */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* RGB triplet for the map hover tint (needs alpha, so it can't
         just reference the hex --ink var). Overridden alongside
         everything else in palette.css for data-palette="mono". */
      --ink-rgb: 76, 56, 42;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* Top nav, and both side columns, are frameless -- just typography
       floating directly on the map photo (matches anahane). frames.css
       still targets these classes with !important, so beat it with a
       body-qualified override (higher specificity, wins regardless of
       stylesheet order). */
    body .section-rule,
    body .col-left,
    body .col-right,
    body main {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
    }

    .section-rule {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 28px 10px 28px;
    }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    /* ── Left column ──
       Spans both grid rows (not just row 2, alongside main) so it uses
       the space next to the top nav bar instead of leaving it empty —
       .section-rule spans the full width but only its centered nav text
       actually renders, so columns 1 and 3 of row 1 were unused. */
    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .col-left .nb-highlight {
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-banner);
      color: var(--ink-red);
      text-align: left;
      flex-shrink: 0;
    }

    /* ── Right column: same reasoning as .col-left above ── */
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      /* main's only child is .map-panel, which escapes to position:fixed
         with a negative z-index (see below) — meaning main's own
         (invisible but still hit-testable) box sits in front of it in
         the root stacking context and was silently swallowing every
         click meant for the map. Nothing else lives in main, so letting
         clicks pass straight through it is safe; .map-panel re-enables
         pointer-events for itself and its children below. */
      pointer-events: none;
    }

    /* ── MAP PANEL: fixed full-bleed background (matches anahane) ──
       position:fixed escapes the body grid entirely, so this covers the
       whole viewport regardless of which grid cell it's a DOM child of. */
    .map-panel {
      position: fixed;
      inset: 0;
      pointer-events: auto;
      z-index: -1;
      overflow: hidden;
      background: #f7f7f7;
    }

    .map-panel img.map-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    /* Hit-region overlay traced against map-photo (same 5046x2300 source
       image) — see assets/istanbul-map.svg for the source of truth; keep
       this copy and anahane.html's in sync. */
    .map-panel svg.map-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .neighborhood {
      cursor: pointer;
      fill: transparent;
      stroke: transparent;
      stroke-width: 1.4;
      transition: fill 0.2s, stroke 0.2s, opacity 0.2s;
      pointer-events: all;
    }

    /* Real districts outside this app's 25, plus the Kocaeli-side landmass
       ("istanbul_disi") — not interactive, and no longer given a
       distinguishing tint; they just blend into the base map artwork. */
    .map-unaccommodated,
    .map-istanbul-disi {
      fill: transparent;
      stroke: transparent;
      pointer-events: none;
    }

    /* Hover: dim the artwork under the cursor (matches anahane) — a
       transparent ink tint, not an element-opacity fade, so the black
       stroke borders stay black instead of washing out to gray. */
    .neighborhood:hover { fill: rgba(var(--ink-rgb), 0.18); }
    /* Clicked/active: darker tint + outline. Same fix as hover — bake
       the alpha into the fill color instead of element opacity, so the
       accent-colored stroke doesn't wash out either. */
    .neighborhood.active {
      fill: rgba(184, 148, 122, 0.7); /* --brown-1 */
      stroke: var(--accent);
      stroke-width: 1.4;
    }
    /* Home neighborhood: a little visible even at rest, with a dashed
       outline so it reads as "yours" over the art. */
    .neighborhood.home {
      fill: rgba(134, 105, 85, 0.4); /* --brown-2 */
      stroke: var(--brown-4);
      stroke-width: 1.6;
      stroke-dasharray: 10 6;
    }
    .neighborhood.home:hover { fill: rgba(119, 94, 76, 0.6); } /* --accent-2 */
    .neighborhood.home.active { fill: rgba(119, 94, 76, 0.85); stroke: var(--brown-4); stroke-dasharray: none; } /* --accent-2 */

    /* Plain text, no frame/shadow — matches the HANE/KÜTÜPHANE/KAHVEHANE
       nav tab style (nav a above), not a floating pill. */
    .map-label {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink);
    }

    .discussion-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    /* Sticky label showing which neighborhood is active */
    .discussion-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      color: var(--ink);
      flex-shrink: 0;
    }

    .games-section {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .games-section-inner {
      padding: 10px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    /* Wraps the heading + 3 game links so they can be hidden as one unit
       while a game's bottom sheet is open (see enterGameContext), leaving
       just that game's own scoreboard in view. */
    .game-picker {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .games-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
      text-align: center;
      letter-spacing: 2px;
      flex-shrink: 0;
      border: 2px solid var(--ink);
      background: var(--paper-warm);
      padding: 10px 12px;
    }

    /* ── Weekly scoreboard (top 5 winners of the last 7 days) ──
       No border-top divider — the framed heading below already reads as
       its own section, a rule line on top of that was redundant. */
    .scoreboard {
      margin-top: 14px;
      flex-shrink: 0;
    }
    .scoreboard h2 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid var(--ink);
      background: var(--paper-warm);
      padding: 8px 12px;
    }
    .scoreboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scoreboard-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 10px;
      background: var(--paper);
      border: 1px solid var(--rule);
      font-size: 0.75rem;
    }
    /* 4-stop brown gradient on the row BACKGROUND. Dark-bg rows flip text to paper. */
    .scoreboard-item { background: var(--brown-1); color: var(--ink); border-color: var(--brown-2); }
    .scoreboard-item.r1 { background: var(--brown-4); color: var(--paper); border-color: var(--ink); }
    .scoreboard-item.r2 { background: var(--brown-3); color: var(--paper); }
    .scoreboard-item.r3 { background: var(--brown-2); color: var(--paper); }
    .scoreboard-rank {
      font-weight: 700;
      color: inherit;
      min-width: 18px;
      font-size: 0.8rem;
    }
    .scoreboard-player {
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .scoreboard-name {
      font-weight: 400;
      color: inherit;
    }
    .scoreboard-score {
      font-weight: 700;
      color: inherit;
      font-size: 0.85rem;
      min-width: 22px;
      text-align: right;
    }
    .scoreboard-empty {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 10px 4px;
      list-style: none;
    }
    .scoreboard-countdown {
      font-size: 0.58rem;
      color: var(--muted);
      text-align: center;
      padding: 4px 4px 6px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      font-style: italic;
    }
    /* Seven-square week tracker replacing the old countdown text: past days
       dark, today double-bordered, future days plain. */
    .week-progress {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 4px 4px 6px;
    }
    .week-day {
      box-sizing: border-box;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid var(--rule);
      font-size: 0.5rem;
      font-weight: 700;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
    }
    .week-day.past { background: var(--muted); border-color: var(--muted); color: var(--paper); }
    .week-day.today { background: var(--paper); border: 3px double var(--ink); color: var(--ink); }
    .week-day.future { background: #fff; border-color: var(--rule); color: var(--muted); }
    /* Scoreboard rows are clickable end-to-end (not just the name) and
       give a little playful wobble on hover to invite the click. */
    .scoreboard-item.author-link { cursor: pointer; }
    .scoreboard-item.author-link:hover { animation: scoreboard-wobble 0.5s ease-in-out infinite; }
    @keyframes scoreboard-wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-1.5deg); }
      75% { transform: rotate(1.5deg); }
    }

    /* Chapter-box style, matching the Kütüphane reading-path nodes
       (.path-node): thick ink border with a heavier bottom edge. */
    .game-link {
      display: block;
      background: var(--paper-warm);
      border: 2px solid var(--ink);
      border-bottom: 5px solid var(--ink);
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.2s, border-color 0.2s, transform 0.15s ease, filter 0.1s ease;
      position: relative;
      flex-shrink: 0;
    }

    .game-link:hover {
      background: var(--paper-dark);
      transform: translateX(-4px);
    }
    /* Pressed feedback: darken whatever the current state's colors are
       (plain, started, completed) without needing a state-specific
       override, plus a small press-down nudge. */
    .game-link:active {
      filter: brightness(0.85);
      transform: translateX(-2px) translateY(2px);
    }

    .game-link-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .game-link-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Started today (light warm) vs completed today (dim dark brown) */
    .game-link.started {
      background: var(--paper-card);
      color: var(--accent);
    }
    .game-link.started .game-link-subtitle { color: var(--muted); }
    .game-link.completed {
      background: var(--brown-3);
      color: var(--paper);
      border-color: var(--brown-4);
    }
    .game-link.completed .game-link-subtitle { color: var(--paper-card); }

    /* .game-link.locked and #game-lock-toast styles are injected by
       game-locks.js so the rule lives in one place. */

    /* Home neighborhood badge shown in the post form */
    .home-nb-badge {
      display: inline-block;
      padding: 4px 10px;
      background: var(--accent);
      color: var(--paper);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      vertical-align: middle;
    }

    .submit-form {
      border-top: var(--col-border);
      padding: 16px 20px;
      flex-shrink: 0;
      margin-top: auto;
    }

    .submit-form-header {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid var(--rule);
      background: var(--paper-warm);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 10px;
    }

    .submit-form button {
      width: 100%;
      padding: 10px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-form button:hover { background: var(--accent); }

    .submit-status {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }
    .submit-status.ok { color: var(--success); }
    .submit-status.err { color: var(--accent); }

    /* Fixed toast — always visible above everything so submit outcome is seen */
    .global-toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100% - 24px);
      padding: 10px 14px;
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 9999;
      display: none;
      text-align: center;
    }
    .global-toast.ok { background: #4C4C4C; }
    .global-toast.err { background: #000000; }

    .discussion-posts {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Chapter-box style, matching the Kütüphane reading-path nodes and
       the Anahane news/event cards: white/opaque, thick border with a
       heavier bottom edge, fixed dark text regardless of OS light/dark
       preference or earth/mono palette -- distinct from --paper-card
       (shared with the game-link "started" state), so changing this
       doesn't retheme the games column. */
    .post {
      position: relative;
      background: rgba(255, 255, 255, 0.85);
      border: 2px solid #1a1a1a;
      border-bottom: 5px solid #1a1a1a;
      padding: 16px 18px;
      margin-bottom: 12px;
      color: #1a1a1a;
      transition: background 0.15s, transform 0.15s ease;
    }
    /* Hover just lightens the background a touch and nudges the post
       inward toward the center, same feedback as the Anahane cards. */
    .post:hover {
      background: #e8e8e8;
      transform: translateX(6px);
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .post-time {
      margin-left: auto;
      text-align: right;
    }

    .post-neighborhood {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #e07a72;
    }

    .post-time {
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4a4a4a;
      font-style: italic;
    }

    .post-content {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #1a1a1a;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      font-style: italic;
      color: var(--muted);
    }

    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding: 8px 0 16px;
    }
    .load-more-btn {
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: 8px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
    }
    .load-more-btn:hover { background: var(--hover, #e0e0e0); }
    .load-more-btn:disabled { opacity: 0.6; cursor: default; }

    .post-delete {
      position: absolute;
      top: 6px;
      right: 8px;
      background: none;
      border: none;
      color: #4a4a4a;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 6px;
      font-family: 'Inter', sans-serif;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .post.can-delete:hover .post-delete,
    .post-delete:focus { opacity: 1; }
    .post-delete:hover { color: var(--danger); }

    /* Discussion posts (left column) and scoreboard rows (right column)
       slide in from their own column's outer screen edge on render, and
       slide back out the same way just before the feed is replaced --
       see the animateFeedSwap() helper used by loadPosts() / loadScoreboard(). */
    @keyframes card-slide-in-left {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes card-slide-in-right {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* backwards fill-mode holds the keyframe's "from" state during the
       staggered animation-delay set in JS, so a lower row stays hidden
       off-screen while it waits its turn instead of flashing visible
       in place first. */
    .card-entering-left { animation: card-slide-in-left 0.4s ease-out backwards; }
    .card-entering-right { animation: card-slide-in-right 0.7s ease-out backwards; }
    .card-leaving-left,
    .card-leaving-right {
      transition: transform 0.3s ease-in, opacity 0.3s ease-in;
      opacity: 0;
    }
    .card-leaving-left { transform: translateX(-100%); }
    .card-leaving-right { transform: translateX(100%); }

    .submit-form .submit-form-note {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
      padding: 12px;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE RESPONSIVE ──
       Same stacked-flow treatment as anahane: the map sits at the top
       like a hero banner with the profile card floating over its empty/
       sea-colored band (same #f7f7f7 as the map artwork's own
       background, so the card reads as part of the map rather than a
       stacked box), then comments (left) and square game tiles (right)
       below, all scrolling in body itself, with the tab bar pinned
       fixed at the very bottom (its <header> already escapes to the
       viewport via position:fixed regardless of where .section-rule
       sits). */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        align-content: start;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        /* Reserve space for fixed bottom tab bar + a frame-gap so the
           cards don't visually press against the nav (frames.css design). */
        padding-bottom: calc(56px + env(safe-area-inset-bottom) + var(--frame-gap, 10px));
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Profile bar: floats over the top (empty/sea) band of the map
         instead of taking its own row -- absolutely positioned against
         body (already position:fixed, so it's a valid containing block
         for this), which places it right at the top since the map is
         the first grid row. Matches the map artwork's own #f7f7f7
         background exactly (see .map-panel below) and drops the card's
         usual border so it reads as floating directly on the map. */
      #ist-pc-mount {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 20;
        max-height: none;
        overflow: visible;
        background: #f7f7f7;
        border-bottom: none;
      }

      /* .section-rule no longer renders a floating brand bar -- its
         only visible content (the tab nav) is pulled out via the
         <header> position:fixed rule below and pinned to the viewport
         bottom regardless of where this sits. Taken out of grid flow so
         it doesn't claim a row of its own. */
      .section-rule {
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        padding: 0;
        overflow: visible;
      }

      /* Map: same real artwork + traced SVG hit-regions, now a normal
         in-flow square block instead of a fixed full-bleed background
         layer sitting behind everything -- so it also drops the
         desktop click-through hack (main's pointer-events:none /
         .map-panel's negative z-index), which only existed because the
         map used to escape main's box via position:fixed. Bleeds past
         body's own left/right frame padding (frames.css) so it reaches
         the true screen edges instead of sitting in a gutter, and drops
         frames.css's card shadow (only meant for panels that look like
         discrete floating cards, not this edge-to-edge hero). */
      main {
        grid-column: 1 / -1;
        grid-row: 1;
        display: block;
        overflow: visible;
        pointer-events: auto;
        margin-left: calc(-1 * var(--frame-pad, 10px));
        margin-right: calc(-1 * var(--frame-pad, 10px));
        box-shadow: none !important;
      }
      .map-panel {
        position: relative;
        inset: auto;
        width: 100%;
        aspect-ratio: 1 / 1;
        z-index: auto;
        overflow: hidden;
      }
      .map-label {
        position: absolute;
        bottom: 8px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 1px;
      }

      /* Comments: normal in-flow column below the map, to the left. */
      .col-left {
        grid-column: 1;
        grid-row: 2;
        min-height: 0;
        overflow: visible;
        border-right: 1px solid var(--rule);
        border-top: 1px solid var(--rule);
        display: block;
      }
      .col-left .nb-highlight {
        padding: 6px 12px;
        font-size: 10px;
        letter-spacing: 1.2px;
      }
      /* #ist-pc-mount (profile-card.js) already covers the identity card
         on mobile — the desktop-only #library-card would just take up
         space above the discussion feed. */
      #library-card { display: none; }
      .discussion-section {
        display: block;
        overflow: visible;
      }
      .discussion-label {
        padding: 5px 12px;
        font-size: 9px;
        letter-spacing: 1.2px;
      }
      .discussion-posts {
        padding: 6px 10px;
        overflow: visible;
      }
      .post {
        padding: 10px 12px;
        margin-bottom: 6px;
      }
      .post-neighborhood {
        font-size: 0.55rem;
        letter-spacing: 1.5px;
      }
      .post-time {
        font-size: 0.55rem;
      }
      .post-content {
        font-size: 0.82rem;
        line-height: 1.4;
      }
      .submit-form {
        padding: 8px 10px 12px;
        border-top: 1px solid var(--rule);
        background: var(--paper);
        margin-top: 0;
      }
      .submit-form-header {
        font-size: 10px;
        margin-bottom: 4px;
      }
      .submit-form textarea {
        min-height: 30px;
        padding: 5px 7px;
        font-size: 11px;
        margin-bottom: 5px;
        border-radius: 4px;
      }
      .submit-form button {
        padding: 6px;
        font-size: 11px;
        border-radius: 4px;
      }

      /* Games: normal in-flow column below the map, to the right --
         true square tiles (aspect-ratio, not flex-stretched to fill a
         clipped column) stacked with a gap. */
      .col-right {
        grid-column: 2;
        grid-row: 2;
        min-height: 0;
        overflow: visible;
        border-left: none;
        border-top: 1px solid var(--rule);
        display: block;
        width: auto;
      }
      .games-section {
        display: block;
        overflow: visible;
      }
      .games-section-inner {
        padding: 8px;
        gap: 8px;
        display: flex;
        flex-direction: column;
        overflow: visible;
      }
      .games-section h2 { display: none; }
      /* Hide the weekly scoreboard on mobile — keeps the tile column compact */
      .scoreboard { display: none; }
      .game-picker { gap: 8px; }
      .game-link {
        padding: 0;
        width: clamp(96px, 26vw, 128px);
        aspect-ratio: 1 / 1;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
      }
      .game-link-title {
        font-size: 12px;
        margin-bottom: 3px;
        font-weight: 700;
      }
      .game-link-subtitle {
        font-size: 9px;
        padding: 0 4px;
        line-height: 1.2;
        overflow-wrap: break-word;
        word-break: break-word;
        max-width: 100%;
      }

      /* Bottom tab bar — fixed at bottom */
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        padding: 0 0 env(safe-area-inset-bottom);
        margin: 0;
        border-top: 1px solid var(--rule);
        border-bottom: none;
        background: var(--paper-navbar);
        z-index: 100;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        padding: 0;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: var(--ink); }

      /* ── Mobile swipe pagination: full page (map + datetime + columns) slides; fixed bottom nav stays ── */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: left column slides out/in toward the
       left edge, right column toward the right edge — regardless of nav
       direction; nav stays ── */
    @media (min-width: 769px) {
      .col-left, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-backward .col-left {
        transform: translateX(-100vw);
        transition: none;
      }
      html.ist-entering-forward .col-right,
      html.ist-entering-backward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-backward .col-left {
        transform: translateX(-100vw);
      }
      body.ist-exiting-forward .col-right,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ══════════════════════════════════════════════
       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs. On
       mobile, direction comes from a class on <html> seeded
       by the outgoing page via sessionStorage (present before
       VT captures the new snapshot); desktop ignores direction
       entirely (see the media query below).
       ══════════════════════════════════════════════ */
    @view-transition { navigation: auto; }

    /* Suppress the default root crossfade — columns handle motion */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    .col-left { view-transition-name: ist-col-left; }
    .col-right { view-transition-name: ist-col-right; }

    /* Desktop: left column always exits/enters via the left edge, right
       column via the right edge — independent of nav direction, so no
       html.vt-forward/vt-backward gate is needed here. */
    @media (min-width: 769px) {
      @keyframes ist-vt-col-left-exit { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-col-left-enter { from { transform: translateX(-100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-col-right-exit { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-col-right-enter { from { transform: translateX(100vw); } to { transform: translateX(0); } }

      ::view-transition-old(ist-col-left) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-left-exit;
      }
      ::view-transition-new(ist-col-left) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-left-enter;
      }
      ::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-right-exit;
      }
      ::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-right-enter;
      }
    }

    @media (max-width: 768px) {
      @keyframes ist-vt-out-left { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-in-left { from { transform: translateX(100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-left;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-left;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-right;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-right;
      }
    }

    /* ══════════════════════════════════════════════
       Game overlay: a small floating window that rises over
       the map instead of navigating to a separate page. The
       game itself renders in an iframe (sozcel.html etc.
       stay self-contained, unmodified pages) — see the
       markup near .col-right below and the script at the
       bottom of the file for open/close wiring. On desktop it's
       a card sized to the game and attached to the bottom edge,
       so kahvehane's own top nav and left/right columns stay
       visible around it when there's room; below ~1380px the columns
       step aside instead of cramping into the same space (see the
       @media (max-width: 1380px) rule below), and on narrow screens
       there's no room for any of it, so it falls back to a full-bleed
       bottom sheet instead. */
    .game-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
    }
    .game-overlay[hidden] { display: none; }
    .game-overlay-backdrop {
      /* No dimming for now — the side columns are the point of the
         swap, so nothing behind the sheet gets tinted. Still present
         (transparent) so clicking outside the sheet still closes it. */
      position: absolute;
      inset: 0;
      background: transparent;
    }
    .game-overlay-sheet {
      /* Background/border/shadow come from frames.css's shared flat-card
         rule, matching every other panel on the page.
         Width stays above 768px on purpose: the game itself (sozcel.html
         etc.) has its own @media (max-width: 768px) mobile layout, and
         since that media query evaluates against the iframe's own
         rendered width, a narrower sheet here would wrongly trigger the
         game's mobile styles (giant keyboard, mobile padding) even on a
         desktop-width viewport. */
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(820px, 90vw);
      height: min(88vh, 860px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translate(-50%, 100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .game-overlay.open .game-overlay-sheet { transform: translate(-50%, 0); }
    .game-overlay-frame {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Below ~1380px there isn't room for both 260px side columns and a
       sheet wide enough (>768px) to stay out of the embedded game's own
       mobile breakpoint (see the width comment above) — shrinking the
       sheet instead would trigger that breakpoint on a desktop-width
       viewport, so the side columns step aside instead while a game is
       open, leaving the centered sheet with a clear lane the full width
       of the viewport. Matches the .col-left/.col-right stacking
       breakpoint (768px) below, so there's no gap where neither rule
       applies. */
    @media (max-width: 1380px) {
      body:has(.game-overlay.open) .col-left,
      body:has(.game-overlay.open) .col-right {
        visibility: hidden;
      }
    }
    @media (max-width: 768px) {
      .game-overlay-sheet {
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 92vh;
        transform: translateY(100%);
      }
      .game-overlay.open .game-overlay-sheet { transform: translateY(0); }
    }

    /* ── Profile popup ── */
    .profile-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .profile-popup-overlay.open { display: flex; }
    .profile-popup {
      background: var(--paper);
      border: 1px solid var(--ink);
      width: 360px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 80px);
      overflow: auto;
      padding: 24px;
      position: relative;
      font-family: 'Inter', sans-serif;
    }
    .profile-popup .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 4px 8px;
    }
    .profile-popup .close-btn:hover { color: var(--ink); }
    .profile-popup .pp-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--paper-dark);
      border: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 auto 14px;
      overflow: hidden;
    }
    .profile-popup .pp-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .profile-popup .pp-name {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .profile-popup .pp-meta {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }
    .profile-popup .pp-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid #e5e5e5;
      font-size: 0.8rem;
    }
    .profile-popup .pp-row .pp-label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      align-self: center;
    }
    .profile-popup .pp-row .pp-value {
      color: var(--ink);
      font-weight: 500;
      text-align: right;
    }
    .profile-popup .pp-since {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    .profile-popup .pp-loading,
    .profile-popup .pp-error {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 30px 0;
    }
    .author-link {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .author-link:hover { text-decoration: underline; }
  </style>

</head>
<body>

  <!-- Mobile-only compact profile card (mounted by profile-card.js) -->
  <div id="ist-pc-mount"></div>

  <div class="section-rule">
    <header>

  </div>

  <!-- ist-content: the swappable region for future client-side routing between
       kutuphane/anahane/kahvehane. Persistent chrome (nav, profile card, clock)
       stays outside this node. display:contents keeps grid placement identical
       to before this wrapper existed. -->
  <div id="ist-content" style="display:contents">

  <main>

        </g>
        <g id="Layer_3" data-name="Layer 3">
          <polygon id="sultangazi" class="neighborhood" data-name="Sultangazi" points="1791.89 1108.49 1797.09 1245.59 1771.69 1241.83 1701.67 1254.01 1620.23 1293.58 1615.01 1293.42 1599.64 1302.84 1502.1 1249.72 1502.65 1225.9 1391.25 1144.31 1495.72 1024.03 1510.75 1021.72 1730.28 1085.06 1788.22 1096.88 1791.89 1108.49" fill="none"/>

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Kütüphane → Hane → Kahvehane. Mobile: touch-swipe
// slides the whole page (map, datetime bar, both columns) horizontally as
// one unit, direction keyed off which way you swiped. Desktop: no gesture
// (nav-bar clicks only) — the left column always slides out/in toward the
// left edge and the right column toward the right edge, regardless of nav
// direction. CSS picks the behavior per media query.
// ══════════════════════════════════════════
(function initSwipePagination() {
  const PAGES = ['kutuphane.html', 'anahane.html', 'kahvehane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function recordDir(dir) {
    // Seed the direction for the incoming page. The pre-body script
    // reads this and sets vt-<dir> on <html> before VT captures the
    // new snapshot, so the CSS slide keyframes can match.
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
      });
    });
  }

  // Entry handler — runs on every page load. Cleans up direction state
  // and, for non-VT browsers, releases the manual offscreen transform.
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: '#ffffff',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        // Mobile: whole page travels one way, keyed off nav direction.
        // Desktop: left column always sweeps toward the left edge and the
        // right column toward the right edge, regardless of nav direction
        // -- so frames are stacked toward the opposite edge here and swept
        // back by the container's own animation below.
        const pct = mobile
          ? (dir === 'forward' ? i : -i) * 100
          : (key === 'right' ? -i : i) * 100;
        node.style.transform = 'translateX(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    // Mobile: both stacks travel together, keyed off nav direction.
    // Desktop: left stack always slides left, right stack always slides
    // right, regardless of nav direction (see placeFrame above).
    const mobileEndPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const leftKeyframes = [
      { transform: 'translateX(0%)' },
      { transform: 'translateX(' + (mobile ? mobileEndPct : -hops * 100) + '%)' },
    ];
    const rightKeyframes = [
      { transform: 'translateX(0%)' },
      { transform: 'translateX(' + (mobile ? mobileEndPct : hops * 100) + '%)' },
    ];
    const a1 = leftStack.stack.animate(leftKeyframes, opts);
    const a2 = rightStack.stack.animate(rightKeyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

// Turkish ablative suffix: -den/-dan/-ten/-tan with vowel harmony
function getAblativeSuffix(name) {
  if (!name) return "'den";
  const lastChar = name.charAt(name.length - 1).toLowerCase();
  const voiceless = 'pçtkfhsş';
  const backVowels = 'aıou';
  // Find last vowel for harmony
  let lastVowel = '';
  for (let i = name.length - 1; i >= 0; i--) {
    const c = name.charAt(i).toLowerCase();
    if ('aeıioöuü'.includes(c)) { lastVowel = c; break; }
  }
  const isBack = backVowels.includes(lastVowel);
  const isVoiceless = voiceless.includes(lastChar);
  if (isVoiceless && isBack) return "'tan";
  if (isVoiceless) return "'ten";
  if (isBack) return "'dan";
  return "'den";
}

// Today's date in Europe/Istanbul, matching the dailySeed format used by each game
function getTodaySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

// Color games by status: started today (light gray) vs completed today (dark
// gray). A game_results row with attempts >= 1 means the game ended; attempts=0
// is the in-progress marker written by each game's markAsPlayed(). LocalStorage
// flags also mark a game as started in case the Supabase write fails.
async function markPlayedGames(userId) {
  const today = getTodaySeed();
  const started = new Set();
  const completed = new Set();

  const localFlags = {
    bulmaca: 'bulmaca_started_' + today,
    sozcel: 'sozcel_started_' + today,
    tumcel: 'tumcel_started_' + today
  };
  for (const [game, key] of Object.entries(localFlags)) {
    if (localStorage.getItem(key)) started.add(game);
  }

  try {
    const { data, error } = await sb
      .from('game_results')
      .select('game, attempts')
      .eq('user_id', userId)
      .eq('date', today);
    if (!error && data) {
      data.forEach(r => {
        if ((r.attempts || 0) >= 1) completed.add(r.game);
        else started.add(r.game);
      });
    }
  } catch (e) { /* table may not exist yet — ignore */ }

  document.querySelectorAll('.game-link[data-game]').forEach(el => {
    const g = el.dataset.game;
    if (completed.has(g)) el.classList.add('completed');
    else if (started.has(g)) el.classList.add('started');
  });
}

// Slides a panel's current rows out toward their column's outer screen
// edge, then rebuilds it and slides the fresh rows back in from that
// same edge. `direction` is 'left' (discussion posts, left column) or
// 'right' (scoreboard, right column) -- see the .card-entering-*/
// .card-leaving-* CSS. Renders immediately (no leave animation) on first
// paint, when the panel starts out empty. Rows enter with a staggered
// delay by list position, so the topmost row arrives first and lower
// ones follow. `leadingEls` (optional) are static elements sitting above
// the container -- e.g. the game links above the scoreboard -- that
// should join the same top-to-bottom entrance cascade without being
// part of the container's own leave/rebuild cycle. Skips the entrance
// animation on the first call after arriving via the swipe-pagination
// nav (see window.__istSuppressFirstCardAnim, seeded pre-body): the
// whole column is already sliding in from that same edge, so animating
// the rows inside it too would look like the content arriving twice.
const CARD_SWAP_MS = 300;
const CARD_STAGGER_MS = 160;
function animateFeedSwap(container, direction, buildFn, leadingEls = []) {
  const suppress = window.__istSuppressFirstCardAnim && window.__istSuppressFirstCardAnim[direction];
  if (suppress) window.__istSuppressFirstCardAnim[direction] = false;
  const enterClass = direction === 'left' ? 'card-entering-left' : 'card-entering-right';
  const leaveClass = direction === 'left' ? 'card-leaving-left' : 'card-leaving-right';
  const playEnter = () => {
    buildFn();
    if (suppress) return;
    const items = [...leadingEls, ...Array.from(container.children)];
    items.forEach((el, i) => {
      el.style.animationDelay = `${i * CARD_STAGGER_MS}ms`;
      el.classList.add(enterClass);
      el.addEventListener('animationend', () => {
        el.classList.remove(enterClass);
        el.style.animationDelay = '';
      }, { once: true });
    });
  };
  const existing = Array.from(container.children);
  if (!existing.length) { playEnter(); return; }
  existing.forEach(el => el.classList.add(leaveClass));
  setTimeout(playEnter, CARD_SWAP_MS);
}

// ── Weekly scoreboard ──
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

// game_results.date is stored as un-padded "YYYY-M-D".
function parseGameDate(s) {
  if (!s || typeof s !== 'string') return null;
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

// Points awarded per Sözcel game: 20/12/8/6/4/2 for win in 1–6 guesses; 1 for playing without winning.
function gamePoints(attempts, won) {
  if (won) {
    const pts = [20, 12, 8, 6, 4, 2];
    return pts[attempts - 1] ?? 2;
  }
  return attempts >= 1 ? 1 : 0;
}

// Seven-square week tracker (Monday first, matching the scoring week):
// days already passed are dark, today is double-bordered, days to come are plain.
function renderWeekProgress() {
  const nowIst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const dow = nowIst.getDay(); // 0=Sun … 6=Sat
  const todayIdx = dow === 0 ? 6 : dow - 1; // Monday=0 … Sunday=6
  const en = I18N.isEnglish();
  const letters = en ? ['M', 'T', 'W', 'T', 'F', 'S', 'S'] : ['P', 'S', 'Ç', 'P', 'C', 'C', 'P'];
  const names = en
    ? ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday']
    : ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi', 'Pazar'];
  const label = en ? 'Weekly progress' : 'Haftalık ilerleme';
  const days = letters.map((l, i) => {
    const cls = i < todayIdx ? 'past' : i === todayIdx ? 'today' : 'future';
    return `<span class="week-day ${cls}" title="${names[i]}">${l}</span>`;
  }).join('');
  return `<div class="week-progress" role="img" aria-label="${label}">${days}</div>`;
}
function setWeekProgress(el) {
  if (!el) return;
  el.innerHTML = renderWeekProgress();
  el.dataset.mode = 'week';
}
function clearWeekProgress(el) {
  if (!el) return;
  el.innerHTML = '';
  el.dataset.mode = '';
}

async function loadScoreboard(neighborhoodFilter = null, gameFilter = null) {
  const listEl = document.getElementById('scoreboard-list');
  if (!listEl) return;
  const titleEl = document.getElementById('scoreboard-title');
  const countdownEl = document.getElementById('scoreboard-countdown');
  // Game links sit above the scoreboard and never get rebuilt, but they
  // should still join the same top-to-bottom entrance cascade as the
  // scoreboard rows below them. Hidden while a game context is active
  // (game-picker display:none), so there's nothing to cascade with then.
  const gameLinks = document.getElementById('game-picker')?.style.display === 'none'
    ? []
    : Array.from(document.querySelectorAll('.games-section .game-link'));
  const setList = (html) => animateFeedSwap(listEl, 'right', () => { listEl.innerHTML = html; }, gameLinks);

  // Title + countdown swap: a filtered view is per-neighborhood or
  // per-game (no weekly countdown shown for those narrowed views), while
  // the unfiltered default is the full weekly leaderboard.
  if (gameFilter) {
    const gameName = (GAME_DISPLAY_NAMES[gameFilter] || gameFilter).toLocaleUpperCase('tr-TR');
    if (titleEl) titleEl.textContent = `${gameName} — Skor Tahtası`;
  } else if (neighborhoodFilter) {
    const nbName = neighborhoodNames[neighborhoodFilter] || neighborhoodFilter;
    if (titleEl) titleEl.textContent = I18N.formatNeighborhoodBest(nbName.toLocaleUpperCase('tr-TR'));
    clearWeekProgress(countdownEl);
  } else {
    if (titleEl) titleEl.textContent = I18N.t('games.weeklyscoreboard');
  }

  let results = null;
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('user_id, neighborhood, date, won, attempts, created_at')
      .eq('game', gameFilter || 'sozcel')
      .gte('attempts', 1);
    if (error) throw error;
    results = data;
  } catch (e) {
    setList('<li class="scoreboard-empty">Skorlar yüklenemedi</li>');
    return;
  }

  if (!results || results.length === 0) {
    setList('<li class="scoreboard-empty">Henüz skor yok</li>');
    return;
  }

  // Weekly cutoff: Monday 00:00 of the current Istanbul week.
  const nowIst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const dow = nowIst.getDay(); // 0=Sun … 6=Sat
  const daysFromMonday = dow === 0 ? 6 : dow - 1;
  const cutoff = new Date(nowIst.getFullYear(), nowIst.getMonth(), nowIst.getDate() - daysFromMonday);

  let weekly = results.filter(r => {
    const d = parseGameDate(r.date);
    return d && d >= cutoff;
  });

  // When filtered by a neighborhood, keep only that neighborhood's players.
  if (neighborhoodFilter) {
    weekly = weekly.filter(r => r.neighborhood === neighborhoodFilter);
  }

  if (weekly.length === 0) {
    setList('');
    return;
  }

  // Find the first winner per date (earliest created_at among won=true rows).
  const firstWinnerByDate = new Map();
  weekly.filter(r => r.won).forEach(r => {
    const existing = firstWinnerByDate.get(r.date);
    if (!existing || r.created_at < existing.created_at) {
      firstWinnerByDate.set(r.date, { user_id: r.user_id, created_at: r.created_at });
    }
  });

  // Deduplicate per (user, date): keep the best (highest-scoring) result per day.
  const byUserDate = new Map();
  weekly.forEach(r => {
    if (!r.user_id) return;
    const key = r.user_id + '|' + r.date;
    const isFirst = firstWinnerByDate.get(r.date)?.user_id === r.user_id;
    const pts = gamePoints(r.attempts, r.won) + (isFirst ? 10 : 0);
    const existing = byUserDate.get(key);
    if (!existing || pts > existing.pts) {
      byUserDate.set(key, { user_id: r.user_id, neighborhood: r.neighborhood, date: r.date, pts });
    }
  });

  const scores = new Map();
  byUserDate.forEach(entry => {
    const prev = scores.get(entry.user_id) || { score: 0, neighborhood: null, lastDate: null };
    prev.score += entry.pts;
    const d = parseGameDate(entry.date);
    if (entry.neighborhood && (!prev.lastDate || (d && d >= prev.lastDate))) {
      prev.neighborhood = entry.neighborhood;
      prev.lastDate = d;
    }
    scores.set(entry.user_id, prev);
  });

  // Resolve display names from the profiles table.
  const userIds = Array.from(scores.keys());
  const nameMap = new Map();
  try {
    if (userIds.length > 0) {
      const { data: profs } = await sb
        .from('profiles')
        .select('id, first_name')
        .in('id', userIds);
      (profs || []).forEach(p => {
        if (p.first_name) nameMap.set(p.id, p.first_name.toLocaleUpperCase('tr-TR'));
      });
    }
  } catch (e) { /* name lookup is best-effort */ }

  const top = Array.from(scores.entries())
    .map(([uid, v]) => ({
      uid,
      score: v.score,
      neighborhood: v.neighborhood,
      name: nameMap.get(uid) || 'Anonim'
    }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'tr'))
    .slice(0, 5);

  const html = top.map((p, i) => {
    const rankClass = ' r' + (i + 1);
    // Filtered view ("best people of this neighborhood") drops the neighborhood
    // prefix (redundant) but keeps the score so ranks are legible.
    if (neighborhoodFilter) {
      return (
        `<li class="scoreboard-item${rankClass} author-link" data-user-id="${p.uid}">` +
          `<span class="scoreboard-rank">${i + 1}.</span>` +
          `<span class="scoreboard-player">` +
            `<span class="scoreboard-name">${escapeHtml(p.name)}</span>` +
          `</span>` +
          `<span class="scoreboard-score">${p.score}</span>` +
        `</li>`
      );
    }
    const nbName = (neighborhoodNames[p.neighborhood] || p.neighborhood || '').toLocaleUpperCase('tr-TR');
    const suffix = getAblativeSuffix(nbName).toLocaleUpperCase('tr-TR');
    const playerLabel = nbName ? `${nbName}${suffix} ${escapeHtml(p.name)}` : escapeHtml(p.name);
    return (
      `<li class="scoreboard-item${rankClass} author-link" data-user-id="${p.uid}">` +
        `<span class="scoreboard-rank">${i + 1}.</span>` +
        `<span class="scoreboard-player">` +
          `<span class="scoreboard-name">${playerLabel}</span>` +
        `</span>` +
        `<span class="scoreboard-score">${p.score}</span>` +
      `</li>`
    );
  }).join('');
  setList(html);

  if (!neighborhoodFilter && countdownEl) setWeekProgress(countdownEl);
}

// ── Map Interaction — clicking a neighborhood filters the discussion feed ──
const mapNeighborhoods = document.querySelectorAll('.neighborhood');

// Resolve what the map label should show when nothing is being hovered:
// the active neighborhood's name, or 'İstanbul' if none is active.
function baseMapLabel() {
  if (!activeMapNeighborhood) return 'İstanbul';
  const active = document.getElementById(activeMapNeighborhood);
  return (active && active.getAttribute('data-name')) || activeMapNeighborhood;
}

mapNeighborhoods.forEach(nb => {
  nb.addEventListener('click', (e) => {
    e.stopPropagation();
    // data-neighborhood covers multi-polygon districts (e.g. Şişli's
    // exclave piece) whose element id must stay unique but which still
    // count as the same neighborhood for comment/scoreboard purposes.
    const nbId = nb.dataset.neighborhood || nb.id;
    mapNeighborhoods.forEach(n => n.classList.toggle('active', (n.dataset.neighborhood || n.id) === nbId));

// Snap back to Tüm İstanbul only when clicking empty space inside the map

    }
    document.getElementById('map-label').textContent = 'İstanbul';
