<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kahvehane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
  <link rel="stylesheet" href="profile-card.css">
  <script src="profile-card.js" defer></script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in (mobile: horizontal, desktop: vertical — CSS picks the axis). Also seeds the VT direction class so the cross-document transition knows which way to slide before it captures the snapshot. -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      /* Core ink & paper — warm cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;        /* main canvas */
      --paper-warm: #eddbd0;
      --paper-card: #ddc4b5;   /* cards/blocks */
      --paper-banner: #c9ae9a; /* section headers/banners */
      --paper-navbar: #b89b7f; /* top nav (darkest) */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 1 / -1;
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 28px;
      padding: 14px 28px 10px 28px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
    }
    .section-rule > .masthead { justify-self: start; }
    .section-rule > header { justify-self: center; }
    .section-rule > .datetime-block { justify-self: end; }
    .masthead {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 1.45rem;
      letter-spacing: 0.5px;
      color: var(--ink);
      line-height: 1;
    }
    .masthead .tld { color: var(--muted); font-style: italic; }
    .datetime-block {
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
    }
    .datetime-block .sep { color: var(--muted); opacity: 0.6; }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 2;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper);
    }
    .col-left .nb-highlight {
      padding: 12px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-banner);
      color: var(--ink-red);
      text-align: left;
      flex-shrink: 0;
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 2;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAP PANEL ── */
    .map-panel {
      display: flex;
      flex-direction: column;
      padding: 12px;
      overflow: hidden;
      background: var(--paper);
      flex: 1;
      min-height: 0;
    }

    .map-panel svg {
      width: 100%;
      height: auto;
      display: block;
      flex: 1;
      pointer-events: painted;
      min-height: 0;
    }

    .neighborhood {
      cursor: pointer;
      fill: #e1cfc6;
      stroke: #867A71;
      stroke-width: 1.4;
      opacity: 1;
      transition: fill 0.2s;
      pointer-events: all;
    }

    /* Hover */
    .neighborhood:hover { fill: #c9b09e; }
    /* Clicked/active */
    .neighborhood.active {
      fill: #a8876a;
      stroke: #615145;
      stroke-width: 1.4;
    }
    /* Home neighborhood */
    .neighborhood.home {
      fill: #866955;
      stroke: #4C3B31;
      stroke-width: 1.6;
    }
    .neighborhood.home:hover { fill: #775E4C; }
    .neighborhood.home.active { fill: #775E4C; stroke: #4C3B31; }

    .map-label {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink);
      padding: 5px 8px;
      background: var(--paper-dark);
      border: 1px solid var(--ink);
      margin-top: 8px;
      flex-shrink: 0;
    }

    .discussion-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    /* Sticky label showing which neighborhood is active */
    .discussion-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--paper-dark);
      border-bottom: var(--col-border);
      color: var(--ink);
      flex-shrink: 0;
    }

    .games-section {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .games-section-inner {
      padding: 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .games-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
      text-align: center;
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    /* ── Weekly scoreboard (top 5 winners of the last 7 days) ── */
    .scoreboard {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .scoreboard h2 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .scoreboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scoreboard-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--paper);
      border: 1px solid var(--rule);
      font-size: 0.75rem;
    }
    .scoreboard-item.top {
      background: var(--paper-dark);
      border-color: var(--ink);
    }
    .scoreboard-rank {
      font-weight: 700;
      color: var(--ink);
      min-width: 18px;
      font-size: 0.8rem;
    }
    .scoreboard-player {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scoreboard-name {
      font-weight: 400;
      color: var(--ink);
      text-transform: uppercase;
    }
    .scoreboard-nb {
      color: var(--muted);
      font-size: 0.7rem;
    }
    .scoreboard-score {
      font-weight: 700;
      color: var(--ink);
      font-size: 0.85rem;
      min-width: 22px;
      text-align: right;
    }
    .scoreboard-empty {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 10px 4px;
      list-style: none;
    }

    .game-link {
      display: block;
      background: var(--paper-warm);
      border: 2px solid var(--ink);
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.2s;
      position: relative;
      flex-shrink: 0;
    }

    .game-link::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }

    .game-link:hover {
      background: var(--paper-dark);
      transform: translateX(-4px);
    }

    .game-link-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .game-link-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Started today (light warm) vs completed today (dim dark brown) */
    .game-link.started {
      background: var(--paper-card);
      color: var(--accent);
    }
    .game-link.started .game-link-subtitle { color: var(--muted); }
    .game-link.completed {
      background: var(--brown-3);
      color: var(--paper);
      border-color: var(--brown-4);
    }
    .game-link.completed::before { border-color: var(--brown-4); }
    .game-link.completed .game-link-subtitle { color: var(--paper-card); }

    .game-link.locked {
      cursor: not-allowed;
      opacity: 0.45;
      color: var(--muted);
      border-color: var(--rule);
    }
    .game-link.locked::before { border-color: var(--rule); }
    .game-link.locked .game-link-subtitle { color: var(--muted); }
    .game-link.locked:hover {
      background: var(--paper-warm);
      transform: none;
    }

    #game-lock-toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--paper);
      padding: 12px 18px;
      border: 2px solid var(--ink);
      font-size: 0.82rem;
      line-height: 1.4;
      text-align: center;
      max-width: 280px;
      width: max-content;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    #game-lock-toast.visible { opacity: 1; }

    /* Home neighborhood badge shown in the post form */
    .home-nb-badge {
      display: inline-block;
      padding: 4px 10px;
      background: var(--accent);
      color: var(--paper);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      vertical-align: middle;
    }

    .submit-form {
      border-top: var(--col-border);
      padding: 16px 20px;
      flex-shrink: 0;
      margin-top: auto;
    }

    .submit-form-header {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid var(--rule);
      background: var(--paper-warm);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 10px;
    }

    .submit-form button {
      width: 100%;
      padding: 10px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-form button:hover { background: var(--accent); }

    .submit-status {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }
    .submit-status.ok { color: var(--success); }
    .submit-status.err { color: var(--accent); }

    /* Fixed toast — always visible above everything so submit outcome is seen */
    .global-toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100% - 24px);
      padding: 10px 14px;
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 9999;
      display: none;
      text-align: center;
    }
    .global-toast.ok { background: #4C4C4C; }
    .global-toast.err { background: #000000; }

    .discussion-posts {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .post {
      background: var(--paper-warm);
      border: 1px solid var(--hairline);
      padding: 14px;
      margin-bottom: 12px;
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .post-neighborhood {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .post-content {
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      font-style: italic;
      color: var(--muted);
    }

    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding: 8px 0 16px;
    }
    .load-more-btn {
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: 8px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
    }
    .load-more-btn:hover { background: var(--hover, #e0e0e0); }
    .load-more-btn:disabled { opacity: 0.6; cursor: default; }

    .post-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 4px;
      margin-left: 6px;
      font-family: 'Inter', sans-serif;
    }
    .post-delete:hover { color: var(--accent); }

    .submit-form .submit-form-note {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
      padding: 12px;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto 1fr;
        overflow: hidden;
        padding-bottom: calc(56px + env(safe-area-inset-bottom)); /* reserve space for fixed bottom tab bar */
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      #ist-pc-mount {
        grid-column: 1 / -1;
        grid-row: 1;
        overflow-y: auto;
        max-height: 50vh;
      }

      /* Compact top brand bar */
      .section-rule {
        grid-column: 1 / -1;
        grid-row: 2;
        padding: 10px 14px 8px 14px;
        border-bottom: 1px solid var(--rule);
        background: var(--paper);
      }
      .masthead { font-size: 1.05rem; }
      .datetime-block { gap: 8px; font-size: 9px; letter-spacing: 1.5px; }
      .datetime-block .day-line, .datetime-block .sep:nth-of-type(2) { display: none; }

      /* Map: fills horizontally, height determined by aspect ratio */
      main {
        grid-column: 1 / -1;
        grid-row: 3;
        overflow: hidden;
        display: block;
      }
      .map-panel {
        padding: 0;
        display: block;
        overflow: hidden;
      }
      .map-panel svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .map-label {
        margin: 4px 0 6px 0;
        padding: 4px 14px;
        font-size: 11px;
        letter-spacing: 1px;
        text-align: center;
      }

      /* Left column below map: simple block scroll so submit-form is always
         reachable even when the map pushes content toward the tab bar. */
      .col-left {
        grid-column: 1;
        grid-row: 4;
        min-height: 0;
        overflow: hidden;
        border-right: 1px solid var(--rule);
        border-top: 1px solid var(--rule);
        display: flex;
        flex-direction: column;
      }
      .col-left .nb-highlight {
        padding: 6px 12px;
        font-size: 10px;
        letter-spacing: 1.2px;
      }
      .discussion-section {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }
      .discussion-label {
        padding: 5px 12px;
        font-size: 9px;
        letter-spacing: 1.2px;
        position: sticky;
        top: 0;
        background: var(--paper);
        z-index: 2;
      }
      .discussion-posts {
        padding: 6px 10px;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .post {
        padding: 5px 8px;
        margin-bottom: 5px;
      }
      .post-meta {
        font-size: 9px;
        margin-bottom: 2px;
      }
      .post-content {
        font-size: 11px;
        line-height: 1.35;
      }
      .submit-form {
        padding: 8px 10px 12px;
        border-top: 1px solid var(--rule);
        background: var(--paper);
      }
      .submit-form-header {
        font-size: 10px;
        margin-bottom: 4px;
      }
      .submit-form textarea {
        min-height: 30px;
        padding: 5px 7px;
        font-size: 11px;
        margin-bottom: 5px;
        border-radius: 4px;
      }
      .submit-form button {
        padding: 6px;
        font-size: 11px;
        border-radius: 4px;
      }

      /* Right column below map: square game buttons stacked vertically */
      .col-right {
        grid-column: 2;
        grid-row: 4;
        min-height: 0;
        overflow: hidden;
        border-left: none;
        border-top: 1px solid var(--rule);
        display: flex;
        flex-direction: column;
        width: auto;
      }
      .games-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
        overflow: hidden;
      }
      .games-section-inner {
        padding: 8px;
        gap: 6px;
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .games-section h2 { display: none; }
      /* Hide the weekly scoreboard on mobile — keeps the game-button row compact */
      .scoreboard { display: none; }
      .game-link {
        padding: 0;
        border-radius: 6px;
        width: clamp(96px, 22vw, 128px);
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
      }
      .game-link::before { inset: 3px; }
      .game-link-title {
        font-size: 12px;
        margin-bottom: 3px;
        font-weight: 700;
      }
      .game-link-subtitle {
        font-size: 9px;
        padding: 0 4px;
        line-height: 1.2;
        overflow-wrap: break-word;
        word-break: break-word;
        max-width: 100%;
      }

      /* Bottom tab bar — fixed at bottom */
      .section-rule > .masthead,
      .section-rule > header,
      .section-rule > .datetime-block { justify-self: auto; }
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        padding: 0 0 env(safe-area-inset-bottom);
        margin: 0;
        border-top: 1px solid var(--rule);
        border-bottom: none;
        background: var(--paper-navbar);
        z-index: 100;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        padding: 0;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: var(--ink); }

      /* ── Mobile swipe pagination: full page (map + datetime + columns) slides; fixed bottom nav stays ── */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: full page (map + datetime + columns) slides vertically; nav stays ── */
    @media (min-width: 769px) {
      .col-left, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateY(100vh);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateY(-100vh);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateY(-100vh);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateY(100vh);
      }
    }

    /* ══════════════════════════════════════════════
       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs.
       Direction comes from a class on <html> seeded by
       the outgoing page via sessionStorage, so the class
       is present before VT captures the new snapshot.
       ══════════════════════════════════════════════ */
    @view-transition { navigation: auto; }

    /* Suppress the default root crossfade — columns handle motion */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    .col-left { view-transition-name: ist-col-left; }
    .col-right { view-transition-name: ist-col-right; }

    @media (min-width: 769px) {
      @keyframes ist-vt-out-up { from { transform: translateY(0); } to { transform: translateY(-100vh); } }
      @keyframes ist-vt-in-up { from { transform: translateY(100vh); } to { transform: translateY(0); } }
      @keyframes ist-vt-out-down { from { transform: translateY(0); } to { transform: translateY(100vh); } }
      @keyframes ist-vt-in-down { from { transform: translateY(-100vh); } to { transform: translateY(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-up;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-up;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-down;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-down;
      }
    }

    @media (max-width: 768px) {
      @keyframes ist-vt-out-left { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-in-left { from { transform: translateX(100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-left;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-left;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-right;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-right;
      }
    }

    /* ── Profile popup ── */
    .profile-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .profile-popup-overlay.open { display: flex; }
    .profile-popup {
      background: var(--paper);
      border: 1px solid var(--ink);
      width: 360px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 80px);
      overflow: auto;
      padding: 24px;
      position: relative;
      font-family: 'Inter', sans-serif;
    }
    .profile-popup .close-btn {
      position: absolute;
      top: 8px;

      line-height: 1;

    }
    .profile-popup .close-btn:hover { color: var(--ink); }
    .profile-popup .pp-avatar {
      width: 96px;

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Anahane → Kahvehane → Kütüphane → Hane with a full-page slide.
// The entire page (map, datetime bar, both columns) translates as one unit;
// only the nav bar stays fixed. Mobile = horizontal touch swipe, desktop =
// vertical wheel swipe; CSS picks the axis per media query. Tab-bar clicks
// trigger the same animation.
// ══════════════════════════════════════════
(function initSwipePagination() {
  const PAGES = ['kutuphane.html', 'anahane.html', 'kahvehane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function recordDir(dir) {
    // Seed the direction for the incoming page. The pre-body script
    // reads this and sets vt-<dir> on <html> before VT captures the
    // new snapshot, so the CSS slide keyframes can match.
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
      });
    });
  }

  // Entry handler — runs on every page load. Cleans up direction state
  // and, for non-VT browsers, releases the manual offscreen transform.
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: '#ffffff',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        const ax = mobile ? 'translateX' : 'translateY';
        const pct = (dir === 'forward' ? i : -i) * 100;
        node.style.transform = ax + '(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const axis = mobile ? 'X' : 'Y';
    const endPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const keyframes = [
      { transform: 'translate' + axis + '(0%)' },
      { transform: 'translate' + axis + '(' + endPct + '%)' },
    ];
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    const a1 = leftStack.stack.animate(keyframes, opts);
    const a2 = rightStack.stack.animate(keyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  // ── Desktop: vertical wheel-based swipe anywhere on the page ──
  // Respects native scrolling: only triggers navigation when there's no
  // more content to scroll in that direction. Wheel delta is accumulated
  // so a single flick doesn't accidentally navigate.
  let wheelAccum = 0, wheelTs = 0;
  const WHEEL_THRESHOLD = 180;
  const WHEEL_RESET_MS = 220;
  function canScrollInDir(target, dy) {
    let el = target;
    while (el && el !== document.body && el !== document.documentElement) {
      if (el.scrollHeight > el.clientHeight + 1) {
        const atTop = el.scrollTop < 0.5;
        const atBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 0.5;
        if (dy > 0 && !atBottom) return true;
        if (dy < 0 && !atTop) return true;
      }
      el = el.parentElement;
    }
    return false;
  }
  document.addEventListener('wheel', (e) => {
    if (isMobile()) return;
    if (navigating) { e.preventDefault(); return; }
    if (e.target.closest && e.target.closest('nav')) { wheelAccum = 0; return; }
    const dy = e.deltaY;
    if (Math.abs(dy) < 1) return;
    if (canScrollInDir(e.target, dy)) {
      wheelAccum = 0;
      return; // let a nested scroll container scroll normally
    }
    // At a scroll boundary — suppress overscroll and accumulate toward navigation.
    e.preventDefault();
    const now = Date.now();
    if (now - wheelTs > WHEEL_RESET_MS) wheelAccum = 0;
    wheelTs = now;
    wheelAccum += dy;
    if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
      const curr = currentIdx();
      const accum = wheelAccum;
      wheelAccum = 0;
      if (accum > 0) navigate(curr + 1, 'forward');
      else           navigate(curr - 1, 'backward');
    }
  }, { passive: false });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

// Turkish ablative suffix: -den/-dan/-ten/-tan with vowel harmony
function getAblativeSuffix(name) {
  if (!name) return "'den";
  const lastChar = name.charAt(name.length - 1).toLowerCase();
  const voiceless = 'pçtkfhsş';
  const backVowels = 'aıou';
  // Find last vowel for harmony
  let lastVowel = '';
  for (let i = name.length - 1; i >= 0; i--) {
    const c = name.charAt(i).toLowerCase();
    if ('aeıioöuü'.includes(c)) { lastVowel = c; break; }
  }
  const isBack = backVowels.includes(lastVowel);
  const isVoiceless = voiceless.includes(lastChar);
  if (isVoiceless && isBack) return "'tan";
  if (isVoiceless) return "'ten";
  if (isBack) return "'dan";
  return "'den";
}

// Today's date in Europe/Istanbul, matching the dailySeed format used by each game
function getTodaySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

// Color games by status: started today (light gray) vs completed today (dark
// gray). A game_results row with attempts >= 1 means the game ended; attempts=0
// is the in-progress marker written by each game's markAsPlayed(). LocalStorage
// flags also mark a game as started in case the Supabase write fails.
async function markPlayedGames(userId) {
  const today = getTodaySeed();
  const started = new Set();
  const completed = new Set();

  const localFlags = {
    bulmaca: 'bulmaca_started_' + today,
    sozcel: 'sozcel_started_' + today,
    tumcel: 'tumcel_started_' + today
  };
  for (const [game, key] of Object.entries(localFlags)) {
    if (localStorage.getItem(key)) started.add(game);
  }

  try {
    const { data, error } = await sb
      .from('game_results')
      .select('game, attempts')
      .eq('user_id', userId)
      .eq('date', today);
    if (!error && data) {
      data.forEach(r => {
        if ((r.attempts || 0) >= 1) completed.add(r.game);
        else started.add(r.game);
      });
    }
  } catch (e) { /* table may not exist yet — ignore */ }

  document.querySelectorAll('.game-link[data-game]').forEach(el => {
    const g = el.dataset.game;
    if (completed.has(g)) el.classList.add('completed');
    else if (started.has(g)) el.classList.add('started');
  });
}

// ── Weekly scoreboard ──
// Aggregates `won=true` rows in game_results over the last 7 days (Istanbul
// time). Each win counts as 1 point. User first names are pulled from the
// discussions table (the only place user_id -> first_name is queryable —
// there is no profiles table). Users who have never posted show as "Anonim".
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

// game_results.date is stored as un-padded "YYYY-M-D" which is not
// lexicographically sortable, so we parse it into a Date for filtering.
function parseGameDate(s) {
  if (!s || typeof s !== 'string') return null;
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

async function loadScoreboard() {
  const listEl = document.getElementById('scoreboard-list');
  if (!listEl) return;

  let results = null;
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('user_id, neighborhood, date, won')
      .eq('won', true);
    if (error) throw error;
    results = data;
  } catch (e) {
    listEl.innerHTML = '<li class="scoreboard-empty">Skorlar yüklenemedi</li>';
    return;
  }

  if (!results || results.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }

  // Window: last 7 days (today + previous 6), Istanbul time, inclusive.
  const nowIst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const cutoff = new Date(nowIst.getFullYear(), nowIst.getMonth(), nowIst.getDate() - 6);

  const weekly = results.filter(r => {
    const d = parseGameDate(r.date);
    return d && d >= cutoff;
  });

  if (weekly.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }

  // Group by user: 1 point per win, remember the neighborhood from their
  // most recent win (later dates overwrite, so admins who later change
  // neighborhood still show correctly).
  const scores = new Map();
  weekly.forEach(r => {
    if (!r.user_id) return;
    const prev = scores.get(r.user_id) || { score: 0, neighborhood: null, lastDate: null };
    prev.score += 1;
    const d = parseGameDate(r.date);
    if (r.neighborhood && (!prev.lastDate || (d && d >= prev.lastDate))) {
      prev.neighborhood = r.neighborhood;
      prev.lastDate = d;
    }
    scores.set(r.user_id, prev);
  });

  // Resolve display names from the profiles table.
  const userIds = Array.from(scores.keys());
  const nameMap = new Map();
  try {
    if (userIds.length > 0) {
      const { data: profs } = await sb
        .from('profiles')
        .select('id, first_name')
        .in('id', userIds);
      (profs || []).forEach(p => {
        if (p.first_name) nameMap.set(p.id, p.first_name.toLocaleUpperCase('tr-TR'));
      });
    }
  } catch (e) { /* name lookup is best-effort */ }

  const top = Array.from(scores.entries())
    .map(([uid, v]) => ({
      uid,
      score: v.score,
      neighborhood: v.neighborhood,
      name: nameMap.get(uid) || 'Anonim'
    }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'tr'))
    .slice(0, 5);

  listEl.innerHTML = top.map((p, i) => {
    const nbName = neighborhoodNames[p.neighborhood] || p.neighborhood || '';
    const topClass = i === 0 ? ' top' : '';
    const suffix = getAblativeSuffix(nbName);
    const playerLabel = nbName ? `${nbName}${suffix} ${escapeHtml(p.name)}` : escapeHtml(p.name);
    return (
      `<li class="scoreboard-item${topClass}">` +
        `<span class="scoreboard-rank">${i + 1}.</span>` +
        `<span class="scoreboard-player">` +
          `<span class="scoreboard-name author-link" data-user-id="${p.uid}">${playerLabel}</span>` +
        `</span>` +
        `<span class="scoreboard-score">${p.score}</span>` +
      `</li>`
    );
  }).join('');
}

// ── Game lock checks ──
// Tümcel requires 15 all-time Sözcel wins. Bulmaca requires at least 1 Tümcel win.
// Locks are applied by adding the `.locked` class to the game-link element; clicks
// on locked games are intercepted and a toast warning is shown instead.

let _lockToastTimer = null;
function showLockToast(msg) {
  const el = document.getElementById('game-lock-toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(_lockToastTimer);
  _lockToastTimer = setTimeout(() => el.classList.remove('visible'), 3500);
}

async function checkGameLocks(userId) {
  let sozcelWins = 0;
  let tumcelWon = false;
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('game, won')
      .eq('user_id', userId)
      .in('game', ['sozcel', 'tumcel'])
      .eq('won', true);
    if (!error && data) {
      sozcelWins = data.filter(r => r.game === 'sozcel').length;
      tumcelWon = data.some(r => r.game === 'tumcel');
    }
  } catch (_) {}

  const tumcelLink = document.querySelector('.game-link[data-game="tumcel"]');
  const bulmacaLink = document.querySelector('.game-link[data-game="bulmaca"]');

  if (tumcelLink && sozcelWins < 15) {
    tumcelLink.classList.add('locked');
    tumcelLink.dataset.lockMsg = `Tümcel'i oynayabilmek için Sözcel'de en az 15 sözcük bulmuş olman gerekiyor. (Şu an: ${sozcelWins}/15)`;
  }
  if (bulmacaLink && !tumcelWon) {
    bulmacaLink.classList.add('locked');
    bulmacaLink.dataset.lockMsg = 'Bulmaca\'yı oynayabilmek için önce Tümcel\'i kazanman gerekiyor.';
  }
}

    }
  });
});

mapNeighborhoods.forEach(nb => {

    e.stopPropagation();
    mapNeighborhoods.forEach(n => n.classList.remove('active'));
    nb.classList.add('active');
    const name = nb.getAttribute('data-name') || nb.id;
    document.getElementById('map-label').textContent = name;
    document.getElementById('discussion-label').textContent = name;
    activeMapNeighborhood = nb.id;
    selectedNeighborhood = (isAdmin || nb.id === homeNeighborhood) ? nb.id : homeNeighborhood;
    updateSubmitFormVisibility();
    loadPosts(nb.id);
  });
  nb.addEventListener('mouseenter', () => {
    const name = nb.getAttribute('data-name') || nb.id;
    document.getElementById('map-label').textContent = name;
  });
  nb.addEventListener('mouseleave', () => {
    document.getElementById('map-label').textContent = baseMapLabel();
  });
});

// Snap back to Tüm İstanbul only when clicking empty space inside the map
// panel itself — clicking the composer, posts, or other UI must not reset.
document.querySelector('.map-panel').addEventListener('click', (e) => {
  if (!e.target.closest('.neighborhood') && !e.target.closest('.map-label')) {
    mapNeighborhoods.forEach(n => n.classList.remove('active'));
    // Restore home highlight after clearing active state
    if (homeNeighborhood) {
      const homeEl = document.getElementById(homeNeighborhood);
      if (homeEl) homeEl.classList.add('home');
    }
    document.getElementById('map-label').textContent = 'İstanbul';
    document.getElementById('discussion-label').textContent = 'Tüm İstanbul';
    activeMapNeighborhood = null;
    selectedNeighborhood = homeNeighborhood;
    updateSubmitFormVisibility();
    loadPosts();
  }
});

// ── Paginated comment feed ──
// Reads `neighborhood_comments` 20 at a time, with a "Load more" button.
// Resets when the filter changes (map click / clear).
const PAGE_SIZE = 20;
let feedState = { filter: null, offset: 0, done: false, currentUserId: null };

async function loadPosts(neighborhoodFilter = null) {
  feedState = { filter: neighborhoodFilter, offset: 0, done: false, currentUserId: feedState.currentUserId };
  const postsEl = document.getElementById('discussion-posts');
  postsEl.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';

  const { data: { session } } = await sb.auth.getSession();
  feedState.currentUserId = session?.user?.id || null;

  const rows = await fetchPostsPage(neighborhoodFilter, 0);
  if (!rows) {
    postsEl.innerHTML = '<div class="empty-state">Mesajlar yüklenemedi.</div>';
    return;
  }
  if (rows.length === 0) {
    postsEl.innerHTML = '<div class="empty-state">Henüz mesaj yok. İlk yazan siz olun!</div>';
    return;
  }
  postsEl.innerHTML = '';
  appendPosts(rows);
  feedState.offset = rows.length;
  feedState.done = rows.length < PAGE_SIZE;
  renderLoadMore();
}

// Posts older than this disappear from the feed.
const POST_TTL_MS = (23 * 60 + 59) * 60 * 1000;

function formatRelativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 0) return 'az önce';
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return 'az önce';
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}dk önce`;
  const hr = Math.floor(min / 60);
  const remMin = min - hr * 60;
  if (remMin === 0) return `${hr}sa önce`;
  return `${hr}sa ${remMin}dk önce`;
}

async function fetchPostsPage(neighborhoodFilter, offset) {
  const cutoff = new Date(Date.now() - POST_TTL_MS).toISOString();
  let query = sb
    .from('neighborhood_comments')
    .select('id, author_id, neighborhood, body, created_at')
    .gte('created_at', cutoff)
    .order('created_at', { ascending: false })
    .range(offset, offset + PAGE_SIZE - 1);
  if (neighborhoodFilter) query = query.eq('neighborhood', neighborhoodFilter);
  const { data, error } = await query;
  if (error) {
    console.error('[kahvehane loadPosts]', error);
    return null;
  }
  if (!data || data.length === 0) return [];
  // Resolve first names in one batched query
  const ids = Array.from(new Set(data.map(p => p.author_id).filter(Boolean)));
  const nameMap = new Map();
  if (ids.length > 0) {
    const { data: profs } = await sb
      .from('profiles')
      .select('id, first_name')
      .in('id', ids);
    (profs || []).forEach(p => nameMap.set(p.id, capitalizeName(p.first_name || '')));
  }
  return data.map(p => ({ ...p, _authorFirstName: nameMap.get(p.author_id) || '' }));
}

function appendPosts(rows) {
  const postsEl = document.getElementById('discussion-posts');
  const html = rows.map(post => {
    const nbName = neighborhoodNames[post.neighborhood] || post.neighborhood;
    const suffix = getAblativeSuffix(nbName);
    const authorDisplay = post._authorFirstName
      ? `${nbName}${suffix} ${post._authorFirstName}`
      : nbName;
    const authorLink = post.author_id
      ? `<span class="author-link" data-user-id="${post.author_id}" title="Profili görüntüle">${authorDisplay}</span>`
      : authorDisplay;
    const isMine = post.author_id && post.author_id === feedState.currentUserId;
    const canDelete = isMine || isAdmin;
    const deleteBtn = canDelete
      ? `<button class="post-delete" data-delete-id="${post.id}" title="Mesajı sil">Sil</button>`
      : '';
    return `
      <div class="post" data-post-id="${post.id}" data-created-at="${post.created_at}">
        <div class="post-meta">
          <span class="post-neighborhood">${authorLink}</span>
          <span><span class="post-time">${formatRelativeTime(post.created_at)}</span> ${deleteBtn}</span>
        </div>
        <div class="post-content">${escapeHtml(post.body)}</div>
      </div>
    `;
  }).join('');
  // Insert before any existing load-more wrapper so it stays at the bottom
  const lm = postsEl.querySelector('.load-more-wrap');
  if (lm) lm.insertAdjacentHTML('beforebegin', html);
  else postsEl.insertAdjacentHTML('beforeend', html);
}

function renderLoadMore() {
  const postsEl = document.getElementById('discussion-posts');
  const existing = postsEl.querySelector('.load-more-wrap');
  if (feedState.done) {
    if (existing) existing.remove();
    return;
  }
  if (existing) return;
  const wrap = document.createElement('div');
  wrap.className = 'load-more-wrap';
  wrap.innerHTML = `<button class="load-more-btn" id="load-more-btn" type="button">Daha fazla</button>`;
  postsEl.appendChild(wrap);
}

async function handleLoadMore() {
  const btn = document.getElementById('load-more-btn');
  if (!btn || feedState.done) return;
  btn.disabled = true;
  btn.textContent = 'Yükleniyor…';
  const rows = await fetchPostsPage(feedState.filter, feedState.offset);
  if (rows === null) {
    btn.disabled = false;
    btn.textContent = 'Tekrar dene';
    return;
  }
  appendPosts(rows);
  feedState.offset += rows.length;
  feedState.done = rows.length < PAGE_SIZE;
  if (feedState.done) {
    const wrap = btn.closest('.load-more-wrap');
    if (wrap) wrap.remove();
  } else {
    btn.disabled = false;
    btn.textContent = 'Daha fazla';
  }
}

document.getElementById('discussion-posts').addEventListener('click', async (e) => {
  const loadMoreBtn = e.target.closest('#load-more-btn');
  if (loadMoreBtn) { handleLoadMore(); return; }
  const delBtn = e.target.closest('.post-delete');
  if (delBtn) {
    const id = delBtn.getAttribute('data-delete-id');
    if (!id) return;
    if (!confirm('Mesaj silinsin mi?')) return;
    delBtn.disabled = true;
    const { error } = await sb.from('neighborhood_comments').delete().eq('id', id);
    if (error) {
      delBtn.disabled = false;
      alert('Silinemedi: ' + error.message);
      return;
    }
    const postEl = delBtn.closest('.post');
    if (postEl) postEl.remove();
  }
});

// Refresh relative-time labels every 30s and drop expired posts.
setInterval(() => {
  const postsEl = document.getElementById('discussion-posts');
  if (!postsEl) return;
  const now = Date.now();
  postsEl.querySelectorAll('.post[data-created-at]').forEach(el => {
    const created = new Date(el.getAttribute('data-created-at')).getTime();
    if (now - created >= POST_TTL_MS) {
      el.remove();
      return;
    }
    const timeEl = el.querySelector('.post-time');
    if (timeEl) timeEl.textContent = formatRelativeTime(el.getAttribute('data-created-at'));
  });
  if (!postsEl.querySelector('.post')) {
    const lm = postsEl.querySelector('.load-more-wrap');
    if (lm) lm.remove();
    if (!postsEl.innerHTML.trim()) {
      postsEl.innerHTML = '<div class="empty-state">Henüz mesaj yok. İlk yazan siz olun!</div>';
    }
  }
}, 30000);

document.getElementById('submit-btn').addEventListener('click', async () => {
  const content = document.getElementById('post-content').value.trim();
  const statusEl = document.getElementById('submit-status');
  
  const postNeighborhood = selectedNeighborhood || homeNeighborhood;
  if (!postNeighborhood) {
    statusEl.textContent = 'Lütfen bir semt seçin';
    statusEl.className = 'submit-status err';
    return;
  }
  
  if (!content) {
    statusEl.textContent = 'Lütfen bir mesaj yazın';
    statusEl.className = 'submit-status err';
    return;
  }
  
  // Explicitly refresh the session first — stale tokens sometimes produce
  // "TypeError: Load failed" on Safari instead of a clean 401, and re-reading
  // the session from storage guarantees we send a fresh access_token.
  let session = null;
  try {
    const refreshed = await sb.auth.refreshSession();
    session = refreshed.data?.session || null;
  } catch (_) {}
  if (!session) {
    const got = await sb.auth.getSession();
    session = got.data?.session || null;
  }
  if (!session) {
    statusEl.textContent = 'Mesaj göndermek için giriş yapın';
    statusEl.className = 'submit-status err';
    showToast('Oturum bulunamadı — lütfen tekrar giriş yapın', 'err');
    return;
  }

  // Residency guard mirrors the RLS policy: only post to your own neighborhood
  // (admin override). The DB will reject any attempt to bypass this.
  if (!isAdmin && postNeighborhood !== homeNeighborhood) {
    statusEl.textContent = 'Sadece kendi semtinize yazabilirsiniz.';
    statusEl.className = 'submit-status err';
    return;
  }

  document.getElementById('submit-btn').disabled = true;

  const insertData = {
    neighborhood: String(postNeighborhood),
    body: String(content),
    author_id: String(session.user.id)
  };

  // Use XMLHttpRequest instead of fetch: Safari's fetch implementation
  // surfaces a generic "TypeError: Load failed" with no diagnostic info on
  // POSTs from inside SPA-shell iframes (keepalive/connection-coalescing
  // bug). XHR uses a separate transport path that works reliably in the
  // same context. Retry up to 3 times for transient network blips.
  function attemptInsert() {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${SUPABASE_URL}/rest/v1/neighborhood_comments`, true);
      xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
      xhr.setRequestHeader('Authorization', `Bearer ${session.access_token}`);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Prefer', 'return=minimal');
      xhr.timeout = 15000;
      xhr.onload = () => resolve({
        ok: xhr.status >= 200 && xhr.status < 300,
        status: xhr.status,
        statusText: xhr.statusText,
        body: xhr.responseText || ''
      });
      xhr.onerror = () => {
        const e = new Error('XHR network error');
        e.name = 'NetworkError';
        reject(e);
      };
      xhr.ontimeout = () => {
        const e = new Error('XHR timed out after 15s');
        e.name = 'TimeoutError';
        reject(e);
      };
      xhr.onabort = () => {
        const e = new Error('XHR aborted');
        e.name = 'AbortError';
        reject(e);
      };
      xhr.send(JSON.stringify(insertData));
    });
  }

  let lastErr = null;
  let response = null;
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      response = await attemptInsert();
      lastErr = null;
      break;
    } catch (err) {
      lastErr = err;
      console.warn(`[kahvehane insert attempt ${attempt}/3 failed]`, err);
      if (attempt < 3) {
        await new Promise(r => setTimeout(r, 400 * attempt));
      }
    }
  }

  document.getElementById('submit-btn').disabled = false;

  if (!response) {
    // All attempts threw — transport-layer failure (offline, content blocker,
    // captive portal, etc.). Surface session + embed-mode info so we can tell
    // if this is iframe-specific from the reported message.
    const sessionSnippet = session?.user?.id ? session.user.id.slice(0, 8) : 'no-user';
    const expiresAt = session?.expires_at ? new Date(session.expires_at * 1000).toISOString().slice(11, 19) : 'n/a';
    const embedMode = new URLSearchParams(location.search).get('embed') || 'none';
    const msg = `Hata: ${lastErr?.name || 'Error'} — ${lastErr?.message || String(lastErr)} [uid:${sessionSnippet} exp:${expiresAt} embed:${embedMode}]`;
    statusEl.textContent = msg;
    statusEl.className = 'submit-status err';
    showToast(msg, 'err');
    console.error('[kahvehane submit failed — all attempts]', { lastErr, insertData, session });
    return;
  }

  if (!response.ok) {
    const detail = (response.body || '').slice(0, 300);
    const msg = `Hata: HTTP ${response.status} ${response.statusText} ${detail}`.trim();
    statusEl.textContent = msg;
    statusEl.className = 'submit-status err';
    showToast(msg, 'err');
    return;
  }

  const okMsg = 'Mesajınız yayınlandı!';
  statusEl.textContent = okMsg;
  statusEl.className = 'submit-status ok';
  document.getElementById('post-content').value = '';
  showToast(okMsg, 'ok');
  loadPosts(activeMapNeighborhood || null);
  setTimeout(() => { statusEl.textContent = ''; }, 3000);
});

// Fixed-position toast so users always see the submit outcome, even when the
// status element inside the form is scrolled out of view on mobile.
function showToast(text, kind) {
  let toast = document.getElementById('global-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = text;
  toast.className = 'global-toast ' + (kind || '');
  toast.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toast.style.display = 'none'; }, 5000);
}

// ── Profile popup: opens when an author name is clicked ──
(function initProfilePopup() {
  const overlay = document.createElement('div');
  overlay.className = 'profile-popup-overlay';
  overlay.innerHTML = `
    <div class="profile-popup" role="dialog" aria-modal="true">
      <button class="close-btn" type="button" aria-label="Kapat">×</button>
      <div class="pp-body"><div class="pp-loading">Yükleniyor…</div></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const popup = overlay.querySelector('.profile-popup');
  const body = overlay.querySelector('.pp-body');

  function close() { overlay.classList.remove('open'); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.close-btn').addEventListener('click', close);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) close();
  });

  function fmtDate(s) {
    if (!s) return '—';
    try {
      return I18N.formatDate(s, { year:'numeric', month:'long', day:'numeric' });
    } catch { return '—'; }
  }

  function nbLabel(id) {
    if (!id) return '—';
    if (id === 'istanbul_disi') return 'İstanbul Dışı';
    return neighborhoodNames[id] || id;
  }

  async function open(userId) {
    overlay.classList.add('open');
    body.innerHTML = '<div class="pp-loading">Yükleniyor…</div>';
    const { data, error } = await sb
      .from('profiles')
      .select('id, first_name, last_name, neighborhood, birth_place, avatar_url, joined_at, referred_by')
      .eq('id', userId)
      .maybeSingle();
    if (error || !data) {
      body.innerHTML = '<div class="pp-error">Profil yüklenemedi.</div>';
      return;
    }

    let kefilName = null, kefilId = null;
    if (data.referred_by) {
      const { data: kp } = await sb
        .from('profiles')
        .select('id, first_name, last_name')
        .eq('id', data.referred_by)
        .maybeSingle();
      if (kp) {
        kefilName = capitalizeName(`${kp.first_name || ''} ${kp.last_name || ''}`.trim()) || 'İsimsiz Üye';
        kefilId = kp.id;
      }
    }

    const fullName = capitalizeName(`${data.first_name || ''} ${data.last_name || ''}`.trim()) || 'İsimsiz Üye';
    const initial = (fullName.charAt(0) || '?').toUpperCase();
    const avatar = data.avatar_url
      ? `<img src="${data.avatar_url}" alt="">`
      : initial;
    const birth = nbLabel(data.birth_place);
    body.innerHTML = `
      <div class="pp-avatar">${avatar}</div>
      <div class="pp-name">${fullName.toLocaleUpperCase('tr-TR')}</div>
      <div class="pp-meta">${nbLabel(data.neighborhood)}</div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.birthplace')}</span><span class="pp-value">${birth}</span></div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.membership')}</span><span class="pp-value">${fmtDate(data.joined_at)}</span></div>
      ${kefilName ? `<div class="pp-row"><span class="pp-label">${I18N.t('profile.kefil')}</span><span class="pp-value"><span class="author-link" data-user-id="${kefilId}">${kefilName}</span></span></div>` : ''}
    `;
  }

  document.addEventListener('click', (e) => {
    const link = e.target.closest('.author-link');
    if (!link) return;
    const id = link.getAttribute('data-user-id');
    if (id) open(id);
  });
})();
</script>
