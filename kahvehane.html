<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Prefetch sibling tabs so the View Transitions API can swap instantly -->
  <link rel="prefetch" href="index.html">
  <link rel="prefetch" href="kutuphane.html">
  <link rel="prefetch" href="hane.html">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahvehane — istanbulite.net</title>
  <!-- Shell always iframes this page; any in-page link should escape to
       the top frame so it doesn't orphan a non-embed URL inside an
       iframe slot (back from that would re-enter the embed guard with
       no param and recurse into the shell). -->
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SPA guard: direct loads redirect to the shell. Iframe loads with
       ?embed=left|middle|right flag this document so only that panel is
       visible and the tab's own swipe/click pagination stays dormant
       (the shell drives routing). -->
  <script>
    (function(){
      var embed = new URLSearchParams(location.search).get('embed');
      if (['left','middle','right'].indexOf(embed) < 0) {
        if (window.top !== window.self) {
          try { window.top.location.href = 'index.html#kahvehane'; } catch (_) {}
          return;
        }
        location.replace('index.html#kahvehane'); return;
      }
      var h = document.documentElement;
      h.classList.add('embedded');
      h.classList.add('embed-' + embed);
    })();
  </script>
  <!-- Nav hijack: inside the shell's middle iframe, nav clicks are
       forwarded to the shell via postMessage. All other links (games,
       profile, etc.) escape to the top window so they take over the
       full page instead of loading inside the iframe slot. -->
  <script>
    (function(){
      var doc = document;
      var isMid = doc.documentElement.classList.contains('embed-middle');
      doc.addEventListener('click', function(e){
        var a = e.target.closest && e.target.closest('a[href]');
        if (!a) return;
        var href = a.getAttribute('href') || '';
        if (!href || href.charAt(0) === '#' || href.indexOf('javascript:') === 0) return;
        if (a.closest('nav')) {
          if (!isMid) return;
          var map = {
            'index.html': 'anahane', '#anahane': 'anahane',
            'anahane.html': 'anahane',
            'kahvehane.html': 'kahvehane', '#kahvehane': 'kahvehane',
            'kutuphane.html': 'kutuphane', '#kutuphane': 'kutuphane',
            'hane.html': 'hane', '#hane': 'hane'
          };
          var tab = map[href];
          if (!tab) return;
          e.preventDefault();
          try { window.parent.postMessage({ type: 'ist-nav', tab: tab }, '*'); } catch (_) {}
          return;
        }
        if (window.top !== window.self) {
          e.preventDefault();
          try { window.top.location.href = href; } catch (_) { window.location.href = href; }
        }
      });
    })();
  </script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in (mobile: horizontal, desktop: vertical — CSS picks the axis). Also seeds the VT direction class so the cross-document transition knows which way to slide before it captures the snapshot. -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --success: #555555;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { }
    .datetime-block .time-line { }

    header {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper);
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAP PANEL ── */
    .map-panel {
      display: flex;
      flex-direction: column;
      padding: 12px;
      overflow: hidden;
      background: var(--paper);
      flex: 1;
      min-height: 0;
    }

    .map-panel svg {
      width: 100%;
      height: auto;
      display: block;
      flex: 1;
      pointer-events: painted;
      min-height: 0;
    }

    .neighborhood {
      cursor: pointer;
      fill: transparent;
      stroke: var(--accent);
      stroke-width: 2;
      opacity: 0.6;
      transition: opacity 0.2s, fill 0.2s;
      pointer-events: all;
    }

    /* Hover: lighter gray */
    .neighborhood:hover { opacity: 1; fill: rgba(0,0,0,0.10); }
    /* Clicked/active: dark gray */
    .neighborhood.active {
      opacity: 1;
      fill: rgba(0,0,0,0.25);
      stroke: #333333;
      stroke-width: 2;
    }
    /* Home neighborhood: darkest, always visible */
    .neighborhood.home {
      fill: rgba(0,0,0,0.40);
      stroke: var(--ink);
      stroke-width: 3;
      opacity: 1;
    }
    .neighborhood.home:hover { fill: rgba(0,0,0,0.45); }
    .neighborhood.home.active { fill: rgba(0,0,0,0.45); stroke: var(--ink); }

    .map-label {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink);
      padding: 5px 8px;
      background: var(--paper-dark);
      border: 1px solid var(--ink);
      margin-top: 8px;
      flex-shrink: 0;
    }

    .discussion-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    /* Sticky label showing which neighborhood is active */
    .discussion-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--paper-dark);
      border-bottom: var(--col-border);
      color: var(--ink);
      flex-shrink: 0;
    }

    .games-section {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .games-section-inner {
      padding: 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .games-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
      text-align: center;
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    /* ── Weekly scoreboard (top 5 winners of the last 7 days) ── */
    .scoreboard {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #cccccc;
      flex-shrink: 0;
    }
    .scoreboard h2 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .scoreboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scoreboard-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--paper);
      border: 1px solid #cccccc;
      font-size: 0.75rem;
    }
    .scoreboard-item.top {
      background: var(--paper-dark);
      border-color: var(--ink);
    }
    .scoreboard-rank {
      font-weight: 700;
      color: var(--ink);
      min-width: 18px;
      font-size: 0.8rem;
    }
    .scoreboard-player {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scoreboard-name {
      font-weight: 700;
      color: var(--ink);
    }
    .scoreboard-nb {
      color: var(--muted);
      font-size: 0.7rem;
    }
    .scoreboard-score {
      font-weight: 700;
      color: var(--ink);
      font-size: 0.85rem;
      min-width: 22px;
      text-align: right;
    }
    .scoreboard-empty {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 10px 4px;
      list-style: none;
    }

    .game-link {
      display: block;
      background: white;
      border: 2px solid var(--ink);
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.2s;
      position: relative;
      flex-shrink: 0;
    }

    .game-link::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }

    .game-link:hover {
      background: var(--paper-dark);
      transform: translateX(-4px);
    }

    .game-link-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .game-link-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Home neighborhood badge shown in the post form */
    .home-nb-badge {
      display: inline-block;
      padding: 4px 10px;
      background: var(--accent);
      color: var(--paper);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      vertical-align: middle;
    }

    .submit-form {
      border-bottom: var(--col-border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .submit-form-header {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid #bbb;
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 10px;
    }

    .submit-form button {
      width: 100%;
      padding: 10px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-form button:hover { background: var(--accent); }

    .submit-status {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
      font-style: italic;
    }
    .submit-status.ok { color: var(--success); }
    .submit-status.err { color: var(--accent); }

    /* Fixed toast — always visible above everything so submit outcome is seen */
    .global-toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100% - 24px);
      padding: 10px 14px;
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 9999;
      display: none;
      text-align: center;
    }
    .global-toast.ok { background: #333333; }
    .global-toast.err { background: #000000; }

    .discussion-posts {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .post {
      background: white;
      border: 1px solid #ccc;
      padding: 14px;
      margin-bottom: 12px;
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .post-neighborhood {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .post-content {
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      font-style: italic;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto 1fr;
        overflow: hidden;
        padding-bottom: 56px; /* reserve space for fixed bottom tab bar */
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Compact top brand bar */
      .section-rule {
        grid-column: 1 / -1;
        grid-row: 1;
        padding: 9px 16px;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.8px;
      }
      .datetime-block { flex-direction: row; gap: 8px; }
      .datetime-block .day-line { display: none; }

      /* Map: fills horizontally, height determined by aspect ratio */
      main {
        grid-column: 1 / -1;
        grid-row: 2;
        overflow: hidden;
        display: block;
      }
      .map-panel {
        padding: 0;
        display: block;
        overflow: hidden;
      }
      .map-panel svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .map-label {
        margin: 4px 0 6px 0;
        padding: 4px 14px;
        font-size: 11px;
        letter-spacing: 1px;
        text-align: center;
      }

      /* Left column below map: simple block scroll so submit-form is always
         reachable even when the map pushes content toward the tab bar. */
      .col-left {
        grid-column: 1;
        grid-row: 3;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-right: 1px solid #e5e5e5;
        border-top: 1px solid #e5e5e5;
        display: block;
      }
      .col-left .nb-highlight {
        padding: 6px 12px;
        font-size: 10px;
        letter-spacing: 1.2px;
      }
      .discussion-section {
        display: block;
      }
      .discussion-label {
        padding: 5px 12px;
        font-size: 9px;
        letter-spacing: 1.2px;
        position: sticky;
        top: 0;
        background: #ffffff;
        z-index: 2;
      }
      .discussion-posts {
        padding: 6px 10px;
        overflow: visible;
      }
      .post {
        padding: 5px 8px;
        margin-bottom: 5px;
      }
      .post-meta {
        font-size: 9px;
        margin-bottom: 2px;
      }
      .post-content {
        font-size: 11px;
        line-height: 1.35;
      }
      .submit-form {
        padding: 8px 10px 12px;
        border-top: 1px solid #e5e5e5;
        background: #ffffff;
      }
      .submit-form-header {
        font-size: 10px;
        margin-bottom: 4px;
      }
      .submit-form textarea {
        min-height: 30px;
        padding: 5px 7px;
        font-size: 11px;
        margin-bottom: 5px;
        border-radius: 4px;
      }
      .submit-form button {
        padding: 6px;
        font-size: 11px;
        border-radius: 4px;
      }

      /* Right column below map: square game buttons stacked vertically */
      .col-right {
        grid-column: 2;
        grid-row: 3;
        min-height: 0;
        overflow: hidden;
        border-left: none;
        border-top: 1px solid #e5e5e5;
        display: flex;
        flex-direction: column;
        width: auto;
      }
      .games-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
        overflow: hidden;
      }
      .games-section-inner {
        padding: 8px;
        gap: 6px;
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .games-section h2 { display: none; }
      /* Hide the weekly scoreboard on mobile — keeps the game-button row compact */
      .scoreboard { display: none; }
      .game-link {
        padding: 0;
        border-radius: 6px;
        width: clamp(88px, 20vw, 128px);
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        flex-shrink: 0;
        position: relative;
      }
      .game-link::before { inset: 3px; }
      .game-link-title {
        font-size: 12px;
        margin-bottom: 3px;
        font-weight: 700;
      }
      .game-link-subtitle {
        font-size: 9px;
        padding: 0 4px;
        line-height: 1.2;
      }
      /* Played state: grayed out and disabled */
      .game-link.played {
        opacity: 0.45;
        filter: grayscale(1);
        pointer-events: none;
      }
      .game-link.played::after {
        content: 'OYNANDI';
        position: absolute;
        bottom: 6px;
        left: 0;
        right: 0;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #000000;
      }

      /* Bottom tab bar — fixed at bottom */
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        padding: 0;
        margin: 0;
        border-top: 1px solid #e5e5e5;
        border-bottom: none;
        background: #ffffff;
        z-index: 100;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        padding: 0;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #888888;
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: #000000; }

      /* ── Mobile swipe pagination: full page (map + datetime + columns) slides; fixed bottom nav stays ── */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: full page (map + datetime + columns) slides vertically; nav stays ── */
    @media (min-width: 769px) {
      .col-left, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateY(100vh);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateY(-100vh);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateY(-100vh);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateY(100vh);
      }
    }

       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs.
       Direction comes from a class on <html> seeded by
       the outgoing page via sessionStorage, so the class
       is present before VT captures the new snapshot.

    .col-right { view-transition-name: ist-col-right; }

    html.embedded .col-right {

    html.embed-left body { grid-template-columns: 1fr 0 0 !important; }
    html.embed-left .col-right,
    html.embed-left .section-rule,
    html.embed-left header,
    html.embed-left main { display: none !important; }

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Anahane → Kahvehane → Kütüphane → Hane with a full-page slide.
// The entire page (map, datetime bar, both columns) translates as one unit;
// only the nav bar stays fixed. Mobile = horizontal touch swipe, desktop =
// vertical wheel swipe; CSS picks the axis per media query. Tab-bar clicks
// trigger the same animation.
// ══════════════════════════════════════════
(function initSwipePagination() {
  // In SPA embed mode the shell drives routing — skip all self-navigation.
  if (document.documentElement.classList.contains('embedded')) return;
  const PAGES = ['index.html', 'kahvehane.html', 'kutuphane.html', 'hane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function recordDir(dir) {
    // Seed the direction for the incoming page. The pre-body script
    // reads this and sets vt-<dir> on <html> before VT captures the
    // new snapshot, so the CSS slide keyframes can match.
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
      });
    });
  }

  // Entry handler — runs on every page load. Cleans up direction state
  // and, for non-VT browsers, releases the manual offscreen transform.
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: '#ffffff',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        const ax = mobile ? 'translateX' : 'translateY';
        const pct = (dir === 'forward' ? i : -i) * 100;
        node.style.transform = ax + '(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const axis = mobile ? 'X' : 'Y';
    const endPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const keyframes = [
      { transform: 'translate' + axis + '(0%)' },
      { transform: 'translate' + axis + '(' + endPct + '%)' },
    ];
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    const a1 = leftStack.stack.animate(keyframes, opts);
    const a2 = rightStack.stack.animate(keyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  // ── Desktop: vertical wheel-based swipe anywhere on the page ──
  // Respects native scrolling: only triggers navigation when there's no
  // more content to scroll in that direction. Wheel delta is accumulated
  // so a single flick doesn't accidentally navigate.
  let wheelAccum = 0, wheelTs = 0;
  const WHEEL_THRESHOLD = 180;
  const WHEEL_RESET_MS = 220;
  function canScrollInDir(target, dy) {
    let el = target;
    while (el && el !== document.body && el !== document.documentElement) {
      if (el.scrollHeight > el.clientHeight + 1) {
        const atTop = el.scrollTop < 0.5;
        const atBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 0.5;
        if (dy > 0 && !atBottom) return true;
        if (dy < 0 && !atTop) return true;
      }
      el = el.parentElement;
    }
    return false;
  }
  document.addEventListener('wheel', (e) => {
    if (isMobile()) return;
    if (navigating) { e.preventDefault(); return; }
    if (e.target.closest && e.target.closest('nav')) { wheelAccum = 0; return; }
    const dy = e.deltaY;
    if (Math.abs(dy) < 1) return;
    if (canScrollInDir(e.target, dy)) {
      wheelAccum = 0;
      return; // let a nested scroll container scroll normally
    }
    // At a scroll boundary — suppress overscroll and accumulate toward navigation.
    e.preventDefault();
    const now = Date.now();
    if (now - wheelTs > WHEEL_RESET_MS) wheelAccum = 0;
    wheelTs = now;
    wheelAccum += dy;
    if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
      const curr = currentIdx();
      const accum = wheelAccum;
      wheelAccum = 0;
      if (accum > 0) navigate(curr + 1, 'forward');
      else           navigate(curr - 1, 'backward');
    }
  }, { passive: false });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

// Turkish ablative suffix: -den/-dan/-ten/-tan with vowel harmony
function getAblativeSuffix(name) {
  if (!name) return "'den";
  const lastChar = name.charAt(name.length - 1).toLowerCase();
  const voiceless = 'pçtkfhsş';
  const backVowels = 'aıou';
  // Find last vowel for harmony
  let lastVowel = '';
  for (let i = name.length - 1; i >= 0; i--) {
    const c = name.charAt(i).toLowerCase();
    if ('aeıioöuü'.includes(c)) { lastVowel = c; break; }
  }
  const isBack = backVowels.includes(lastVowel);
  const isVoiceless = voiceless.includes(lastChar);
  if (isVoiceless && isBack) return "'tan";
  if (isVoiceless) return "'ten";
  if (isBack) return "'dan";
  return "'den";
}

// Today's date in Europe/Istanbul, matching the dailySeed format used by each game
function getTodaySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

// Mark games played today as gray. Uses Supabase game_results as the source of
// truth, but also falls back to per-game localStorage flags written by each
// game's markAsPlayed() — this keeps the indicator working even if the
// game_results table is missing, RLS blocks the read, or the insert failed.
async function markPlayedGames(userId) {
  const today = getTodaySeed();
  const playedGames = new Set();

  // Local fallback: flags set by each game when the user first interacts
  const localFlags = {
    bulmaca: 'bulmaca_started_' + today,
    sozcel: 'sozcel_started_' + today,
    baglantilar: 'baglantilar_started_' + today
  };
  for (const [game, key] of Object.entries(localFlags)) {
    if (localStorage.getItem(key)) playedGames.add(game);
  }

  // Remote source of truth — merge with local flags
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('game')
      .eq('user_id', userId)
      .eq('date', today);
    if (!error && data) {
      data.forEach(r => playedGames.add(r.game));
    }
  } catch (e) { /* table may not exist yet — ignore */ }

  document.querySelectorAll('.game-link[data-game]').forEach(el => {
    if (playedGames.has(el.dataset.game)) el.classList.add('played');
  });
}

// ── Weekly scoreboard ──
// Aggregates `won=true` rows in game_results over the last 7 days (Istanbul
// time). Each win counts as 1 point. User first names are pulled from the
// discussions table (the only place user_id -> first_name is queryable —
// there is no profiles table). Users who have never posted show as "Anonim".
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

// game_results.date is stored as un-padded "YYYY-M-D" which is not
// lexicographically sortable, so we parse it into a Date for filtering.
function parseGameDate(s) {
  if (!s || typeof s !== 'string') return null;
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

async function loadScoreboard() {
  const listEl = document.getElementById('scoreboard-list');
  if (!listEl) return;

  let results = null;
  try {
    const { data, error } = await sb
      .from('game_results')
      .select('user_id, neighborhood, date, won')
      .eq('won', true);
    if (error) throw error;
    results = data;
  } catch (e) {
    listEl.innerHTML = '<li class="scoreboard-empty">Skorlar yüklenemedi</li>';
    return;
  }

  if (!results || results.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }

  // Window: last 7 days (today + previous 6), Istanbul time, inclusive.
  const nowIst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const cutoff = new Date(nowIst.getFullYear(), nowIst.getMonth(), nowIst.getDate() - 6);

  const weekly = results.filter(r => {
    const d = parseGameDate(r.date);
    return d && d >= cutoff;
  });

  if (weekly.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }

  // Group by user: 1 point per win, remember the neighborhood from their
  // most recent win (later dates overwrite, so admins who later change
  // neighborhood still show correctly).
  const scores = new Map();
  weekly.forEach(r => {
    if (!r.user_id) return;
    const prev = scores.get(r.user_id) || { score: 0, neighborhood: null, lastDate: null };
    prev.score += 1;
    const d = parseGameDate(r.date);
    if (r.neighborhood && (!prev.lastDate || (d && d >= prev.lastDate))) {
      prev.neighborhood = r.neighborhood;
      prev.lastDate = d;
    }
    scores.set(r.user_id, prev);
  });

  // Resolve display names from the discussions table.
  const userIds = Array.from(scores.keys());
  const nameMap = new Map();
  try {
    const { data: posts } = await sb
      .from('discussions')
      .select('user_id, author_first_name')
      .in('user_id', userIds);
    if (posts) {
      posts.forEach(p => {
        if (p.user_id && p.author_first_name && !nameMap.has(p.user_id)) {
          nameMap.set(p.user_id, p.author_first_name);
        }
      });
    }
  } catch (e) { /* name lookup is best-effort */ }

  const top = Array.from(scores.entries())
    .map(([uid, v]) => ({
      uid,
      score: v.score,
      neighborhood: v.neighborhood,
      name: nameMap.get(uid) || 'Anonim'
    }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'tr'))
    .slice(0, 5);

  listEl.innerHTML = top.map((p, i) => {
    const nbName = neighborhoodNames[p.neighborhood] || p.neighborhood || '';
    const topClass = i === 0 ? ' top' : '';
    return (
      `<li class="scoreboard-item${topClass}">` +
        `<span class="scoreboard-rank">${i + 1}.</span>` +
        `<span class="scoreboard-player">` +
          `<span class="scoreboard-name">${escapeHtml(p.name)}</span>` +
          (nbName ? `<span class="scoreboard-nb"> — ${escapeHtml(nbName)}</span>` : '') +
        `</span>` +
        `<span class="scoreboard-score">${p.score}</span>` +
      `</li>`
    );
  }).join('');
}

    .from('discussions')
    .select('*')
    .eq('approved', true)
    .order('created_at', { ascending: false })
    .limit(50);

  if (neighborhoodFilter) query = query.eq('neighborhood', neighborhoodFilter);

  const { data, error } = await query;
  
  if (error || !data || data.length === 0) {
    postsEl.innerHTML = '<div class="empty-state">Henüz mesaj yok. İlk yazan siz olun!</div>';
    return;
  }
  
  postsEl.innerHTML = data.map(post => {
    // Display author as "[neighborhood]'den/dan [first name]"
    const nbName = neighborhoodNames[post.neighborhood] || post.neighborhood;
    const authorFirst = post.author_first_name || '';
    const suffix = getAblativeSuffix(nbName);
    const authorDisplay = authorFirst
      ? `${nbName}${suffix} ${authorFirst}`
      : nbName;
    const authorLink = post.user_id
      ? `<a href="hane.html?user=${post.user_id}" style="text-decoration:none;color:inherit;" title="Profili görüntüle">${authorDisplay}</a>`
      : authorDisplay;
    return `
      <div class="post">

          <span class="post-neighborhood">${authorLink}</span>
          <span>${new Date(post.created_at).toLocaleDateString('tr-TR')}</span>
        </div>
        <div class="post-content">${post.content}</div>
      </div>
    `;
  }).join('');
}

      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(insertData)
    });
  }

  let lastErr = null;
  let response = null;
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      response = await attemptInsert();
      lastErr = null;
      break;
    } catch (err) {
      lastErr = err;
      console.warn(`[kahvehane insert attempt ${attempt}/3 failed]`, err);
      if (attempt < 3) {
        await new Promise(r => setTimeout(r, 400 * attempt));
      }
    }
  }

  document.getElementById('submit-btn').disabled = false;

  if (!response) {
    // All attempts threw — this is a transport-layer failure (CORS preflight,
    // tracking blocker, captive portal, offline, etc.)
    const sessionSnippet = session?.user?.id ? session.user.id.slice(0, 8) : 'no-user';
    const expiresAt = session?.expires_at ? new Date(session.expires_at * 1000).toISOString().slice(11, 19) : 'n/a';
    const msg = `Hata: ${lastErr?.name || 'Error'} — ${lastErr?.message || String(lastErr)} [uid:${sessionSnippet} exp:${expiresAt}]`;
    statusEl.textContent = msg;
    statusEl.className = 'submit-status err';
    showToast(msg, 'err');
    console.error('[kahvehane submit failed — all attempts]', { lastErr, insertData, session });
    return;
  }

  if (!response.ok) {
    let detail = '';
    try {
      const body = await response.text();
      detail = body.slice(0, 300);
    } catch (_) {}
    const msg = `Hata: HTTP ${response.status} ${response.statusText} ${detail}`.trim();
    statusEl.textContent = msg;
    statusEl.className = 'submit-status err';
    showToast(msg, 'err');
    return;
  }

  const okMsg = isAdmin ? 'Mesajınız yayınlandı!' : 'Mesajınız onay bekliyor!';
  statusEl.textContent = okMsg;
  statusEl.className = 'submit-status ok';
  document.getElementById('post-content').value = '';
  showToast(okMsg, 'ok');
  if (isAdmin) loadPosts(activeMapNeighborhood || null);
  setTimeout(() => { statusEl.textContent = ''; }, 3000);
});

// Fixed-position toast so users always see the submit outcome, even when the
// status element inside the form is scrolled out of view on mobile.
function showToast(text, kind) {
  let toast = document.getElementById('global-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = text;
  toast.className = 'global-toast ' + (kind || '');
  toast.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toast.style.display = 'none'; }, 5000);
}
</script>
