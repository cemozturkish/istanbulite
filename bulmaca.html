<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulmaca — istanbulite.net</title>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --success: #555555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 32px;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
      flex-shrink: 0;
    }

    .masthead {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 2rem;
      color: var(--ink);
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.2s;
    }

    .masthead:hover { color: var(--accent); }

    .back-btn {
      text-decoration: none;
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      z-index: 11;
    }
    .back-btn:hover { color: var(--accent); }

    .game-title-bar {
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      background: var(--paper-dark);
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }

    .crossword-section {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: var(--col-border);
      overflow: hidden;
    }

    .clues-section {
      padding: 20px;
      overflow-y: auto;
    }

    .crossword-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      margin-bottom: 12px;
      max-width: 280px;
      width: 100%;
    }

    .crossword-cell {
      aspect-ratio: 1;
      border: 2px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      background: white;
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    .crossword-cell.black {
      background: var(--ink);
      cursor: default;
    }

    .crossword-cell.active {
      background: #e0e0e0;
    }

    .crossword-cell.correct {
      background: #c0c0c0;
    }

    .cell-number {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 0.55rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }

    .btn-primary:hover { background: var(--accent); }

    .clues h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--ink);
      letter-spacing: 1px;
    }

    .clue-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .clue {
      display: flex;
      gap: 6px;
      font-size: 0.85rem;
      line-height: 1.3;
    }

    .clue-number {
      font-weight: 700;
      color: var(--accent);
      min-width: 18px;
    }

    .game-message {
      text-align: center;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      min-height: 22px;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: var(--paper-dark);
      border-top: 2px solid var(--ink);
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header>
    <a href="kahvehane.html" class="back-btn">← Kahvehane</a>
    <a href="index.html" style="text-decoration:none;">
      <div class="masthead">istanbulite.net</div>
    </a>
    <div style="width: 120px;"></div>
  </header>

  <div class="game-title-bar">Bulmaca</div>

  <main>
    <section class="crossword-section">
      <div class="crossword-grid" id="crossword-grid"></div>
      <div class="controls">
        <button class="btn btn-primary" id="check-btn">Kontrol Et</button>
        <button class="btn btn-primary" id="clear-btn">Temizle</button>
      </div>
      <div class="game-message" id="game-message"></div>
    </section>

    <section class="clues-section">
      <div class="clues" id="clues-container"></div>
    </section>
  </main>

  <footer>
    &copy; 2026 ISTANBULITE
  </footer>

<script>
// Daily seed for puzzle rotation
function getDailySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return `Yeni bulmaca ${hours} saat ${minutes} dakika sonra`;
}

// Multiple puzzles for daily rotation
const PUZZLES = [
  {
    grid: [
      ['A', 'N', 'K', 'A', 'R'],
      ['I', null, 'I', null, 'A'],
      ['R', null, 'T', null, 'K'],
      [null, 'Ç', 'A', 'Y', null],
      ['B', 'A', 'L', 'I', 'K']
    ],
    clues: {
      across: [
        { num: 1, clue: "Türkiye'nin başkenti" },
        { num: 4, clue: 'Sabah içilen sıcak içecek' },
        { num: 5, clue: 'Denizde yaşayan canlı' }
      ],
      down: [
        { num: 1, clue: 'Yaz mevsiminde sıcak hava' },
        { num: 2, clue: 'Kitap okunan yer' },
        { num: 3, clue: 'Gece gökyüzünde parlayan' }
      ]
    }
  },
  {
    grid: [
      ['D', 'E', 'N', 'İ', 'Z'],
      ['Ü', null, 'E', null, 'A'],
      ['N', null, 'F', null, 'M'],
      [null, 'G', 'E', 'C', 'E'],
      ['A', 'Y', 'S', 'E', null]
    ],
    clues: {
      across: [
        { num: 1, clue: 'Tuzlu su kütlesi' },
        { num: 4, clue: 'Güneşin battığı zaman' },
        { num: 5, clue: 'Türk kadın ismi' }
      ],
      down: [
        { num: 1, clue: 'Rüyaların görüldüğü yer' },
        { num: 2, clue: 'Soluk alıp verme' },
        { num: 3, clue: 'Yılın dönemleri' }
      ]
    }
  },
  {
    grid: [
      ['S', 'A', 'B', 'A', 'H'],
      ['E', null, 'A', null, 'A'],
      ['S', null, 'H', null, 'V'],
      [null, 'K', 'Ç', 'E', null],
      ['E', 'K', 'İ', 'N', null]
    ],
    clues: {
      across: [
        { num: 1, clue: 'Günün başlangıcı' },
        { num: 4, clue: 'Nehir kenarındaki bitki örtüsü' },
        { num: 5, clue: 'Tarlada yetişen ürün' }
      ],
      down: [
        { num: 1, clue: 'Duyulan algı' },
        { num: 2, clue: 'Meyve ve sebze yetişen yer' },
        { num: 3, clue: 'Gökyüzündeki su' }
      ]
    }
  },
  {
    grid: [
      ['K', 'A', 'L', 'E', 'M'],
      ['A', null, 'İ', null, 'A'],
      ['P', null, 'M', null, 'S'],
      [null, 'Y', 'O', 'L', null],
      ['A', 'R', 'N', 'A', null]
    ],
    clues: {
      across: [
        { num: 1, clue: 'Yazı yazılan araç' },
        { num: 4, clue: 'Gidilen güzergah' },
        { num: 5, clue: 'Spor müsabakası yapılan yer' }
      ],
      down: [
        { num: 1, clue: 'Gemi bağlanan yer' },
        { num: 2, clue: 'Ekşi sarı meyve' },
        { num: 3, clue: 'Ahşap malzeme' }
      ]
    }
  },
  {
    grid: [
      ['P', 'A', 'S', 'T', 'A'],
      ['A', null, 'O', null, 'Ş'],
      ['R', null, 'K', null, 'K'],
      [null, 'T', 'A', 'Ş', null],
      ['K', 'U', 'K', 'U', null]
    ],
    clues: {
      across: [
        { num: 1, clue: 'İtalyan yemeği' },
        { num: 4, clue: 'Sert kayaç parçası' },
        { num: 5, clue: 'Kuş türü, sesi ile bilinir' }
      ],
      down: [
        { num: 1, clue: 'Paranın birimi' },
        { num: 2, clue: 'Caddedeki yol' },
        { num: 3, clue: 'Sevgi, tutku' }
      ]
    }
  },
  {
    grid: [
      ['V', 'A', 'P', 'U', 'R'],
      ['A', null, 'A', null, 'Ü'],
      ['T', null, 'Z', null, 'Z'],
      [null, 'D', 'A', 'Ğ', null],
      ['İ', 'N', 'R', 'E', null]
    ],
    clues: {
      across: [
        { num: 1, clue: 'Denizde yolcu taşıyan araç' },
        { num: 4, clue: 'Yüksek arazi' },
        { num: 5, clue: 'Kuyu veya mağara' }
      ],
      down: [
        { num: 1, clue: 'Yurt, memleket' },
        { num: 2, clue: 'Alışveriş merkezi' },
        { num: 3, clue: 'Esinti' }
      ]
    }
  },
  {
    grid: [
      ['G', 'Ü', 'N', 'E', 'Ş'],
      ['İ', null, 'E', null, 'E'],
      ['T', null, 'F', null, 'H'],
      [null, 'İ', 'E', 'Ş', null],
      ['D', 'A', 'S', 'K', null]
    ],
    clues: {
      across: [
        { num: 1, clue: 'Gökyüzündeki yıldız' },
        { num: 4, clue: 'Karşılıklı ilişki' },
        { num: 5, clue: 'Okul mobilyası' }
      ],
      down: [
        { num: 1, clue: 'Müzik aleti çalan' },
        { num: 2, clue: 'Soluk alma' },
        { num: 3, clue: 'Kent, il' }
      ]
    }
  }
];

function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % PUZZLES.length);
}

const dailySeed = getDailySeed();
const puzzleIndex = seededRandom(dailySeed);
const todayPuzzle = PUZZLES[puzzleIndex];
const PUZZLE = todayPuzzle.grid;
const CLUES = todayPuzzle.clues;

let activeCell = null;
let gameCompleted = false;
const userAnswers = Array(5).fill(null).map(() => Array(5).fill(''));
const SAVE_KEY = 'bulmaca_state_' + dailySeed;

function createGrid() {
  const grid = document.getElementById('crossword-grid');
  
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      const cell = document.createElement('div');
      
      if (PUZZLE[row][col] === null) {
        cell.className = 'crossword-cell black';
      } else {
        cell.className = 'crossword-cell';
        cell.dataset.row = row;
        cell.dataset.col = col;
        
        if ((row === 0 && col === 0) || 
            (row === 0 && col === 2) ||
            (row === 1 && col === 0) ||
            (row === 3 && col === 1) ||
            (row === 4 && col === 0)) {
          const num = document.createElement('span');
          num.className = 'cell-number';
          if (row === 0 && col === 0) num.textContent = '1';
          if (row === 0 && col === 2) num.textContent = '3';
          if (row === 1 && col === 0) num.textContent = '2';
          if (row === 3 && col === 1) num.textContent = '4';
          if (row === 4 && col === 0) num.textContent = '5';
          cell.appendChild(num);
        }
        
        cell.onclick = () => selectCell(row, col);
      }
      
      grid.appendChild(cell);
    }
  }
}

function selectCell(row, col) {
  document.querySelectorAll('.crossword-cell').forEach(c => c.classList.remove('active'));
  activeCell = { row, col };
  const cells = document.querySelectorAll('.crossword-cell');
  cells[row * 5 + col].classList.add('active');
}

function updateCell(letter) {
  if (!activeCell) return;
  const { row, col } = activeCell;
  userAnswers[row][col] = letter;
  
  const cells = document.querySelectorAll('.crossword-cell');
  const cell = cells[row * 5 + col];
  const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
  if (textNode) {
    textNode.textContent = letter;
  } else {
    cell.appendChild(document.createTextNode(letter));
  }
}

document.addEventListener('keydown', (e) => {
  if (!activeCell || gameCompleted) return;

  if (e.key.length === 1 && e.key.match(/[a-zçğıöşüA-ZÇĞİÖŞÜ]/)) {
    updateCell(e.key.toUpperCase());
    moveToNext();
    saveState();
  } else if (e.key === 'Backspace') {
    updateCell('');
    saveState();
  }
});

function moveToNext() {
  if (!activeCell) return;
  let { row, col } = activeCell;
  
  col++;
  if (col >= 5) {
    col = 0;
    row++;
  }
  
  if (row < 5) {
    while (PUZZLE[row][col] === null) {
      col++;
      if (col >= 5) {
        col = 0;
        row++;
      }
      if (row >= 5) return;
    }
    selectCell(row, col);
  }
}

// Render clues dynamically
function renderClues() {
  const container = document.getElementById('clues-container');
  let html = '<h3>Yatay</h3><div class="clue-list">';
  CLUES.across.forEach(c => {
    html += `<div class="clue"><span class="clue-number">${c.num}.</span><span>${c.clue}</span></div>`;
  });
  html += '</div><h3>Dikey</h3><div class="clue-list">';
  CLUES.down.forEach(c => {
    html += `<div class="clue"><span class="clue-number">${c.num}.</span><span>${c.clue}</span></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// Save state to localStorage
function saveState() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ userAnswers, gameCompleted }));
}

// Restore state from localStorage
function restoreState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.userAnswers) return false;
    // Restore answers into grid
    const cells = document.querySelectorAll('.crossword-cell');
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        if (PUZZLE[row][col] !== null) {
          userAnswers[row][col] = state.userAnswers[row][col] || '';
          const cell = cells[row * 5 + col];
          const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
          if (textNode) { textNode.textContent = userAnswers[row][col]; }
          else if (userAnswers[row][col]) { cell.appendChild(document.createTextNode(userAnswers[row][col])); }
          // If completed, mark correct cells
          if (state.gameCompleted && userAnswers[row][col] === PUZZLE[row][col]) {
            cell.classList.add('correct');
          }
        }
      }
    }
    gameCompleted = state.gameCompleted || false;
    if (gameCompleted) {
      document.getElementById('game-message').textContent = 'Tebrikler! Tamamladınız!';
      document.getElementById('game-message').style.color = 'var(--success)';
    }
    return true;
  } catch (e) { return false; }
}

document.getElementById('check-btn').addEventListener('click', () => {
  if (gameCompleted) return;
  let allCorrect = true;
  const cells = document.querySelectorAll('.crossword-cell:not(.black)');

  cells.forEach(cell => {
    const row = parseInt(cell.dataset.row);
    const col = parseInt(cell.dataset.col);

    if (userAnswers[row][col] === PUZZLE[row][col]) {
      cell.classList.add('correct');
    } else {
      allCorrect = false;
      cell.classList.remove('correct');
    }
  });

  const msgEl = document.getElementById('game-message');
  if (allCorrect) {
    msgEl.textContent = 'Tebrikler! Tamamladınız!';
    msgEl.style.color = 'var(--success)';
    gameCompleted = true;
    // Track score in localStorage (only once per puzzle)
    localStorage.setItem('bulmaca_played', parseInt(localStorage.getItem('bulmaca_played') || '0') + 1);
    localStorage.setItem('bulmaca_wins', parseInt(localStorage.getItem('bulmaca_wins') || '0') + 1);
  } else {
    msgEl.textContent = 'Bazı cevaplar yanlış!';
    msgEl.style.color = 'var(--accent)';
  }
  saveState();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (gameCompleted) return;
  userAnswers.forEach((row, i) => row.forEach((_, j) => userAnswers[i][j] = ''));
  document.querySelectorAll('.crossword-cell:not(.black)').forEach(cell => {
    const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
    if (textNode) textNode.textContent = '';
    cell.classList.remove('correct');
  });
  document.getElementById('game-message').textContent = '';
  saveState();
});

createGrid();
renderClues();
restoreState();
</script>
</body>
</html>
