<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Bulmaca — istanbulite.net</title>
  <style>
    :root {
      /* Core ink & paper — warm cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;
      --paper-warm: #eddbd0;
      --paper-card: #ddc4b5;
      --paper-banner: #c9ae9a;
      --paper-navbar: #b89b7f;
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: pan-y;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 1 / -1;
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 28px;
      padding: 14px 28px 10px 28px;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
    }
    .section-rule > .masthead { justify-self: start; }
    .section-rule > header { justify-self: center; }
    .section-rule > .datetime-block { justify-self: end; }
    .masthead {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 1.45rem;
      letter-spacing: 0.5px;
      color: var(--ink);
      line-height: 1;
    }
    .masthead .tld { color: var(--muted); font-style: italic; }
    .datetime-block {
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
    }
    .datetime-block .sep { color: var(--muted); opacity: 0.6; }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 2 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--paper-banner);
      color: var(--ink);
      text-align: center;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      border-bottom: 1px solid var(--rule);
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 2 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    /* Left: personal + community stats (compact) */
    .stats-left {
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      overflow-y: auto;
      gap: 8px;
    }

    .panel-title {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 3px;
      border-bottom: 1px solid var(--rule);
      font-family: 'Inter', sans-serif;
    }

    .stat-tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .stat-tile {
      text-align: center;
      padding: 4px 2px;
      background: var(--paper-card);
      border: 1px solid var(--hairline);
    }
    .stat-tile .num {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-tile .label {
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 1px 0;
    }
    .stat-row .stat-label { color: var(--muted); }
    .stat-row .stat-val { font-weight: 700; }

    .stats-left .dist-bar-wrap {
      font-size: 0.6rem;
      margin-bottom: 2px;
      gap: 4px;
    }
    .stats-left .dist-bar-outer { height: 10px; }
    .stats-left .dist-pct { font-size: 0.55rem; min-width: 24px; }
    .stats-left .district-rank { font-size: 0.65rem; padding: 1px 0; }

    /* Center: game */
    .game-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      overflow-y: auto;
      min-height: 0;
      gap: 8px;
      flex: 1;
    }

    .crossword-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      max-width: 220px;
      width: 100%;
      flex-shrink: 0;
    }

    .crossword-cell {
      aspect-ratio: 1;
      border: 1.5px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.8rem, 2.5vh, 1.2rem);
      font-weight: 700;
      text-transform: uppercase;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    .crossword-cell.black {
      background: var(--ink);
      border-color: var(--ink);
      cursor: default;
    }

    .crossword-cell.active {
      background: var(--brown-1);
    }

    .crossword-cell.correct {
      background: var(--paper-card);
    }

    .cell-number {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 0.5rem;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
    }
    .btn-primary:hover { background: var(--accent); }

    .game-message {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      min-height: 18px;
      flex-shrink: 0;
    }

    .reset-info {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      flex-shrink: 0;
    }

    .clues-wrap {
      width: 100%;
      max-width: 360px;
      flex-shrink: 0;
    }

    .clues-wrap h3 {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 4px;
      padding: 4px 8px;
      background: var(--paper-banner);
      border-bottom: 1px solid var(--rule);
      letter-spacing: 1px;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }

    .clue-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px;
      background: var(--paper-card);
      padding: 6px 8px;
      border: 1px solid var(--hairline);
    }

    .clue {
      display: flex;
      gap: 4px;
      font-size: 0.78rem;
      line-height: 1.3;
      padding: 2px 4px;
      border-left: 3px solid transparent;
    }

    .clue.active {
      background: var(--hover);
      border-left-color: var(--ink-red);
    }

    .clue-number {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      color: var(--ink-red);
      min-width: 16px;
    }

    .dist-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      margin-bottom: 4px;
    }
    .dist-bar-wrap .dist-label {
      min-width: 12px;
      text-align: right;
      font-weight: 700;
      color: var(--muted);
    }
    .dist-bar-outer {
      flex: 1;
      height: 14px;
      background: var(--paper-dark);
      border: 1px solid var(--hairline);
    }
    .dist-bar-inner {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .dist-bar-wrap .dist-pct {
      min-width: 30px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .district-rank {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0;
      border-bottom: 1px solid var(--whisper);
    }
    .district-rank:last-child { border-bottom: none; }
    .district-rank .rank-name { font-weight: 600; }
    .district-rank .rank-pct { color: var(--muted); font-weight: 700; }

    /* ── Right: games nav (mirrors Kahvehane) ── */
    .games-section {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }
    .games-section-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .games-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
      text-align: center;
      letter-spacing: 2px;
      flex-shrink: 0;
      background: var(--paper-banner);
      padding: 6px 0;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    .game-link {
      display: block;
      background: var(--paper-card);
      border: 2px solid var(--ink);
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.2s;
      position: relative;
      flex-shrink: 0;
    }
    .game-link::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }
    .game-link:hover {
      background: var(--hover);
      transform: translateX(-4px);
    }
    .game-link.active { background: var(--brown-4); color: var(--paper); }
    .game-link.active::before { border-color: var(--paper); }
    .game-link-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; font-family: 'Inter', sans-serif; }
    .game-link-subtitle { font-size: 0.75rem; color: var(--muted); font-style: italic; }
    .game-link.active .game-link-subtitle { color: var(--whisper); }
    .scoreboard {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .scoreboard h2 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--paper-banner);
      padding: 6px 0;
      font-family: 'Inter', sans-serif;
    }
    .scoreboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scoreboard-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--paper-card);
      border: 1px solid var(--hairline);
      font-size: 0.75rem;
    }
    .scoreboard-item.top { background: var(--paper-banner); border-color: var(--ink); }
    .scoreboard-rank { font-weight: 700; color: var(--ink); min-width: 18px; font-size: 0.8rem; }
    .scoreboard-player {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scoreboard-name { font-weight: 700; color: var(--ink); }
    .scoreboard-nb { color: var(--muted); font-size: 0.7rem; }
    .scoreboard-score {
      font-weight: 700;
      color: var(--ink);
      font-size: 0.85rem;
      min-width: 22px;
      text-align: right;
    }
    .scoreboard-empty {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 10px 4px;
      list-style: none;
    }

    /* ── MOBILE RESPONSIVE ── */
    /* Back button hidden on desktop (overridden in mobile @media below) */
    /* Desktop back button: floating top-left inside main */
    .game-back-btn {
      position: absolute;
      top: 10px;
      left: 14px;
      z-index: 50;
      width: 30px;
      height: 30px;
      border: 1px solid var(--ink);
      background: var(--paper);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      line-height: 1;
      transition: background 0.15s;
    }
    .game-back-btn:hover { background: var(--hover); }

    /* Side nav: started today (light tint) vs completed today (darker tint) */
    .game-link.started {
      background: var(--paper-dark);
      color: var(--accent);
    }
    .game-link.started .game-link-subtitle { color: var(--muted); }
    .game-link.completed {
      background: var(--brown-2);
      color: var(--paper);
      border-color: var(--brown-4);
    }
    .game-link.completed::before { border-color: var(--brown-4); }
    .game-link.completed .game-link-subtitle { color: var(--whisper); }

    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
        overflow: hidden;
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Hide everything except the game itself for immersive fullscreen */
      .section-rule, .col-left, .col-right, header { display: none !important; }

      /* Floating back button (top-left) */
      .game-back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 10px;
        left: 10px;
        width: 38px;
        height: 38px;
        background: var(--paper);
        border: 1px solid var(--ink);
        border-radius: 50%;
        color: var(--ink);
        font-size: 18px;
        font-weight: 700;
        text-decoration: none;
        z-index: 200;
        box-shadow: 0 2px 8px rgba(31,27,20,0.15);
      }
      .game-back-btn:hover { background: var(--hover); }

      /* Main: fullscreen game area */
      main {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        height: 100dvh;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        -webkit-overflow-scrolling: touch;
      }
      .game-panel {
        padding: 60px 12px 24px 12px;
        gap: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
      }
      .crossword-grid {
        max-width: min(62vh, 92vw);
        gap: 4px;
      }
      .crossword-cell {
        border-width: 2.5px;
        font-size: clamp(1.4rem, 4.2vh, 2.2rem);
      }
      .cell-number { font-size: 13px; top: 2px; left: 3px; }
      .controls { gap: 12px; }
      .btn {
        padding: 13px 22px;
        font-size: 15px;
        letter-spacing: 0.5px;
        border-radius: 5px;
      }
      .game-message { font-size: 16px; min-height: 20px; }
      .reset-info { font-size: 13px; }
      .clues-wrap {
        max-width: 100%;
        overflow: hidden;
      }
      .clues-wrap h3 {
        font-size: 14px;
        margin-bottom: 6px;
        padding-bottom: 4px;
        letter-spacing: 1px;
      }
      .clue-list { gap: 5px; margin-bottom: 10px; }
      .clue { font-size: 15px; line-height: 1.35; gap: 6px; }
      .clue-number { min-width: 20px; }

    }

    /* ── Profile popup ── */
    .profile-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31,27,20,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .profile-popup-overlay.open { display: flex; }
    .profile-popup {
      background: var(--paper);
      border: 1px solid var(--brown-3);
      width: 360px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 80px);
      overflow: auto;
      padding: 24px;
      position: relative;
      font-family: 'Inter', sans-serif;
    }
    .profile-popup .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 4px 8px;
    }
    .profile-popup .close-btn:hover { color: var(--ink); }
    .profile-popup .pp-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--paper-card);
      border: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 auto 14px;
      overflow: hidden;
    }
    .profile-popup .pp-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-popup .pp-name {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .profile-popup .pp-meta {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }
    .profile-popup .pp-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid var(--hairline);
      font-size: 0.8rem;
    }
    .profile-popup .pp-row .pp-label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      align-self: center;
    }
    .profile-popup .pp-row .pp-value {
      color: var(--ink);
      font-weight: 500;
      text-align: right;
    }
    .profile-popup .pp-loading,
    .profile-popup .pp-error {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 30px 0;
    }
    .author-link {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .author-link:hover { text-decoration: underline; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
</head>
<body>

  <aside class="col-left">
    <div class="nb-highlight" id="user-nb-badge"></div>
    <section class="stats-left" id="stats-left"></section>
  </aside>

  <div class="section-rule">
    <div class="masthead">istanbulite<span class="tld">.net</span></div>
    <header>
      <nav>
        <a href="index.html">Anahane</a>
        <a href="kahvehane.html">Kahvehane</a>
        <a href="kutuphane.html">Kütüphane</a>
      </nav>
    </header>
    <div class="datetime-block">
      <span class="date-line" id="date-line"></span>
      <span class="sep">·</span>
      <span class="day-line" id="day-line"></span>
      <span class="sep">·</span>
      <span class="time-line" id="time-line"></span>
    </div>

// ── Personal stats from Supabase ──
// For bulmaca, `attempts` = number of check-button presses on the winning
// submission. Lower is better. Dedupe per (user, date): keep the smallest
// attempts among winning rows as the day's score.
async function loadPersonalStats() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return null;
    const { data, error } = await sb.from('game_results')
      .select('date, attempts, won')
      .eq('user_id', session.user.id)
      .eq('game', 'bulmaca');
    if (error) return null;
    const byDate = new Map();
    (data || []).forEach(r => {
      const prev = byDate.get(r.date) || { date: r.date, won: false, attempts: null };
      if (r.won) {
        prev.won = true;
        if (prev.attempts === null || r.attempts < prev.attempts) prev.attempts = r.attempts;
      }
      byDate.set(r.date, prev);
    });
    const entries = Array.from(byDate.values());
    const played = entries.length;
    const wins = entries.filter(e => e.won).length;
    const winDateSet = new Set(entries.filter(e => e.won).map(e => e.date));
    function seedForOffset(off) {
      const now = new Date();
      const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
      ist.setDate(ist.getDate() - off);
      return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
    }
    let currentStreak = 0;
    let offset = winDateSet.has(seedForOffset(0)) ? 0 : 1;
    while (winDateSet.has(seedForOffset(offset))) { currentStreak++; offset++; }
    const DAY = 86400000;
    const winTimes = entries.filter(e => e.won).map(e => {
      const [y, m, d] = e.date.split('-').map(Number);
      return Date.UTC(y, m - 1, d);
    }).sort((a, b) => a - b);
    let maxStreak = 0, cur = 0, prev = null;
    for (const t of winTimes) {
      cur = (prev !== null && t - prev === DAY) ? cur + 1 : 1;
      if (cur > maxStreak) maxStreak = cur;
      prev = t;
    }
    // Today's check count: max attempts among today's rows (each check writes).
    // Until the puzzle is completed only the "started" row (attempts=0) exists,
    // so this stays meaningful only after a win.
    const todayEntry = byDate.get(dailySeed);
    const todayChecks = (todayEntry && todayEntry.attempts !== null) ? todayEntry.attempts : 0;
    return { played, wins, currentStreak, maxStreak, todayChecks };
  } catch (e) { return null; }
}

}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return I18N.formatCountdown(hours, minutes, { prefixTr: 'Yeni bulmaca', prefixEn: 'New puzzle in' });
}

function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % PUZZLES.length);
}

const dailySeed = getDailySeed();

const todayPuzzle = PUZZLES[puzzleIndex];

let activeCell = null;
let gameCompleted = false;
let checkAttempts = 0;
const userAnswers = Array(5).fill(null).map(() => Array(5).fill(''));
const SAVE_KEY = 'bulmaca_state_' + dailySeed;

function createGrid() {
  const grid = document.getElementById('crossword-grid');

  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      const cell = document.createElement('div');

      if (PUZZLE[row][col] === null) {
        cell.className = 'crossword-cell black';
      } else {
        cell.className = 'crossword-cell';
        cell.dataset.row = row;
        cell.dataset.col = col;

        if ((row === 0 && col === 0) ||
            (row === 0 && col === 2) ||
            (row === 1 && col === 0) ||
            (row === 3 && col === 1) ||
            (row === 4 && col === 0)) {
          const num = document.createElement('span');
          num.className = 'cell-number';
          if (row === 0 && col === 0) num.textContent = '1';
          if (row === 0 && col === 2) num.textContent = '3';
          if (row === 1 && col === 0) num.textContent = '2';
          if (row === 3 && col === 1) num.textContent = '4';
          if (row === 4 && col === 0) num.textContent = '5';
          cell.appendChild(num);
        }

        cell.onclick = () => selectCell(row, col);
      }

      grid.appendChild(cell);
    }
  }
}

function selectCell(row, col) {
  document.querySelectorAll('.crossword-cell').forEach(c => c.classList.remove('active'));
  activeCell = { row, col };
  const cells = document.querySelectorAll('.crossword-cell');
  cells[row * 5 + col].classList.add('active');
}

function updateCell(letter) {
  if (!activeCell) return;
  const { row, col } = activeCell;
  userAnswers[row][col] = letter;

  const cells = document.querySelectorAll('.crossword-cell');
  const cell = cells[row * 5 + col];
  const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
  if (textNode) {
    textNode.textContent = letter;
  } else {
    cell.appendChild(document.createTextNode(letter));
  }
}

document.addEventListener('keydown', (e) => {
  if (!activeCell || gameCompleted) return;

  if (e.key.length === 1 && e.key.match(/[a-zçğıöşüA-ZÇĞİÖŞÜ]/)) {
    updateCell(e.key.toUpperCase());
    moveToNext();
    markAsPlayed();
    saveState();
  } else if (e.key === 'Backspace') {
    updateCell('');
    saveState();
  }
});

// Record an "in progress" game_results row on first interaction so Kahvehane
// can show the game as played even when the user doesn't finish it today.
async function markAsPlayed() {
  const flagKey = 'bulmaca_started_' + dailySeed;
  if (localStorage.getItem(flagKey)) return;
  localStorage.setItem(flagKey, '1');
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const { error } = await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: 'bulmaca',
      date: dailySeed,
      attempts: 0,
      won: false,
      neighborhood: userNeighborhood
    }]);
    if (error) console.error('[bulmaca markAsPlayed]', error);
  } catch (e) { console.error('[bulmaca markAsPlayed]', e); }
}

function moveToNext() {
  if (!activeCell) return;
  let { row, col } = activeCell;

  col++;
  if (col >= 5) { col = 0; row++; }

  if (row < 5) {
    while (PUZZLE[row][col] === null) {
      col++;
      if (col >= 5) { col = 0; row++; }
      if (row >= 5) return;
    }
    selectCell(row, col);
  }
}

// Render clues
function renderClues() {

    html += `<div class="clue"><span class="clue-number">${c.num}.</span><span>${c.clue}</span></div>`;

  CLUES.down.forEach(c => {
    html += `<div class="clue"><span class="clue-number">${c.num}.</span><span>${c.clue}</span></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// Save/restore state
function saveState() {
  const state = { userAnswers, gameCompleted, checkAttempts };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  saveStateRemote(state);
}

// Mirror to Supabase so the board syncs across devices.
async function saveStateRemote(state) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const { error } = await sb.from('game_state').upsert({
      user_id: session.user.id,
      game: 'bulmaca',
      date: dailySeed,
      state,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,game,date' });
    if (error) console.error('[bulmaca saveStateRemote]', error);
  } catch (e) { console.error('[bulmaca saveStateRemote]', e); }
}

async function restoreState() {
  let raw = localStorage.getItem(SAVE_KEY);
  if (!raw) {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data } = await sb.from('game_state')
          .select('state')
          .eq('user_id', session.user.id)
          .eq('game', 'bulmaca')
          .eq('date', dailySeed)
          .maybeSingle();
        if (data && data.state) {
          raw = JSON.stringify(data.state);
          localStorage.setItem(SAVE_KEY, raw);
        }
      }
    } catch (e) { console.error('[bulmaca restoreState remote]', e); }
  }
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.userAnswers) return false;
    const cells = document.querySelectorAll('.crossword-cell');
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        if (PUZZLE[row][col] !== null) {
          userAnswers[row][col] = state.userAnswers[row][col] || '';
          const cell = cells[row * 5 + col];
          const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
          if (textNode) { textNode.textContent = userAnswers[row][col]; }
          else if (userAnswers[row][col]) { cell.appendChild(document.createTextNode(userAnswers[row][col])); }
          if (state.gameCompleted && userAnswers[row][col] === PUZZLE[row][col]) {
            cell.classList.add('correct');
          }
        }
      }
    }
    checkAttempts = state.checkAttempts || 0;
    gameCompleted = state.gameCompleted || false;
    if (gameCompleted) {
      document.getElementById('game-message').textContent = 'Tebrikler! Tamamladınız!';
      document.getElementById('game-message').style.color = 'var(--success)';
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    }
    return true;
  } catch (e) { return false; }
}

// Check & clear buttons
document.getElementById('check-btn').addEventListener('click', async () => {
  if (gameCompleted) return;
  checkAttempts++;
  let allCorrect = true;
  const cells = document.querySelectorAll('.crossword-cell:not(.black)');

  cells.forEach(cell => {
    const row = parseInt(cell.dataset.row);
    const col = parseInt(cell.dataset.col);
    if (userAnswers[row][col] === PUZZLE[row][col]) {
      cell.classList.add('correct');
    } else {
      allCorrect = false;
      cell.classList.remove('correct');
    }
  });

  const msgEl = document.getElementById('game-message');
  if (allCorrect) {
    msgEl.textContent = 'Tebrikler! Tamamladınız!';
    msgEl.style.color = 'var(--success)';
    document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    gameCompleted = true;
    // Insert the winning row first so renderStats() (Supabase-backed)
    // reflects this game immediately. Streaks are derived from row data.
    await recordGameResult('bulmaca', dailySeed, checkAttempts, true, userNeighborhood);
    renderStats();
  } else {
    msgEl.textContent = 'Bazı cevaplar yanlış!';
    msgEl.style.color = 'var(--accent)';
  }
  saveState();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (gameCompleted) return;
  userAnswers.forEach((row, i) => row.forEach((_, j) => userAnswers[i][j] = ''));
  document.querySelectorAll('.crossword-cell:not(.black)').forEach(cell => {
    const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
    if (textNode) textNode.textContent = '';
    cell.classList.remove('correct');
  });
  document.getElementById('game-message').textContent = '';
  saveState();
});

      .select('user_id, attempts, won, neighborhood')
      .eq('game', 'bulmaca')
      .eq('date', dailySeed);
    if (error || !data || data.length === 0) return null;
    // Dedupe per user: best (lowest) attempts among winning rows.
    const byUser = new Map();
    data.forEach(r => {
      const prev = byUser.get(r.user_id) || { won: false, attempts: null, neighborhood: r.neighborhood };
      if (r.neighborhood) prev.neighborhood = r.neighborhood;
      if (r.won) {
        prev.won = true;
        if (prev.attempts === null || r.attempts < prev.attempts) prev.attempts = r.attempts;
      }
      byUser.set(r.user_id, prev);
    });
    const dist = [0, 0, 0, 0, 0]; // 1 check, 2 checks, 3 checks, 4+ checks, failed
    const districtMap = {};
    byUser.forEach(e => {
      if (e.won) {
        if (e.attempts <= 1) dist[0]++;
        else if (e.attempts <= 2) dist[1]++;
        else if (e.attempts <= 3) dist[2]++;
        else dist[3]++;
      } else { dist[4]++; }
      if (e.neighborhood) {
        if (!districtMap[e.neighborhood]) districtMap[e.neighborhood] = { wins: 0, total: 0 };
        districtMap[e.neighborhood].total++;
        if (e.won) districtMap[e.neighborhood].wins++;
      }
    });
    const topDistricts = Object.entries(districtMap)
      .map(([k, v]) => ({ name: neighborhoodNames[k] || k, pct: Math.round(v.wins / v.total * 100), total: v.total }))
      .sort((a, b) => b.pct - a.pct || b.total - a.total)
      .slice(0, 5);
    return { dist, topDistricts };
  } catch (e) {
    return null;
  }
}

// Stats rendering
async function renderStats() {
  // Supabase is the source of truth. Cache the last payload so first paint
  // isn't blank on slow networks.
  const cacheKey = 'bulmaca_stats_cache';
  let personal = await loadPersonalStats();
  if (personal) {
    localStorage.setItem(cacheKey, JSON.stringify(personal));
  } else {
    try { personal = JSON.parse(localStorage.getItem(cacheKey) || 'null'); } catch { personal = null; }
  }
  const played = personal ? personal.played : 0;
  const wins = personal ? personal.wins : 0;
  const streak = personal ? personal.currentStreak : 0;
  const maxStreak = personal ? Math.max(personal.maxStreak, personal.currentStreak) : 0;
  const winPct = played > 0 ? Math.round(wins / played * 100) : 0;
  const todayChecks = personal ? personal.todayChecks : 0;

  const community = await loadCommunityStats();
  let communityHtml = '';
  if (!community) {
    communityHtml = `
      <div><div class="panel-title">Günün İstatistikleri</div></div>
      <div class="stat-row"><span class="stat-label">Henüz veri yok</span></div>
    `;
  } else {
    const communityDist = community.dist;
    const topDistricts = community.topDistricts;
    const totalCommunity = communityDist.reduce((a, b) => a + b, 0);
    const maxCommunityDist = Math.max(...communityDist, 1);
    const labels = ['1 denemede', '2 denemede', '3 denemede', '4+ denemede', 'Bitiremedi'];
    communityHtml = `
      <div><div class="panel-title">Günün İstatistikleri</div></div>
      ${communityDist.map((d, i) => {
        const pct = totalCommunity > 0 ? Math.round(d / totalCommunity * 100) : 0;
        return `
          <div class="dist-bar-wrap">
            <span class="dist-label" style="min-width:56px;text-align:left;font-size:0.55rem;">${labels[i]}</span>
            <div class="dist-bar-outer">
              <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxCommunityDist * 100, 3) : 0}%"></div>
            </div>
            <span class="dist-pct">${pct}%</span>
          </div>
        `;
      }).join('')}
      <div style="margin-top:4px;"><div class="panel-title">En Başarılı İlçeler</div></div>
      ${topDistricts.length === 0
        ? `<div class="stat-row"><span class="stat-label">Henüz veri yok</span></div>`
        : topDistricts.map((d, i) => `
          <div class="district-rank">
            <span class="rank-name">${i + 1}. ${d.name}</span>
            <span class="rank-pct">${d.pct}%</span>
          </div>
        `).join('')}
    `;
  }

  document.getElementById('stats-left').innerHTML = `
    <div><div class="panel-title">${I18N.t('games.personal')}</div></div>
    <div class="stat-tiles">
      <div class="stat-tile"><div class="num">${streak}</div><div class="label">${I18N.t('games.streak')}</div></div>
      <div class="stat-tile"><div class="num">${maxStreak}</div><div class="label">${I18N.t('games.longest')}</div></div>
      <div class="stat-tile"><div class="num">${played}</div><div class="label">${I18N.t('games.played')}</div></div>
      <div class="stat-tile"><div class="num">${winPct}%</div><div class="label">${I18N.t('games.winrate')}</div></div>
    </div>
    <div class="stat-row">
      <span class="stat-label">Bugün Kontrol</span>
      <span class="stat-val">${todayChecks > 0 ? todayChecks : '—'}</span>
    </div>
    <div style="margin-top:6px;"></div>
    ${communityHtml}
  `;
}

// ── Weekly scoreboard (mirrors Kahvehane) ──
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function parseGameDate(s) {
  if (!s || typeof s !== 'string') return null;
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}
async function loadScoreboard() {
  const listEl = document.getElementById('scoreboard-list');
  if (!listEl) return;
  let results = null;
  try {
    const { data, error } = await sb.from('game_results')
      .select('user_id, neighborhood, date, won').eq('won', true);
    if (error) throw error;
    results = data;
  } catch (e) {
    listEl.innerHTML = '<li class="scoreboard-empty">Skorlar yüklenemedi</li>';
    return;
  }
  if (!results || results.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }
  const nowIst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const cutoff = new Date(nowIst.getFullYear(), nowIst.getMonth(), nowIst.getDate() - 6);
  const weekly = results.filter(r => { const d = parseGameDate(r.date); return d && d >= cutoff; });
  if (weekly.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }
  const scores = new Map();
  weekly.forEach(r => {
    if (!r.user_id) return;
    const prev = scores.get(r.user_id) || { score: 0, neighborhood: null, lastDate: null };
    prev.score += 1;
    const d = parseGameDate(r.date);
    if (r.neighborhood && (!prev.lastDate || (d && d >= prev.lastDate))) {
      prev.neighborhood = r.neighborhood;
      prev.lastDate = d;
    }
    scores.set(r.user_id, prev);
  });
  const userIds = Array.from(scores.keys());
  const nameMap = new Map();
  try {
    if (userIds.length > 0) {
      const { data: profs } = await sb.from('profiles').select('id, first_name').in('id', userIds);
      (profs || []).forEach(p => { if (p.first_name) nameMap.set(p.id, p.first_name.toLocaleUpperCase('tr-TR')); });
    }
  } catch (e) {}
  const top = Array.from(scores.entries())
    .map(([uid, v]) => ({ uid, score: v.score, neighborhood: v.neighborhood, name: nameMap.get(uid) || 'Anonim' }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'tr'))
    .slice(0, 5);
  listEl.innerHTML = top.map((p, i) => {
    const nbName = neighborhoodNames[p.neighborhood] || p.neighborhood || '';
    const topClass = i === 0 ? ' top' : '';
    return `<li class="scoreboard-item${topClass}">` +
      `<span class="scoreboard-rank">${i + 1}.</span>` +
      `<span class="scoreboard-player">` +
        `<span class="scoreboard-name author-link" data-user-id="${p.uid}">${escapeHtml(p.name)}</span>` +
        (nbName ? `<span class="scoreboard-nb"> — ${escapeHtml(nbName)}</span>` : '') +
      `</span>` +
      `<span class="scoreboard-score">${p.score}</span>` +
    `</li>`;
  }).join('');
}

// Mark games as started (light gray) or completed (dark gray) in side nav
async function markPlayedGames() {
  const today = dailySeed;
  const started = new Set();
  const completed = new Set();
  const localFlags = {
    sozcel: 'sozcel_started_' + today,
    baglantilar: 'baglantilar_started_' + today,
    bulmaca: 'bulmaca_started_' + today
  };
  for (const [g, key] of Object.entries(localFlags)) {
    if (localStorage.getItem(key)) started.add(g);
  }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data, error } = await sb.from('game_results')
        .select('game, attempts').eq('user_id', session.user.id).eq('date', today);
      if (!error && data) data.forEach(r => {
        if ((r.attempts || 0) >= 1) completed.add(r.game);
        else started.add(r.game);
      });
    }
  } catch (e) {}
  document.querySelectorAll('.game-link[data-game]').forEach(el => {
    if (el.classList.contains('active')) return;
    const g = el.dataset.game;
    if (completed.has(g)) el.classList.add('completed');
    else if (started.has(g)) el.classList.add('started');
  });
}

// Init
createGrid();
renderClues();
(async () => {
  await restoreState();
  renderStats();
  loadScoreboard();
  markPlayedGames();
})();

// ── Profile popup: opens when an author name is clicked ──
(function initProfilePopup() {
  const overlay = document.createElement('div');
  overlay.className = 'profile-popup-overlay';
  overlay.innerHTML = `
    <div class="profile-popup" role="dialog" aria-modal="true">
      <button class="close-btn" type="button" aria-label="Kapat">×</button>
      <div class="pp-body"><div class="pp-loading">Yükleniyor…</div></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const body = overlay.querySelector('.pp-body');
  function close() { overlay.classList.remove('open'); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.close-btn').addEventListener('click', close);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) close();
  });

  function fmtDate(s) {
    if (!s) return '—';
    try {
      return I18N.formatDate(s, { year:'numeric', month:'long', day:'numeric' });
    } catch { return '—'; }
  }
  function nbLabel(id) {
    if (!id) return '—';
    if (id === 'istanbul_disi') return 'İstanbul Dışı';
    return (typeof neighborhoodNames !== 'undefined' && neighborhoodNames[id]) || id;
  }

  async function open(userId) {
    overlay.classList.add('open');
    body.innerHTML = '<div class="pp-loading">Yükleniyor…</div>';
    const { data, error } = await sb
      .from('profiles')
      .select('id, first_name, last_name, neighborhood, birth_place, avatar_url, joined_at, referred_by')
      .eq('id', userId)
      .maybeSingle();
    if (error || !data) {
      body.innerHTML = '<div class="pp-error">Profil yüklenemedi.</div>';
      return;
    }
    let kefilName = null, kefilId = null;
    if (data.referred_by) {
      const { data: kp } = await sb
        .from('profiles')
        .select('id, first_name, last_name')
        .eq('id', data.referred_by)
        .maybeSingle();
      if (kp) {
        kefilName = (`${kp.first_name || ''} ${kp.last_name || ''}`).trim() || 'İsimsiz Üye';
        kefilId = kp.id;
      }
    }
    const fullName = `${data.first_name || ''} ${data.last_name || ''}`.trim() || 'İsimsiz Üye';
    const initial = (fullName.charAt(0) || '?').toUpperCase();
    const avatar = data.avatar_url ? `<img src="${data.avatar_url}" alt="">` : initial;
    const birth = nbLabel(data.birth_place);
    const upperName = fullName.toLocaleUpperCase('tr-TR');
    body.innerHTML = `
      <div class="pp-avatar">${avatar}</div>
      <div class="pp-name">${upperName}</div>
      <div class="pp-meta">${nbLabel(data.neighborhood)}</div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.birthplace')}</span><span class="pp-value">${birth}</span></div>
      <div class="pp-row"><span class="pp-label">${I18N.t('profile.membership')}</span><span class="pp-value">${fmtDate(data.joined_at)}</span></div>
      ${kefilName ? `<div class="pp-row"><span class="pp-label">${I18N.t('profile.kefil')}</span><span class="pp-value"><span class="author-link" data-user-id="${kefilId}">${kefilName}</span></span></div>` : ''}
    `;
  }

  document.addEventListener('click', (e) => {
    const link = e.target.closest('.author-link');
    if (!link) return;
    const id = link.getAttribute('data-user-id');
    if (id) open(id);
  });
})();
</script>
