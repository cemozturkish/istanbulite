<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulmaca — istanbulite.net</title>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --success: #555555;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 32px;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
      flex-shrink: 0;
    }

    .masthead {
      font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .masthead:hover { color: var(--accent); }

    nav { display: flex; gap: 22px; align-items: center; }
    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    .section-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 7px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
      flex-shrink: 0;
    }
    .section-rule .divider {
      width: 2px;
      height: 12px;
      background: var(--ink);
    }

    /* 3-column layout */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      gap: 0;
      overflow: hidden;
      min-height: 0;
    }

    /* Left: personal stats */
    .stats-left {
      order: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .panel-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .stat-big {
      text-align: center;
      padding: 8px 0;
    }
    .stat-big .num {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-big .label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      padding: 3px 0;
    }
    .stat-row .stat-label { color: var(--muted); }
    .stat-row .stat-val { font-weight: 700; }

    /* Center: game */
    .game-panel {
      order: 2;
      border-left: var(--col-border);
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 16px;
      overflow-y: auto;
      min-height: 0;
      gap: 8px;
    }

    .crossword-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      max-width: 220px;
      width: 100%;
      flex-shrink: 0;
    }

    .crossword-cell {
      aspect-ratio: 1;
      border: 2px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.8rem, 2.5vh, 1.2rem);
      font-weight: 700;
      text-transform: uppercase;
      background: white;
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    .crossword-cell.black {
      background: var(--ink);
      cursor: default;
    }

    .crossword-cell.active {
      background: #e0e0e0;
    }

    .crossword-cell.correct {
      background: #c0c0c0;
    }

    .cell-number {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 0.5rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }
    .btn-primary:hover { background: var(--accent); }

    .game-message {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      min-height: 18px;
      flex-shrink: 0;
    }

    .reset-info {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      flex-shrink: 0;
    }

    .clues-wrap {
      width: 100%;
      max-width: 360px;
      flex-shrink: 0;
    }

    .clues-wrap h3 {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 4px;
      padding-bottom: 3px;
      border-bottom: 1px solid #ddd;
      letter-spacing: 1px;
    }

    .clue-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px;
    }

    .clue {
      display: flex;
      gap: 4px;
      font-size: 0.75rem;
      line-height: 1.3;
    }

    .clue-number {
      font-weight: 700;
      color: var(--accent);
      min-width: 16px;
    }

    /* Right: community stats */
    .stats-right {
      order: 3;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .dist-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      margin-bottom: 4px;
    }
    .dist-bar-wrap .dist-label {
      min-width: 12px;
      text-align: right;
      font-weight: 700;
      color: var(--muted);
    }
    .dist-bar-outer {
      flex: 1;
      height: 14px;
      background: var(--paper-dark);
      border: 1px solid #ddd;
    }
    .dist-bar-inner {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .dist-bar-wrap .dist-pct {
      min-width: 30px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .district-rank {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0;
      border-bottom: 1px solid #eee;
    }
    .district-rank:last-child { border-bottom: none; }
    .district-rank .rank-name { font-weight: 600; }
    .district-rank .rank-pct { color: var(--muted); font-weight: 700; }

    footer {
      text-align: center;
      padding: 10px;
      background: var(--paper-dark);
      border-top: 2px solid var(--ink);
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }
  </style>

// Daily seed for puzzle rotation
function getDailySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return `Yeni bulmaca ${hours} saat ${minutes} dakika sonra`;
}

function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % PUZZLES.length);
}

const dailySeed = getDailySeed();
const puzzleIndex = seededRandom(dailySeed);
const todayPuzzle = PUZZLES[puzzleIndex];
const PUZZLE = todayPuzzle.grid;
const CLUES = todayPuzzle.clues;

let activeCell = null;
let gameCompleted = false;
let checkAttempts = 0;
const userAnswers = Array(5).fill(null).map(() => Array(5).fill(''));
const SAVE_KEY = 'bulmaca_state_' + dailySeed;

function createGrid() {
  const grid = document.getElementById('crossword-grid');

  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      const cell = document.createElement('div');

      if (PUZZLE[row][col] === null) {
        cell.className = 'crossword-cell black';
      } else {
        cell.className = 'crossword-cell';
        cell.dataset.row = row;
        cell.dataset.col = col;

        if ((row === 0 && col === 0) ||
            (row === 0 && col === 2) ||
            (row === 1 && col === 0) ||
            (row === 3 && col === 1) ||
            (row === 4 && col === 0)) {
          const num = document.createElement('span');
          num.className = 'cell-number';
          if (row === 0 && col === 0) num.textContent = '1';
          if (row === 0 && col === 2) num.textContent = '3';
          if (row === 1 && col === 0) num.textContent = '2';
          if (row === 3 && col === 1) num.textContent = '4';
          if (row === 4 && col === 0) num.textContent = '5';
          cell.appendChild(num);
        }

        cell.onclick = () => selectCell(row, col);
      }

      grid.appendChild(cell);
    }
  }
}

function selectCell(row, col) {
  document.querySelectorAll('.crossword-cell').forEach(c => c.classList.remove('active'));
  activeCell = { row, col };
  const cells = document.querySelectorAll('.crossword-cell');
  cells[row * 5 + col].classList.add('active');
}

function updateCell(letter) {
  if (!activeCell) return;
  const { row, col } = activeCell;
  userAnswers[row][col] = letter;

  const cells = document.querySelectorAll('.crossword-cell');
  const cell = cells[row * 5 + col];
  const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
  if (textNode) {
    textNode.textContent = letter;
  } else {
    cell.appendChild(document.createTextNode(letter));
  }
}

document.addEventListener('keydown', (e) => {
  if (!activeCell || gameCompleted) return;

  if (e.key.length === 1 && e.key.match(/[a-zçğıöşüA-ZÇĞİÖŞÜ]/)) {
    updateCell(e.key.toUpperCase());
    moveToNext();
    saveState();
  } else if (e.key === 'Backspace') {
    updateCell('');
    saveState();
  }
});

function moveToNext() {
  if (!activeCell) return;
  let { row, col } = activeCell;

  col++;
  if (col >= 5) { col = 0; row++; }

  if (row < 5) {
    while (PUZZLE[row][col] === null) {
      col++;
      if (col >= 5) { col = 0; row++; }
      if (row >= 5) return;
    }
    selectCell(row, col);
  }
}

// Render clues
function renderClues() {
  const container = document.getElementById('clues-container');
  let html = '<h3>Yatay</h3><div class="clue-list">';
  CLUES.across.forEach(c => {
    html += `<div class="clue"><span class="clue-number">${c.num}.</span><span>${c.clue}</span></div>`;
  });
  html += '</div><h3>Dikey</h3><div class="clue-list">';
  CLUES.down.forEach(c => {
    html += `<div class="clue"><span class="clue-number">${c.num}.</span><span>${c.clue}</span></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// Save/restore state
function saveState() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ userAnswers, gameCompleted, checkAttempts }));
}

function restoreState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.userAnswers) return false;
    const cells = document.querySelectorAll('.crossword-cell');
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        if (PUZZLE[row][col] !== null) {
          userAnswers[row][col] = state.userAnswers[row][col] || '';
          const cell = cells[row * 5 + col];
          const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
          if (textNode) { textNode.textContent = userAnswers[row][col]; }
          else if (userAnswers[row][col]) { cell.appendChild(document.createTextNode(userAnswers[row][col])); }
          if (state.gameCompleted && userAnswers[row][col] === PUZZLE[row][col]) {
            cell.classList.add('correct');
          }
        }
      }
    }
    checkAttempts = state.checkAttempts || 0;
    gameCompleted = state.gameCompleted || false;
    if (gameCompleted) {
      document.getElementById('game-message').textContent = 'Tebrikler! Tamamladınız!';
      document.getElementById('game-message').style.color = 'var(--success)';
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    }
    return true;
  } catch (e) { return false; }
}

// Check & clear buttons
document.getElementById('check-btn').addEventListener('click', () => {
  if (gameCompleted) return;
  checkAttempts++;
  let allCorrect = true;
  const cells = document.querySelectorAll('.crossword-cell:not(.black)');

  cells.forEach(cell => {
    const row = parseInt(cell.dataset.row);
    const col = parseInt(cell.dataset.col);
    if (userAnswers[row][col] === PUZZLE[row][col]) {
      cell.classList.add('correct');
    } else {
      allCorrect = false;
      cell.classList.remove('correct');
    }
  });

  const msgEl = document.getElementById('game-message');
  if (allCorrect) {
    msgEl.textContent = 'Tebrikler! Tamamladınız!';
    msgEl.style.color = 'var(--success)';
    document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    gameCompleted = true;
    // Track stats
    localStorage.setItem('bulmaca_played', parseInt(localStorage.getItem('bulmaca_played') || '0') + 1);
    localStorage.setItem('bulmaca_wins', parseInt(localStorage.getItem('bulmaca_wins') || '0') + 1);
    localStorage.setItem('bulmaca_checks_' + dailySeed, checkAttempts);
    // Streak tracking
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
    const lastWin = localStorage.getItem('bulmaca_last_win_date') || '';
    if (lastWin === yKey) {
      localStorage.setItem('bulmaca_streak', parseInt(localStorage.getItem('bulmaca_streak') || '0') + 1);
    } else if (lastWin !== dailySeed) {
      localStorage.setItem('bulmaca_streak', '1');
    }
    localStorage.setItem('bulmaca_last_win_date', dailySeed);
    const streak = parseInt(localStorage.getItem('bulmaca_streak') || '1');
    const maxStreak = parseInt(localStorage.getItem('bulmaca_max_streak') || '0');
    if (streak > maxStreak) localStorage.setItem('bulmaca_max_streak', streak);
    recordGameResult('bulmaca', dailySeed, checkAttempts, true, userNeighborhood);
    renderStats();
  } else {
    msgEl.textContent = 'Bazı cevaplar yanlış!';
    msgEl.style.color = 'var(--accent)';
  }
  saveState();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (gameCompleted) return;
  userAnswers.forEach((row, i) => row.forEach((_, j) => userAnswers[i][j] = ''));
  document.querySelectorAll('.crossword-cell:not(.black)').forEach(cell => {
    const textNode = Array.from(cell.childNodes).find(n => n.nodeType === 3);
    if (textNode) textNode.textContent = '';
    cell.classList.remove('correct');
  });
  document.getElementById('game-message').textContent = '';
  saveState();
});

// Load community stats from Supabase, falling back to deterministic data
async function loadCommunityStats() {
  try {
    const { data, error } = await sb.from('game_results')
      .select('attempts, won, neighborhood')
      .eq('game', 'bulmaca')
      .eq('date', dailySeed);
    if (error || !data || data.length === 0) throw new Error('no data');
    const dist = [0, 0, 0, 0, 0]; // 1 check, 2 checks, 3 checks, 4+ checks, failed
    data.forEach(r => {
      if (r.won) {
        if (r.attempts <= 1) dist[0]++;
        else if (r.attempts <= 2) dist[1]++;
        else if (r.attempts <= 3) dist[2]++;
        else dist[3]++;
      } else { dist[4]++; }
    });
    const districtMap = {};
    data.forEach(r => {
      if (!r.neighborhood) return;
      if (!districtMap[r.neighborhood]) districtMap[r.neighborhood] = { wins: 0, total: 0 };
      districtMap[r.neighborhood].total++;
      if (r.won) districtMap[r.neighborhood].wins++;
    });
    const neighborhoodNames = {
      bakirkoy:'Bakırköy', besiktas:'Beşiktaş', kadikoy:'Kadıköy',
      uskudar:'Üsküdar', fatih:'Fatih', beyoglu:'Beyoğlu',
      sisli:'Şişli', sariyer:'Sarıyer', maltepe:'Maltepe', atasehir:'Ataşehir',
      umraniye:'Ümraniye', kagithane:'Kağıthane', bahcelievler:'Bahçelievler',
      bagcilar:'Bağcılar', eyupsultan:'Eyüpsultan', bayrampasa:'Bayrampaşa',
      basaksehir:'Başakşehir', gungoren:'Güngören', esenler:'Esenler',
      gop:'Gaziosmanpaşa', kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi',
      beykoz:'Beykoz', cekmekoy:'Çekmeköy', zeytinburnu:'Zeytinburnu'
    };
    const topDistricts = Object.entries(districtMap)
      .map(([k, v]) => ({ name: neighborhoodNames[k] || k, pct: Math.round(v.wins / v.total * 100) }))
      .sort((a, b) => b.pct - a.pct)
      .slice(0, 5);
    return { dist, topDistricts };
  } catch (e) {
    return { dist: generateCommunityDist(), topDistricts: generateTopDistricts() };
  }
}

// Stats rendering
async function renderStats() {
  const played = parseInt(localStorage.getItem('bulmaca_played') || '0');
  const wins = parseInt(localStorage.getItem('bulmaca_wins') || '0');
  const streak = parseInt(localStorage.getItem('bulmaca_streak') || '0');
  const maxStreak = parseInt(localStorage.getItem('bulmaca_max_streak') || '0');
  const winPct = played > 0 ? Math.round(wins / played * 100) : 0;
  const todayChecks = parseInt(localStorage.getItem('bulmaca_checks_' + dailySeed) || '0');

  document.getElementById('stats-left').innerHTML = `
    <div>
      <div class="panel-title">Kişisel İstatistikler</div>
    </div>
    <div class="stat-big">
      <div class="num">${streak}</div>
      <div class="label">Seri</div>
    </div>
    <div class="stat-row">
      <span class="stat-label">Oynanan</span>
      <span class="stat-val">${played}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanılan</span>
      <span class="stat-val">${wins}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanma %</span>
      <span class="stat-val">${winPct}%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">En Uzun Seri</span>
      <span class="stat-val">${Math.max(streak, maxStreak)}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Bugün Kontrol</span>
      <span class="stat-val">${todayChecks > 0 ? todayChecks : '—'}</span>
    </div>
  `;

  // Right: community stats from Supabase (falls back to deterministic data)
  const community = await loadCommunityStats();
  const communityDist = community.dist;
  const topDistricts = community.topDistricts;
  const totalCommunity = communityDist.reduce((a, b) => a + b, 0);
  const maxCommunityDist = Math.max(...communityDist, 1);

  document.getElementById('stats-right').innerHTML = `
    <div>
      <div class="panel-title">Günün İstatistikleri</div>
    </div>
    ${communityDist.map((d, i) => {
      const pct = totalCommunity > 0 ? Math.round(d / totalCommunity * 100) : 0;
      const labels = ['1 denemede', '2 denemede', '3 denemede', '4+ denemede', 'Bitiremedi'];
      return `
        <div class="dist-bar-wrap">
          <span class="dist-label" style="min-width:64px;text-align:left;font-size:0.6rem;">${labels[i]}</span>
          <div class="dist-bar-outer">
            <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxCommunityDist * 100, 3) : 0}%"></div>
          </div>
          <span class="dist-pct">${pct}%</span>
        </div>
      `;
    }).join('')}
    <div style="margin-top:8px;">
      <div class="panel-title">En Başarılı İlçeler</div>
    </div>
    ${topDistricts.map((d, i) => `
      <div class="district-rank">
        <span class="rank-name">${i + 1}. ${d.name}</span>
        <span class="rank-pct">${d.pct}%</span>
      </div>
    `).join('')}
  `;
}

// Deterministic community stats from daily seed
function generateCommunityDist() {
  let hash = 0;
  for (let i = 0; i < dailySeed.length; i++) {
    hash = ((hash << 5) - hash) + dailySeed.charCodeAt(i);
    hash = hash & hash;
  }
  // Distribution: 1 check, 2 checks, 3 checks, 4+ checks, failed
  const base = [8, 22, 30, 25, 15];
  return base.map((b, i) => {
    const noise = ((hash >> (i * 4)) & 0xF) - 8;
    return Math.max(1, b + noise);
  });
}

function generateTopDistricts() {
  const names = {
    bakirkoy:'Bakırköy', besiktas:'Beşiktaş', kadikoy:'Kadıköy',
    uskudar:'Üsküdar', fatih:'Fatih', beyoglu:'Beyoğlu',
    sisli:'Şişli', sariyer:'Sarıyer', maltepe:'Maltepe', atasehir:'Ataşehir',
    umraniye:'Ümraniye', kagithane:'Kağıthane', bahcelievler:'Bahçelievler',
    bagcilar:'Bağcılar', eyupsultan:'Eyüpsultan'
  };
  const keys = Object.keys(names);
  let hash = 0;
  for (let i = 0; i < dailySeed.length; i++) {
    hash = ((hash << 3) - hash) + dailySeed.charCodeAt(i);
    hash = hash & hash;
  }
  return keys.map((k, i) => ({
    name: names[k],
    pct: 55 + Math.abs((hash >> (i * 2)) % 40)
  })).sort((a, b) => b.pct - a.pct).slice(0, 5);
}

createGrid();
renderClues();
restoreState();
renderStats();
</script>
