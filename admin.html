<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --rule: #cccccc;
      --accent: #333333;
      --muted: #888888;
      --success: #555555;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper-dark);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── ACCESS DENIED / LOGIN ── */
    #access-screen {
      position: fixed;
      inset: 0;
      background: var(--paper);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    #access-screen .masthead {
      font-family: 'Inter', sans-serif; font-weight: 400;
      font-size: 2rem;
      letter-spacing: 1px;
      color: var(--ink);
      margin-bottom: 4px;
    }

    #access-screen .sub {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .admin-login-box {
      border: 2px solid var(--ink);
      padding: 32px 38px;
      width: 360px;
      background: var(--paper);
      position: relative;
    }
    .admin-login-box::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }
    .admin-login-box h2 {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: var(--col-border);
      color: var(--accent);
    }
    .admin-login-box input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--ink);
      background: #f5f5f5;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
    }
    .admin-login-box input:focus { border-color: var(--accent); }
    .admin-login-box button {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .admin-login-box button:hover { background: #555555; }
    .error-msg {
      color: var(--accent);
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 10px;
      min-height: 18px;
      font-style: italic;
    }

    /* ── ADMIN PANEL ── */
    #admin-panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 32px;
      background: var(--ink);
      color: var(--paper);
      border-bottom: 3px solid var(--accent);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Inter', sans-serif; font-weight: 400;
      font-size: 2rem;
      letter-spacing: 1px;
    }

    header .admin-badge {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 10px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-right span { font-size: 0.78rem; color: #aaa; }

    #signout-btn {
      background: none;
      border: 1px solid #666;
      color: #aaa;
      padding: 5px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    #signout-btn:hover { border-color: var(--accent); color: var(--accent); }

    .admin-body {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px;
      width: 100%;
    }

    .admin-body.users-mode {
      grid-template-columns: 1fr;
      max-width: 520px;
    }

    .admin-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 24px 0;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .admin-tab {
      padding: 8px 16px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-bottom: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .admin-tab.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: 16px 20px;
      overflow-y: auto;
      min-height: 0;
    }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: var(--col-border);
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label:first-of-type { margin-top: 0; }

    select, input[type="text"], textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #bbb;
      background: #f5f5f5;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }

    textarea { resize: vertical; min-height: 60px; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-primary { background: var(--ink); color: var(--paper); flex: 1; }
    .btn-primary:hover { background: var(--accent); }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #922b21; }
    .btn-secondary { background: #ddd; color: var(--ink); }
    .btn-secondary:hover { background: #ccc; }

    .status-msg {
      margin-top: 12px;
      font-size: 0.82rem;
      font-style: italic;
      min-height: 18px;
      text-align: center;
    }
    .status-msg.ok { color: var(--success); }
    .status-msg.err { color: var(--accent); }

    /* Articles list */
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }
    .filter-row select { flex: 1; }
    .filter-row button {
      padding: 8px 14px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .articles-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; min-height: 0; }

    .article-card {
      border: 1px solid #ccc;
      padding: 12px 14px;
      background: #f5f5f5;
      position: relative;
    }

    .article-card .a-neighborhood {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .article-card h4 {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .article-card p {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .article-card .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .card-actions button {
      padding: 4px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      border: none;
    }
    .btn-edit { background: var(--ink); color: var(--paper); }
    .btn-edit:hover { background: #444; }
    .btn-del { background: #c0392b; color: white; }
    .btn-del:hover { background: #922b21; }

    .empty-state {
      font-style: italic;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      padding: 20px 0;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      #access-screen .masthead {
        font-size: 1.6rem;
      }

      .admin-login-box {
        width: 90vw;
        max-width: 360px;
        padding: 24px 20px;
      }

      header {
        padding: 6px 10px;
        flex-wrap: wrap;
        gap: 6px;
        flex-shrink: 0;
      }

      header h1 {
        font-size: 1rem;
      }

      .header-right {
        gap: 6px;
      }

      .admin-body {
        display: flex;
        flex-direction: column;
        padding: 8px;
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }

      .panel {
        min-height: auto;
        overflow: visible;
      }
    }
  </style>
</head>
<body>

<!-- ── ACCESS SCREEN ── -->
<div id="access-screen">
  <div class="masthead">istanbulite.net</div>
  <div class="sub">Admin Access</div>
  <div class="admin-login-box">
    <h2>Editor Login</h2>
    <div class="error-msg" id="access-error"></div>
    <input type="email" id="adm-email" placeholder="Admin email"/>
    <input type="password" id="adm-password" placeholder="Password"/>
    <button id="adm-login-btn">Enter Editorial</button>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">
  <header>
    <h1>istanbulite.net</h1>
    <div class="admin-badge">Editorial Desk</div>
    <div class="header-right">
      <span id="adm-email-display"></span>
      <a href="index.html" style="color:#aaa;font-size:0.78rem;text-decoration:none;">← Back to Site</a>
      <button id="signout-btn">Sign Out</button>
    </div>
  </header>

  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="articles">Articles</button>
    <button class="admin-tab" data-tab="news">Breaking News</button>
    <button class="admin-tab" data-tab="users">Users</button>
  </div>

  <div class="admin-body" id="articles-tab">

    <!-- LEFT: Add / Edit Form -->
    <div class="panel">
      <div class="panel-title" id="form-mode-label">Add New Article</div>

      <label>Source</label>
      <select id="f-source">
        <option value="economist">The Economist</option>
        <option value="nytimes">New York Times</option>
        <option value="ft">Financial Times</option>
        <option value="codastory">Coda Story</option>
        <option value="european_correspondent">The European Correspondent</option>
        <option value="telegraph">The Telegraph</option>
        <option value="aljazeera">Al Jazeera</option>
      </select>

      <label>Title</label>
      <input type="text" id="f-title" placeholder="Article title..."/>

      <label>Author</label>
      <input type="text" id="f-author" placeholder="e.g. Jane Doe"/>

      <label>Date Published</label>
      <input type="date" id="f-published"/>

      <label>One-sentence summary</label>
      <textarea id="f-summary" placeholder="Shown in the article list..."></textarea>

      <label>Body (optional)</label>
      <textarea id="f-body" placeholder="Full article text shown when opened..." style="min-height:120px;"></textarea>

      <label>Source URL (optional)</label>
      <input type="text" id="f-url" placeholder="https://..."/>

      <input type="hidden" id="f-editing-id"/>

      <div class="btn-row">
        <button class="btn btn-primary" id="submit-btn">Publish Article</button>
        <button class="btn btn-secondary" id="cancel-edit-btn" style="display:none;">Cancel Edit</button>
      </div>
      <div class="status-msg" id="form-status"></div>
    </div>

    <!-- RIGHT: Articles List -->
    <div class="panel">
      <div class="panel-title">Published Articles</div>

      <div class="filter-row">
        <select id="filter-scope">
          <option value="all">All Sources</option>
          <option value="economist">The Economist</option>
          <option value="nytimes">New York Times</option>
          <option value="ft">Financial Times</option>
          <option value="codastory">Coda Story</option>
          <option value="european_correspondent">The European Correspondent</option>
          <option value="telegraph">The Telegraph</option>
          <option value="aljazeera">Al Jazeera</option>
        </select>
        <button id="filter-btn">Filter</button>
      </div>

      <div class="articles-list" id="articles-list">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>

  </div>

  <div class="admin-body" id="news-tab" style="display:none;">

    <!-- LEFT: Add Breaking News -->
    <div class="panel">
      <div class="panel-title">Post Breaking News</div>

      <label>Headline</label>
      <input type="text" id="n-title" placeholder="Breaking news headline..."/>

      <label>Body (optional)</label>
      <textarea id="n-body" placeholder="A sentence or two of detail..."></textarea>

      <label>URL (optional)</label>
      <input type="text" id="n-url" placeholder="https://..."/>

      <label>Neighborhood (optional — pulses on the map)</label>
      <select id="n-neighborhood">
        <option value="">— None (general) —</option>
      </select>

      <div class="btn-row">
        <button class="btn btn-primary" id="n-submit-btn">Post Breaking News</button>
      </div>
      <div class="status-msg" id="n-form-status"></div>
      <p style="margin-top:14px;font-size:0.75rem;color:var(--muted);font-style:italic;line-height:1.4;">
        Breaking news auto-disappears 24 hours after posting.
      </p>
    </div>

    <!-- RIGHT: Active News -->
    <div class="panel">
      <div class="panel-title">Active Breaking News (last 24h)</div>
      <div class="articles-list" id="news-list">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>

  </div>

  <div class="admin-body" id="users-tab" style="display:none;">

    <!-- LEFT: Create User -->
    <div class="panel">
      <div class="panel-title">Create User Account</div>

      <label>First Name</label>
      <input type="text" id="u-first-name" placeholder="Ad"/>

      <label>Last Name</label>
      <input type="text" id="u-last-name" placeholder="Soyad"/>

      <label>Phone</label>
      <input type="tel" id="u-phone" placeholder="+90..."/>

      <label>Email (magic-link invite sent here)</label>
      <input type="email" id="u-email" placeholder="user@example.com"/>

      <label>Neighborhood (current residence)</label>
      <select id="u-neighborhood"><option value="">— Select District —</option></select>

      <label>Birth Neighborhood</label>
      <select id="u-birth-neighborhood"><option value="">— Select District —</option></select>

<div class="form-actions" style="margin-top:14px;">
        <button class="btn btn-primary" id="u-submit-btn">Send Invite</button>
      </div>
      <div class="status-msg" id="u-form-status"></div>
    </div>

    <!-- RIGHT: Members List -->
    <div class="panel">
      <div class="panel-title">Members</div>
      <div class="articles-list" id="users-list">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIGURATION — Replace with your values
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const ADMIN_EMAIL = 'cemwozturk@gmail.com'; // e.g. 'you@youremail.com'

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Check access ──
async function checkAdmin() {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user.email === ADMIN_EMAIL) {
    showAdminPanel(session.user);
    loadArticles();
    loadUsersTabNeighborhoods();
  }
}

function showAdminPanel(user) {
  document.getElementById('access-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'flex';
  document.getElementById('adm-email-display').textContent = user.email;
}

// ── Login ──
document.getElementById('adm-login-btn').addEventListener('click', async () => {
  const email = document.getElementById('adm-email').value.trim();
  const password = document.getElementById('adm-password').value;
  const errEl = document.getElementById('access-error');

  if (!email || !password) { errEl.textContent = 'Fill in all fields.'; return; }

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) { errEl.textContent = error.message; return; }
  if (data.user.email !== ADMIN_EMAIL) {
    await sb.auth.signOut();
    errEl.textContent = 'Access denied. Admin only.';
    return;
  }
  showAdminPanel(data.user);
  loadArticles();
  loadUsersTabNeighborhoods();
});

const NEIGHBORHOOD_NAMES = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih',
  istanbul_disi: 'İstanbul Dışı'
};
const LIB_SOURCE_NAMES = {
  economist: 'The Economist',
  nytimes: 'New York Times',
  ft: 'Financial Times',
  codastory: 'Coda Story',
  european_correspondent: 'The European Correspondent',
  telegraph: 'The Telegraph',
  aljazeera: 'Al Jazeera',
};
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Tab switching ──
document.querySelectorAll('.admin-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.admin-tab').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('articles-tab').style.display = (tab === 'articles') ? '' : 'none';
    document.getElementById('news-tab').style.display = (tab === 'news') ? '' : 'none';
    document.getElementById('users-tab').style.display = (tab === 'users') ? '' : 'none';
    if (tab === 'news') loadBreakingNews();
    if (tab === 'users') loadUsersList();
  });
});

// ── Populate all neighborhood dropdowns ──
async function loadAllNeighborhoodDropdowns() {
  const { data, error } = await sb.from('neighborhoods').select('id, name_tr').order('name_tr');
  if (error || !data) return;
  const resSel = document.getElementById('u-neighborhood');
  const birthSel = document.getElementById('u-birth-neighborhood');
  const nNb = document.getElementById('n-neighborhood');
  data.forEach(n => {
    [birthSel, nNb].forEach(sel => {
      const opt = document.createElement('option');
      opt.value = n.id;
      opt.textContent = n.name_tr;
      sel.appendChild(opt);
    });
    if (n.id !== 'istanbul_disi') {
      const resOpt = document.createElement('option');
      resOpt.value = n.id;
      resOpt.textContent = n.name_tr;
      resSel.appendChild(resOpt);
    }
  });
}
const loadUsersTabNeighborhoods = loadAllNeighborhoodDropdowns; // back-compat alias

// ── Users tab: create user via Edge Function ──
document.getElementById('u-submit-btn').addEventListener('click', async () => {
  const btn = document.getElementById('u-submit-btn');
  const statusEl = document.getElementById('u-form-status');
  const payload = {
    first_name: document.getElementById('u-first-name').value.trim(),
    last_name: document.getElementById('u-last-name').value.trim(),
    phone: document.getElementById('u-phone').value.trim(),
    email: document.getElementById('u-email').value.trim(),
    neighborhood: document.getElementById('u-neighborhood').value,
    birth_neighborhood: document.getElementById('u-birth-neighborhood').value,
  };
  if (!payload.first_name || !payload.last_name || !payload.phone || !payload.email
      || !payload.neighborhood || !payload.birth_neighborhood) {
    statusEl.textContent = 'Please fill all required fields.';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending...';
  statusEl.textContent = '';
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    statusEl.textContent = 'Failed: not logged in.';
    btn.disabled = false;
    btn.textContent = 'Send Invite';
    return;
  }
  const { data, error } = await sb.functions.invoke('admin-create-user', {
    body: payload,
    headers: { Authorization: `Bearer ${session.access_token}` },
  });
  btn.disabled = false;
  btn.textContent = 'Send Invite';
  if (error || (data && data.error)) {
    statusEl.textContent = 'Failed: ' + (error?.message || data?.error || 'Unknown error');
    return;
  }
  statusEl.textContent = 'Invite sent to ' + payload.email;
  ['u-first-name','u-last-name','u-phone','u-email'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('u-neighborhood').value = '';
  document.getElementById('u-birth-neighborhood').value = '';
});

['adm-email','adm-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('adm-login-btn').click();
  });
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

// ══════════════════════════════════════════
// Unified Articles tab
// ══════════════════════════════════════════
// A row from `articles` (neighborhood-tagged) or `library_articles`
// (source-tagged) is normalized into { id, kind, source|neighborhood,
// title, summary, body, url, position }. `kind` is the table name
// so edit/delete know where to write.

async function loadArticles(scope = 'all') {
  const listEl = document.getElementById('articles-list');
  listEl.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';

  let query = sb.from('library_articles').select('*')
    .order('source').order('position', { ascending: true }).order('created_at', { ascending: false });
  if (scope !== 'all') query = query.eq('source', scope);

  const { data, error } = await query;
  if (error) { listEl.innerHTML = `<div class="empty-state">Error loading articles.</div>`; return; }
  if (!data || !data.length) { listEl.innerHTML = '<div class="empty-state">No articles yet.</div>'; return; }

  const bySource = {};
  data.forEach(a => { (bySource[a.source] = bySource[a.source] || []).push(a); });

  const sections = Object.keys(bySource).map(src => ({
    label: LIB_SOURCE_NAMES[src] || src,
    rows: bySource[src],
    source: src,
  }));

  listEl.innerHTML = sections.map(section => {
    const cards = section.rows.map((a, i) => {
      const meta = [
        a.author ? escapeHtml(a.author) : null,
        a.published_at ? new Date(a.published_at).toLocaleDateString('tr-TR', { year:'numeric', month:'short', day:'numeric' }) : null,
      ].filter(Boolean).join(' · ');
      return `
        <div class="article-card" data-id="${a.id}">
          <div class="a-neighborhood">${escapeHtml(section.label)} · #${i + 1}${meta ? ' · ' + meta : ''}</div>
          <h4>${escapeHtml(a.title)}</h4>
          ${a.summary ? `<p>${escapeHtml(a.summary)}</p>` : ''}
          <div class="card-actions">
            <button class="btn-edit" data-act="up"   data-id="${a.id}" ${i === 0 ? 'disabled style="opacity:0.4;cursor:default;"' : ''}>↑</button>
            <button class="btn-edit" data-act="down" data-id="${a.id}" ${i === section.rows.length - 1 ? 'disabled style="opacity:0.4;cursor:default;"' : ''}>↓</button>
            <button class="btn-edit" data-act="edit" data-id="${a.id}">Edit</button>
            <button class="btn-del"  data-act="del"  data-id="${a.id}">Delete</button>
          </div>
        </div>
      `;
    }).join('');
    return `<div style="margin:6px 0;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);">${escapeHtml(section.label)}</div>${cards}`;
  }).join('');

  listEl.querySelectorAll('button[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      const row = data.find(x => x.id === id);
      if (!row) return;
      if (act === 'edit') editArticle(row);
      else if (act === 'del') deleteArticle(row);
      else if (act === 'up' || act === 'down') {
        const section = sections.find(s => s.source === row.source);
        if (section) reorderArticle(row, act, section.rows);
      }
    });
  });
}

document.getElementById('filter-btn').addEventListener('click', () => {
  loadArticles(document.getElementById('filter-scope').value);
});

// ── Submit (insert/update) ──
document.getElementById('submit-btn').addEventListener('click', async () => {
  const editingId = document.getElementById('f-editing-id').value;
  const source = document.getElementById('f-source').value;
  const title = document.getElementById('f-title').value.trim();
  const author = document.getElementById('f-author').value.trim() || null;
  const publishedRaw = document.getElementById('f-published').value;
  const published_at = publishedRaw ? new Date(publishedRaw).toISOString() : null;
  const summary = document.getElementById('f-summary').value.trim();
  const body = document.getElementById('f-body').value.trim();
  const url = document.getElementById('f-url').value.trim();
  const statusEl = document.getElementById('form-status');
  const btn = document.getElementById('submit-btn');

  if (!title || !source) {
    statusEl.textContent = 'Please select a source and enter a title.';
    statusEl.className = 'status-msg err';
    return;
  }

  statusEl.textContent = ''; statusEl.className = 'status-msg';
  btn.innerHTML = '<span class="spinner"></span>';

  let result;
  if (editingId) {
    result = await sb.from('library_articles')
      .update({ source, title, summary, body, url, author, published_at })
      .eq('id', editingId);
  } else {
    const { data: tail } = await sb.from('library_articles')
      .select('position').eq('source', source)
      .order('position', { ascending: false }).limit(1);
    const nextPos = (tail && tail[0] ? tail[0].position : -1) + 1;
    result = await sb.from('library_articles')
      .insert([{ source, title, summary, body, url, author, published_at, position: nextPos }]);
  }

  btn.textContent = editingId ? 'Update Article' : 'Publish Article';

  if (result.error) {
    statusEl.textContent = result.error.message;
    statusEl.className = 'status-msg err';
    return;
  }
  statusEl.textContent = editingId ? 'Article updated!' : 'Article published!';
  statusEl.className = 'status-msg ok';
  resetForm();
  loadArticles(document.getElementById('filter-scope').value);
  setTimeout(() => { statusEl.textContent = ''; }, 3000);
});

function resetForm() {
  document.getElementById('f-editing-id').value = '';
  document.getElementById('f-source').value = 'economist';
  document.getElementById('f-title').value = '';
  document.getElementById('f-author').value = '';
  document.getElementById('f-published').value = '';
  document.getElementById('f-summary').value = '';
  document.getElementById('f-body').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('submit-btn').textContent = 'Publish Article';
  document.getElementById('form-mode-label').textContent = 'Add New Article';
  document.getElementById('cancel-edit-btn').style.display = 'none';
}

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

function editArticle(row) {
  document.getElementById('f-editing-id').value = row.id;
  document.getElementById('f-source').value = row.source;
  document.getElementById('f-title').value = row.title || '';
  document.getElementById('f-author').value = row.author || '';
  document.getElementById('f-published').value = row.published_at
    ? new Date(row.published_at).toISOString().slice(0, 10)
    : '';
  document.getElementById('f-summary').value = row.summary || '';
  document.getElementById('f-body').value = row.body || '';
  document.getElementById('f-url').value = row.url || '';
  document.getElementById('submit-btn').textContent = 'Update Article';
  document.getElementById('form-mode-label').textContent = 'Editing Article';
  document.getElementById('cancel-edit-btn').style.display = 'inline-block';
  document.querySelector('#articles-tab .panel').scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteArticle(row) {
  if (!confirm('Delete this article? This cannot be undone.')) return;
  const { error } = await sb.from('library_articles').delete().eq('id', row.id);
  if (error) { alert('Error deleting: ' + error.message); return; }
  loadArticles(document.getElementById('filter-scope').value);
}

async function reorderArticle(row, direction, sourceList) {
  const i = sourceList.findIndex(x => x.id === row.id);
  const j = direction === 'up' ? i - 1 : i + 1;
  if (j < 0 || j >= sourceList.length) return;
  const other = sourceList[j];

  let pa = row.position;
  let pb = other.position;
  if (pa === pb) { pa = i; pb = j; }

  const { error: e1 } = await sb.from('library_articles').update({ position: pb }).eq('id', row.id);
  const { error: e2 } = await sb.from('library_articles').update({ position: pa }).eq('id', other.id);
  if (e1 || e2) { alert('Reorder failed: ' + (e1?.message || e2?.message)); return; }
  loadArticles(document.getElementById('filter-scope').value);
}

// ══════════════════════════════════════════
// Breaking news tab
// ══════════════════════════════════════════
async function loadBreakingNews() {
  const listEl = document.getElementById('news-list');
  listEl.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
  const { data, error } = await sb.from('breaking_news')
    .select('*').gte('created_at', cutoff)
    .order('created_at', { ascending: false });
  if (error) { listEl.innerHTML = '<div class="empty-state">Error loading news.</div>'; return; }
  if (!data || !data.length) { listEl.innerHTML = '<div class="empty-state">No active breaking news.</div>'; return; }

  listEl.innerHTML = data.map(n => {
    const ago = formatAgo(n.created_at);
    const tag = n.neighborhood
      ? (NEIGHBORHOOD_NAMES[n.neighborhood] || n.neighborhood)
      : 'General';
    return `
      <div class="article-card" data-id="${n.id}">
        <div class="a-neighborhood">${escapeHtml(tag)} · ${ago}</div>
        <h4>${escapeHtml(n.title)}</h4>
        ${n.body ? `<p>${escapeHtml(n.body)}</p>` : ''}
        <div class="card-actions">
          <button class="btn-del" data-act="del-news" data-id="${n.id}">Delete</button>
        </div>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('button[data-act="del-news"]').forEach(btn => {
    btn.addEventListener('click', () => deleteBreakingNews(btn.dataset.id));
  });
}

function formatAgo(iso) {
  const d = new Date(iso);
  const mins = Math.floor((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min ago';
  const hrs = Math.floor(mins / 60);
  return hrs + ' h ago';
}

document.getElementById('n-submit-btn').addEventListener('click', async () => {
  const btn = document.getElementById('n-submit-btn');
  const statusEl = document.getElementById('n-form-status');
  const title = document.getElementById('n-title').value.trim();
  const body = document.getElementById('n-body').value.trim();
  const url = document.getElementById('n-url').value.trim();
  const neighborhood = document.getElementById('n-neighborhood').value || null;

  if (!title) {
    statusEl.textContent = 'Please enter a headline.';
    statusEl.className = 'status-msg err';
    return;
  }
  statusEl.textContent = ''; statusEl.className = 'status-msg';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await sb.from('breaking_news').insert([{ title, body: body || null, url: url || null, neighborhood }]);
  btn.disabled = false;
  btn.textContent = 'Post Breaking News';

  if (error) {
    statusEl.textContent = error.message;
    statusEl.className = 'status-msg err';
    return;
  }
  statusEl.textContent = 'Breaking news posted!';
  statusEl.className = 'status-msg ok';
  ['n-title','n-body','n-url'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('n-neighborhood').value = '';
  loadBreakingNews();
  setTimeout(() => { statusEl.textContent = ''; }, 3000);
});

async function deleteBreakingNews(id) {
  if (!confirm('Delete this breaking news item?')) return;
  const { error } = await sb.from('breaking_news').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  loadBreakingNews();
}

// Users tab — list
// ══════════════════════════════════════════
async function loadUsersList() {
  const listEl = document.getElementById('users-list');
  listEl.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  const { data, error } = await sb.from('profiles')
    .select('*').order('joined_at', { ascending: false });
  if (error) { listEl.innerHTML = '<div class="empty-state">Error loading users: ' + escapeHtml(error.message) + '</div>'; return; }
  if (!data || !data.length) { listEl.innerHTML = '<div class="empty-state">No members yet.</div>'; return; }

  listEl.innerHTML = data.map(p => {
    const name = ((p.first_name || '') + ' ' + (p.last_name || '')).trim() || '(no name)';
    const nb = NEIGHBORHOOD_NAMES[p.neighborhood] || p.neighborhood || '—';
    const birth = NEIGHBORHOOD_NAMES[p.birth_place] || p.birth_place || '—';
    const joined = p.joined_at ? new Date(p.joined_at).toLocaleDateString('tr-TR', { year:'numeric', month:'short', day:'numeric' }) : '—';
    return `
      <div class="article-card">
        <div class="a-neighborhood">${escapeHtml(nb)} · joined ${escapeHtml(joined)}</div>
        <h4>${escapeHtml(name)}</h4>
        <p>
          ${p.email ? escapeHtml(p.email) + '<br>' : ''}
          ${p.phone ? escapeHtml(p.phone) + '<br>' : ''}
          <span style="color:var(--muted);">Doğum: ${escapeHtml(birth)}</span><br>
          <span style="color:var(--muted);font-family:monospace;font-size:0.75rem;">Kefil kodu: ${escapeHtml(p.referral_code || '—')}</span>
        </p>
      </div>
    `;
  }).join('');
}
