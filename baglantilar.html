<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Bağlantılar — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      /* Core ink & paper */
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --hover: #e0e0e0;
      --field-bg: #f5f5f5;
      /* Grayscale neutrals */
      --accent: #333333;
      --accent-2: #555555;
      --muted: #888888;
      --rule: #cccccc;
      --hairline: #bbbbbb;
      --whisper: #e6e6e6;
      /* Newspaper accents (reserve — use sparingly) */
      --ink-red: #D41717;
      --brown-1: #8a6f53;
      --brown-2: #6b5640;
      --brown-3: #4e3f2e;
      --brown-4: #38301f;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
      /* Bağlantılar category fills */
      --cat1: #666666;
      --cat2: #888888;
      --cat3: #444444;
      --cat4: #222222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: pan-y;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { }
    .datetime-block .time-line { }

    header {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    /* ── Left: personal + community stats (compact) ── */
    .stats-left {
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      overflow-y: auto;
      gap: 8px;
    }

    .panel-title {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 3px;
      border-bottom: 1px solid #ddd;
    }

    .stat-tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .stat-tile {
      text-align: center;
      padding: 4px 2px;
      background: var(--paper-dark);
    }
    .stat-tile .num {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-tile .label {
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 1px 0;
    }
    .stat-row .stat-label { color: var(--muted); }
    .stat-row .stat-val { font-weight: 700; }

    .stats-left .dist-bar-wrap {
      font-size: 0.6rem;
      margin-bottom: 2px;
      gap: 4px;
    }
    .stats-left .dist-bar-outer { height: 10px; }
    .stats-left .dist-pct { font-size: 0.55rem; min-width: 24px; }
    .stats-left .district-rank { font-size: 0.65rem; padding: 1px 0; }

    /* ── Center: game panel ── */
    .game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      overflow: hidden;
      min-height: 0;
      gap: 8px;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 100%;
      min-height: 0;
    }

    .instructions {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .mistakes {
      text-align: center;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
    }

    .solved-groups {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .solved-group {
      padding: 8px;
      text-align: center;
      border-radius: 4px;
      color: white;
    }

    .solved-group.cat1 { background: var(--cat1); }
    .solved-group.cat2 { background: var(--cat2); }
    .solved-group.cat3 { background: var(--cat3); }
    .solved-group.cat4 { background: var(--cat4); }

    .solved-group-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .solved-group-words {
      font-size: 0.85rem;
    }

    .words-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .word-card {
      padding: 12px 6px;
      background: white;
      border: 2px solid #ccc;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      user-select: none;
    }

    .word-card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .word-card.selected {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .btn {
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }

    .btn-primary:hover { background: var(--accent); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .btn-secondary {
      background: #ddd;
      color: var(--ink);
    }

    .btn-secondary:hover { background: #ccc; }

    .game-status {
      text-align: center;
      font-size: 0.9rem;
      min-height: 22px;
      font-weight: 700;
    }

    .reset-info {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      flex-shrink: 0;
    }

    .dist-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      margin-bottom: 4px;
    }
    .dist-bar-wrap .dist-label {
      min-width: 12px;
      text-align: right;
      font-weight: 700;
      color: var(--muted);
    }
    .dist-bar-outer {
      flex: 1;
      height: 14px;
      background: var(--paper-dark);
      border: 1px solid #ddd;
      position: relative;
    }
    .dist-bar-inner {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .dist-bar-wrap .dist-pct {
      min-width: 30px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .district-rank {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0;
      border-bottom: 1px solid #eee;
    }
    .district-rank:last-child { border-bottom: none; }
    .district-rank .rank-name { font-weight: 600; }
    .district-rank .rank-pct { color: var(--muted); font-weight: 700; }

    /* ── Right: games nav (mirrors Kahvehane) ── */
    .games-section {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }
    .games-section-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .games-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
      text-align: center;
      letter-spacing: 2px;
      flex-shrink: 0;
    }
    .game-link {
      display: block;
      background: white;
      border: 2px solid var(--ink);
      padding: 14px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.2s;
      position: relative;
      flex-shrink: 0;
    }
    .game-link::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }
    .game-link:hover {
      background: var(--paper-dark);
      transform: translateX(-4px);
    }
    .game-link.active {
      background: var(--ink);
      color: var(--paper);
    }
    .game-link.active::before { border-color: var(--paper); }
    .game-link-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .game-link-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
    }
    .game-link.active .game-link-subtitle { color: #cccccc; }
    .scoreboard {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #cccccc;
      flex-shrink: 0;
    }
    .scoreboard h2 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .scoreboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .scoreboard-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--paper);
      border: 1px solid #cccccc;
      font-size: 0.75rem;
    }
    .scoreboard-item.top {
      background: var(--paper-dark);
      border-color: var(--ink);
    }
    .scoreboard-rank {
      font-weight: 700;
      color: var(--ink);
      min-width: 18px;
      font-size: 0.8rem;
    }
    .scoreboard-player {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scoreboard-name { font-weight: 700; color: var(--ink); }
    .scoreboard-nb { color: var(--muted); font-size: 0.7rem; }
    .scoreboard-score {
      font-weight: 700;
      color: var(--ink);
      font-size: 0.85rem;
      min-width: 22px;
      text-align: right;
    }
    .scoreboard-empty {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 10px 4px;
      list-style: none;
    }

    /* ── MOBILE RESPONSIVE ── */
    /* Desktop back button: floating top-left inside main */
    .game-back-btn {
      position: absolute;
      top: 10px;
      left: 14px;
      z-index: 50;
      width: 30px;
      height: 30px;
      border: 1px solid var(--ink);
      background: var(--paper);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      line-height: 1;
      transition: background 0.15s;
    }
    .game-back-btn:hover { background: var(--paper-dark); }

    .game-link.played {
      opacity: 0.55;
      filter: grayscale(1);
    }
    .game-link.played::after {
      content: 'OYNANDI';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--ink);
    }

    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
        overflow: hidden;
      }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      /* Hide everything except the game itself for immersive fullscreen */
      .section-rule, .col-left, .col-right, header { display: none !important; }

      /* Floating back button (top-left) */
      .game-back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 10px;
        left: 10px;
        width: 38px;
        height: 38px;
        background: #ffffff;
        border: 1px solid #000000;
        border-radius: 50%;
        color: #000000;
        font-size: 18px;
        font-weight: 700;
        text-decoration: none;
        z-index: 200;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .game-back-btn:hover { background: #f0f0f0; }

      /* Main: fullscreen game area */
      main {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        height: 100dvh;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        -webkit-overflow-scrolling: touch;
      }
      .game-panel {
        padding: 56px 16px 20px 16px;
        gap: 10px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .game-container {
        overflow: hidden;
        gap: 6px;
      }
      .instructions { font-size: 11px; }
      .mistakes { font-size: 11px; font-weight: 700; }
      .words-grid { gap: 8px; }
      .word-card {
        padding: 26px 4px;
        font-size: 13px;
        border-width: 2px;
        border-radius: 6px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 64px;
        line-height: 1.15;
      }
      .solved-groups { gap: 5px; }
      .solved-group {
        padding: 6px 8px;
        border-radius: 4px;
      }
      .solved-group-title {
        font-size: 11px;
        margin-bottom: 2px;
        letter-spacing: 0.5px;
      }
      .solved-group-words { font-size: 10px; }
      .controls { gap: 6px; }
      .btn {
        padding: 8px 14px;
        font-size: 11px;
        letter-spacing: 0.5px;
        border-radius: 4px;
      }
      .game-status { font-size: 12px; min-height: 14px; }
      .reset-info { font-size: 10px; }

    }
  </style>
</head>
<body>

  <aside class="col-left">
    <div class="nb-highlight" id="user-nb-badge"></div>
    <section class="stats-left" id="stats-left"></section>
  </aside>

  <div class="section-rule">
    <div class="datetime-block">
      <div class="date-line" id="date-line"></div>
      <div class="day-line" id="day-line"></div>
      <div class="time-line" id="time-line"></div>
    </div>
  </div>

  <header>
    <nav>
      <a href="index.html">Anahane</a>
      <a href="kahvehane.html">Kahvehane</a>
      <a href="kutuphane.html">Kütüphane</a>
    </nav>
  </header>

  <main>
    <a href="kahvehane.html" class="game-back-btn" aria-label="Geri" title="Geri">←</a>
    <section class="game-panel">
      <div class="game-container">
        <div class="instructions">
          4 kelime seç ve aralarındaki bağlantıyı bul. 4 grup var!
        </div>

        <div class="mistakes" id="mistakes">Kalan hak: 4</div>

        <div class="solved-groups" id="solved-groups"></div>

        <div class="words-grid" id="words-grid"></div>

        <div class="controls">
          <button class="btn btn-secondary" id="shuffle-btn">Karıştır</button>
          <button class="btn btn-secondary" id="deselect-btn">Temizle</button>
          <button class="btn btn-primary" id="submit-btn" disabled>Gönder</button>
        </div>

        <div class="game-status" id="game-status"></div>
        <div class="reset-info" id="reset-info"></div>
      </div>
    </section>

  </main>

  <aside class="col-right">
    <section class="games-section">
      <div class="games-section-inner">
        <h2>Günün Oyunları</h2>

        <a href="sozcel.html" class="game-link" data-game="sozcel">
          <div class="game-link-title">Sözcel</div>
          <div class="game-link-subtitle">Türkçe Wordle</div>
        </a>

        <a href="baglantilar.html" class="game-link active" data-game="baglantilar">
          <div class="game-link-title">Bağlantılar</div>
          <div class="game-link-subtitle">Türkçe Connections</div>
        </a>

        <a href="bulmaca.html" class="game-link" data-game="bulmaca">
          <div class="game-link-title">Bulmaca</div>
          <div class="game-link-subtitle">Mini Çapraz Bulmaca</div>
        </a>

        <div class="scoreboard">
          <h2>Haftanın Skor Tahtası</h2>
          <ol class="scoreboard-list" id="scoreboard-list">
            <li class="scoreboard-empty">Yükleniyor...</li>
          </ol>
        </div>
      </div>
    </section>
  </aside>

<script>
// ── Disable browser zoom (Ctrl+wheel, Ctrl+=/-/0, pinch gestures) ──
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey) e.preventDefault();
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) &&
      (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0' ||
       e.key === '_' || e.key === 'Add' || e.key === 'Subtract')) {
    e.preventDefault();
  }
});
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('gestureend', (e) => e.preventDefault());

// ── Supabase init ──
const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Get user neighborhood from session ──
let userNeighborhood = '';
const neighborhoodNames = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      userNeighborhood = session.user.user_metadata?.yasadigi_ilce
        || session.user.user_metadata?.neighborhood || '';
      if (userNeighborhood) {
        const badgeEl = document.getElementById('user-nb-badge');
        if (badgeEl) badgeEl.textContent = neighborhoodNames[userNeighborhood] || userNeighborhood;
      }
    }
  } catch(e) {}
})();

// ── Record game result to Supabase ──
async function recordGameResult(game, date, attempts, won, neighborhood) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: game,
      date: date,
      attempts: attempts,
      won: won,
      neighborhood: neighborhood
    }]);
  } catch (e) { /* table may not exist yet */ }
}

// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const day = now.toLocaleDateString('tr-TR', { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString('tr-TR', { ...opts, month: 'long' });
  const year = now.toLocaleDateString('tr-TR', { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString('tr-TR', { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString('tr-TR', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

// ── Daily seed ──
function getDailySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return `Yeni oyun ${hours} saat ${minutes} dakika sonra`;
}

const dailySeed = getDailySeed();

// ── Puzzle data ──
const PUZZLES = [
  {
    groups: [
      { category: 'Meyveler', words: ['ELMA', 'ARMUT', 'MUZ', 'ÇİLEK'], color: 'cat1' },
      { category: 'Renkler', words: ['KIRMIZI', 'MAVİ', 'YEŞİL', 'SARI'], color: 'cat2' },
      { category: 'Hayvanlar', words: ['KEDİ', 'KÖPEK', 'KUŞ', 'BALIK'], color: 'cat3' },
      { category: 'Mevsimler', words: ['İLKBAHAR', 'YAZ', 'SONBAHAR', 'KIŞ'], color: 'cat4' }
    ]
  },
  {
    groups: [
      { category: 'İçecekler', words: ['ÇAY', 'KAHVE', 'SU', 'MEYVE SUYU'], color: 'cat1' },
      { category: 'Ulaşım', words: ['OTOBÜS', 'METRO', 'TRAMVAY', 'FERİBOT'], color: 'cat2' },
      { category: 'Meslekler', words: ['DOKTOR', 'ÖĞRETMEN', 'MÜHENDİS', 'AVUKAT'], color: 'cat3' },
      { category: 'Spor', words: ['FUTBOL', 'BASKETBOL', 'VOLEYBOL', 'TENİS'], color: 'cat4' }
    ]
  }
];

// ── Seeded puzzle selection ──
function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % PUZZLES.length);
}

const todaysPuzzle = PUZZLES[seededRandom(dailySeed)];
let allWords = [];
let selectedWords = [];
let solvedGroups = [];
let mistakes = 4;
let gameOver = false;

todaysPuzzle.groups.forEach(g => allWords.push(...g.words));
allWords = shuffleArray([...allWords]);

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Save / restore state ──
const SAVE_KEY = 'baglantilar_state_' + dailySeed;

function saveState() {
  const state = {
    solvedGroups: solvedGroups,
    mistakes: mistakes,
    gameOver: gameOver,
    allWords: allWords
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function restoreState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.solvedGroups || state.solvedGroups.length === 0) return false;

    solvedGroups = state.solvedGroups;
    mistakes = state.mistakes;
    gameOver = state.gameOver;
    allWords = state.allWords || [];

    // Re-render solved groups
    const solvedDiv = document.getElementById('solved-groups');
    solvedGroups.forEach(catName => {
      const group = todaysPuzzle.groups.find(g => g.category === catName);
      if (!group) return;
      const groupDiv = document.createElement('div');
      groupDiv.className = `solved-group ${group.color}`;
      groupDiv.innerHTML = `
        <div class="solved-group-title">${group.category}</div>
        <div class="solved-group-words">${group.words.join(', ')}</div>
      `;
      solvedDiv.appendChild(groupDiv);
    });

    document.getElementById('mistakes').textContent = `Kalan hak: ${mistakes}`;

    if (gameOver) {
      if (solvedGroups.length === 4) {
        document.getElementById('game-status').textContent = 'Tebrikler! Hepsini buldun!';
        document.getElementById('game-status').style.color = 'var(--success)';
      } else {
        document.getElementById('game-status').textContent = 'Oyun bitti!';
        document.getElementById('game-status').style.color = 'var(--accent)';
        // Reveal unsolved groups
        revealUnsolvedGroups();
      }
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    }

    return true;
  } catch (e) { return false; }
}

function revealUnsolvedGroups() {
  const solvedDiv = document.getElementById('solved-groups');
  todaysPuzzle.groups.forEach(group => {
    if (solvedGroups.includes(group.category)) return;
    const groupDiv = document.createElement('div');
    groupDiv.className = `solved-group ${group.color}`;
    groupDiv.style.opacity = '0.5';
    groupDiv.innerHTML = `
      <div class="solved-group-title">${group.category}</div>
      <div class="solved-group-words">${group.words.join(', ')}</div>
    `;
    solvedDiv.appendChild(groupDiv);
  });
}

// ── Render words grid ──
function renderWords() {
  const grid = document.getElementById('words-grid');
  grid.innerHTML = '';
  allWords.forEach(word => {
    const card = document.createElement('div');
    card.className = 'word-card' + (selectedWords.includes(word) ? ' selected' : '');
    card.textContent = word;
    card.onclick = () => toggleWord(word);
    grid.appendChild(card);
  });
}

function toggleWord(word) {
  if (gameOver) return;
  if (selectedWords.includes(word)) {
    selectedWords = selectedWords.filter(w => w !== word);
  } else if (selectedWords.length < 4) {
    selectedWords.push(word);
  }
  renderWords();
  document.getElementById('submit-btn').disabled = selectedWords.length !== 4;
  markAsPlayed();
}

// Record an "in progress" game_results row on first interaction so Kahvehane
// can show the game as played even when the user doesn't finish it today.
async function markAsPlayed() {
  const flagKey = 'baglantilar_started_' + dailySeed;
  if (localStorage.getItem(flagKey)) return;
  localStorage.setItem(flagKey, '1');
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: 'baglantilar',
      date: dailySeed,
      attempts: 0,
      won: false,
      neighborhood: userNeighborhood
    }]);
  } catch (e) { /* table may not exist yet */ }
}

// ── Check guess ──
async function checkGuess() {
  if (gameOver) return;
  const statusEl = document.getElementById('game-status');

  for (let group of todaysPuzzle.groups) {
    if (solvedGroups.includes(group.category)) continue;

    const match = group.words.every(w => selectedWords.includes(w));
    if (match) {
      solvedGroups.push(group.category);
      allWords = allWords.filter(w => !group.words.includes(w));

      const solvedDiv = document.getElementById('solved-groups');
      const groupDiv = document.createElement('div');
      groupDiv.className = `solved-group ${group.color}`;
      groupDiv.innerHTML = `
        <div class="solved-group-title">${group.category}</div>
        <div class="solved-group-words">${group.words.join(', ')}</div>
      `;
      solvedDiv.appendChild(groupDiv);

      selectedWords = [];
      renderWords();

      if (solvedGroups.length === 4) {
        statusEl.textContent = 'Tebrikler! Hepsini buldun!';
        statusEl.style.color = 'var(--success)';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('reset-info').textContent = getTimeUntilMidnight();
        gameOver = true;

        // Insert the winning row first so renderStats() (Supabase-backed)
        // sees it. attempts = number of mistakes made (0..3).
        await recordGameResult('baglantilar', dailySeed, 4 - mistakes, true, userNeighborhood);
        saveState();
        renderStats();
      } else {
        saveState();
      }
      return;
    }
  }

  // Wrong guess
  mistakes--;
  document.getElementById('mistakes').textContent = `Kalan hak: ${mistakes}`;

  if (mistakes === 0) {
    statusEl.textContent = 'Oyun bitti!';
    statusEl.style.color = 'var(--accent)';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    gameOver = true;

    // Reveal unsolved groups
    revealUnsolvedGroups();

    await recordGameResult('baglantilar', dailySeed, 4, false, userNeighborhood);
    saveState();
    renderStats();
  } else {
    statusEl.textContent = 'Yanlış tahmin!';
    statusEl.style.color = 'var(--accent)';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
    saveState();
  }

  selectedWords = [];
  renderWords();
}

// ── Controls ──
document.getElementById('submit-btn').addEventListener('click', checkGuess);

document.getElementById('shuffle-btn').addEventListener('click', () => {
  allWords = shuffleArray([...allWords]);
  renderWords();
});

document.getElementById('deselect-btn').addEventListener('click', () => {
  selectedWords = [];
  renderWords();
  document.getElementById('submit-btn').disabled = true;
});

// ── Personal stats from Supabase ──
// For baglantilar, `attempts` on a winning row = mistakes made (0..3).
// On failure (4 wrong guesses) we record attempts=4, won=false.
async function loadPersonalStats() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return null;
    const { data, error } = await sb.from('game_results')
      .select('date, attempts, won')
      .eq('user_id', session.user.id)
      .eq('game', 'baglantilar');
    if (error) return null;
    const byDate = new Map();
    (data || []).forEach(r => {
      const prev = byDate.get(r.date) || { date: r.date, won: false, attempts: null };
      if (r.won) {
        prev.won = true;
        if (prev.attempts === null || r.attempts < prev.attempts) prev.attempts = r.attempts;
      }
      byDate.set(r.date, prev);
    });
    const entries = Array.from(byDate.values());
    const played = entries.length;
    const wins = entries.filter(e => e.won).length;
    // Mistake distribution: indices 0..3 = 0..3 mistakes (winning), index 4 = failure.
    const dist = [0, 0, 0, 0, 0];
    entries.forEach(e => {
      if (e.won && e.attempts >= 0 && e.attempts <= 3) dist[e.attempts]++;
      else dist[4]++;
    });
    const winDateSet = new Set(entries.filter(e => e.won).map(e => e.date));
    function seedForOffset(off) {
      const now = new Date();
      const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
      ist.setDate(ist.getDate() - off);
      return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
    }
    let currentStreak = 0;
    let offset = winDateSet.has(seedForOffset(0)) ? 0 : 1;
    while (winDateSet.has(seedForOffset(offset))) { currentStreak++; offset++; }
    const DAY = 86400000;
    const winTimes = entries.filter(e => e.won).map(e => {
      const [y, m, d] = e.date.split('-').map(Number);
      return Date.UTC(y, m - 1, d);
    }).sort((a, b) => a - b);
    let maxStreak = 0, cur = 0, prev = null;
    for (const t of winTimes) {
      cur = (prev !== null && t - prev === DAY) ? cur + 1 : 1;
      if (cur > maxStreak) maxStreak = cur;
      prev = t;
    }
    return { played, wins, currentStreak, maxStreak, dist };
  } catch (e) { return null; }
}

// ── Community stats from Supabase. Returns null when no data for today. ──
async function loadCommunityStats() {
  try {
    const { data, error } = await sb.from('game_results')
      .select('user_id, attempts, won, neighborhood')
      .eq('game', 'baglantilar')
      .eq('date', dailySeed);

    if (error || !data || data.length === 0) return null;

    // Dedupe per user.
    const byUser = new Map();
    data.forEach(r => {
      const prev = byUser.get(r.user_id) || { won: false, attempts: null, neighborhood: r.neighborhood };
      if (r.neighborhood) prev.neighborhood = r.neighborhood;
      if (r.won) {
        prev.won = true;
        if (prev.attempts === null || r.attempts < prev.attempts) prev.attempts = r.attempts;
      }
      byUser.set(r.user_id, prev);
    });

    const dist = [0, 0, 0, 0, 0];
    const districtMap = {};
    byUser.forEach(e => {
      if (e.won && e.attempts >= 0 && e.attempts <= 3) dist[e.attempts]++;
      else dist[4]++;
      if (e.neighborhood) {
        if (!districtMap[e.neighborhood]) districtMap[e.neighborhood] = { wins: 0, total: 0 };
        districtMap[e.neighborhood].total++;
        if (e.won) districtMap[e.neighborhood].wins++;
      }
    });

    const topDistricts = Object.entries(districtMap)
      .map(([k, v]) => ({ name: neighborhoodNames[k] || k, pct: Math.round(v.wins / v.total * 100), total: v.total }))
      .sort((a, b) => b.pct - a.pct || b.total - a.total)
      .slice(0, 5);

    return { dist, topDistricts };
  } catch (e) {
    return null;
  }
}

// ── Stats rendering ──
async function renderStats() {
  // Supabase is the source of truth.
  const cacheKey = 'baglantilar_stats_cache';
  let personal = await loadPersonalStats();
  if (personal) {
    localStorage.setItem(cacheKey, JSON.stringify(personal));
  } else {
    try { personal = JSON.parse(localStorage.getItem(cacheKey) || 'null'); } catch { personal = null; }
  }
  const played = personal ? personal.played : 0;
  const wins = personal ? personal.wins : 0;
  const streak = personal ? personal.currentStreak : 0;
  const displayMaxStreak = personal ? Math.max(personal.maxStreak, personal.currentStreak) : 0;
  const winPct = played > 0 ? Math.round(wins / played * 100) : 0;

  const dist = personal ? personal.dist : [0, 0, 0, 0, 0];
  const maxDist = Math.max(...dist, 1);

  const distLabels = ['0 hata', '1 hata', '2 hata', '3 hata', 'Kaybetti'];

  const community = await loadCommunityStats();
  let communityHtml = '';
  if (!community) {
    communityHtml = `
      <div><div class="panel-title">Günün İstatistikleri</div></div>
      <div class="stat-row"><span class="stat-label">Henüz veri yok</span></div>
    `;
  } else {
    const communityDist = community.dist;
    const totalCommunity = communityDist.reduce((a, b) => a + b, 0);
    const maxCommunityDist = Math.max(...communityDist, 1);
    const topDistricts = community.topDistricts;
    const communityLabels = ['0 hata', '1 hata', '2 hata', '3 hata', 'Kaybetti'];
    communityHtml = `
      <div><div class="panel-title">Günün İstatistikleri</div></div>
      ${communityDist.map((d, i) => {
        const pct = totalCommunity > 0 ? Math.round(d / totalCommunity * 100) : 0;
        return `
          <div class="dist-bar-wrap">
            <span class="dist-label" style="min-width:46px;text-align:left;font-size:0.55rem;">${communityLabels[i]}</span>
            <div class="dist-bar-outer">
              <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxCommunityDist * 100, 3) : 0}%"></div>
            </div>
            <span class="dist-pct">${pct}%</span>
          </div>
        `;
      }).join('')}
      <div style="margin-top:4px;"><div class="panel-title">En Başarılı İlçeler</div></div>
      ${topDistricts.length === 0
        ? `<div class="stat-row"><span class="stat-label">Henüz veri yok</span></div>`
        : topDistricts.map((d, i) => `
          <div class="district-rank">
            <span class="rank-name">${i + 1}. ${d.name}</span>
            <span class="rank-pct">${d.pct}%</span>
          </div>
        `).join('')}
    `;
  }

  // Left panel: personal + community stats, all compact
  document.getElementById('stats-left').innerHTML = `
    <div><div class="panel-title">Kişisel İstatistikler</div></div>
    <div class="stat-tiles">
      <div class="stat-tile"><div class="num">${streak}</div><div class="label">Seri</div></div>
      <div class="stat-tile"><div class="num">${displayMaxStreak}</div><div class="label">En Uzun</div></div>
      <div class="stat-tile"><div class="num">${played}</div><div class="label">Oynanan</div></div>
      <div class="stat-tile"><div class="num">${winPct}%</div><div class="label">Kazanma</div></div>
    </div>
    <div style="margin-top:4px;"><div class="panel-title">Hata Dağılımı</div></div>
    ${dist.map((d, i) => `
      <div class="dist-bar-wrap">
        <span class="dist-label" style="min-width:46px;text-align:left;font-size:0.55rem;">${distLabels[i]}</span>
        <div class="dist-bar-outer">
          <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxDist * 100, 5) : 0}%"></div>
        </div>
        <span class="dist-pct">${d}</span>
      </div>
    `).join('')}
    <div style="margin-top:6px;"></div>
    ${communityHtml}
  `;
}

// ── Weekly scoreboard (mirrors Kahvehane) ──
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function parseGameDate(s) {
  if (!s || typeof s !== 'string') return null;
  const parts = s.split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}
async function loadScoreboard() {
  const listEl = document.getElementById('scoreboard-list');
  if (!listEl) return;
  let results = null;
  try {
    const { data, error } = await sb.from('game_results')
      .select('user_id, neighborhood, date, won').eq('won', true);
    if (error) throw error;
    results = data;
  } catch (e) {
    listEl.innerHTML = '<li class="scoreboard-empty">Skorlar yüklenemedi</li>';
    return;
  }
  if (!results || results.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }
  const nowIst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const cutoff = new Date(nowIst.getFullYear(), nowIst.getMonth(), nowIst.getDate() - 6);
  const weekly = results.filter(r => { const d = parseGameDate(r.date); return d && d >= cutoff; });
  if (weekly.length === 0) {
    listEl.innerHTML = '<li class="scoreboard-empty">Bu hafta henüz skor yok</li>';
    return;
  }
  const scores = new Map();
  weekly.forEach(r => {
    if (!r.user_id) return;
    const prev = scores.get(r.user_id) || { score: 0, neighborhood: null, lastDate: null };
    prev.score += 1;
    const d = parseGameDate(r.date);
    if (r.neighborhood && (!prev.lastDate || (d && d >= prev.lastDate))) {
      prev.neighborhood = r.neighborhood;
      prev.lastDate = d;
    }
    scores.set(r.user_id, prev);
  });
  const userIds = Array.from(scores.keys());
  const nameMap = new Map();
  try {
    if (userIds.length > 0) {
      const { data: profs } = await sb.from('profiles').select('id, first_name').in('id', userIds);
      (profs || []).forEach(p => { if (p.first_name) nameMap.set(p.id, p.first_name); });
    }
  } catch (e) {}
  const top = Array.from(scores.entries())
    .map(([uid, v]) => ({ uid, score: v.score, neighborhood: v.neighborhood, name: nameMap.get(uid) || 'Anonim' }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'tr'))
    .slice(0, 5);
  listEl.innerHTML = top.map((p, i) => {
    const nbName = neighborhoodNames[p.neighborhood] || p.neighborhood || '';
    const topClass = i === 0 ? ' top' : '';
    return `<li class="scoreboard-item${topClass}">` +
      `<span class="scoreboard-rank">${i + 1}.</span>` +
      `<span class="scoreboard-player">` +
        `<span class="scoreboard-name">${escapeHtml(p.name)}</span>` +
        (nbName ? `<span class="scoreboard-nb"> — ${escapeHtml(nbName)}</span>` : '') +
      `</span>` +
      `<span class="scoreboard-score">${p.score}</span>` +
    `</li>`;
  }).join('');
}

// ── Mark games already played today (dimmed in side nav) ──
async function markPlayedGames() {
  const today = dailySeed;
  const played = new Set();
  const localFlags = {
    sozcel: 'sozcel_started_' + today,
    baglantilar: 'baglantilar_started_' + today,
    bulmaca: 'bulmaca_started_' + today
  };
  for (const [g, key] of Object.entries(localFlags)) {
    if (localStorage.getItem(key)) played.add(g);
  }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data, error } = await sb.from('game_results')
        .select('game').eq('user_id', session.user.id).eq('date', today);
      if (!error && data) data.forEach(r => played.add(r.game));
    }
  } catch (e) {}
  document.querySelectorAll('.game-link[data-game]').forEach(el => {
    if (el.classList.contains('active')) return;
    if (played.has(el.dataset.game)) el.classList.add('played');
  });
}

// ── Init ──
renderWords();
const restored = restoreState();
if (!restored) {
  renderWords();
}
renderStats();
loadScoreboard();
markPlayedGames();
</script>
