<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bağlantılar — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --accent: #333333;
      --muted: #888888;
      --success: #555555;
      --col-border: 1px solid #cccccc;
      --cat1: #666666;
      --cat2: #888888;
      --cat3: #444444;
      --cat4: #222222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { }
    .datetime-block .time-line { }

    header {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    /* ── Left column ── */
    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Right column ── */
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left: personal stats ── */
    .stats-left {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .panel-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .stat-big {
      text-align: center;
      padding: 8px 0;
    }
    .stat-big .num {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-big .label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      padding: 3px 0;
    }
    .stat-row .stat-label { color: var(--muted); }
    .stat-row .stat-val { font-weight: 700; }

    /* ── Center: game panel ── */
    .game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      overflow: hidden;
      min-height: 0;
      gap: 8px;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 100%;
      min-height: 0;
    }

    .instructions {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .mistakes {
      text-align: center;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
    }

    .solved-groups {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .solved-group {
      padding: 8px;
      text-align: center;
      border-radius: 4px;
      color: white;
    }

    .solved-group.cat1 { background: var(--cat1); }
    .solved-group.cat2 { background: var(--cat2); }
    .solved-group.cat3 { background: var(--cat3); }
    .solved-group.cat4 { background: var(--cat4); }

    .solved-group-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .solved-group-words {
      font-size: 0.85rem;
    }

    .words-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .word-card {
      padding: 12px 6px;
      background: white;
      border: 2px solid #ccc;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      user-select: none;
    }

    .word-card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .word-card.selected {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .btn {
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }

    .btn-primary:hover { background: var(--accent); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .btn-secondary {
      background: #ddd;
      color: var(--ink);
    }

    .btn-secondary:hover { background: #ccc; }

    .game-status {
      text-align: center;
      font-size: 0.9rem;
      min-height: 22px;
      font-weight: 700;
    }

    .reset-info {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      flex-shrink: 0;
    }

    /* ── Right: community stats ── */
    .stats-right {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 14px;
    }

    .dist-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      margin-bottom: 4px;
    }
    .dist-bar-wrap .dist-label {
      min-width: 12px;
      text-align: right;
      font-weight: 700;
      color: var(--muted);
    }
    .dist-bar-outer {
      flex: 1;
      height: 14px;
      background: var(--paper-dark);
      border: 1px solid #ddd;
      position: relative;
    }
    .dist-bar-inner {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .dist-bar-wrap .dist-pct {
      min-width: 30px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .district-rank {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0;
      border-bottom: 1px solid #eee;
    }
    .district-rank:last-child { border-bottom: none; }
    .district-rank .rank-name { font-weight: 600; }
    .district-rank .rank-pct { color: var(--muted); font-weight: 700; }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
        overflow: hidden;
      }

      /* Stack vertically, share viewport space */
      .section-rule { order: 1; flex-shrink: 0; border-bottom: none; padding: 2px 10px; font-size: 0.5rem; letter-spacing: 2px; }
      header { order: 2; flex-shrink: 0; border-bottom: 1px solid var(--ink); padding: 3px 8px; }
      main { order: 3; flex: 6; min-height: 0; overflow: hidden; display: flex; }
      .col-left { order: 4; flex: 1; min-height: 0; overflow: hidden; border-right: none; border-top: 1px solid var(--ink); }
      .col-right { order: 5; flex: 1; min-height: 0; overflow: hidden; border-left: none; border-top: 1px solid var(--ink); }

      .col-left, .col-right, header, .section-rule, main {
        grid-column: unset; grid-row: unset;
      }

      nav { flex-wrap: wrap; justify-content: center; gap: 6px; }
      nav a { font-size: 0.55rem; letter-spacing: 1px; padding: 0; }

      .col-left .nb-highlight {
        padding: 3px 8px;
        font-size: 0.55rem;
        letter-spacing: 1px;
      }

      .stats-left, .stats-right {
        padding: 4px 6px;
        gap: 4px;
        overflow: hidden;
      }

      .panel-title {
        font-size: 0.45rem;
        letter-spacing: 1px;
        padding-bottom: 1px;
      }

      .stat-big { padding: 2px 0; }
      .stat-big .num { font-size: 0.85rem; }
      .stat-big .label { font-size: 0.45rem; letter-spacing: 1px; margin-top: 0; }

      .stat-row { font-size: 0.55rem; padding: 1px 0; }

      .dist-bar-wrap { font-size: 0.5rem; gap: 4px; margin-bottom: 1px; }
      .dist-bar-outer { height: 6px; }
      .dist-bar-wrap .dist-label { min-width: 8px; }
      .dist-bar-wrap .dist-pct { min-width: 22px; font-size: 0.45rem; }

      .district-rank { font-size: 0.5rem; padding: 1px 0; }

      .game-panel {
        padding: 4px 6px;
        gap: 3px;
        overflow: hidden;
        flex: 1;
      }

      .game-container {
        overflow: hidden;
        gap: 3px;
      }

      .instructions { font-size: 0.55rem; }
      .mistakes { font-size: 0.55rem; }

      .words-grid { gap: 3px; }

      .word-card {
        padding: 5px 2px;
        font-size: 0.5rem;
        border-width: 1px;
      }

      .solved-groups { gap: 3px; }
      .solved-group { padding: 3px; border-radius: 2px; }
      .solved-group-title { font-size: 0.55rem; margin-bottom: 1px; letter-spacing: 0; }
      .solved-group-words { font-size: 0.5rem; }

      .controls { gap: 4px; }

      .btn {
        padding: 3px 8px;
        font-size: 0.55rem;
        letter-spacing: 0;
      }

      .game-status { font-size: 0.6rem; min-height: 12px; }
      .reset-info { font-size: 0.5rem; }
    }
  </style>
</head>
<body>

  <aside class="col-left">
    <div class="nb-highlight" id="user-nb-badge"></div>
    <section class="stats-left" id="stats-left"></section>
  </aside>

  <div class="section-rule">
    <div class="datetime-block">
      <div class="date-line" id="date-line"></div>
      <div class="day-line" id="day-line"></div>
      <div class="time-line" id="time-line"></div>
    </div>
  </div>

  <header>
    <nav>
      <a href="index.html">Anahane</a>
      <a href="kahvehane.html">Kahvehane</a>
      <a href="kutuphane.html">Kütüphane</a>
      <a href="hane.html">Hane</a>
    </nav>
  </header>

  <main>
    <section class="game-panel">
      <div class="game-container">
        <div class="instructions">
          4 kelime seç ve aralarındaki bağlantıyı bul. 4 grup var!
        </div>

        <div class="mistakes" id="mistakes">Kalan hak: 4</div>

        <div class="solved-groups" id="solved-groups"></div>

        <div class="words-grid" id="words-grid"></div>

        <div class="controls">
          <button class="btn btn-secondary" id="shuffle-btn">Karıştır</button>
          <button class="btn btn-secondary" id="deselect-btn">Temizle</button>
          <button class="btn btn-primary" id="submit-btn" disabled>Gönder</button>
        </div>

        <div class="game-status" id="game-status"></div>
        <div class="reset-info" id="reset-info"></div>
      </div>
    </section>

  </main>

  <aside class="col-right">
    <section class="stats-right" id="stats-right"></section>
  </aside>

<script>
// ── Supabase init ──
const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Get user neighborhood from session ──
let userNeighborhood = '';
const neighborhoodNames = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      userNeighborhood = session.user.user_metadata?.yasadigi_ilce
        || session.user.user_metadata?.neighborhood || '';
      if (userNeighborhood) {
        const badgeEl = document.getElementById('user-nb-badge');
        if (badgeEl) badgeEl.textContent = neighborhoodNames[userNeighborhood] || userNeighborhood;
      }
    }
  } catch(e) {}
})();

// ── Record game result to Supabase ──
async function recordGameResult(game, date, attempts, won, neighborhood) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await sb.from('game_results').insert([{
      user_id: session.user.id,
      game: game,
      date: date,
      attempts: attempts,
      won: won,
      neighborhood: neighborhood
    }]);
  } catch (e) { /* table may not exist yet */ }
}

// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const day = now.toLocaleDateString('tr-TR', { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString('tr-TR', { ...opts, month: 'long' });
  const year = now.toLocaleDateString('tr-TR', { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString('tr-TR', { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString('tr-TR', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

// ── Daily seed ──
function getDailySeed() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  return `${ist.getFullYear()}-${ist.getMonth() + 1}-${ist.getDate()}`;
}

function getTimeUntilMidnight() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  const tomorrow = new Date(ist);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - ist;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return `Yeni oyun ${hours} saat ${minutes} dakika sonra`;
}

const dailySeed = getDailySeed();

// ── Puzzle data ──
const PUZZLES = [
  {
    groups: [
      { category: 'Meyveler', words: ['ELMA', 'ARMUT', 'MUZ', 'ÇİLEK'], color: 'cat1' },
      { category: 'Renkler', words: ['KIRMIZI', 'MAVİ', 'YEŞİL', 'SARI'], color: 'cat2' },
      { category: 'Hayvanlar', words: ['KEDİ', 'KÖPEK', 'KUŞ', 'BALIK'], color: 'cat3' },
      { category: 'Mevsimler', words: ['İLKBAHAR', 'YAZ', 'SONBAHAR', 'KIŞ'], color: 'cat4' }
    ]
  },
  {
    groups: [
      { category: 'İçecekler', words: ['ÇAY', 'KAHVE', 'SU', 'MEYVE SUYU'], color: 'cat1' },
      { category: 'Ulaşım', words: ['OTOBÜS', 'METRO', 'TRAMVAY', 'FERİBOT'], color: 'cat2' },
      { category: 'Meslekler', words: ['DOKTOR', 'ÖĞRETMEN', 'MÜHENDİS', 'AVUKAT'], color: 'cat3' },
      { category: 'Spor', words: ['FUTBOL', 'BASKETBOL', 'VOLEYBOL', 'TENİS'], color: 'cat4' }
    ]
  }
];

// ── Seeded puzzle selection ──
function seededRandom(seed) {
  let x = 0;
  for (let i = 0; i < seed.length; i++) {
    x = ((x << 5) - x) + seed.charCodeAt(i);
    x = x & x;
  }
  return Math.abs(x % PUZZLES.length);
}

const todaysPuzzle = PUZZLES[seededRandom(dailySeed)];
let allWords = [];
let selectedWords = [];
let solvedGroups = [];
let mistakes = 4;
let gameOver = false;

todaysPuzzle.groups.forEach(g => allWords.push(...g.words));
allWords = shuffleArray([...allWords]);

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Save / restore state ──
const SAVE_KEY = 'baglantilar_state_' + dailySeed;

function saveState() {
  const state = {
    solvedGroups: solvedGroups,
    mistakes: mistakes,
    gameOver: gameOver,
    allWords: allWords
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function restoreState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state.solvedGroups || state.solvedGroups.length === 0) return false;

    solvedGroups = state.solvedGroups;
    mistakes = state.mistakes;
    gameOver = state.gameOver;
    allWords = state.allWords || [];

    // Re-render solved groups
    const solvedDiv = document.getElementById('solved-groups');
    solvedGroups.forEach(catName => {
      const group = todaysPuzzle.groups.find(g => g.category === catName);
      if (!group) return;
      const groupDiv = document.createElement('div');
      groupDiv.className = `solved-group ${group.color}`;
      groupDiv.innerHTML = `
        <div class="solved-group-title">${group.category}</div>
        <div class="solved-group-words">${group.words.join(', ')}</div>
      `;
      solvedDiv.appendChild(groupDiv);
    });

    document.getElementById('mistakes').textContent = `Kalan hak: ${mistakes}`;

    if (gameOver) {
      if (solvedGroups.length === 4) {
        document.getElementById('game-status').textContent = 'Tebrikler! Hepsini buldun!';
        document.getElementById('game-status').style.color = 'var(--success)';
      } else {
        document.getElementById('game-status').textContent = 'Oyun bitti!';
        document.getElementById('game-status').style.color = 'var(--accent)';
        // Reveal unsolved groups
        revealUnsolvedGroups();
      }
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    }

    return true;
  } catch (e) { return false; }
}

function revealUnsolvedGroups() {
  const solvedDiv = document.getElementById('solved-groups');
  todaysPuzzle.groups.forEach(group => {
    if (solvedGroups.includes(group.category)) return;
    const groupDiv = document.createElement('div');
    groupDiv.className = `solved-group ${group.color}`;
    groupDiv.style.opacity = '0.5';
    groupDiv.innerHTML = `
      <div class="solved-group-title">${group.category}</div>
      <div class="solved-group-words">${group.words.join(', ')}</div>
    `;
    solvedDiv.appendChild(groupDiv);
  });
}

// ── Render words grid ──
function renderWords() {
  const grid = document.getElementById('words-grid');
  grid.innerHTML = '';
  allWords.forEach(word => {
    const card = document.createElement('div');
    card.className = 'word-card' + (selectedWords.includes(word) ? ' selected' : '');
    card.textContent = word;
    card.onclick = () => toggleWord(word);
    grid.appendChild(card);
  });
}

function toggleWord(word) {
  if (gameOver) return;
  if (selectedWords.includes(word)) {
    selectedWords = selectedWords.filter(w => w !== word);
  } else if (selectedWords.length < 4) {
    selectedWords.push(word);
  }
  renderWords();
  document.getElementById('submit-btn').disabled = selectedWords.length !== 4;
}

// ── Check guess ──
function checkGuess() {
  if (gameOver) return;
  const statusEl = document.getElementById('game-status');

  for (let group of todaysPuzzle.groups) {
    if (solvedGroups.includes(group.category)) continue;

    const match = group.words.every(w => selectedWords.includes(w));
    if (match) {
      solvedGroups.push(group.category);
      allWords = allWords.filter(w => !group.words.includes(w));

      const solvedDiv = document.getElementById('solved-groups');
      const groupDiv = document.createElement('div');
      groupDiv.className = `solved-group ${group.color}`;
      groupDiv.innerHTML = `
        <div class="solved-group-title">${group.category}</div>
        <div class="solved-group-words">${group.words.join(', ')}</div>
      `;
      solvedDiv.appendChild(groupDiv);

      selectedWords = [];
      renderWords();

      if (solvedGroups.length === 4) {
        statusEl.textContent = 'Tebrikler! Hepsini buldun!';
        statusEl.style.color = 'var(--success)';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('reset-info').textContent = getTimeUntilMidnight();
        gameOver = true;

        // Record personal stats
        localStorage.setItem('baglantilar_played', parseInt(localStorage.getItem('baglantilar_played') || '0') + 1);
        localStorage.setItem('baglantilar_wins', parseInt(localStorage.getItem('baglantilar_wins') || '0') + 1);
        localStorage.setItem('baglantilar_streak', parseInt(localStorage.getItem('baglantilar_streak') || '0') + 1);
        recordMistakeDistribution(4 - mistakes);
        recordGameResult('baglantilar', dailySeed, 4 - mistakes, true, userNeighborhood);
        saveState();
        renderStats();
      } else {
        saveState();
      }
      return;
    }
  }

  // Wrong guess
  mistakes--;
  document.getElementById('mistakes').textContent = `Kalan hak: ${mistakes}`;

  if (mistakes === 0) {
    statusEl.textContent = 'Oyun bitti!';
    statusEl.style.color = 'var(--accent)';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('reset-info').textContent = getTimeUntilMidnight();
    gameOver = true;

    // Reveal unsolved groups
    revealUnsolvedGroups();

    // Record personal stats
    localStorage.setItem('baglantilar_played', parseInt(localStorage.getItem('baglantilar_played') || '0') + 1);
    localStorage.setItem('baglantilar_streak', '0');
    recordMistakeDistribution(-1); // -1 signals failure
    recordGameResult('baglantilar', dailySeed, 4, false, userNeighborhood);
    saveState();
    renderStats();
  } else {
    statusEl.textContent = 'Yanlış tahmin!';
    statusEl.style.color = 'var(--accent)';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
    saveState();
  }

  selectedWords = [];
  renderWords();
}

// ── Mistakes distribution tracking ──
function recordMistakeDistribution(mistakeCount) {
  // mistakeCount: 0,1,2,3 for wins with that many mistakes; -1 for failure
  if (mistakeCount < 0) {
    const key = 'baglantilar_dist_fail';
    localStorage.setItem(key, parseInt(localStorage.getItem(key) || '0') + 1);
  } else {
    const key = 'baglantilar_dist_' + mistakeCount;
    localStorage.setItem(key, parseInt(localStorage.getItem(key) || '0') + 1);
  }
}

// ── Controls ──
document.getElementById('submit-btn').addEventListener('click', checkGuess);

document.getElementById('shuffle-btn').addEventListener('click', () => {
  allWords = shuffleArray([...allWords]);
  renderWords();
});

document.getElementById('deselect-btn').addEventListener('click', () => {
  selectedWords = [];
  renderWords();
  document.getElementById('submit-btn').disabled = true;
});

// ── Community stats from Supabase ──
async function loadCommunityStats() {
  try {
    const { data, error } = await sb.from('game_results')
      .select('attempts, won, neighborhood')
      .eq('game', 'baglantilar')
      .eq('date', dailySeed);

    if (error || !data || data.length === 0) throw new Error('no data');

    // Build distribution: 0 mistakes, 1 mistake, 2 mistakes, 3 mistakes, failed
    const dist = [0, 0, 0, 0, 0];
    data.forEach(r => {
      if (r.won && r.attempts >= 0 && r.attempts <= 3) {
        dist[r.attempts]++;
      } else {
        dist[4]++;
      }
    });

    // Build district success rates
    const districtMap = {};
    data.forEach(r => {
      if (!r.neighborhood) return;
      if (!districtMap[r.neighborhood]) districtMap[r.neighborhood] = { wins: 0, total: 0 };
      districtMap[r.neighborhood].total++;
      if (r.won) districtMap[r.neighborhood].wins++;
    });

    const neighborhoodNames = {
      bakirkoy:'Bakırköy', besiktas:'Beşiktaş', kadikoy:'Kadıköy',
      uskudar:'Üsküdar', fatih:'Fatih', beyoglu:'Beyoğlu',
      sisli:'Şişli', sariyer:'Sarıyer', maltepe:'Maltepe', atasehir:'Ataşehir',
      umraniye:'Ümraniye', kagithane:'Kağıthane', bahcelievler:'Bahçelievler',
      bagcilar:'Bağcılar', eyupsultan:'Eyüpsultan', bayrampasa:'Bayrampaşa',
      basaksehir:'Başakşehir', gungoren:'Güngören', esenler:'Esenler',
      gop:'Gaziosmanpaşa', kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi',
      beykoz:'Beykoz', cekmekoy:'Çekmeköy', zeytinburnu:'Zeytinburnu'
    };

    const topDistricts = Object.entries(districtMap)
      .map(([k, v]) => ({ name: neighborhoodNames[k] || k, pct: Math.round(v.wins / v.total * 100) }))
      .sort((a, b) => b.pct - a.pct)
      .slice(0, 5);

    return { dist, topDistricts, isReal: true };
  } catch (e) {
    return { dist: generateCommunityDist(), topDistricts: generateTopDistricts(), isReal: false };
  }
}

// ── Generate deterministic community stats from daily seed ──
function generateCommunityDist() {
  let hash = 0;
  for (let i = 0; i < dailySeed.length; i++) {
    hash = ((hash << 5) - hash) + dailySeed.charCodeAt(i);
    hash = hash & hash;
  }
  // Distribution: 0 mistakes, 1 mistake, 2 mistakes, 3 mistakes, failed
  const base = [15, 30, 25, 18, 12];
  return base.map((b, i) => {
    const noise = ((hash >> (i * 4)) & 0xF) - 8;
    return Math.max(1, b + noise);
  });
}

function generateTopDistricts() {
  const names = {
    bakirkoy:'Bakırköy', besiktas:'Beşiktaş', kadikoy:'Kadıköy',
    uskudar:'Üsküdar', fatih:'Fatih', beyoglu:'Beyoğlu',
    sisli:'Şişli', sariyer:'Sarıyer', maltepe:'Maltepe', atasehir:'Ataşehir',
    umraniye:'Ümraniye', kagithane:'Kağıthane', bahcelievler:'Bahçelievler',
    bagcilar:'Bağcılar', eyupsultan:'Eyüpsultan'
  };
  const keys = Object.keys(names);
  let hash = 0;
  for (let i = 0; i < dailySeed.length; i++) {
    hash = ((hash << 3) - hash) + dailySeed.charCodeAt(i);
    hash = hash & hash;
  }
  const shuffled = keys.map((k, i) => ({
    name: names[k],
    pct: 60 + Math.abs((hash >> (i * 2)) % 35)
  })).sort((a, b) => b.pct - a.pct).slice(0, 5);
  return shuffled;
}

// ── Stats rendering ──
async function renderStats() {
  const played = parseInt(localStorage.getItem('baglantilar_played') || '0');
  const wins = parseInt(localStorage.getItem('baglantilar_wins') || '0');
  const streak = parseInt(localStorage.getItem('baglantilar_streak') || '0');
  const maxStreak = parseInt(localStorage.getItem('baglantilar_max_streak') || '0');
  const winPct = played > 0 ? Math.round(wins / played * 100) : 0;

  // Update max streak
  if (streak > maxStreak) {
    localStorage.setItem('baglantilar_max_streak', streak);
  }
  const displayMaxStreak = Math.max(streak, maxStreak);

  // Personal mistakes distribution
  const dist = [];
  for (let i = 0; i <= 3; i++) {
    dist.push(parseInt(localStorage.getItem('baglantilar_dist_' + i) || '0'));
  }
  dist.push(parseInt(localStorage.getItem('baglantilar_dist_fail') || '0'));
  const maxDist = Math.max(...dist, 1);

  const distLabels = ['0 hata', '1 hata', '2 hata', '3 hata', 'Kaybetti'];

  // Left panel: personal stats
  document.getElementById('stats-left').innerHTML = `
    <div>
      <div class="panel-title">Kişisel İstatistikler</div>
    </div>
    <div class="stat-big">
      <div class="num">${streak}</div>
      <div class="label">Seri</div>
    </div>
    <div class="stat-row">
      <span class="stat-label">Oynanan</span>
      <span class="stat-val">${played}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanılan</span>
      <span class="stat-val">${wins}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Kazanma %</span>
      <span class="stat-val">${winPct}%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">En Uzun Seri</span>
      <span class="stat-val">${displayMaxStreak}</span>
    </div>
    <div style="margin-top:8px;">
      <div class="panel-title">Hata Dağılımı</div>
    </div>
    ${dist.map((d, i) => `
      <div class="dist-bar-wrap">
        <span class="dist-label" style="min-width:50px;text-align:left;font-size:0.6rem;">${distLabels[i]}</span>
        <div class="dist-bar-outer">
          <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxDist * 100, 5) : 0}%"></div>
        </div>
        <span class="dist-pct">${d}</span>
      </div>
    `).join('')}
  `;

  // Right panel: community stats from Supabase
  const community = await loadCommunityStats();
  const communityDist = community.dist;
  const totalCommunity = communityDist.reduce((a, b) => a + b, 0);
  const maxCommunityDist = Math.max(...communityDist, 1);
  const topDistricts = community.topDistricts;

  const communityLabels = ['0 hata', '1 hata', '2 hata', '3 hata', 'Kaybetti'];

  document.getElementById('stats-right').innerHTML = `
    <div>
      <div class="panel-title">Günün İstatistikleri</div>
    </div>
    ${communityDist.map((d, i) => {
      const pct = totalCommunity > 0 ? Math.round(d / totalCommunity * 100) : 0;
      return `
        <div class="dist-bar-wrap">
          <span class="dist-label" style="min-width:50px;text-align:left;font-size:0.6rem;">${communityLabels[i]}</span>
          <div class="dist-bar-outer">
            <div class="dist-bar-inner" style="width:${d > 0 ? Math.max(d / maxCommunityDist * 100, 3) : 0}%"></div>
          </div>
          <span class="dist-pct">${pct}%</span>
        </div>
      `;
    }).join('')}
    <div style="margin-top:8px;">
      <div class="panel-title">En Başarılı İlçeler</div>
    </div>
    ${topDistricts.map((d, i) => `
      <div class="district-rank">
        <span class="rank-name">${i + 1}. ${d.name}</span>
        <span class="rank-pct">${d.pct}%</span>
      </div>
    `).join('')}
  `;
}

// ── Init ──
renderWords();
const restored = restoreState();
if (!restored) {
  renderWords();
}
renderStats();
</script>
