<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --rule: #cccccc;
      --accent: #333333;
      --muted: #888888;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .section-rule {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }
    .datetime-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .datetime-block .date-line { }
    .datetime-block .day-line { }
    .datetime-block .time-line { }

    header {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    nav {
      display: flex;
      width: 100%;
    }
    nav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .col-left .nb-highlight {
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      flex-shrink: 0;
    }
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      border-left: var(--col-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Profile identity section (left column) ── */
    .profile-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .display-name {
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      word-break: break-word;
    }

    .avatar-upload {
      font-size: 0.65rem;
      color: var(--accent);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
    }
    .avatar-upload:hover { text-decoration: underline; }

    .district-select-wrap {
      width: 100%;
      margin-top: 6px;
    }

    .district-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .district-select {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 8px;
      background: #f5f5f5;
      border: 1px solid var(--ink);
      color: var(--ink);
      width: 100%;
      cursor: pointer;
    }

    .district-display {
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--paper-dark);
      border: 1px solid #ccc;
      color: var(--ink);
    }

    .save-btn {
      width: 100%;
      padding: 8px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
    }
    .save-btn:hover { background: var(--accent); }
    .save-btn:disabled { background: var(--muted); cursor: default; }

    .save-msg {
      font-size: 0.7rem;
      text-align: center;
      min-height: 14px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-signout {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-signout:hover { background: #555555; }

    /* Signout wrapper (bottom of right column on desktop, below everything on mobile) */
    .profile-signout-wrap {
      padding: 16px;
      display: flex;
      justify-content: center;
      border-top: 1px solid #ddd;
      margin-top: auto;
    }

    /* ── Center: profile board ── */
    .profile-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }

    #sticker-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .board-header {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--paper-dark);
      border-bottom: var(--col-border);
      color: var(--ink);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-header .edit-toggle {
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    .board-header .edit-toggle:hover { color: var(--ink); }

    .sticker-board {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--paper);
      min-height: 0;
    }

    .sticker {
      position: absolute;
      cursor: grab;
      user-select: none;
      width: 120px;
      height: auto;
      filter: grayscale(100%);
      transition: filter 0.2s;
    }
    .sticker:hover { filter: grayscale(60%); }
    .sticker.dragging { cursor: grabbing; z-index: 100; filter: grayscale(0%); }

    /* Sticker tray (shown in edit mode) */
    .sticker-tray {
      display: none;
      padding: 10px 16px;
      background: var(--paper-dark);
      border-top: var(--col-border);
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
      gap: 8px;
    }

    .sticker-tray.active {
      display: flex;
    }

    .tray-sticker {
      width: 64px;
      height: 64px;
      object-fit: contain;
      cursor: pointer;
      filter: grayscale(100%);
      opacity: 0.7;
      transition: all 0.2s;
      flex-shrink: 0;
      padding: 4px;
      border: 2px solid transparent;
    }
    .tray-sticker:hover { filter: grayscale(40%); opacity: 1; }
    .tray-sticker.locked {
      opacity: 0.2;
      cursor: not-allowed;
      filter: grayscale(100%);
    }
    .tray-sticker.locked:hover { opacity: 0.2; filter: grayscale(100%); }

    /* ── Right: stats & info ── */
    .profile-right {
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 16px;
    }

    .right-section-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 8px;
    }
    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .info-value {
      font-size: 0.8rem;
      color: var(--ink);
    }

    .score-card {
      border: 1px solid #ccc;
      padding: 10px;
      background: var(--paper);
      text-align: center;
      margin-bottom: 8px;
    }
    .score-card:last-child { margin-bottom: 0; }

    .score-card .game-name {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .score-card .score-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .score-card .score-detail {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      font-style: italic;
    }

    .loading {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 60px 40px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html {
        height: 100vh;
        height: 100dvh;
      }
      body {
        height: 100vh;
        height: 100dvh;
        display: block;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 56px; /* reserve space for fixed bottom tab bar */

      /* Compact top brand bar */
      .section-rule {

      .col-left .nb-highlight {

        font-size: 10px;
        letter-spacing: 1.5px;

      /* Stack profile-left vertically, center all items */
      .profile-left {
        padding: 0;

      .display-name {

      .district-select, .district-display {

      }

      }
      .save-msg {

      }

      /* Scores & account info in profile-right — compact below profile-left */
      .profile-right {
        padding: 12px 20px 14px 20px;
        gap: 10px;
        overflow: visible;
        display: flex;
        flex-direction: column;
        border-top: 1px solid #e5e5e5;

      }
      .profile-signout-wrap {
        padding: 14px 20px 20px 20px;
        display: flex;
        justify-content: center;
        border-top: 1px solid #e5e5e5;
        background: #ffffff;
      }
      .profile-signout-wrap .btn-signout {
        width: 100%;
        max-width: 320px;
        padding: 11px 16px;
        font-size: 12px;
        border-radius: 4px;
      }
      .right-section-title {
        font-size: 10px;

      .score-card .game-name {

      /* Bottom tab bar — fixed at bottom */
      header {

<script>
// Date/time display
function updateDateTime() {
  const now = new Date();
  const opts = { timeZone: 'Europe/Istanbul' };
  const day = now.toLocaleDateString('tr-TR', { ...opts, day: 'numeric' });
  const month = now.toLocaleDateString('tr-TR', { ...opts, month: 'long' });
  const year = now.toLocaleDateString('tr-TR', { ...opts, year: 'numeric' });
  const weekday = now.toLocaleDateString('tr-TR', { ...opts, weekday: 'long' });
  const time = now.toLocaleTimeString('tr-TR', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('date-line').textContent = (day + ' ' + month + ' ' + year).toUpperCase();
  document.getElementById('day-line').textContent = weekday.toUpperCase();
  document.getElementById('time-line').textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 60000);

const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const neighborhoodNames = {

  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};

// Sticker definitions — image-based stickers, unlocked by birth district
const STICKERS = [

  { src: 'assets/kizkulesisticker.png', label: 'Kız Kulesi', district: 'uskudar' },
];

function getGameScores() {
  return {
    bulmacaWins: parseInt(localStorage.getItem('bulmaca_wins') || '0'),
    bulmacaPlayed: parseInt(localStorage.getItem('bulmaca_played') || '0'),
    sozcelWins: parseInt(localStorage.getItem('sozcel_wins') || '0'),
    sozcelPlayed: parseInt(localStorage.getItem('sozcel_played') || '0'),
    sozcelStreak: parseInt(localStorage.getItem('sozcel_streak') || '0'),
  };
}

function formatLastSeen(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1) return 'Şimdi çevrimiçi';
  if (diffMins < 60) return `${diffMins} dk önce`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `${diffHours} saat önce`;
  const diffDays = Math.floor(diffHours / 24);
  if (diffDays < 7) return `${diffDays} gün önce`;
  return d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ── Sticker board persistence (localStorage, keyed by user id) ──
function loadBoardStickers(userId) {
  try {
    return JSON.parse(localStorage.getItem('hane_stickers_' + userId)) || [];
  } catch { return []; }
}

function saveBoardStickers(userId, stickers) {
  localStorage.setItem('hane_stickers_' + userId, JSON.stringify(stickers));
}

async function loadProfile() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    window.location.href = 'index.html';
    return;
  }

  // Check if viewing another user's profile via ?user=ID
  const urlParams = new URLSearchParams(window.location.search);
  const viewingUserId = urlParams.get('user');
  const isViewingOther = viewingUserId && viewingUserId !== session.user.id;

  // Fetch fresh user data from server (getSession can return stale cache)
  const { data: { user: freshUser }, error: userError } = await sb.auth.getUser();
  const user = freshUser || session.user;
  const meta = user.user_metadata || {};
  const avatarUrl = meta.avatar_url || null;
  // When viewing own profile, prefer localStorage values (most-recent local save)
  // over user_metadata, since metadata can briefly lag behind after an updateUser call.
  // When viewing someone else's profile, always use the metadata we fetched.
  const lsFirstName = !isViewingOther ? localStorage.getItem('first_name_local') : null;
  const lsLastName = !isViewingOther ? localStorage.getItem('last_name_local') : null;
  const lsYasadigi = !isViewingOther ? localStorage.getItem('yasadigi_ilce_local') : null;
  const firstName = (lsFirstName !== null && lsFirstName !== '') ? lsFirstName : (meta.first_name || '');
  const lastName = (lsLastName !== null && lsLastName !== '') ? lsLastName : (meta.last_name || '');
  const displayName = firstName ? `${firstName} ${lastName}`.trim() : (meta.display_name || user.email.split('@')[0]);
  const yasadigiIlce = (lsYasadigi !== null && lsYasadigi !== '') ? lsYasadigi : (meta.yasadigi_ilce || meta.neighborhood || '');
  const dogumYeri = meta.dogum_yeri || '';

  // Update neighborhood badge in left column
  const badgeEl = document.getElementById('user-nb-badge');
  if (badgeEl && yasadigiIlce) {
    badgeEl.textContent = neighborhoodNames[yasadigiIlce] || yasadigiIlce;
  }

  const joinedDate = new Date(user.created_at).toLocaleDateString('tr-TR', {
    year: 'numeric', month: 'long', day: 'numeric'
  });
  const lastSeenText = formatLastSeen(user.last_sign_in_at);
  const scores = getGameScores();

  const avatarContent = avatarUrl
    ? `<img src="${avatarUrl}" alt="Profile">`
    : displayName.charAt(0).toUpperCase();

  // Build living district dropdown
  const districtOptions = Object.entries(neighborhoodNames)
    .sort((a, b) => a[1].localeCompare(b[1], 'tr'))
    .map(([id, name]) => `<option value="${id}"${id === yasadigiIlce ? ' selected' : ''}>${name}</option>`)
    .join('');

  // Birth place display (read-only)
  let dogumDisplay = '—';
  if (dogumYeri === 'istanbul_disi') dogumDisplay = 'İstanbul Dışı';
  else if (dogumYeri && neighborhoodNames[dogumYeri]) dogumDisplay = neighborhoodNames[dogumYeri];
  else if (dogumYeri) dogumDisplay = dogumYeri;

  // ── PROFILE BAR (inside center column) ──
  const profileLeftEl = document.getElementById('profile-left-area');
  if (isViewingOther) {
    profileLeftEl.innerHTML = `
      <div style="font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);">Profil</div>
      <div style="font-weight:700;font-size:1rem;">Kullanıcı Panosu</div>
    `;
  } else {
    profileLeftEl.innerHTML = `
      <div class="avatar" id="avatar-display">${avatarContent}</div>
      <button class="avatar-upload" id="avatar-btn">Fotoğraf Değiştir</button>
      <input type="file" id="avatar-input" accept="image/*" style="display:none;">
      <div class="district-select-wrap">
        <div class="district-label">Ad</div>
        <input class="district-select" id="edit-firstname" type="text" value="${firstName}" placeholder="Adınız" style="border:1px solid var(--ink);padding:6px 8px;font-family:'Inter',sans-serif;font-size:0.8rem;">
      </div>
      <div class="district-select-wrap">
        <div class="district-label">Soyad</div>
        <input class="district-select" id="edit-lastname" type="text" value="${lastName}" placeholder="Soyadınız" style="border:1px solid var(--ink);padding:6px 8px;font-family:'Inter',sans-serif;font-size:0.8rem;">
      </div>
      <div class="district-select-wrap">
        <div class="district-label">Yaşadığı İlçe</div>
        <select class="district-select" id="edit-yasadigi">
          <option value="">— İlçe seçin —</option>
          ${districtOptions}
        </select>
      </div>
      <div class="district-select-wrap">
        <div class="district-label">Doğum Yeri</div>
        <div class="district-display">${dogumDisplay}</div>
      </div>
      <button class="save-btn" id="save-btn">Kaydet</button>
      <div class="save-msg" id="save-msg"></div>
    `;
    // Render signout in its dedicated wrapper (bottom of page on mobile, bottom of right column on desktop)
    document.getElementById('profile-signout-wrap').innerHTML = `
      <button class="btn-signout" id="signout-btn">Çıkış Yap</button>
    `;
  }

  // ── STICKER BOARD (inside center column, below profile bar) ──
  const boardStickers = loadBoardStickers(user.id);

  document.getElementById('sticker-area').innerHTML = `
    <div class="board-header">
      <span>Profil Panosu</span>
      <button class="edit-toggle" id="edit-board-btn">Düzenle</button>
    </div>
    <div class="sticker-board" id="sticker-board"></div>
    <div class="sticker-tray" id="sticker-tray"></div>
  `;

  // Determine which stickers are unlocked for this user
  const unlockedDistricts = new Set();
  unlockedDistricts.add(null); // universal stickers always unlocked
  if (dogumYeri && dogumYeri !== 'istanbul_disi') unlockedDistricts.add(dogumYeri);

  // Render sticker tray (image-based stickers)
  const tray = document.getElementById('sticker-tray');
  if (tray && !isViewingOther) {
    STICKERS.forEach((s, idx) => {
      const img = document.createElement('img');
      img.className = 'tray-sticker';
      img.src = s.src;
      img.alt = s.label;
      const isUnlocked = unlockedDistricts.has(s.district);
      if (!isUnlocked) {
        img.classList.add('locked');
        img.title = '🔒 ' + s.label + ' — Bu çıkartma sadece ' + (neighborhoodNames[s.district] || '') + ' doğumlulara özel. Açmak için doğum yerinizin ' + (neighborhoodNames[s.district] || '') + ' olması gerekir.';
      } else {
        img.title = s.label;
        img.addEventListener('click', () => {
          if (img.dataset.placed === 'true') return;
          addStickerToBoard(user.id, idx);
        });
      }
      tray.appendChild(img);
    });
  }

  // Render placed stickers
  const board = document.getElementById('sticker-board');
  boardStickers.forEach((bs, i) => {
    placeSticker(board, bs, i, user.id, isViewingOther);
  });

  // Edit mode toggle (only on own profile)
  let editMode = false;
  if (!isViewingOther) {
    document.getElementById('edit-board-btn').addEventListener('click', () => {
      editMode = !editMode;
      document.getElementById('sticker-tray').classList.toggle('active', editMode);
      document.getElementById('edit-board-btn').textContent = editMode ? 'Bitti' : 'Düzenle';
      // Update sticker cursors based on edit mode
      board.querySelectorAll('.sticker').forEach(s => {
        s.style.cursor = editMode ? 'grab' : 'default';
      });
    });
  } else {
    // Hide edit button when viewing another user
    const editBtn = document.getElementById('edit-board-btn');
    if (editBtn) editBtn.style.display = 'none';
  }

  // Check which stickers are already placed (for limiting to one use each)
  function getUsedStickerIndices(userId) {
    return new Set(loadBoardStickers(userId).map(s => s.idx));
  }

  function updateTrayAvailability(userId) {
    const used = getUsedStickerIndices(userId);
    if (!tray) return;
    tray.querySelectorAll('.tray-sticker').forEach((img, idx) => {
      if (img.classList.contains('locked')) return; // already locked by district
      if (used.has(idx)) {
        img.style.opacity = '0.3';
        img.style.cursor = 'not-allowed';
        img.dataset.placed = 'true';
      } else {
        img.style.opacity = '';
        img.style.cursor = 'pointer';
        img.dataset.placed = 'false';
      }
    });
  }

  updateTrayAvailability(user.id);

  function addStickerToBoard(userId, stickerIdx) {
    // Prevent adding the same sticker twice
    const used = getUsedStickerIndices(userId);
    if (used.has(stickerIdx)) return;

    const stored = loadBoardStickers(userId);
    const newSticker = {
      idx: stickerIdx,
      x: 40 + Math.random() * 20,
      y: 30 + Math.random() * 30
    };
    stored.push(newSticker);
    saveBoardStickers(userId, stored);
    placeSticker(board, newSticker, stored.length - 1, userId, false);
    updateTrayAvailability(userId);
  }

  function placeSticker(boardEl, stickerData, index, userId, readOnly) {
    const s = STICKERS[stickerData.idx];
    if (!s) return;
    const el = document.createElement('img');
    el.className = 'sticker';
    el.src = s.src;
    el.alt = s.label;
    el.title = s.label;
    el.draggable = false;
    el.style.left = stickerData.x + '%';
    el.style.top = stickerData.y + '%';
    // Only show grab cursor in edit mode
    el.style.cursor = (readOnly || !editMode) ? 'default' : 'grab';

    if (readOnly) {
      boardEl.appendChild(el);
      return;
    }

    // Drag to reposition — only in edit mode
    let dragging = false, startX, startY, startLeft, startTop;
    el.addEventListener('mousedown', (e) => {
      if (!editMode) return;
      e.preventDefault();
      dragging = true;
      el.classList.add('dragging');
      const rect = boardEl.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      startLeft = parseFloat(el.style.left);
      startTop = parseFloat(el.style.top);

      function onMove(ev) {
        if (!dragging) return;
        const dx = (ev.clientX - startX) / rect.width * 100;
        const dy = (ev.clientY - startY) / rect.height * 100;
        el.style.left = Math.max(0, Math.min(95, startLeft + dx)) + '%';
        el.style.top = Math.max(0, Math.min(90, startTop + dy)) + '%';
      }
      function onUp() {
        dragging = false;
        el.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const stored = loadBoardStickers(userId);
        if (stored[index]) {
          stored[index].x = parseFloat(el.style.left);
          stored[index].y = parseFloat(el.style.top);
          saveBoardStickers(userId, stored);
        }
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Double-click to remove — only in edit mode
    el.addEventListener('dblclick', () => {
      if (!editMode) return;
      const stored = loadBoardStickers(userId);
      stored.splice(index, 1);
      saveBoardStickers(userId, stored);
      boardEl.innerHTML = '';
      stored.forEach((bs, i) => placeSticker(boardEl, bs, i, userId, false));
      updateTrayAvailability(userId);
    });

    boardEl.appendChild(el);
  }

  // ── RIGHT: stats & account info ──
  if (isViewingOther) {
    // When viewing another user, show minimal info
    document.querySelector('.profile-right').innerHTML = `
      <div style="text-align:center;padding:20px;color:var(--muted);font-style:italic;font-size:0.8rem;">
        Bu kullanıcının panosu
      </div>
    `;
  } else {
    document.querySelector('.profile-right').innerHTML = `
      <div>
        <div class="right-section-title">Hesap</div>
        <div class="info-row">
          <div class="info-label">E-posta</div>
          <div class="info-value">${user.email}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Üyelik</div>
          <div class="info-value">${joinedDate}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Son Görülme</div>
          <div class="info-value">${lastSeenText}</div>
        </div>
      </div>
      <div>
        <div class="right-section-title">Oyun Skorları</div>
        <div class="score-card">
          <div class="game-name">Bulmaca</div>
          <div class="score-value">${scores.bulmacaWins}</div>
          <div class="score-detail">${scores.bulmacaPlayed} oyun</div>
        </div>
        <div class="score-card">
          <div class="game-name">Sözcel</div>
          <div class="score-value">${scores.sozcelWins}</div>
          <div class="score-detail">${scores.sozcelPlayed > 0 ? scores.sozcelStreak + ' seri' : 'Henüz oynanmadı'}</div>
        </div>
      </div>
    `;
  }

  // ── Save profile (name + district) ──
  if (!isViewingOther) {
    document.getElementById('save-btn').addEventListener('click', async () => {
      const msgEl = document.getElementById('save-msg');
      const btn = document.getElementById('save-btn');
      const newYasadigi = document.getElementById('edit-yasadigi').value;
      const newFirstName = document.getElementById('edit-firstname').value.trim();
      const newLastName = document.getElementById('edit-lastname').value.trim();

      if (!newYasadigi) {
        msgEl.textContent = 'Lütfen bir ilçe seçin.';
        msgEl.style.color = 'var(--accent)';
        return;
      }

      // 1. Save to localStorage FIRST, synchronously — guarantees the value
      //    is available on the next page load even if the network call below fails.
      localStorage.setItem('yasadigi_ilce_local', newYasadigi);
      localStorage.setItem('first_name_local', newFirstName);
      localStorage.setItem('last_name_local', newLastName);

      btn.textContent = 'Kaydediliyor...';
      btn.disabled = true;
      msgEl.textContent = '';

      // 2. Merge with existing metadata so we don't accidentally clobber
      //    unrelated fields (avatar_url, dogum_yeri, etc.) that Supabase
      //    would otherwise leave alone but some clients may mis-handle.
      const mergedMetadata = {
        ...(user.user_metadata || {}),
        yasadigi_ilce: newYasadigi,
        first_name: newFirstName,
        last_name: newLastName
      };

      try {
        const { data, error } = await sb.auth.updateUser({ data: mergedMetadata });
        if (error) throw error;

        // 3. Verify the server actually persisted the change by re-fetching
        //    the user. If the server returns stale or missing data, we treat
        //    it as a failure and keep the localStorage fallback.
        const { data: verifyData, error: verifyError } = await sb.auth.getUser();
        if (verifyError) throw verifyError;

        const serverMeta = verifyData?.user?.user_metadata || {};
        const persisted =
          serverMeta.first_name === newFirstName &&
          serverMeta.last_name === newLastName &&
          serverMeta.yasadigi_ilce === newYasadigi;

        btn.textContent = 'Kaydet';
        btn.disabled = false;
        if (persisted) {
          msgEl.textContent = 'Kaydedildi!';
        } else {
          msgEl.textContent = 'Yerel olarak kaydedildi.';
        }
        msgEl.style.color = 'var(--muted)';
        setTimeout(() => { msgEl.textContent = ''; }, 3000);
      } catch (err) {
        console.error('Profile save error:', err);
        btn.textContent = 'Kaydet';
        btn.disabled = false;
        msgEl.textContent = 'Yerel olarak kaydedildi.';
        msgEl.style.color = 'var(--muted)';
        setTimeout(() => { msgEl.textContent = ''; }, 3000);
      }
    });
  }

  // Sign out & avatar (only for own profile)
  if (!isViewingOther) {
    document.getElementById('signout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });

    document.getElementById('avatar-btn').addEventListener('click', () => {
      document.getElementById('avatar-input').click();
    });

    document.getElementById('avatar-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 200 * 1024) {
        alert('Fotoğraf 200KB\'den küçük olmalı.');
        return;
      }
      const reader = new FileReader();
      reader.onload = async (evt) => {
        const base64 = evt.target.result;
        const { error } = await sb.auth.updateUser({ data: { avatar_url: base64 } });
        if (!error) {
          document.getElementById('avatar-display').innerHTML = `<img src="${base64}" alt="Profile">`;
        }
      };
      reader.readAsDataURL(file);
    });
  }
}

loadProfile();
</script>
</body>
</html>
