<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --rule: #cccccc;
      --accent: #333333;
      --muted: #888888;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 32px 12px;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
    }

    .masthead {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 3.2rem;
      color: var(--ink);
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.2s;
    }

    .masthead:hover { color: var(--accent); }

    nav { display: flex; gap: 22px; }
    nav a {
      text-decoration: none;
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }

    .section-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
    }

    /* ── Profile Layout ── */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 32px;
      overflow-y: auto;
    }

    .profile-container {
      width: 580px;
      border: 2px solid var(--ink);
      background: white;
      position: relative;
    }

    .profile-container::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }

    .profile-header {
      text-align: center;
      padding: 30px 40px 20px;
      border-bottom: var(--col-border);
    }

    .profile-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: var(--ink);
      margin-bottom: 20px;
    }

    /* Profile photo */
    .avatar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--muted);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-upload {
      font-size: 0.72rem;
      color: var(--accent);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
    }

    .avatar-upload:hover { text-decoration: underline; }

    /* Info rows */
    .profile-body {
      padding: 24px 40px 30px;
    }

    .info-section {
      margin-bottom: 24px;
    }

    .info-section-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid #ddd;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-row.full-width {
      grid-column: 1 / -1;
    }

    .info-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .info-value {
      font-size: 1rem;
      padding: 10px 12px;
      background: var(--paper-dark);
      border: 1px solid #ccc;
      color: var(--ink);
    }

    /* Game scores */
    .scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .score-card {
      border: 1px solid #ccc;
      padding: 14px;
      background: var(--paper);
      text-align: center;
    }

    .score-card .game-name {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .score-card .score-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .score-card .score-detail {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
    }

    /* Sign out */
    .profile-footer {
      padding: 0 40px 30px;
    }

    .btn-signout {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-signout:hover { background: #555555; }

    footer {
      text-align: center;
      padding: 16px;
      background: var(--paper-dark);
      border-top: 2px solid var(--ink);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .loading {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 60px 40px;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="kahvehane.html">Kahvehane</a>
    </nav>
    <a href="index.html" style="text-decoration:none;">
      <div class="masthead">istanbulite.net</div>
    </a>
    <nav>
      <a href="kutuphane.html">Kütüphane</a>
      <a href="hane.html">Hane</a>
    </nav>
  </header>

  <div class="section-rule">Your Profile</div>

  <main>
    <div class="profile-container" id="profile-content">
      <div class="loading">
        <span class="spinner"></span>Loading your profile...
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 ISTANBULITE — All rights reserved
  </footer>

<script>
// ══════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const neighborhoodNames = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};

// Read game scores from localStorage (set by bulmaca.html and sozcel.html)
function getGameScores() {
  const bulmacaWins = parseInt(localStorage.getItem('bulmaca_wins') || '0');
  const bulmacaPlayed = parseInt(localStorage.getItem('bulmaca_played') || '0');
  const sozcelWins = parseInt(localStorage.getItem('sozcel_wins') || '0');
  const sozcelPlayed = parseInt(localStorage.getItem('sozcel_played') || '0');
  const sozcelStreak = parseInt(localStorage.getItem('sozcel_streak') || '0');
  const bulmacaBest = localStorage.getItem('bulmaca_best_time') || null;
  return { bulmacaWins, bulmacaPlayed, sozcelWins, sozcelPlayed, sozcelStreak, bulmacaBest };
}

// Format relative time for "last seen"
function formatLastSeen(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1) return 'Şimdi çevrimiçi';
  if (diffMins < 60) return `${diffMins} dakika önce`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `${diffHours} saat önce`;
  const diffDays = Math.floor(diffHours / 24);
  if (diffDays < 7) return `${diffDays} gün önce`;
  return d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadProfile() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    window.location.href = 'index.html';
    return;
  }

  const user = session.user;
  const homeNb = user.user_metadata?.neighborhood || null;
  const homeNbName = homeNb ? (neighborhoodNames[homeNb] || homeNb) : '—';
  const avatarUrl = user.user_metadata?.avatar_url || null;
  const displayName = user.user_metadata?.display_name || user.email.split('@')[0];

  const joinedDate = new Date(user.created_at).toLocaleDateString('tr-TR', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });

  const lastSignIn = user.last_sign_in_at;
  const lastSeenText = formatLastSeen(lastSignIn);

  const scores = getGameScores();

  // Build the avatar element
  const avatarContent = avatarUrl
    ? `<img src="${avatarUrl}" alt="Profile">`
    : displayName.charAt(0).toUpperCase();

  document.getElementById('profile-content').innerHTML = `
    <div class="profile-header">
      <h2>Hane</h2>
      <div class="avatar-wrapper">
        <div class="avatar" id="avatar-display">${avatarContent}</div>
        <button class="avatar-upload" id="avatar-btn">Fotoğraf Değiştir</button>
        <input type="file" id="avatar-input" accept="image/*" style="display:none;">
      </div>
    </div>

    <div class="profile-body">
      <!-- Account Info -->
      <div class="info-section">
        <div class="info-section-title">Hesap Bilgileri</div>
        <div class="info-grid">
          <div class="info-row">
            <div class="info-label">E-posta</div>
            <div class="info-value">${user.email}</div>
          </div>
          <div class="info-row">
            <div class="info-label">Semt</div>
            <div class="info-value">${homeNbName}</div>
          </div>
          <div class="info-row">
            <div class="info-label">Üyelik Tarihi</div>
            <div class="info-value">${joinedDate}</div>
          </div>
          <div class="info-row">
            <div class="info-label">Son Görülme</div>
            <div class="info-value">${lastSeenText}</div>
          </div>
        </div>
      </div>

      <!-- Game Scores -->
      <div class="info-section">
        <div class="info-section-title">Oyun Skorları</div>
        <div class="scores-grid">
          <div class="score-card">
            <div class="game-name">Bulmaca</div>
            <div class="score-value">${scores.bulmacaWins}</div>
            <div class="score-detail">${scores.bulmacaPlayed} oyun oynandı</div>
          </div>
          <div class="score-card">
            <div class="game-name">Sözcel</div>
            <div class="score-value">${scores.sozcelWins}</div>
            <div class="score-detail">${scores.sozcelPlayed > 0 ? scores.sozcelStreak + ' seri' : 'Henüz oynanmadı'}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="profile-footer">
      <button class="btn-signout" id="signout-btn">Çıkış Yap</button>
    </div>
  `;

  // Sign out handler
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  // Avatar upload handler — stores as base64 in user_metadata
  document.getElementById('avatar-btn').addEventListener('click', () => {
    document.getElementById('avatar-input').click();
  });

  document.getElementById('avatar-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Limit to 200KB for metadata storage
    if (file.size > 200 * 1024) {
      alert('Fotoğraf 200KB\'den küçük olmalı.');
      return;
    }

    const reader = new FileReader();
    reader.onload = async (evt) => {
      const base64 = evt.target.result;
      const { error } = await sb.auth.updateUser({
        data: { avatar_url: base64 }
      });
      if (!error) {
        document.getElementById('avatar-display').innerHTML = `<img src="${base64}" alt="Profile">`;
      }
    };
    reader.readAsDataURL(file);
  });
}

loadProfile();
</script>
</body>
</html>
