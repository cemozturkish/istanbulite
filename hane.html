<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hane — istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --paper-dark: #f0f0f0;
      --rule: #cccccc;
      --accent: #333333;
      --muted: #888888;
      --col-border: 1px solid #cccccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 32px;
      background: var(--paper);
      border-bottom: 4px double var(--ink);
      flex-shrink: 0;
    }

    .masthead {
      font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
    }

    .masthead:hover { color: var(--accent); }

    nav { display: flex; gap: 22px; align-items: center; }
    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--ink); }

    .section-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 7px 32px;
      border-bottom: 1px solid var(--ink);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--paper-dark);
      flex-shrink: 0;
    }
    .section-rule .divider {
      width: 2px;
      height: 12px;
      background: var(--ink);
    }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      gap: 0;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left: identity ── */
    .profile-left {
      order: 1;
      border-right: var(--col-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 10px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--paper-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .display-name {
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
    }

    .avatar-upload {
      font-size: 0.65rem;
      color: var(--accent);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
    }
    .avatar-upload:hover { text-decoration: underline; }

    .district-select-wrap {
      width: 100%;
      margin-top: 6px;
    }

    .district-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .district-select {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 8px;
      background: #f5f5f5;
      border: 1px solid var(--ink);
      color: var(--ink);
      width: 100%;
      cursor: pointer;
    }

    .district-display {
      font-size: 0.8rem;
      padding: 6px 8px;
      background: var(--paper-dark);
      border: 1px solid #ccc;
      color: var(--ink);
    }

    .save-btn {
      width: 100%;
      padding: 8px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
    }
    .save-btn:hover { background: var(--accent); }
    .save-btn:disabled { background: var(--muted); cursor: default; }

    .save-msg {
      font-size: 0.7rem;
      text-align: center;
      min-height: 14px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-signout {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-signout:hover { background: #555555; }

    /* ── Center: profile board ── */
    .profile-center {
      order: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: var(--col-border);
    }

    .board-header {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--paper-dark);
      border-bottom: var(--col-border);
      color: var(--ink);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-header .edit-toggle {
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    .board-header .edit-toggle:hover { color: var(--ink); }

    .sticker-board {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--paper);
      min-height: 0;
    }

    .sticker {
      position: absolute;
      cursor: grab;
      user-select: none;
      font-size: 2rem;
      line-height: 1;
      filter: grayscale(100%);
      transition: filter 0.2s;
    }
    .sticker:hover { filter: grayscale(60%); }
    .sticker.dragging { cursor: grabbing; z-index: 100; filter: grayscale(0%); }

    /* Sticker tray (shown in edit mode) */
    .sticker-tray {
      display: none;
      padding: 10px 16px;
      background: var(--paper-dark);
      border-top: var(--col-border);
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
      gap: 8px;
    }

    .sticker-tray.active {
      display: flex;
    }

    .tray-sticker {
      font-size: 1.6rem;
      cursor: pointer;
      filter: grayscale(100%);
      opacity: 0.7;
      transition: all 0.2s;
      flex-shrink: 0;
      padding: 4px;
      border: 2px solid transparent;
    }
    .tray-sticker:hover { filter: grayscale(40%); opacity: 1; }
    .tray-sticker.locked {
      opacity: 0.2;
      cursor: not-allowed;
      filter: grayscale(100%);
    }
    .tray-sticker.locked:hover { opacity: 0.2; filter: grayscale(100%); }

    /* ── Right: stats & info ── */
    .profile-right {
      order: 3;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 16px;
    }

    .right-section-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 8px;
    }
    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .info-value {
      font-size: 0.8rem;
      color: var(--ink);
    }

    .score-card {
      border: 1px solid #ccc;
      padding: 10px;
      background: var(--paper);
      text-align: center;
      margin-bottom: 8px;
    }
    .score-card:last-child { margin-bottom: 0; }

    .score-card .game-name {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .score-card .score-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .score-card .score-detail {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      font-style: italic;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: var(--paper-dark);
      border-top: 2px solid var(--ink);
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .loading {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      padding: 60px 40px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<script>
// Date/time
function updateDateTime() {
  const now = new Date();
  document.getElementById('current-date').textContent =
    now.toLocaleDateString('tr-TR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const istanbulTime = now.toLocaleTimeString('tr-TR', {
    timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit', hour12: false
  });
  document.getElementById('istanbul-time').textContent = istanbulTime;
}
updateDateTime();
setInterval(updateDateTime, 60000);

const SUPABASE_URL = 'https://fgxispjoiynnoqitwpks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iCNHaPaYLC-WRfmsfNPxYg_x2XJtI9Z';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const neighborhoodNames = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'

// Sticker definitions — each has emoji, label, and which district unlocks it (null = universal)
const STICKERS = [
  // Universal stickers (everyone gets these)
  { emoji: '☕', label: 'Çay', district: null },
  { emoji: '🥯', label: 'Simit', district: null },
  { emoji: '🐈', label: 'Kedi', district: null },

  { emoji: '🏰', label: 'Kız Kulesi', district: 'uskudar' },
  { emoji: '🌉', label: 'Boğaz Köprüsü', district: 'besiktas' },
  { emoji: '🎣', label: 'Balıkçı', district: 'beykoz' },
  { emoji: '🏟️', label: 'Stadyum', district: 'kadikoy' },
  { emoji: '🎭', label: 'Tiyatro', district: 'beyoglu' },
  { emoji: '⚓', label: 'Liman', district: 'bakirkoy' },
  { emoji: '🌳', label: 'Orman', district: 'sariyer' },
  { emoji: '🏛️', label: 'Saray', district: 'fatih' },
  { emoji: '🛍️', label: 'Çarşı', district: 'sisli' },
  { emoji: '🎡', label: 'Lunapark', district: 'basaksehir' },
  { emoji: '🏔️', label: 'Tepe', district: 'cekmekoy' },
  { emoji: '🌅', label: 'Gün Batımı', district: 'maltepe' },
  { emoji: '🏗️', label: 'İnşaat', district: 'umraniye' },
  { emoji: '🎪', label: 'Festival', district: 'kagithane' },
  { emoji: '🌿', label: 'Bahçe', district: 'bahcelievler' },
  { emoji: '🚂', label: 'Tren', district: 'zeytinburnu' },
  { emoji: '🏘️', label: 'Mahalle', district: 'eyupsultan' },
  { emoji: '🏋️', label: 'Spor', district: 'atasehir' },
  { emoji: '🎵', label: 'Müzik', district: 'bagcilar' },
  { emoji: '🍖', label: 'Kebap', district: 'sultangazi' },
  { emoji: '🛒', label: 'Pazar', district: 'gungoren' },
  { emoji: '🌙', label: 'Hilal', district: 'bayrampasa' },
  { emoji: '🏠', label: 'Ev', district: 'esenler' },
  { emoji: '🚌', label: 'Otobüs', district: 'gop' },
  { emoji: '🏊', label: 'Havuz', district: 'kucukcekmece' },
];

function getGameScores() {
  return {
    bulmacaWins: parseInt(localStorage.getItem('bulmaca_wins') || '0'),
    bulmacaPlayed: parseInt(localStorage.getItem('bulmaca_played') || '0'),
    sozcelWins: parseInt(localStorage.getItem('sozcel_wins') || '0'),
    sozcelPlayed: parseInt(localStorage.getItem('sozcel_played') || '0'),
    sozcelStreak: parseInt(localStorage.getItem('sozcel_streak') || '0'),
  };
}

function formatLastSeen(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1) return 'Şimdi çevrimiçi';
  if (diffMins < 60) return `${diffMins} dk önce`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `${diffHours} saat önce`;
  const diffDays = Math.floor(diffHours / 24);
  if (diffDays < 7) return `${diffDays} gün önce`;
  return d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ── Sticker board persistence (localStorage, keyed by user id) ──
function loadBoardStickers(userId) {
  try {
    return JSON.parse(localStorage.getItem('hane_stickers_' + userId)) || [];
  } catch { return []; }
}

function saveBoardStickers(userId, stickers) {
  localStorage.setItem('hane_stickers_' + userId, JSON.stringify(stickers));
}

async function loadProfile() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    window.location.href = 'index.html';
    return;
  }

  const user = session.user;
  const meta = user.user_metadata || {};
  const avatarUrl = meta.avatar_url || null;
  const displayName = meta.display_name || user.email.split('@')[0];
  const yasadigiIlce = meta.yasadigi_ilce || meta.neighborhood || '';
  const dogumYeri = meta.dogum_yeri || '';

  const joinedDate = new Date(user.created_at).toLocaleDateString('tr-TR', {
    year: 'numeric', month: 'long', day: 'numeric'
  });
  const lastSeenText = formatLastSeen(user.last_sign_in_at);
  const scores = getGameScores();

  const avatarContent = avatarUrl
    ? `<img src="${avatarUrl}" alt="Profile">`
    : displayName.charAt(0).toUpperCase();

  // Build living district dropdown
  const districtOptions = Object.entries(neighborhoodNames)
    .sort((a, b) => a[1].localeCompare(b[1], 'tr'))
    .map(([id, name]) => `<option value="${id}"${id === yasadigiIlce ? ' selected' : ''}>${name}</option>`)
    .join('');

  // Birth place display (read-only)
  let dogumDisplay = '—';
  if (dogumYeri === 'istanbul_disi') dogumDisplay = 'İstanbul Dışı';
  else if (dogumYeri && neighborhoodNames[dogumYeri]) dogumDisplay = neighborhoodNames[dogumYeri];
  else if (dogumYeri) dogumDisplay = dogumYeri;

  // ── LEFT: identity + district edit ──
  document.querySelector('.profile-left').innerHTML = `
    <div class="avatar" id="avatar-display">${avatarContent}</div>
    <button class="avatar-upload" id="avatar-btn">Fotoğraf Değiştir</button>
    <input type="file" id="avatar-input" accept="image/*" style="display:none;">
    <div class="display-name">${displayName}</div>
    <div class="district-select-wrap">
      <div class="district-label">Yaşadığı İlçe</div>
      <select class="district-select" id="edit-yasadigi">
        <option value="">— İlçe seçin —</option>
        ${districtOptions}
      </select>
    </div>
    <div class="district-select-wrap">
      <div class="district-label">Doğum Yeri</div>
      <div class="district-display">${dogumDisplay}</div>
    </div>
    <button class="save-btn" id="save-btn">Kaydet</button>
    <div class="save-msg" id="save-msg"></div>
    <button class="btn-signout" id="signout-btn">Çıkış Yap</button>
  `;

  // ── CENTER: sticker board ──
  const boardStickers = loadBoardStickers(user.id);

  document.querySelector('.profile-center').innerHTML = `
    <div class="board-header">
      <span>Profil Panosu</span>
      <button class="edit-toggle" id="edit-board-btn">Düzenle</button>
    </div>
    <div class="sticker-board" id="sticker-board"></div>
    <div class="sticker-tray" id="sticker-tray"></div>
  `;

  // Determine which stickers are unlocked for this user
  const unlockedDistricts = new Set();
  unlockedDistricts.add(null); // universal stickers always unlocked
  if (dogumYeri && dogumYeri !== 'istanbul_disi') unlockedDistricts.add(dogumYeri);

  // Render sticker tray
  const tray = document.getElementById('sticker-tray');
  STICKERS.forEach((s, idx) => {
    const span = document.createElement('span');
    span.className = 'tray-sticker';
    span.textContent = s.emoji;
    const isUnlocked = unlockedDistricts.has(s.district);
    if (!isUnlocked) {
      span.classList.add('locked');
      span.title = s.label + ' — ' + (neighborhoodNames[s.district] || '') + ' doğumluya özel';
    } else {
      span.title = s.label;
      span.addEventListener('click', () => {
        addStickerToBoard(user.id, idx);
      });
    }
    tray.appendChild(span);
  });

  // Render placed stickers
  const board = document.getElementById('sticker-board');
  boardStickers.forEach((bs, i) => {
    placeSticker(board, bs, i, user.id);
  });

  // Edit mode toggle
  let editMode = false;
  document.getElementById('edit-board-btn').addEventListener('click', () => {
    editMode = !editMode;
    document.getElementById('sticker-tray').classList.toggle('active', editMode);
    document.getElementById('edit-board-btn').textContent = editMode ? 'Bitti' : 'Düzenle';
  });

  function addStickerToBoard(userId, stickerIdx) {
    const stored = loadBoardStickers(userId);
    const newSticker = {
      idx: stickerIdx,
      x: 40 + Math.random() * 20,
      y: 30 + Math.random() * 30
    };
    stored.push(newSticker);
    saveBoardStickers(userId, stored);
    placeSticker(board, newSticker, stored.length - 1, userId);
  }

  function placeSticker(boardEl, stickerData, index, userId) {
    const s = STICKERS[stickerData.idx];
    if (!s) return;
    const el = document.createElement('span');
    el.className = 'sticker';
    el.textContent = s.emoji;
    el.title = s.label;
    el.style.left = stickerData.x + '%';
    el.style.top = stickerData.y + '%';

    // Drag to reposition
    let dragging = false, startX, startY, startLeft, startTop;
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      dragging = true;
      el.classList.add('dragging');
      const rect = boardEl.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      startLeft = parseFloat(el.style.left);
      startTop = parseFloat(el.style.top);

      function onMove(ev) {
        if (!dragging) return;
        const dx = (ev.clientX - startX) / rect.width * 100;
        const dy = (ev.clientY - startY) / rect.height * 100;
        el.style.left = Math.max(0, Math.min(95, startLeft + dx)) + '%';
        el.style.top = Math.max(0, Math.min(90, startTop + dy)) + '%';
      }
      function onUp() {
        dragging = false;
        el.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        // Save new position
        const stored = loadBoardStickers(userId);
        if (stored[index]) {
          stored[index].x = parseFloat(el.style.left);
          stored[index].y = parseFloat(el.style.top);
          saveBoardStickers(userId, stored);
        }
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Double-click to remove
    el.addEventListener('dblclick', () => {
      const stored = loadBoardStickers(userId);
      stored.splice(index, 1);
      saveBoardStickers(userId, stored);
      // Re-render board
      boardEl.innerHTML = '';
      stored.forEach((bs, i) => placeSticker(boardEl, bs, i, userId));
    });

    boardEl.appendChild(el);
  }

  // ── RIGHT: stats & account info ──
  document.querySelector('.profile-right').innerHTML = `
    <div>
      <div class="right-section-title">Hesap</div>
      <div class="info-row">
        <div class="info-label">E-posta</div>
        <div class="info-value">${user.email}</div>
      </div>
      <div class="info-row">
        <div class="info-label">Üyelik</div>
        <div class="info-value">${joinedDate}</div>
      </div>
      <div class="info-row">
        <div class="info-label">Son Görülme</div>
        <div class="info-value">${lastSeenText}</div>
      </div>
    </div>
    <div>
      <div class="right-section-title">Oyun Skorları</div>
      <div class="score-card">
        <div class="game-name">Bulmaca</div>
        <div class="score-value">${scores.bulmacaWins}</div>
        <div class="score-detail">${scores.bulmacaPlayed} oyun</div>
      </div>
      <div class="score-card">
        <div class="game-name">Sözcel</div>
        <div class="score-value">${scores.sozcelWins}</div>
        <div class="score-detail">${scores.sozcelPlayed > 0 ? scores.sozcelStreak + ' seri' : 'Henüz oynanmadı'}</div>
      </div>
    </div>
  `;

  // ── Save living district ──
  document.getElementById('save-btn').addEventListener('click', async () => {
    const msgEl = document.getElementById('save-msg');
    const btn = document.getElementById('save-btn');
    const newYasadigi = document.getElementById('edit-yasadigi').value;

    if (!newYasadigi) {
      msgEl.textContent = 'Lütfen bir ilçe seçin.';
      msgEl.style.color = 'var(--accent)';
      return;
    }

    btn.textContent = 'Kaydediliyor...';
    btn.disabled = true;
    msgEl.textContent = '';

    // Use direct fetch to Supabase auth endpoint as fallback
    try {
      const { data: { session: currentSession } } = await sb.auth.getSession();
      if (!currentSession) {
        await sb.auth.refreshSession();
      }

      const { error } = await sb.auth.updateUser({
        data: { yasadigi_ilce: newYasadigi }
      });

      if (error) throw error;

      btn.textContent = 'Kaydet';
      btn.disabled = false;
      msgEl.textContent = 'Kaydedildi!';
      msgEl.style.color = 'var(--muted)';
      setTimeout(() => { msgEl.textContent = ''; }, 3000);
    } catch (err) {
      btn.textContent = 'Kaydet';
      btn.disabled = false;
      // Fallback: save to localStorage so the rest of the site can use it
      localStorage.setItem('yasadigi_ilce_local', newYasadigi);
      msgEl.textContent = 'Yerel olarak kaydedildi.';
      msgEl.style.color = 'var(--muted)';
      setTimeout(() => { msgEl.textContent = ''; }, 3000);
    }
  });

  // Sign out
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  // Avatar upload
  document.getElementById('avatar-btn').addEventListener('click', () => {
    document.getElementById('avatar-input').click();
  });

  document.getElementById('avatar-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 200 * 1024) {
      alert('Fotoğraf 200KB\'den küçük olmalı.');
      return;
    }
    const reader = new FileReader();
    reader.onload = async (evt) => {
      const base64 = evt.target.result;
      const { error } = await sb.auth.updateUser({ data: { avatar_url: base64 } });
      if (!error) {
        document.getElementById('avatar-display').innerHTML = `<img src="${base64}" alt="Profile">`;
      }
    };
    reader.readAsDataURL(file);
  });
}

loadProfile();
</script>
</body>
</html>
