// ── Map Interactions ──
const svg = document.querySelector('svg');

// A virtual navigation (see router.js) replaces #ist-content's whole
// subtree on every revisit to this page, including the map's SVG
// -- so the actual .neighborhood elements are different DOM nodes each
// time. Delegating on `document` (never itself replaced) and re-querying
// fresh each time, instead of binding per-node listeners once, keeps map
// clicks/hover working after any number of navigate-away-and-back trips.
function getNeighborhoods() { return document.querySelectorAll('.neighborhood'); }

// Currently-selected neighborhood scopes the news feed and events to that
// district. null means show everything (subject to the news filter tabs).
let activeNeighborhood = null;

// Resolve what the map label should currently read when nothing is
// being hovered: the active neighborhood's name, or 'İstanbul'.
function baseMapLabel() {
  if (!activeNeighborhood) return 'İstanbul';
  const active = document.getElementById(activeNeighborhood);
  return (active && active.getAttribute('data-name')) || activeNeighborhood;
}

document.addEventListener('click', (e) => {
  const nb = e.target.closest('.neighborhood');
  if (!nb) {
    getNeighborhoods().forEach(n => n.classList.remove('active'));
    document.getElementById('map-label').textContent = 'İstanbul';
    if (activeNeighborhood !== null) {
      activeNeighborhood = null;
      flashingNewsCardId = null;
      applyNewsFilter(activeNewsFilter, true);
      loadEvents(true);
    }
    return;
  }
  // data-neighborhood covers multi-polygon districts (e.g. Şişli's
  // exclave piece) whose element id must stay unique but which still
  // count as the same neighborhood for filtering/active-state purposes.
  const nbId = nb.dataset.neighborhood || nb.id;
  getNeighborhoods().forEach(n => n.classList.toggle('active', (n.dataset.neighborhood || n.id) === nbId));
  const name = nb.getAttribute('data-name') || nbId;
  document.getElementById('map-label').textContent = name;
  const flashedItem = flashingNews[nbId];
  flashingNewsCardId = flashedItem ? flashedItem.id : null;
  markNewsSeenForNeighborhood(nbId);
  activeNeighborhood = nbId;
  // instant: a map click filters the existing feed to this district --
  // it should update in place, not slide the whole feed out and back
  // in as if it were leaving and re-entering the screen.
  applyNewsFilter(activeNewsFilter, true);
  loadEvents(true);
});
document.addEventListener('mouseover', (e) => {
  const nb = e.target.closest('.neighborhood');
  if (!nb) return;
  document.getElementById('map-label').textContent = nb.getAttribute('data-name') || nb.id;
});
document.addEventListener('mouseout', (e) => {
  const nb = e.target.closest('.neighborhood');
  if (!nb || nb.contains(e.relatedTarget)) return;
  document.getElementById('map-label').textContent = baseMapLabel();
});

// ── Breaking News (from public.breaking_news) ──────────────────
// Rows expire client-side 24h after updated_at (falls back to
// created_at for stories with no timeline updates yet), so a story
// that keeps getting "gelişme" updates stays in the feed instead of
// silently vanishing at the 24h mark. A row with a neighborhood pulses
// that district on the map until the *current user* has clicked it;
// "seen" state is local to the browser (localStorage key:
// ist-news-seen-<userId>).
let flashingNews = {}; // nbId -> { id, title, body, url, created_at }
let allBreakingNews = []; // cached for client-side filter
let activeNewsFilter = 'all';
let flashingNewsCardId = null; // news id whose card should flash while its neighborhood is active

function seenKey() {
  // Capture current user once available; fallback to anonymous bucket.
  const uid = (window.__currentUser && window.__currentUser.id) || 'anon';
  return 'ist-news-seen-' + uid;
}
function loadSeenSet() {
  try { return new Set(JSON.parse(localStorage.getItem(seenKey()) || '[]')); }
  catch { return new Set(); }
}
function persistSeenSet(set) {
  try { localStorage.setItem(seenKey(), JSON.stringify([...set])); } catch {}
}
function markNewsSeenForNeighborhood(nbId) {
  const item = flashingNews[nbId];
  if (!item) return;
  const set = loadSeenSet();
  set.add(item.id);
  persistSeenSet(set);
  const el = document.getElementById(nbId);
  if (el) el.classList.remove('flashing-news');
  delete flashingNews[nbId];
}

function applyFlashingNewsCard() {
  if (!flashingNewsCardId) return;
  const card = document.querySelector(`#breaking-news-feed [data-news-id="${CSS.escape(flashingNewsCardId)}"]`);
  if (card) card.classList.add('flashing-news-card');
}

function escapeText(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const NB_NAMES_TR = {
  bakirkoy:'Bakırköy', bayrampasa:'Bayrampaşa', bahcelievler:'Bahçelievler',
  sisli:'Şişli', eyupsultan:'Eyüpsultan', gop:'Gaziosmanpaşa',
  esenler:'Esenler', bagcilar:'Bağcılar', basaksehir:'Başakşehir',
  kucukcekmece:'Küçükçekmece', sultangazi:'Sultangazi', uskudar:'Üsküdar',
  kadikoy:'Kadıköy', maltepe:'Maltepe', umraniye:'Ümraniye',
  cekmekoy:'Çekmeköy', beykoz:'Beykoz', sariyer:'Sarıyer',
  besiktas:'Beşiktaş', beyoglu:'Beyoğlu', gungoren:'Güngören',
  kagithane:'Kağıthane', atasehir:'Ataşehir', zeytinburnu:'Zeytinburnu', fatih:'Fatih'
};

function categoryLabelTR(n) {
  const c = n.category || n.neighborhood || 'turkiye';
  if (c === 'turkiye') return 'TÜRKİYE';
  if (c === 'istanbul') return 'İSTANBUL';
  if (c === 'dunya') return 'DÜNYA';
  return (NB_NAMES_TR[c] || c).toLocaleUpperCase('tr-TR');
}

// The story's series name (if the admin tagged one grouping several
// separate posts under the same ongoing event), falling back to the
// category label when the story isn't part of a series.
function newsKickerLabel(n) {
  const seriesName = n.breaking_news_series && n.breaking_news_series.name;
  return seriesName ? seriesName.toLocaleUpperCase('tr-TR') : categoryLabelTR(n);
}

// No trailing "ago"/"önce" word -- kept as short as possible so the
// series name (kicker) gets more of .meta-row's width before truncating.
function formatAgoTR(iso) {
  const d = new Date(iso);
  const secs = Math.floor((Date.now() - d.getTime()) / 1000);
  const en = I18N.isEnglish();
  if (secs < 60) return en ? 'now' : 'şimdi';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return en ? `${mins}m` : `${mins} dk`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return en ? `${hrs}h` : `${hrs} sa`;
  const days = Math.floor(hrs / 24);
  return en ? `${days}d` : `${days} gün`;
}

// Spelled-out "X sa önce" / "Xh ago" form used in the timeline, where the
// date stands alone as a column of its own (formatAgoTR's terse "X sa" is
// tuned for the cramped meta-row next to a kicker instead).
function formatAgoTRLong(iso) {
  const secs = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  const en = I18N.isEnglish();
  if (secs < 60) return en ? 'now' : 'şimdi';
  return `${formatAgoTR(iso)} ${en ? 'ago' : 'önce'}`;
}

function safeUrl(u) {
  const s = String(u || '').trim();
  if (/^https?:\/\//i.test(s)) return s;
  return null;
}

// Slides a feed panel's current cards out toward their column's outer
// screen edge, then rebuilds it and slides the fresh cards back in from
// that same edge. `direction` is 'left' (breaking news, left column) or
// 'right' (events, right column) -- see the .card-entering-*/.card-leaving-*
// CSS. Renders immediately (no leave animation) on first paint, when the
// panel starts out empty. Cards enter with a staggered delay by list
// position, so the topmost card arrives first and lower ones follow.
// Skips that entrance animation on the first call after arriving via the
// swipe-pagination nav (see window.__istSuppressFirstCardAnim, seeded
// pre-body): the whole column is already sliding in from that same edge,
// so animating the cards inside it too would look like the content
// arriving twice.
// `instant`: rebuilds in place with no leave/enter animation at all --
// used for map neighborhood clicks, where the slide-out/in read as the
// whole feed leaving and re-entering the screen instead of just updating.
const CARD_SWAP_MS = 300;
const CARD_STAGGER_MS = 160;
function animateFeedSwap(container, direction, buildFn, instant) {
  if (instant) { buildFn(); return; }
  const suppress = window.__istSuppressFirstCardAnim && window.__istSuppressFirstCardAnim[direction];
  if (suppress) window.__istSuppressFirstCardAnim[direction] = false;
  const enterClass = direction === 'left' ? 'card-entering-left' : 'card-entering-right';
  const leaveClass = direction === 'left' ? 'card-leaving-left' : 'card-leaving-right';
  const playEnter = () => {
    buildFn();
    if (suppress) return;
    Array.from(container.children).forEach((el, i) => {
      el.style.animationDelay = `${i * CARD_STAGGER_MS}ms`;
      el.classList.add(enterClass);
      el.addEventListener('animationend', () => {
        el.classList.remove(enterClass);
        el.style.animationDelay = '';
      }, { once: true });
    });
  };
  const existing = Array.from(container.children);
  if (!existing.length) { playEnter(); return; }
  existing.forEach(el => el.classList.add(leaveClass));
  setTimeout(playEnter, CARD_SWAP_MS);
}

function renderBreakingNewsFeed(rows, instant) {
  const feed = document.getElementById('breaking-news-feed');
  if (!feed) return;
  animateFeedSwap(feed, 'left', () => renderBreakingNewsFeedNow(feed, rows), instant);
}

// Full detail markup for a news article — rendered into the detail
// overlay's sheet (see openDetail). Reuses the .article card's own
// styling so it looks like the same card, just full-size.
function buildNewsDetailHtml(n) {
  const sources = (n.breaking_news_sources || [])
    .slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const sourcesHtml = sources.length
    ? sources.map(s => {
        const url = safeUrl(s.url);
        const inner = `
          <span class="src-name">${escapeText(s.name)}</span>
          ${escapeText(s.headline)}
        `;
        return `<div class="src-item">${
          url
            ? `<a href="${escapeText(url)}" target="_blank" rel="noopener">${inner}</a>`
            : inner
        }</div>`;
      }).join('')
    : '<div class="sources-empty">Henüz kaynak eklenmedi.</div>';
  // Updates and polls share one chronological spine (newest first) — a
  // poll slots in at the point in the story's history it was posted,
  // rather than living in a separate block.
  const timelineEvents = (n.breaking_news_updates || []).map(u => ({ type: 'update', created_at: u.created_at, data: u }))
    .concat((n.breaking_news_polls || []).map(p => ({ type: 'poll', created_at: p.created_at, data: p })))
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const timelineHtml = timelineEvents.length ? `
    <div class="timeline">
      <div class="sidebar-label" style="padding:0 0 6px 0;background:none;border:none;font-size:0.6rem;letter-spacing:2px;">Zaman Akışı</div>
      <div class="timeline-track">
        ${timelineEvents.map(ev => ev.type === 'poll' ? `
          <div class="timeline-item timeline-item-poll">
            <div class="timeline-item-date">
              <span class="timeline-tick"></span>
              <div class="ago" data-iso="${escapeText(ev.created_at)}">${escapeText(formatAgoTRLong(ev.created_at))}</div>
            </div>
            <div class="poll-block" id="poll-${escapeText(ev.data.id)}"></div>
          </div>
        ` : `
          <div class="timeline-item">
            <div class="timeline-item-date">
              <span class="timeline-tick"></span>
              <div class="ago" data-iso="${escapeText(ev.created_at)}">${escapeText(formatAgoTRLong(ev.created_at))}</div>
            </div>
            <strong>${escapeText(ev.data.title)}</strong>
            ${ev.data.body ? `<p>${escapeText(ev.data.body)}</p>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';
  const lastTouch = n.updated_at || n.created_at;
  return `
    <div class="article">
      <div class="meta-row">
        <div class="kicker">${escapeText(newsKickerLabel(n))}</div>
        <div class="ago" data-iso="${escapeText(lastTouch)}">${escapeText(formatAgoTR(lastTouch))}</div>
      </div>
      <h3>${escapeText(n.title)}</h3>
      ${n.body ? `<p>${escapeText(n.body)}</p>` : ''}
      ${timelineHtml}
      <div class="sources">
        <button type="button" class="sources-toggle" aria-expanded="false">
          <div class="sidebar-label" style="padding:0;background:none;border:none;font-size:0.6rem;letter-spacing:2px;">${I18N.t('news.sources')} (${sources.length})</div>
          <span class="sources-toggle-icon">▾</span>
        </button>
        <div class="sources-body">
          ${sourcesHtml}
        </div>
      </div>
    </div>
  `;
}

// Fetches this news item's poll votes and renders either the voting
// buttons or the result bars into its #poll-<id> container inside the
// currently-open detail sheet. Called after openDetail() since the
// sheet's HTML is built synchronously but the vote/result state isn't
// known until this query resolves.
const MAX_POLL_VOTER_AVATARS = 6;

async function loadAndRenderPoll(poll) {
  const container = document.getElementById('poll-' + poll.id);
  if (!container) return;
  const { data, error } = await sb.from('breaking_news_poll_option_votes')
    .select('user_id, option').eq('poll_id', poll.id);
  if (error) { console.error('[poll]', error); return; }
  const uid = window.__currentUser && window.__currentUser.id;
  const votersA = [], votersB = [];
  let mine = null;
  (data || []).forEach(v => {
    if (v.option === 1) votersA.push(v.user_id);
    else if (v.option === 2) votersB.push(v.user_id);
    if (uid && v.user_id === uid) mine = v.option;
  });

  // Only need profile pictures once the result view (bars + avatars) is
  // about to be shown -- skip the query while votes are still empty or
  // the viewer hasn't voted yet (still seeing the plain vote buttons).
  let profilesById = new Map();
  const userIds = Array.from(new Set([...votersA, ...votersB]));
  if (mine != null && userIds.length) {
    const { data: profs, error: profErr } = await sb.from('profiles')
      .select('id, first_name, last_name, avatar_url').in('id', userIds);
    if (profErr) console.error('[poll voter profiles]', profErr);
    else profilesById = new Map(profs.map(p => [p.id, p]));
  }

  renderPollInto(container, poll, votersA, votersB, mine, profilesById);
}

function buildVoterAvatarsHtml(userIds, profilesById) {
  const list = userIds.map(id => profilesById.get(id)).filter(Boolean);
  if (!list.length) return '';
  const shown = list.slice(0, MAX_POLL_VOTER_AVATARS);
  const extra = list.length - shown.length;
  const avatarsHtml = shown.map(p => {
    const name = capitalizeName([p.first_name, p.last_name].filter(Boolean).join(' ')) || 'Üye';
    const initial = (p.first_name || p.last_name || '?').charAt(0).toLocaleUpperCase('tr-TR');
    const inner = p.avatar_url
      ? `<img src="${Palette.avatarSrc(p.avatar_url)}" alt="">`
      : initial;
    return `<span class="poll-voter-avatar" title="${escapeText(name)}">${inner}</span>`;
  }).join('');
  const moreHtml = extra > 0
    ? `<span class="poll-voter-avatar poll-voter-more" title="+${extra}">+${extra}</span>`
    : '';
  return avatarsHtml + moreHtml;
}

function renderPollInto(container, poll, votersA, votersB, mine, profilesById) {
  const countA = votersA.length, countB = votersB.length;
  const total = countA + countB;
  if (mine == null) {
    container.innerHTML = `
      <div class="poll-question">${escapeText(poll.question)}</div>
      <div class="poll-options">
        <button class="poll-opt-btn" type="button" data-option="1">${escapeText(poll.option_a)}</button>
        <button class="poll-opt-btn" type="button" data-option="2">${escapeText(poll.option_b)}</button>
      </div>
      <div class="poll-status"></div>
    `;
    container.querySelectorAll('.poll-opt-btn').forEach(btn => {
      btn.addEventListener('click', () => submitPollVote(poll, parseInt(btn.dataset.option, 10), container));
    });
  } else {
    const pctA = total ? Math.round((countA / total) * 100) : 0;
    const pctB = total ? 100 - pctA : 0;
    container.innerHTML = `
      <div class="poll-question">${escapeText(poll.question)}</div>
      <div class="poll-result-labels">
        <span class="poll-label-a${mine === 1 ? ' poll-label-mine' : ''}">${escapeText(poll.option_a)} · ${pctA}%</span>
        <span class="poll-label-b${mine === 2 ? ' poll-label-mine' : ''}">${pctB}% · ${escapeText(poll.option_b)}</span>
      </div>
      <div class="poll-bar-track">
        <div class="poll-bar-fill-a" style="width:${pctA}%"></div>
        <div class="poll-bar-fill-b" style="width:${pctB}%"></div>
      </div>
      <div class="poll-voters-row">
        <div class="poll-voters poll-voters-a">${buildVoterAvatarsHtml(votersA, profilesById)}</div>
        <div class="poll-voters poll-voters-b">${buildVoterAvatarsHtml(votersB, profilesById)}</div>
      </div>
    `;
  }
}

async function submitPollVote(poll, option, container) {
  const uid = window.__currentUser && window.__currentUser.id;
  if (!uid) return;
  container.querySelectorAll('.poll-opt-btn').forEach(b => b.disabled = true);
  const { error } = await sb.from('breaking_news_poll_option_votes')
    .insert([{ poll_id: poll.id, user_id: uid, option }]);
  if (error) {
    console.error('[poll vote]', error);
    const statusEl = container.querySelector('.poll-status');
    if (statusEl) {
      statusEl.textContent = 'Oy kaydedilemedi, tekrar deneyin.';
      statusEl.className = 'poll-status err';
    }
    container.querySelectorAll('.poll-opt-btn').forEach(b => b.disabled = false);
    return;
  }
  loadAndRenderPoll(poll);
}

// Hovering a news/event card highlights its neighborhood on the map (no-op
// for city-wide rows with no neighborhood). Shared by both feeds.
function attachCardMapHover(el, nbId) {
  if (!nbId) return;
  el.addEventListener('mouseenter', () => {
    const nbEl = document.getElementById(nbId);
    if (nbEl) nbEl.classList.add('card-hover');
  });
  el.addEventListener('mouseleave', () => {
    const nbEl = document.getElementById(nbId);
    if (nbEl) nbEl.classList.remove('card-hover');
  });
}

function renderBreakingNewsFeedNow(feed, rows) {
  if (!rows.length) {
    feed.innerHTML = '';
    return;
  }
  const rowsById = new Map(rows.map(n => [String(n.id), n]));
  feed.innerHTML = rows.map(n => {
    const lastTouch = n.updated_at || n.created_at;
    return `
      <div class="article openable" data-news-id="${escapeText(n.id)}">
        <div class="meta-row">
          <div class="kicker">${escapeText(newsKickerLabel(n))}</div>
          <div class="ago" data-iso="${escapeText(lastTouch)}">${escapeText(formatAgoTR(lastTouch))}</div>
        </div>
        <h3>${escapeText(n.title)}</h3>
        ${n.body ? `<p>${escapeText(n.body)}</p>` : ''}
      </div>
    `;
  }).join('');

  feed.querySelectorAll('.article.openable').forEach(el => {
    const n = rowsById.get(el.dataset.newsId);
    el.addEventListener('click', () => {
      if (n) {
        openDetail(buildNewsDetailHtml(n));
        (n.breaking_news_polls || []).forEach(p => loadAndRenderPoll(p));
      }
    });
    if (n) attachCardMapHover(el, n.neighborhood);
  });

  applyFlashingNewsCard();
}

function applyNewsFilter(filter, instant) {
  activeNewsFilter = filter;
  document.querySelectorAll('.news-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  let rows = allBreakingNews;
  if (filter === 'istanbul') rows = allBreakingNews.filter(n => n.category === 'istanbul');
  else if (filter === 'turkiye') rows = allBreakingNews.filter(n => n.category === 'turkiye');
  else if (filter === 'dunya') rows = allBreakingNews.filter(n => n.category === 'dunya');
  else if (filter === 'mahalle') rows = allBreakingNews.filter(n => n.category !== 'istanbul' && n.category !== 'turkiye' && n.category !== 'dunya');
  // When a district is selected on the map, narrow further to its news.
  if (activeNeighborhood) rows = rows.filter(n => n.neighborhood === activeNeighborhood);
  renderBreakingNewsFeed(rows, instant);
}

document.querySelectorAll('.news-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyNewsFilter(btn.dataset.filter));
});

async function loadBreakingNews() {
  const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
  const { data, error } = await sb.from('breaking_news')
    .select('*, breaking_news_sources(*), breaking_news_updates(*), breaking_news_polls(*), breaking_news_series(name)').gte('updated_at', cutoff)
    .order('updated_at', { ascending: false });
  if (error) { console.error('[anahane breaking_news]', error); return; }
  allBreakingNews = data || [];

  applyNewsFilter(activeNewsFilter);

  // Pulse neighborhoods with unseen news.
  const seen = loadSeenSet();
  flashingNews = {};
  document.querySelectorAll('.neighborhood.flashing-news').forEach(el => el.classList.remove('flashing-news'));
  allBreakingNews.forEach(n => {
    if (!n.neighborhood) return;
    if (seen.has(n.id)) return;
    if (flashingNews[n.neighborhood]) return;
    flashingNews[n.neighborhood] = n;
  });
  Object.keys(flashingNews).forEach(nbId => {
    const el = document.getElementById(nbId);
    if (el) el.classList.add('flashing-news');
  });
}

// ── Events (right column) ──────────────────
const MONTH_ABBR_TR = ['OCA','ŞUB','MAR','NİS','MAY','HAZ','TEM','AĞU','EYL','EKİ','KAS','ARA'];
const MONTH_ABBR_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function eventDateParts(iso) {
  const d = new Date(iso);
  const tz = 'Europe/Istanbul';
  const en = I18N.isEnglish();
  const locale = en ? 'en-US' : 'tr-TR';
  const day = parseInt(d.toLocaleDateString('en-US', { timeZone: tz, day: 'numeric' }), 10);
  const month = parseInt(d.toLocaleDateString('en-US', { timeZone: tz, month: 'numeric' }), 10);
  const weekday = d.toLocaleDateString(locale, { timeZone: tz, weekday: 'long' });
  const wd = d.toLocaleDateString(locale, { timeZone: tz, weekday: 'short' }).toLocaleUpperCase(locale);
  const time = d.toLocaleTimeString(locale, { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: en });
  const monAbbr = (en ? MONTH_ABBR_EN : MONTH_ABBR_TR)[month - 1] || '';
  return { day, mon: monAbbr, wd, weekday, time };
}

let allEvents = [];
let eventsRequestSeq = 0;
let rsvpCounts = {};   // event_id -> attendee count
let myRsvpIds = new Set(); // event_ids the current user has RSVP'd to
let rsvpAttendees = {}; // event_id -> [{ id, first_name, last_name, avatar_url }, ...] (capped)
const MAX_ATTENDEE_AVATARS = 6;

function capitalizeName(s) {
  if (!s) return '';
  return s.trim().split(/\s+/).map(w => w ? w.charAt(0).toLocaleUpperCase('tr-TR') + w.slice(1).toLocaleLowerCase('tr-TR') : '').join(' ');
}

async function loadEvents(instant) {
  const reqId = ++eventsRequestSeq;
  const now = new Date().toISOString();
  // Scope the query to the selected neighborhood so the 30-row cap
  // doesn't hide matching rows that sit past the global top-30 window.
  let query = sb.from('events')
    .select('*')
    .gte('event_date', now)
    .order('event_date', { ascending: true })
    .limit(30);
  if (activeNeighborhood) query = query.eq('neighborhood', activeNeighborhood);
  const { data, error } = await query;
  // Drop responses from superseded requests so a slow older fetch
  // can't clobber a newer one with stale rows.
  if (reqId !== eventsRequestSeq) return;
  if (error) { console.error('[anahane events]', error); allEvents = []; }
  else allEvents = data || [];
  await loadRsvps();
  if (reqId !== eventsRequestSeq) return;
  renderEvents(instant);
}

async function loadRsvps() {
  rsvpCounts = {};
  myRsvpIds = new Set();
  rsvpAttendees = {};
  const ids = allEvents.map(ev => ev.id);
  if (!ids.length) return;
  const { data, error } = await sb.from('event_rsvps')
    .select('event_id, user_id, created_at')
    .in('event_id', ids)
    .order('created_at', { ascending: true });
  if (error) { console.error('[anahane rsvps]', error); return; }
  const myId = window.__currentUser && window.__currentUser.id;
  (data || []).forEach(r => {
    rsvpCounts[r.event_id] = (rsvpCounts[r.event_id] || 0) + 1;
    if (myId && r.user_id === myId) myRsvpIds.add(r.event_id);
  });
  // Resolve attendee profile pictures in one batched query.
  const userIds = Array.from(new Set((data || []).map(r => r.user_id)));
  if (userIds.length) {
    const { data: profs, error: profErr } = await sb.from('profiles')
      .select('id, first_name, last_name, avatar_url')
      .in('id', userIds);
    if (profErr) { console.error('[anahane rsvp attendees]', profErr); return; }
    const profMap = new Map((profs || []).map(p => [p.id, p]));
    (data || []).forEach(r => {
      const p = profMap.get(r.user_id);
      if (!p) return;
      (rsvpAttendees[r.event_id] = rsvpAttendees[r.event_id] || []).push(p);
    });
  }
}

function buildAttendeeAvatarsHtml(eventId) {
  const list = rsvpAttendees[eventId] || [];
  if (!list.length) return '';
  const shown = list.slice(0, MAX_ATTENDEE_AVATARS);
  const extra = list.length - shown.length;
  const avatarsHtml = shown.map(p => {
    const name = capitalizeName([p.first_name, p.last_name].filter(Boolean).join(' ')) || 'Üye';
    const initial = (p.first_name || p.last_name || '?').charAt(0).toLocaleUpperCase('tr-TR');
    const inner = p.avatar_url
      ? `<img src="${Palette.avatarSrc(p.avatar_url)}" alt="">`
      : initial;
    return `<span class="ev-attendee-avatar" title="${escapeText(name)}">${inner}</span>`;
  }).join('');
  const moreHtml = extra > 0
    ? `<span class="ev-attendee-avatar ev-attendee-more" title="+${extra}">+${extra}</span>`
    : '';
  return avatarsHtml + moreHtml;
}

async function toggleRsvp(eventId, btn) {
  const myId = window.__currentUser && window.__currentUser.id;
  if (!myId || btn.disabled) return;
  const attending = myRsvpIds.has(eventId);
  btn.disabled = true;
  try {
    if (attending) {
      const { error } = await sb.from('event_rsvps').delete().eq('event_id', eventId).eq('user_id', myId);
      if (error) throw error;
    } else {
      const { error } = await sb.from('event_rsvps').insert({ event_id: eventId, user_id: myId });
      if (error) throw error;
    }
  } catch (err) {
    console.error('[anahane rsvp]', err);
    btn.disabled = false;
    return;
  }
  // Refetch counts + attendee avatars so the stack reflects the change,
  // then patch just this event's row in place so the card doesn't collapse.
  await loadRsvps();
  const nowAttending = myRsvpIds.has(eventId);
  btn.classList.toggle('attending', nowAttending);
  btn.textContent = nowAttending ? I18N.t('home.events.rsvp.going') : I18N.t('home.events.rsvp.join');
  const row = btn.closest('.ev-rsvp-row');
  const countEl = row?.querySelector('.ev-rsvp-count');
  if (countEl) countEl.textContent = `${rsvpCounts[eventId] || 0} ${I18N.t('home.events.rsvp.count')}`;
  const avatarsEl = row?.querySelector('.ev-attendees');
  if (avatarsEl) avatarsEl.innerHTML = buildAttendeeAvatarsHtml(eventId);
  // Also patch the (separate) preview card in the events list behind the
  // overlay, so its attendee stack matches without waiting for a reload.
  const previewEl = document.querySelector(`.event-item[data-event-id="${CSS.escape(eventId)}"] .ev-attendees-preview`);
  if (previewEl) previewEl.innerHTML = buildAttendeeAvatarsHtml(eventId);
  btn.disabled = false;
}

function renderEvents(instant) {
  const panel = document.getElementById('events-panel');
  if (!panel) return;
  let rows = allEvents;
  if (activeNeighborhood) rows = rows.filter(ev => ev.neighborhood === activeNeighborhood);
  animateFeedSwap(panel, 'right', () => renderEventsNow(panel, rows), instant);
}

// Full detail markup for an event — rendered into the detail overlay's
// sheet (see openDetail). Reuses the .event-item card's own styling so
// it looks like the same card, just full-size, with the RSVP row live.
function buildEventDetailHtml(ev) {
  const nbLabel = ev.neighborhood ? (NB_NAMES_TR[ev.neighborhood] || ev.neighborhood) : 'İstanbul';
  const parts = eventDateParts(ev.event_date);
  const dateTime = [parts.weekday, parts.time].filter(Boolean).join(' ');
  const metaHTML = [dateTime, ev.location].filter(Boolean).map(escapeText).join('<br>');
  const count = rsvpCounts[ev.id] || 0;
  const attending = myRsvpIds.has(ev.id);
  return `
    <div class="event-item">
      <div class="ev-date-block">
        <div class="ev-day">${parts.day}</div>
        <div class="ev-mon">${parts.mon}</div>
      </div>
      <div class="ev-body">
        <div class="ev-kicker">${escapeText(nbLabel.toLocaleUpperCase('tr-TR'))}</div>
        <div class="ev-title">${escapeText(ev.title)}</div>
        ${metaHTML ? `<div class="ev-meta">${metaHTML}</div>` : ''}
      </div>
      <div class="ev-details">
        ${ev.description ? `<div class="ev-desc">${escapeText(ev.description)}</div>` : ''}
        <div class="ev-rsvp-row">
          <button type="button" class="ev-rsvp-btn${attending ? ' attending' : ''}" data-event-id="${ev.id}">${attending ? I18N.t('home.events.rsvp.going') : I18N.t('home.events.rsvp.join')}</button>
          <span class="ev-rsvp-count">${count} ${I18N.t('home.events.rsvp.count')}</span>
          <span class="ev-attendees">${buildAttendeeAvatarsHtml(ev.id)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderEventsNow(panel, rows) {
  if (!rows.length) {
    panel.innerHTML = '';
    return;
  }
  const rowsById = new Map(rows.map(ev => [String(ev.id), ev]));
  panel.innerHTML = rows.map(ev => {
    const nbLabel = ev.neighborhood ? (NB_NAMES_TR[ev.neighborhood] || ev.neighborhood) : 'İstanbul';
    const parts = eventDateParts(ev.event_date);
    // Weekday now lives in the date block (day / month / weekday); time
    // and location are both dropped from the preview -- see
    // buildEventDetailHtml for the full date/time/location, still shown
    // once you open the card. That frees this card for a bigger title.
    return `
      <div class="event-item openable" data-event-id="${escapeText(ev.id)}">
        <div class="ev-date-block">
          <div class="ev-day">${parts.day}</div>
          <div class="ev-mon">${parts.mon}</div>
          <div class="ev-wd">${parts.wd}</div>
        </div>
        <div class="ev-body">
          <div class="ev-kicker">${escapeText(nbLabel.toLocaleUpperCase('tr-TR'))}</div>
          <div class="ev-title">${escapeText(ev.title)}</div>
          <span class="ev-attendees ev-attendees-preview">${buildAttendeeAvatarsHtml(ev.id)}</span>
        </div>
      </div>
    `;
  }).join('');

  panel.querySelectorAll('.event-item.openable').forEach(el => {
    const ev = rowsById.get(el.dataset.eventId);
    el.addEventListener('click', () => {
      if (ev) openDetail(buildEventDetailHtml(ev));
    });
    if (ev) attachCardMapHover(el, ev.neighborhood);
  });
}

// Detail overlay: a bottom sheet for a news article or event's full
// details, opened instead of the old expand-in-place toggle — mirrors
// Kahvehane's game overlay / Kütüphane's reader overlay. Content is
// built by buildNewsDetailHtml/buildEventDetailHtml above.
function openDetail(html) {
  const overlay = document.getElementById('detail-overlay');
  const body = document.getElementById('detail-overlay-body');
  if (!overlay || !body) return;
  body.innerHTML = html;
  overlay.hidden = false;
  requestAnimationFrame(() => overlay.classList.add('open'));
}
function closeDetail() {
  const overlay = document.getElementById('detail-overlay');
  if (!overlay) return;
  overlay.classList.remove('open');
  // Matches the sheet's own 0.55s transition (see .detail-overlay-sheet)
  // so hiding doesn't cut the closing slide-down short.
  setTimeout(() => { overlay.hidden = true; }, 550);
}
(function initDetailOverlay() {
  const overlay = document.getElementById('detail-overlay');
  const backdrop = document.getElementById('detail-overlay-backdrop');
  const closeBtn = document.getElementById('detail-overlay-close');
  const body = document.getElementById('detail-overlay-body');
  if (!overlay || !backdrop || !closeBtn || !body) return;
  backdrop.addEventListener('click', closeDetail);
  closeBtn.addEventListener('click', closeDetail);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeDetail();
  });
  // Delegated so it keeps working across re-renders of the sheet body
  // (e.g. jumping straight from one event's detail to another's).
  body.addEventListener('click', (e) => {
    const toggle = e.target.closest('.sources-toggle');
    if (toggle) {
      const wrap = toggle.closest('.sources');
      if (wrap) {
        const isOpen = wrap.classList.toggle('open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      }
      return;
    }
    const btn = e.target.closest('.ev-rsvp-btn');
    if (!btn) return;
    e.stopPropagation();
    toggleRsvp(btn.dataset.eventId, btn);
  });
})();

// loadBreakingNews() is called from showSite() once the user is known
// so the per-user "seen" set is in play immediately.

// ── Init ──
// Skipped when this script is being injected by a virtual navigation
// (see router.js's navigateTo) -- that path calls the registered mount()
// directly instead, since the user's already authenticated and the
// profile card's already mounted from the real page load that got them
// into the app in the first place.
if (!window.__istVirtualNavInjecting) checkSession();

IstRouter.registerPage('anahane', { mount, unmount });
})();
</script>
