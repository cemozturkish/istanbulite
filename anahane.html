<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>istanbulite.net</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
  <script src="palette.js"></script>
  <script src="loading-screen.js?v=2"></script>
  <link rel="stylesheet" href="palette.css">
  <link rel="stylesheet" href="loading-screen.css?v=2">
  <link rel="stylesheet" href="profile-card.css">
  <script src="profile-card.js" defer></script>
  <link rel="stylesheet" href="onboarding.css">
  <script src="onboarding.js" defer></script>
  <link rel="stylesheet" href="mahalle-picker.css">
  <script src="mahalle-picker.js" defer></script>
  <script src="admin-notification.js" defer></script>
  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in (mobile: horizontal, desktop: vertical — CSS picks the axis). Also seeds the VT direction class so the cross-document transition knows which way to slide before it captures the snapshot. -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
        }
      } catch(e) {}
    })();
  </script>
  <style>
    :root {
      /* Core ink & paper — cool cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;       /* main canvas + sidebar columns — lightest */
      --paper-warm: #eddbd0;  /* sidebar column background — lightest */
      --paper-card: rgba(175, 175, 175, 0.6);  /* news + event cards — light grey, translucent over the map photo */
      /* Card text flips to a light palette when hovered/expanded, since
         that state turns the card dark grey (see .expandable:hover /
         .expanded overrides below). */
      --card-fg: #1a1a1a;
      --card-fg-heading: #1a1a1a;
      --card-fg-muted: #4a4a4a;
      --card-border: rgba(26, 26, 26, 0.2);
      --card-border-soft: rgba(26, 26, 26, 0.15);
      --paper-banner: #c9ae9a;/* sidebar header bars — darker */
      --paper-navbar: #b89b7f;/* top nav bar — darkest */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* RGB triplets for the floating map panels (need alpha, so they
         can't just reference the hex vars above). Overridden alongside
         everything else in palette.css for data-palette="mono". */
      --paper-warm-rgb: 237, 219, 208;
      --ink-rgb: 76, 56, 42;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #a4322b;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    /* News + event cards float over the map photo and keep one fixed
       look (light grey, translucent) regardless of the earth/mono
       palette toggle — same reasoning as the fixed --card-fg text
       colors on .article/.event-item below. This overrides
       palette.css's mono --paper-card just for this page. */
    :root[data-palette="mono"] {
      --paper-card: rgba(175, 175, 175, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN OVERLAY ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(237, 229, 208, 0.98);
      backdrop-filter: blur(3px);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    #login-overlay .masthead-login {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 2.4rem;
      letter-spacing: 0.5px;
      color: var(--ink);
      margin-bottom: 48px;
    }

    #login-overlay .tagline {
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .login-box {
      border: 2px solid var(--ink);
      padding: 36px 40px;
      width: 360px;
      background: var(--paper);
      position: relative;
    }

    .login-box::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }

    .login-box h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: var(--col-border);
    }

    .login-box input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid var(--ink);
      background: var(--field-bg);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus {
      border-color: var(--accent);
    }

    .login-box button {
      width: 100%;
      padding: 11px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-box button:hover { background: var(--accent); }

    .login-box .error-msg {
      color: var(--accent);
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 10px;
      min-height: 18px;
      font-style: italic;
    }

    .form-toggle {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 14px;
      color: var(--muted);
    }
    .form-toggle a {
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
    }
    .form-toggle a:hover { text-decoration: underline; }

    .q-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      margin-top: 10px;
      text-align: left;
    }

    .q-buttons-inline {
      margin-bottom: 10px;
      justify-content: flex-start;
    }

    .q-btn-sm, .q-btn-sm-outline {
      padding: 7px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .q-btn-sm {
      background: var(--paper);
      color: var(--ink);
      border: 2px solid var(--ink);
    }
    .q-btn-sm.selected {
      background: var(--ink);
      color: var(--paper);
    }
    .q-btn-sm-outline {
      background: var(--paper);
      color: var(--ink);
      border: 2px solid var(--ink);
    }
    .q-btn-sm-outline.selected {
      background: var(--ink);
      color: var(--paper);
    }

    /* ── MAIN SITE ──
       Desktop: the map is a fixed full-bleed background layer (z-index 0);
       the top bar and both sidebars float above it as separate cards
       (z-index 5/10). Mobile keeps the original grid layout untouched,
       redeclared wholesale inside its own @media block below. */
    #main-site {
      pointer-events: none;
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    #main-site.active {
      pointer-events: auto;
    }

    /* Top nav, and both side columns, are frameless -- just typography
       floating directly on the map photo. frames.css still targets these
       classes with !important, so beat it with an #main-site-qualified
       override (higher specificity, wins regardless of stylesheet order). */
    #main-site .section-rule,
    #main-site .col-left,
    #main-site .col-right {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
    }

    .section-rule {
      position: fixed;
      top: 24px;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
    }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    .col-left {
      position: fixed;
      top: 24px;
      left: 0;
      bottom: 16px;
      width: 260px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .col-left .nb-highlight {
      padding: 9px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-style: italic;
      font-family: 'Source Serif 4', Georgia, serif;
      flex-shrink: 0;
    }
    .col-right {
      position: fixed;
      top: 24px;
      right: 0;
      bottom: 16px;
      width: 260px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      display: block;
      overflow: hidden;
    }

    /* ── MAP PANEL: fixed full-bleed background ── */
    .map-panel {
      position: absolute;
      inset: 0;
      padding: 0;
      overflow: hidden;
      /* Matches the map artwork's own sea/background gray (#eeeeee); the
         svg uses preserveAspectRatio="slice" so this only shows briefly
         during image load, not as a letterbox gap. */
      background: #eeeeee;
    }

    .map-panel img.map-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    /* Mobile-only draft map image -- hidden on desktop, shown instead of
       the svg inside the mobile media query below. */
    .map-mobile-draft { display: none; }

    /* Traced hit-region overlay, aligned to map-photo via the matching
       5046x2300 viewBox + slice (see mobile media query for the
       mobile-draft swap, which hides this since it has no mobile trace
       yet). */
    .map-panel svg.map-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .neighborhood {
      cursor: pointer;
      fill: transparent;
      stroke: transparent;
      stroke-width: 3;
      transition: fill 0.2s, stroke 0.2s;
      pointer-events: all;
    }

    /* Real districts outside this app's 25 (Avcılar, Arnavutköy, Kartal,
       Sultanbeyli, Sancaktepe, Pendik, Tuzla, Şile), plus the Kocaeli-side
       landmass ("istanbul_disi") — not interactive, and no longer given a
       distinguishing tint; they just blend into the base map artwork. */
    .map-unaccommodated,
    .map-istanbul-disi {
      fill: transparent;
      stroke: transparent;
      pointer-events: none;
    }

    /* Hover: dim the artwork under the cursor */
    .neighborhood:hover { fill: rgba(var(--ink-rgb), 0.18); }
    /* Clicked/active: darker tint + outline */
    .neighborhood.active {
      fill: rgba(var(--ink-rgb), 0.32);
      stroke: var(--accent);
    }
    /* Home neighborhood: always darker than the rest, even at rest,
       plus a dashed outline so it reads as "yours" over the art. Uses
       --ink-red (the same red as SON DAKİKA/breaking news) instead of
       the neutral ink tint the other states use -- it's identical in
       both earth and mono palettes, so no separate mono override needed. */
    .neighborhood.home {
      fill: rgba(164, 50, 43, 0.16);
      stroke: var(--brown-4);
      stroke-width: 4;
      stroke-dasharray: 10 6;
    }
    .neighborhood.home:hover { fill: rgba(164, 50, 43, 0.26); }
    .neighborhood.home.active { fill: rgba(164, 50, 43, 0.38); stroke: var(--brown-4); stroke-dasharray: none; }

    /* Plain text, no frame/shadow — matches the HANE/KÜTÜPHANE/KAHVEHANE
       nav tab style (nav a above), not a floating pill. */
    .map-label {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── LEFT SIDEBAR (articles) ── */
    .sidebar-left {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    #breaking-news-feed {
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1;
      min-height: 0;
    }

    /* Still used by the "Kaynaklar" (sources) sub-heading inside an
       expanded article -- see renderBreakingNewsFeed(). */
    .sidebar-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-red);
      margin-bottom: 2px;
    }

    #breaking-news-feed { padding: 10px 14px 16px 14px; }

    /* Cards are a light grey, translucent square floating over the map
       photo, so their text uses a fixed dark palette (not the page's
       --ink tokens, which vary by earth/mono palette) regardless of
       OS light/dark preference or the active palette. */
    .article {
      background: var(--paper-card);
      border: 2px solid var(--card-fg);
      border-bottom: 5px solid var(--card-fg);
      padding: 16px 18px;
      margin-bottom: 12px;
      color: var(--card-fg);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .article:last-child { margin-bottom: 0; }

    .article .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #e07a72;
      margin-bottom: 6px;
    }

    .article h3 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1.25;
      margin-bottom: 8px;
      color: var(--card-fg-heading);
    }

    .article p {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--card-fg);
    }

    .article.expandable { cursor: pointer; }
    .article.expandable:hover,
    .article.expanded {
      background: #505050;
      --card-fg: #ffffff;
      --card-fg-heading: #ffffff;
      --card-fg-muted: #cfcfcf;
      --card-border: rgba(255, 255, 255, 0.25);
      --card-border-soft: rgba(255, 255, 255, 0.18);
    }
    .article .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .article .ago {
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--card-fg-muted);
      font-style: italic;
    }
    .article .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--card-border);
      display: none;
    }
    .article.expanded .sources { display: block; }
    .article .src-item {
      padding: 6px 0;
      border-bottom: 1px dotted var(--card-border-soft);
      font-size: 0.78rem;
    }
    .article .src-item:last-child { border-bottom: none; }
    .article .src-item .src-name {
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.65rem;
      display: block;
      color: var(--card-fg-muted);
      margin-bottom: 2px;
    }
    .article .src-item a {
      color: var(--card-fg);
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      line-height: 1.4;
    }
    .article .src-item a:hover { opacity: 0.7; }
    .article .sources-empty {
      font-size: 0.75rem;
      font-style: italic;
      color: var(--card-fg-muted);
    }

    /* ── RIGHT SIDEBAR (neighborhood info) ── */
    .sidebar-right {
      padding: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .sidebar-right-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nb-articles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nb-article {
      border-left: 3px solid #4C4C4C;
      padding-left: 6px;
    }

    .nb-article h4 {
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.15;
    }

    .nb-article p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
      line-height: 1.2;
    }

    .no-articles {
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Flashing neighborhood with breaking news */
    @keyframes flash-nb {
      0%, 100% { fill: rgba(164, 50, 43, 0.1); }
      50% { fill: rgba(164, 50, 43, 0.6); }
    }
    .neighborhood.flashing-news {
      animation: flash-nb 1.2s ease-in-out infinite;
      stroke: var(--ink-red);
      stroke-width: 3;
    }
    .neighborhood.flashing-news:hover {
      animation: none;
      fill: rgba(164, 50, 43, 0.5);
    }
    .neighborhood.flashing-news.active {
      animation: none;
      fill: rgba(164, 50, 43, 0.5);
      stroke: var(--ink-deep);
      stroke-width: 3;
    }

    /* Flashing news card in feed when its neighborhood is selected */
    @keyframes flash-card {
      0%, 100% { background: var(--paper-card); box-shadow: inset 3px 0 0 transparent; }
      50% { background: var(--paper-banner); box-shadow: inset 3px 0 0 var(--ink-red); }
    }
    .article.flashing-news-card {
      animation: flash-card 1.2s ease-in-out infinite;
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      #login-overlay .masthead-login { font-size: 2rem; }
      .login-box { width: 90vw; max-width: 360px; padding: 24px 20px; }
      .q-buttons-inline { display: flex; gap: 8px; }

      #main-site {
        position: relative;
        height: 100%;
        overflow: hidden;
      }

      /* Map fills the entire screen as a fixed background layer, same
         mechanism as desktop -- draft/placeholder art for now, no
         hit-regions traced yet. Base rule already has main pinned
         fixed/inset; on mobile there's no docked top bar reserving
         space, so pull the top edge all the way to 0. */
      main { top: 0; }
      .map-panel img.map-photo { display: none; }
      .map-panel svg.map-svg { display: none; }
      .map-mobile-draft {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .map-label {
        bottom: calc(56px + env(safe-area-inset-bottom) + 14px);
        left: 50%;
        right: auto;
        font-size: 11px;
        letter-spacing: 1px;
      }

      /* Profile bar: floats at the very top. */
      #ist-pc-mount {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 10;
        max-height: 40vh;
        overflow-y: auto;
      }

      /* Istanbulite masthead bar: floats just below the profile bar.
         NOTE: top:78px is a placeholder guess for the profile card's
         rendered height -- needs tuning once real profile-card content
         is in place, not just this stubbed draft pass.
         No backdrop-filter here (unlike the other floating panels): its
         child <header> is position:fixed and gets pulled out to become
         the bottom tab bar -- backdrop-filter creates a new containing
         block for fixed descendants, which would trap header inside
         this small top bar instead of the viewport. */
      .section-rule {
        top: 78px;
        left: 12px;
        right: 12px;
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      /* News + events: floating panel pair docked above the bottom tab
         bar, side by side like they sat before. Placement here is a
         placeholder -- wasn't specified yet, easiest to react to once
         you see it live. */
      .col-left, .col-right {
        top: auto;
        bottom: calc(56px + env(safe-area-inset-bottom) + 12px);
        height: 32vh;
        width: auto;
      }
      .col-left { left: 0; right: calc(50% + 5px); }
      .col-right { left: calc(50% + 5px); right: 0; }

      .sidebar-left {
        overflow: hidden;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .sidebar-label {
        font-size: 9px;
        letter-spacing: 1.5px;
      }
      .article {
        padding: 6px 12px;
      }
      .article .kicker {
        font-size: 9px;
        margin-bottom: 2px;
        letter-spacing: 1px;
      }
      .article h3 {
        font-size: 11px;
        margin-bottom: 3px;
        line-height: 1.25;
      }
      .article p {
        font-size: 10px;
        line-height: 1.35;
      }
      .sidebar-right-inner {
        padding: 8px 12px;
        gap: 6px;
      }
      .no-articles { font-size: 11px; padding: 14px 8px; }

      /* Bottom tab bar — fixed at bottom, unchanged */
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        padding: 0 0 env(safe-area-inset-bottom);
        margin: 0;
        border-top: 1px solid var(--rule);
        border-bottom: none;
        background: var(--paper-navbar);
        z-index: 100;
        box-shadow: 0 -2px 8px rgba(42,34,26,0.06);
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        padding: 0;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: var(--ink); font-weight: 700; }

      /* ── Mobile swipe pagination: only left/right columns slide; map, datetime bar, and nav stay ── */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: only left/right columns slide vertically; map, datetime bar, and nav stay ── */
    @media (min-width: 769px) {
      .col-left, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateY(100vh);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateY(-100vh);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateY(-100vh);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateY(100vh);
      }
    }

    /* ══════════════════════════════════════════════
       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs.
       Direction comes from a class on <html> seeded by
       the outgoing page via sessionStorage, so the class
       is present before VT captures the new snapshot.
       ══════════════════════════════════════════════ */
    @view-transition { navigation: auto; }

    /* Suppress the default root crossfade — columns handle motion */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    .col-left { view-transition-name: ist-col-left; }
    .col-right { view-transition-name: ist-col-right; }

    @media (min-width: 769px) {
      @keyframes ist-vt-out-up { from { transform: translateY(0); } to { transform: translateY(-100vh); } }
      @keyframes ist-vt-in-up { from { transform: translateY(100vh); } to { transform: translateY(0); } }
      @keyframes ist-vt-out-down { from { transform: translateY(0); } to { transform: translateY(100vh); } }
      @keyframes ist-vt-in-down { from { transform: translateY(-100vh); } to { transform: translateY(0); } }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-up;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-up;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-down;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-down;
      }
    }

    /* ── Events (right column) ── */
    #events-panel { padding: 10px 14px 16px 14px; }

    .event-item {
      display: grid;
      grid-template-columns: 38px 1fr;
      column-gap: 10px;
      padding: 14px 16px 14px 14px;
      margin-bottom: 12px;
      background: var(--paper-card);
      border: 2px solid var(--card-fg);
      border-bottom: 5px solid var(--card-fg);
      transition: background 0.15s, border-color 0.15s;
    }
    .event-item:last-child { margin-bottom: 0; }
    .event-item .ev-date-block {
      text-align: center;
      padding-top: 18px;
      font-family: 'Source Serif 4', Georgia, serif;
      color: var(--card-fg-heading);
    }
    .event-item .ev-day {
      font-size: 1.7rem;
      font-weight: 400;
      line-height: 1;
    }
    .event-item .ev-mon {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--card-fg-muted);
      margin-top: 4px;
    }
    .event-item .ev-body { min-width: 0; }
    .event-item .ev-kicker {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #e07a72;
      margin-bottom: 5px;
    }
    .event-item .ev-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 4px;
      color: var(--card-fg-heading);
    }
    .event-item .ev-meta {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.78rem;
      color: var(--card-fg-muted);
      line-height: 1.35;
    }
    .event-item.expandable { cursor: pointer; }
    .event-item.expandable:hover,
    .event-item.expanded {
      background: #505050;
      --card-fg: #ffffff;
      --card-fg-heading: #ffffff;
      --card-fg-muted: #cfcfcf;
      --card-border: rgba(255, 255, 255, 0.25);
      --card-border-soft: rgba(255, 255, 255, 0.18);
    }
    .event-item .ev-details {
      grid-column: 1 / -1;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--card-border);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--card-fg);
      display: none;
    }
    .event-item.expanded .ev-details { display: block; }
    .event-item .ev-desc { margin-bottom: 10px; }
    .ev-rsvp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ev-rsvp-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 14px;
      background: transparent;
      color: #e07a72;
      border: 1px solid #e07a72;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .ev-rsvp-btn:hover { background: rgba(224, 122, 114, 0.15); }
    .ev-rsvp-btn.attending {
      background: #e07a72;
      color: #1a1a1a;
    }
    .ev-rsvp-btn.attending:hover { opacity: 0.85; }
    .ev-rsvp-btn:disabled { opacity: 0.6; cursor: default; }
    .ev-rsvp-count {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: var(--card-fg-muted);
    }

    /* News (left) and event (right) cards slide in from their own
       column's outer screen edge on render, and slide back out the
       same way when the feed is about to be replaced -- see the
       animateFeedSwap() helper used by renderBreakingNewsFeed() /
       renderEvents(). Generic so it also covers the "no articles/
       events" empty-state message. */
    @keyframes card-slide-in-left {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes card-slide-in-right {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* backwards fill-mode holds the keyframe's "from" state during the
       staggered animation-delay set in JS, so a lower card stays hidden
       off-screen while it waits its turn instead of flashing visible
       in place first. */
    .card-entering-left { animation: card-slide-in-left 0.4s ease-out backwards; }
    .card-entering-right { animation: card-slide-in-right 0.4s ease-out backwards; }
    .card-leaving-left,
    .card-leaving-right {
      transition: transform 0.3s ease-in, opacity 0.3s ease-in;
      opacity: 0;
    }
    .card-leaving-left { transform: translateX(-100%); }
    .card-leaving-right { transform: translateX(100%); }

    @media (max-width: 768px) {
      @keyframes ist-vt-out-left { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-in-left { from { transform: translateX(100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      #events-panel { padding: 6px 8px 10px 8px; }
      .event-item {
        grid-template-columns: 24px 1fr;
        column-gap: 6px;
        padding: 5px 7px;
        margin-bottom: 4px;
      }
      .event-item .ev-date-block { padding-top: 1px; }
      .event-item .ev-day { font-size: 0.82rem; line-height: 1; }
      .event-item .ev-mon { font-size: 0.48rem; margin-top: 2px; }
      .event-item .ev-kicker { font-size: 8px; letter-spacing: 1.5px; margin-bottom: 2px; }
      .event-item .ev-title { font-size: 10px; margin-bottom: 2px; }
      .event-item .ev-meta { font-size: 9px; }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-left;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-left;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-right;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-right;
      }
    }

    /* ── Small-phone overrides (≤ 400px, e.g. iPhone 15) ── */
    @media (max-width: 400px) {
      /* News column gets ~270px (1fr), events column a fixed 120px. */
      #main-site {
        grid-template-columns: 1fr 120px;
      }
      /* Tighten padding inside the narrow events column */
      .sidebar-right-inner { padding: 6px 6px; }
    }
  </style>
  <link rel="stylesheet" href="frames.css">
</head>

<div id="login-overlay">

    <div class="error-msg" id="auth-error"></div>
    <input type="email" id="auth-email" placeholder="E-posta adresi" autocomplete="email"/>
    <!-- type="text" intentionally: checkSession() below always either
         redirects to index.html or hides this overlay via showSite(),
         so this form is never actually shown to a user. A real
         type="password" field here still gets picked up by Safari's
         login-form scan on page load and pops its AutoFill suggestion
         on top of the loading screen even though nobody can see the form. -->
    <input type="text" id="auth-password" placeholder="Şifre" autocomplete="current-password"/>
    <button id="auth-submit-btn">Giriş</button>
    <p class="form-toggle">Hesabın yok mu? <a href="#" id="show-signup">Kayıt Ol</a></p>

<script>
// ══════════════════════════════════════════
// Swipe pagination
// Navigate Anahane → Kahvehane → Kütüphane → Hane with a sliding transition.
// Only the left and right columns translate; the map, datetime bar, and nav
// bar stay fixed so the center of the screen is visually stable across pages.
// Mobile = horizontal touch swipe, desktop = vertical wheel swipe; CSS picks
// the axis per media query. Tab-bar clicks trigger the same animation.
// ══════════════════════════════════════════
(function initSwipePagination() {
  const PAGES = ['kutuphane.html', 'anahane.html', 'kahvehane.html'];
  const DURATION = 400;
  const MIN_DX = 50;
  const MAX_TIME = 700;
  // Prefer the View Transitions API when available — it snapshots the
  // outgoing page and holds it until the new one is rendered, which
  // eliminates the white flash the manual slide-out can't hide.
  const supportsVT = 'startViewTransition' in document;

  function isMobile() { return window.innerWidth <= 768; }
  function currentIdx() {
    const path = (location.pathname.split('/').pop() || 'index.html');
    const idx = PAGES.indexOf(path);
    return idx === -1 ? 0 : idx;
  }
  function recordDir(dir) {
    // Seed the direction for the incoming page. The pre-body script
    // reads this and sets vt-<dir> on <html> before VT captures the
    // new snapshot, so the CSS slide keyframes can match.
    try { sessionStorage.setItem('ist-page-enter-dir', dir); } catch(e) {}
  }

  // Back up: if the outgoing page is swapped before the new page mounts
  // its pagereveal handler (or if navigation.activation isn't populated
  // yet), also set types at pageswap so the outgoing snapshot phase is
  // correctly tagged.
  if (supportsVT) {
    window.addEventListener('pageswap', (e) => {
      if (!e.viewTransition) return;
      const dir = sessionStorage.getItem('ist-page-enter-dir');
      if (dir) e.viewTransition.types.add(dir);
    });
    window.addEventListener('pagereveal', (e) => {
      if (!e.viewTransition) return;
      const root = document.documentElement;
      const dir = root.classList.contains('vt-forward') ? 'forward'
                : root.classList.contains('vt-backward') ? 'backward' : null;
      if (dir) e.viewTransition.types.add(dir);
      // Remove the direction class once the animation completes so it
      // doesn't bleed into a later same-document render.
      e.viewTransition.finished.finally(() => {
        root.classList.remove('vt-forward', 'vt-backward');
      });
    });
  }

  // Entry handler — runs on every page load. Cleans up direction state
  // and, for non-VT browsers, releases the manual offscreen transform.
  function handleIncoming() {
    const root = document.documentElement;
    const dir = root.classList.contains('ist-entering-forward') ? 'forward'
              : root.classList.contains('ist-entering-backward') ? 'backward' : null;
    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    if (!dir) return;
    // Double rAF so the initial transform has painted before we release it.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        root.classList.remove('ist-entering-' + dir);
      });
    });
  }

  let navigating = false;
  function navigate(targetIdx, dir) {
    if (navigating) return;
    if (targetIdx < 0 || targetIdx >= PAGES.length) return;
    const curr = currentIdx();
    if (targetIdx === curr) return;
    navigating = true;
    recordDir(dir);
    if (supportsVT) {
      // The browser will trigger a view transition on this navigation.
      location.href = PAGES[targetIdx];
      return;
    }
    const exitClass = dir === 'forward' ? 'ist-exiting-forward' : 'ist-exiting-backward';
    document.body.classList.add(exitClass);
    setTimeout(() => { location.href = PAGES[targetIdx]; }, DURATION - 30);
  }

  // Chain-slide through intermediate tabs when the user jumps 2+ away.
  // Fetch each hop in parallel (warmed by <link rel="prefetch">), extract
  // its .col-left / .col-right, stack the clones in a fixed overlay, then
  // translate the stack to reveal each frame in sequence. The final hop
  // ends with a real navigation so the destination's scripts run normally;
  // we strip the direction class and kill the cross-document VT animation
  // so there's no double-animation on arrival.
  async function multiHopSlide(curr, target) {
    if (navigating) return;
    const dir = target > curr ? 'forward' : 'backward';
    const step = dir === 'forward' ? 1 : -1;
    const hopIdxs = [];
    for (let i = curr + step; i !== target + step; i += step) hopIdxs.push(i);
    if (hopIdxs.length === 0) return;
    navigating = true;

    const fetches = hopIdxs.map(i => fetch(PAGES[i]).then(r => r.text()).catch(() => null));
    const leftEl = document.querySelector('.col-left');
    const rightEl = document.querySelector('.col-right');
    if (!leftEl || !rightEl) { recordDir(dir); location.href = PAGES[target]; return; }
    const leftRect = leftEl.getBoundingClientRect();
    const rightRect = rightEl.getBoundingClientRect();
    const mobile = window.innerWidth <= 768;

    const htmls = await Promise.all(fetches);
    if (htmls.some(h => h == null)) {
      navigating = false;
      recordDir(dir);
      location.href = PAGES[target];
      return;
    }
    const parser = new DOMParser();
    const fragments = htmls.map(html => {
      const doc = parser.parseFromString(html, 'text/html');
      return {
        left: doc.querySelector('.col-left'),
        right: doc.querySelector('.col-right'),
      };
    });

    function buildStack(origEl, origRect, key) {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        position: 'fixed',
        left: origRect.left + 'px',
        top: origRect.top + 'px',
        width: origRect.width + 'px',
        height: origRect.height + 'px',
        overflow: 'hidden',
        pointerEvents: 'none',
        zIndex: '90',
        background: 'var(--paper)',
      });
      const stack = document.createElement('div');
      Object.assign(stack.style, {
        position: 'absolute',
        inset: '0',
        willChange: 'transform',
      });
      wrap.appendChild(stack);

      function placeFrame(node, i) {
        Object.assign(node.style, {
          position: 'absolute',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
          margin: '0',
          boxSizing: 'border-box',
          overflow: 'hidden',
        });
        node.style.viewTransitionName = 'none';
        const ax = mobile ? 'translateX' : 'translateY';
        const pct = (dir === 'forward' ? i : -i) * 100;
        node.style.transform = ax + '(' + pct + '%)';
        stack.appendChild(node);
      }
      const frame0 = origEl.cloneNode(true);
      placeFrame(frame0, 0);
      fragments.forEach((frag, i) => {
        const src = frag[key];
        const node = src ? src.cloneNode(true) : document.createElement('div');
        placeFrame(node, i + 1);
      });
      return { wrap, stack };
    }

    const leftStack = buildStack(leftEl, leftRect, 'left');
    const rightStack = buildStack(rightEl, rightRect, 'right');
    document.body.appendChild(leftStack.wrap);
    document.body.appendChild(rightStack.wrap);

    leftEl.style.visibility = 'hidden';
    rightEl.style.visibility = 'hidden';
    leftEl.style.viewTransitionName = 'none';
    rightEl.style.viewTransitionName = 'none';

    const hops = hopIdxs.length;
    const perHop = hops === 2 ? 260 : 220;
    const totalMs = perHop * hops;
    const axis = mobile ? 'X' : 'Y';
    const endPct = dir === 'forward' ? -hops * 100 : hops * 100;
    const keyframes = [
      { transform: 'translate' + axis + '(0%)' },
      { transform: 'translate' + axis + '(' + endPct + '%)' },
    ];
    const opts = { duration: totalMs, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' };
    const a1 = leftStack.stack.animate(keyframes, opts);
    const a2 = rightStack.stack.animate(keyframes, opts);

    try { await Promise.all([a1.finished, a2.finished]); } catch (e) {}

    try { sessionStorage.removeItem('ist-page-enter-dir'); } catch(e) {}
    document.documentElement.classList.remove('vt-forward', 'vt-backward');
    const killVT = document.createElement('style');
    killVT.textContent = '::view-transition-group(*),::view-transition-image-pair(*),::view-transition-old(*),::view-transition-new(*){animation:none !important;}';
    document.head.appendChild(killVT);

    location.href = PAGES[target];
  }

  // Intercept tab-bar clicks: direct-neighbor hops ride the built-in VT;
  // jumps of 2+ go through multiHopSlide so intermediate tabs flash past.
  document.addEventListener('click', (e) => {
    const link = e.target.closest('nav a');
    if (!link) return;
    const href = link.getAttribute('href');
    const targetIdx = PAGES.indexOf(href);
    const curr = currentIdx();
    if (targetIdx === -1 || targetIdx === curr) return;
    const dir = targetIdx > curr ? 'forward' : 'backward';
    const dist = Math.abs(targetIdx - curr);
    if (supportsVT && dist >= 2) {
      e.preventDefault();
      multiHopSlide(curr, targetIdx);
      return;
    }
    if (supportsVT) { recordDir(dir); return; }
    e.preventDefault();
    navigate(targetIdx, dir);
  }, true);

  // ── Mobile: horizontal touch-swipe anywhere on main-site (except the nav bar) ──
  let sx = 0, sy = 0, st = 0, active = false;
  document.addEventListener('touchstart', (e) => {
    if (!isMobile() || e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('nav')) return; // let nav-bar taps through
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    active = true;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    const dt = Date.now() - st;
    if (dt > MAX_TIME) return;
    if (Math.abs(dx) < MIN_DX) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.2) return; // vertical-dominant: let it scroll
    const curr = currentIdx();
    if (dx < 0) navigate(curr + 1, 'forward');
    else        navigate(curr - 1, 'backward');
  }, { passive: true });

  // ── Desktop: vertical wheel-based swipe anywhere on the page ──
  // Respects native scrolling: only triggers navigation when there's no
  // more content to scroll in that direction. Wheel delta is accumulated
  // so a single flick doesn't accidentally navigate.
  let wheelAccum = 0, wheelTs = 0;
  const WHEEL_THRESHOLD = 180;
  const WHEEL_RESET_MS = 220;
  function canScrollInDir(target, dy) {
    let el = target;
    while (el && el !== document.body && el !== document.documentElement) {
      if (el.scrollHeight > el.clientHeight + 1) {
        const atTop = el.scrollTop < 0.5;
        const atBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 0.5;
        if (dy > 0 && !atBottom) return true;
        if (dy < 0 && !atTop) return true;
      }
      el = el.parentElement;
    }
    return false;
  }
  document.addEventListener('wheel', (e) => {
    if (isMobile()) return;
    if (navigating) { e.preventDefault(); return; }
    if (e.target.closest && e.target.closest('nav')) { wheelAccum = 0; return; }
    const dy = e.deltaY;
    if (Math.abs(dy) < 1) return;
    if (canScrollInDir(e.target, dy)) {
      wheelAccum = 0;
      return; // let a nested scroll container scroll normally
    }
    // At a scroll boundary — suppress overscroll and accumulate toward navigation.
    e.preventDefault();
    const now = Date.now();
    if (now - wheelTs > WHEEL_RESET_MS) wheelAccum = 0;
    wheelTs = now;
    wheelAccum += dy;
    if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
      const curr = currentIdx();
      const accum = wheelAccum;
      wheelAccum = 0;
      if (accum > 0) navigate(curr + 1, 'forward');
      else           navigate(curr - 1, 'backward');
    }
  }, { passive: false });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleIncoming);
  } else {
    handleIncoming();
  }
})();

  const playEnter = () => {
    buildFn();
    Array.from(container.children).forEach((el, i) => {
      el.style.animationDelay = `${i * CARD_STAGGER_MS}ms`;
      el.classList.add(enterClass);
      el.addEventListener('animationend', () => {
        el.classList.remove(enterClass);
        el.style.animationDelay = '';
      }, { once: true });
    });
  };
  const existing = Array.from(container.children);
  if (!existing.length) { playEnter(); return; }
  existing.forEach(el => el.classList.add(leaveClass));
  setTimeout(playEnter, CARD_SWAP_MS);
}

function renderBreakingNewsFeed(rows) {
  const feed = document.getElementById('breaking-news-feed');
  if (!feed) return;
  animateFeedSwap(feed, 'left', () => renderBreakingNewsFeedNow(feed, rows));
}

function renderBreakingNewsFeedNow(feed, rows) {
  if (!rows.length) {
    feed.innerHTML = `<p class="no-articles" style="padding:12px;">${I18N.t('home.breaking.empty')}</p>`;
    return;
  }
  feed.innerHTML = rows.map(n => {
    const sources = (n.breaking_news_sources || [])
      .slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    const sourcesHtml = sources.length
      ? sources.map(s => {
          const url = safeUrl(s.url);
          const inner = `
            <span class="src-name">${escapeText(s.name)}</span>
            ${escapeText(s.headline)}
          `;
          return `<div class="src-item">${
            url
              ? `<a href="${escapeText(url)}" target="_blank" rel="noopener">${inner}</a>`
              : inner
          }</div>`;
        }).join('')
      : '<div class="sources-empty">Henüz kaynak eklenmedi.</div>';
    return `
      <div class="article expandable" data-news-id="${escapeText(n.id)}">
        <div class="meta-row">
          <div class="kicker">${escapeText(categoryLabelTR(n))}</div>
          <div class="ago" data-iso="${escapeText(n.created_at)}">${escapeText(formatAgoTR(n.created_at))}</div>
        </div>
        <h3>${escapeText(n.title)}</h3>
        ${n.body ? `<p>${escapeText(n.body)}</p>` : ''}
        <div class="sources">
          <div class="sidebar-label" style="padding:0 0 6px 0;background:none;border:none;font-size:0.6rem;letter-spacing:2px;">Kaynaklar</div>
          ${sourcesHtml}
        </div>
      </div>
    `;
  }).join('');

  feed.querySelectorAll('.article.expandable').forEach(el => {
    el.addEventListener('click', (e) => {
      // Let source links open without toggling.
      if (e.target.closest('a')) return;
      const wasExpanded = el.classList.contains('expanded');
      // Collapse any other open item — only one at a time.
      feed.querySelectorAll('.article.expandable.expanded').forEach(other => {
        if (other !== el) other.classList.remove('expanded');
      });
      el.classList.toggle('expanded', !wasExpanded);
    });
  });

  applyFlashingNewsCard();
}

// Tick the "X dk önce" labels every minute so they stay current.
setInterval(() => {
  document.querySelectorAll('#breaking-news-feed .ago[data-iso]').forEach(el => {
    el.textContent = formatAgoTR(el.dataset.iso);
  });
}, 60000);

function applyNewsFilter(filter) {
  activeNewsFilter = filter;
  document.querySelectorAll('.news-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  let rows = allBreakingNews;
  if (filter === 'istanbul') rows = allBreakingNews.filter(n => n.category === 'istanbul');
  else if (filter === 'turkiye') rows = allBreakingNews.filter(n => n.category === 'turkiye');
  else if (filter === 'dunya') rows = allBreakingNews.filter(n => n.category === 'dunya');
  else if (filter === 'mahalle') rows = allBreakingNews.filter(n => n.category !== 'istanbul' && n.category !== 'turkiye' && n.category !== 'dunya');
  // When a district is selected on the map, narrow further to its news.
  if (activeNeighborhood) rows = rows.filter(n => n.neighborhood === activeNeighborhood);
  renderBreakingNewsFeed(rows);
}

document.querySelectorAll('.news-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyNewsFilter(btn.dataset.filter));
});

async function loadBreakingNews() {
  const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
  const { data, error } = await sb.from('breaking_news')
    .select('*, breaking_news_sources(*)').gte('created_at', cutoff)
    .order('created_at', { ascending: false });
  if (error) { console.error('[anahane breaking_news]', error); return; }
  allBreakingNews = data || [];

  applyNewsFilter(activeNewsFilter);

  // Pulse neighborhoods with unseen news.
  const seen = loadSeenSet();
  flashingNews = {};
  document.querySelectorAll('.neighborhood.flashing-news').forEach(el => el.classList.remove('flashing-news'));
  allBreakingNews.forEach(n => {
    if (!n.neighborhood) return;
    if (seen.has(n.id)) return;
    if (flashingNews[n.neighborhood]) return;
    flashingNews[n.neighborhood] = n;
  });
  Object.keys(flashingNews).forEach(nbId => {
    const el = document.getElementById(nbId);
    if (el) el.classList.add('flashing-news');
  });
}

// ── Events (right column) ──────────────────
const MONTH_ABBR_TR = ['OCA','ŞUB','MAR','NİS','MAY','HAZ','TEM','AĞU','EYL','EKİ','KAS','ARA'];
const MONTH_ABBR_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function eventDateParts(iso) {
  const d = new Date(iso);
  const tz = 'Europe/Istanbul';
  const en = I18N.isEnglish();
  const locale = en ? 'en-US' : 'tr-TR';
  const day = parseInt(d.toLocaleDateString('en-US', { timeZone: tz, day: 'numeric' }), 10);
  const month = parseInt(d.toLocaleDateString('en-US', { timeZone: tz, month: 'numeric' }), 10);
  const weekday = d.toLocaleDateString(locale, { timeZone: tz, weekday: 'long' });
  const time = d.toLocaleTimeString(locale, { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: en });
  const monAbbr = (en ? MONTH_ABBR_EN : MONTH_ABBR_TR)[month - 1] || '';
  return { day, mon: monAbbr, weekday, time };
}

let allEvents = [];
let eventsRequestSeq = 0;
let rsvpCounts = {};   // event_id -> attendee count
let myRsvpIds = new Set(); // event_ids the current user has RSVP'd to

async function loadEvents() {
  const reqId = ++eventsRequestSeq;
  const now = new Date().toISOString();
  // Scope the query to the selected neighborhood so the 30-row cap
  // doesn't hide matching rows that sit past the global top-30 window.
  let query = sb.from('events')
    .select('*')
    .gte('event_date', now)
    .order('event_date', { ascending: true })
    .limit(30);
  if (activeNeighborhood) query = query.eq('neighborhood', activeNeighborhood);
  const { data, error } = await query;
  // Drop responses from superseded requests so a slow older fetch
  // can't clobber a newer one with stale rows.
  if (reqId !== eventsRequestSeq) return;
  if (error) { console.error('[anahane events]', error); allEvents = []; }
  else allEvents = data || [];
  await loadRsvps();
  if (reqId !== eventsRequestSeq) return;
  renderEvents();
}

async function loadRsvps() {
  rsvpCounts = {};
  myRsvpIds = new Set();
  const ids = allEvents.map(ev => ev.id);
  if (!ids.length) return;
  const { data, error } = await sb.from('event_rsvps').select('event_id, user_id').in('event_id', ids);
  if (error) { console.error('[anahane rsvps]', error); return; }
  const myId = window.__currentUser && window.__currentUser.id;
  (data || []).forEach(r => {
    rsvpCounts[r.event_id] = (rsvpCounts[r.event_id] || 0) + 1;
    if (myId && r.user_id === myId) myRsvpIds.add(r.event_id);
  });
}

async function toggleRsvp(eventId, btn) {
  const myId = window.__currentUser && window.__currentUser.id;
  if (!myId || btn.disabled) return;
  const attending = myRsvpIds.has(eventId);
  btn.disabled = true;
  try {
    if (attending) {
      const { error } = await sb.from('event_rsvps').delete().eq('event_id', eventId).eq('user_id', myId);
      if (error) throw error;
      myRsvpIds.delete(eventId);
      rsvpCounts[eventId] = Math.max(0, (rsvpCounts[eventId] || 1) - 1);
    } else {
      const { error } = await sb.from('event_rsvps').insert({ event_id: eventId, user_id: myId });
      if (error) throw error;
      myRsvpIds.add(eventId);
      rsvpCounts[eventId] = (rsvpCounts[eventId] || 0) + 1;
    }
  } catch (err) {
    console.error('[anahane rsvp]', err);
    btn.disabled = false;
    return;
  }
  // Patch just this button/count in place so the card doesn't collapse.
  const nowAttending = myRsvpIds.has(eventId);
  btn.classList.toggle('attending', nowAttending);
  btn.textContent = nowAttending ? I18N.t('home.events.rsvp.going') : I18N.t('home.events.rsvp.join');
  const countEl = btn.closest('.ev-rsvp-row')?.querySelector('.ev-rsvp-count');
  if (countEl) countEl.textContent = `${rsvpCounts[eventId] || 0} ${I18N.t('home.events.rsvp.count')}`;
  btn.disabled = false;
}

function renderEvents() {
  const panel = document.getElementById('events-panel');
  if (!panel) return;
  let rows = allEvents;
  if (activeNeighborhood) rows = rows.filter(ev => ev.neighborhood === activeNeighborhood);
  animateFeedSwap(panel, 'right', () => renderEventsNow(panel, rows));
}

function renderEventsNow(panel, rows) {
  if (!rows.length) {
    panel.innerHTML = `<p class="no-articles" style="padding:12px 18px;">${I18N.t('home.events.empty')}</p>`;
    return;
  }
  panel.innerHTML = rows.map(ev => {
    const nbLabel = ev.neighborhood ? (NB_NAMES_TR[ev.neighborhood] || ev.neighborhood) : 'İstanbul';
    const parts = eventDateParts(ev.event_date);
    // Weekday + time on one line ("Saturday 11:00 PM"), location on its
    // own line below -- built from pre-escaped pieces joined with a real
    // <br>, since the pieces need to stay separately escapable.
    const dateTime = [parts.weekday, parts.time].filter(Boolean).join(' ');
    const metaHTML = [dateTime, ev.location].filter(Boolean).map(escapeText).join('<br>');
    const count = rsvpCounts[ev.id] || 0;
    const attending = myRsvpIds.has(ev.id);
    return `
      <div class="event-item expandable">
        <div class="ev-date-block">
          <div class="ev-day">${parts.day}</div>
          <div class="ev-mon">${parts.mon}</div>
        </div>
        <div class="ev-body">
          <div class="ev-kicker">${escapeText(nbLabel.toLocaleUpperCase('tr-TR'))}</div>
          <div class="ev-title">${escapeText(ev.title)}</div>
          ${metaHTML ? `<div class="ev-meta">${metaHTML}</div>` : ''}
        </div>
        <div class="ev-details">
          ${ev.description ? `<div class="ev-desc">${escapeText(ev.description)}</div>` : ''}
          <div class="ev-rsvp-row">
            <button type="button" class="ev-rsvp-btn${attending ? ' attending' : ''}" data-event-id="${ev.id}">${attending ? I18N.t('home.events.rsvp.going') : I18N.t('home.events.rsvp.join')}</button>
            <span class="ev-rsvp-count">${count} ${I18N.t('home.events.rsvp.count')}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  panel.querySelectorAll('.event-item.expandable').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('a, button')) return;
      const wasExpanded = el.classList.contains('expanded');
      panel.querySelectorAll('.event-item.expandable.expanded').forEach(other => {
        if (other !== el) other.classList.remove('expanded');
      });
      el.classList.toggle('expanded', !wasExpanded);
    });
  });

  panel.querySelectorAll('.ev-rsvp-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleRsvp(btn.dataset.eventId, btn);
    });
  });
}

// loadBreakingNews() is called from showSite() once the user is known
// so the per-user "seen" set is in play immediately.

// Collapse any expanded news/event when clicking outside of them.
document.addEventListener('click', (e) => {
  if (e.target.closest('.article.expandable, .event-item.expandable')) return;
  document.querySelectorAll('.article.expandable.expanded, .event-item.expandable.expanded')
    .forEach(el => el.classList.remove('expanded'));
});
