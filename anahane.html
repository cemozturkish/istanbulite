  <!-- Swipe pagination: pre-body, set initial offscreen state so columns don't flash at origin before sliding in. Also seeds the VT direction class so the cross-document transition knows which way to slide before it captures the snapshot, and a one-shot flag so the news/events card-entrance animation (see animateFeedSwap) skips its first run here -- the column itself is already sliding in from the same edge, so animating the cards inside it too would look like the content arriving twice. -->
  <script>
    (function(){
      try {
        var _d = sessionStorage.getItem('ist-page-enter-dir');
        if (_d) {
          document.documentElement.classList.add('ist-entering-' + _d);
          document.documentElement.classList.add('vt-' + _d);
          window.__istSuppressFirstCardAnim = { left: true, right: true };
        }
      } catch(e) {}
    })();
  </script>
  <style data-page="anahane">
    :root {
      /* Core ink & paper — cool cream newspaper palette */
      --ink: #4C382A;
      --ink-deep: #4C382A;
      --paper: #eddbd0;       /* main canvas + sidebar columns — lightest */
      --paper-warm: #eddbd0;  /* sidebar column background — lightest */
      --paper-card: rgba(255, 255, 255, 0.85);  /* news + event cards — white, mostly opaque over the map photo */
      /* Card text stays dark; hover just lightens the background a
         touch. Full detail (sources / RSVP) opens in the bottom sheet
         instead of flipping the card's own colors in place. */
      --card-fg: #1a1a1a;
      --card-fg-heading: #1a1a1a;
      --card-fg-muted: #4a4a4a;
      --card-border: rgba(26, 26, 26, 0.2);
      --card-border-soft: rgba(26, 26, 26, 0.15);
      --card-border-color: #1a1a1a;
      --paper-banner: #c9ae9a;/* sidebar header bars — darker */
      --paper-navbar: #b89b7f;/* top nav bar — darkest */
      --paper-dark: #d8c0b1;
      --hover: #d8c0b1;
      --field-bg: #e8d3c8;
      /* RGB triplets for the floating map panels (need alpha, so they
         can't just reference the hex vars above). Overridden alongside
         everything else in palette.css for data-palette="mono". */
      --paper-warm-rgb: 237, 219, 208;
      --ink-rgb: 76, 56, 42;
      /* Warm neutrals */
      --accent: #4C3B31;
      --accent-2: #775E4C;
      --muted: #867264;
      --rule: #b8a08a;
      --hairline: #c5ad9a;
      --whisper: #d4bbad;
      /* Newspaper accents */
      --ink-red: #B93631;
      --brown-1: #b8947a;
      --brown-2: #866955;
      --brown-3: #775742;
      --brown-4: #4C3B31;
      /* Semantic aliases */
      --border: var(--rule);
      --success: var(--accent-2);
      --danger: var(--ink-red);
      /* Border shortcuts */
      --col-border: 1px solid var(--rule);
      --row-border: 1px solid var(--hairline);
      --hairline-border: 1px solid var(--whisper);
      --rule-strong: 1px solid var(--ink);
      --rule-double: 4px double var(--ink);
    }

    /* News + event cards float over the map photo and keep one fixed
       look (white, mostly opaque) regardless of the earth/mono
       palette toggle — same reasoning as the fixed --card-fg text
       colors on .article/.event-item below. This overrides
       palette.css's mono --paper-card just for this page. */
    :root[data-palette="mono"] {
      --paper-card: rgba(255, 255, 255, 0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    body {
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      background-color: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN OVERLAY ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(237, 229, 208, 0.98);
      backdrop-filter: blur(3px);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    #login-overlay .masthead-login {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 2.4rem;
      letter-spacing: 0.5px;
      color: var(--ink);
      margin-bottom: 48px;
    }

    #login-overlay .tagline {
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .login-box {
      border: 2px solid var(--ink);
      padding: 36px 40px;
      width: 360px;
      background: var(--paper);
      position: relative;
    }

    .login-box::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--ink);
      pointer-events: none;
    }

    .login-box h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: var(--col-border);
    }

    .login-box input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid var(--ink);
      background: var(--field-bg);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus {
      border-color: var(--accent);
    }

    .login-box button {
      width: 100%;
      padding: 11px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-box button:hover { background: var(--accent); }

    .login-box .error-msg {
      color: var(--accent);
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 10px;
      min-height: 18px;
      font-style: italic;
    }

    .form-toggle {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 14px;
      color: var(--muted);
    }
    .form-toggle a {
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
    }
    .form-toggle a:hover { text-decoration: underline; }

    .q-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      margin-top: 10px;
      text-align: left;
    }

    .q-buttons-inline {
      margin-bottom: 10px;
      justify-content: flex-start;
    }

    .q-btn-sm, .q-btn-sm-outline {
      padding: 7px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .q-btn-sm {
      background: var(--paper);
      color: var(--ink);
      border: 2px solid var(--ink);
    }
    .q-btn-sm.selected {
      background: var(--ink);
      color: var(--paper);
    }
    .q-btn-sm-outline {
      background: var(--paper);
      color: var(--ink);
      border: 2px solid var(--ink);
    }
    .q-btn-sm-outline.selected {
      background: var(--ink);
      color: var(--paper);
    }

    /* ── MAIN SITE ──
       Desktop: a real CSS Grid (matches kahvehane/kutuphane's body grid)
       -- 260px/1fr/260px columns, auto/1fr rows. The map is a fixed
       full-bleed background layer that escapes the grid entirely
       (z-index -1); the top nav and both sidebars are frameless grid
       items floating over it. Mobile keeps its own stacked layout,
       redeclared wholesale inside its own @media block below. */
    #main-site {
      pointer-events: none;
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    #main-site.active {
      pointer-events: auto;
    }

    /* Top nav, both side columns, and main are frameless -- just typography
       (or the full-bleed map) floating directly on the map photo. frames.css
       still targets these classes/tag with !important (including `main`,
       shared with kahvehane/kutuphane where it IS a card), so beat it with
       an #main-site-qualified override (higher specificity, wins regardless
       of stylesheet order). Without `main` here, frames.css's opaque
       --frame-bg background paints solid over main's grid cell, hiding the
       fixed/z-index:-1 .map-panel behind it. */
    #main-site .section-rule,
    #main-site .col-left,
    #main-site .col-right,
    #main-site main {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
    }

    .section-rule {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 28px 10px 28px;
      /* main now carries z-index:0 (see main{} below) to keep its fixed
         .map-panel child contained in its own stacking context instead of
         escaping to the root -- but that also makes main's whole subtree,
         including the full-bleed map, paint above any *non*-stacking-context
         sibling. .col-left/.col-right already get z-index:501 from
         frames.css (for the bottom-sheet layering, desktop-only), so they
         were unaffected; .section-rule had no z-index of its own and ended
         up buried under the map. A plain positive z-index (any value above
         main's 0) is enough to put it back on top. */
      z-index: 1;
    }

    header {
      display: flex;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 32px;
    }
    nav a {
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 2px 0;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--ink); font-weight: 700; }

    .col-left {
      grid-column: 1;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Wraps everything in .col-left except #library-card, so the profile
       card can be excluded from the column's slide/view-transition
       animation below and stay visually still while switching pages. */
    .col-left-slide {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .col-left .nb-highlight {
      padding: 9px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-style: italic;
      font-family: 'Source Serif 4', Georgia, serif;
      flex-shrink: 0;
    }
    .col-right {
      grid-column: 3;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    main {
      grid-column: 2;
      grid-row: 2;
      display: block;
      overflow: hidden;
      /* z-index (any explicit value, grid items don't need `position` for
         this) gives main its own stacking context, so its fixed/negative
         z-index child .map-panel stays contained within main's local
         paint order instead of escaping all the way to the root stacking
         context. Without this, .map-panel ends up stacked below
         #main-site's own box -- and #main-site.active has
         pointer-events:auto (see above) covering the full viewport, so it
         silently intercepted every hover/click meant for the map's SVG
         hit-regions before they ever reached them. Nothing else lives in
         main, so letting clicks pass straight through main's own box is
         safe; .map-panel re-enables pointer-events for itself and its
         children below. */
      z-index: 0;
      pointer-events: none;
    }

    /* ── MAP PANEL: fixed full-bleed background (matches kahvehane/kutuphane) ──
       position:fixed escapes the grid entirely, so this covers the whole
       viewport regardless of which grid cell it's a DOM child of. */
    .map-panel {
      position: fixed;
      inset: 0;
      pointer-events: auto;
      z-index: -1;
      padding: 0;
      overflow: hidden;
      /* Matches the map artwork's own sea/background gray (#f7f7f7); the
         svg uses preserveAspectRatio="slice" so this only shows briefly
         during image load, not as a letterbox gap. */
      background: #f7f7f7;
      /* Hands touch gestures on the map entirely to map-zoom.js (pinch
         to zoom, drag to pan when zoomed) instead of the browser's own
         page-zoom/scroll handling, which would otherwise fight it. */
      touch-action: none;
    }

    /* Wraps the photo + hit-region overlay so map-zoom.js can scale/pan
       them together as one unit with a single transform -- map-label
       stays outside it, un-zoomed. */
    .map-zoom-layer {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
    }

    .map-panel img.map-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    /* Mobile-only draft map image -- hidden on desktop, shown instead of
       the svg inside the mobile media query below. */
    .map-mobile-draft { display: none; }

    /* Traced hit-region overlay, aligned to map-photo via the matching
       5046x2300 viewBox + slice (see mobile media query for the
       mobile-draft swap, which hides this since it has no mobile trace
       yet). */
    .map-panel svg.map-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .neighborhood {
      cursor: pointer;
      fill: transparent;
      stroke: transparent;
      stroke-width: 3;
      transition: fill 0.2s, stroke 0.2s;
      pointer-events: all;
      /* Mobile browsers draw the default tap-highlight using the
         element's bounding *box*, not its actual (irregular polygon)
         shape -- on a district like this, that showed up as a gray
         rectangle flashing over the tapped area for a moment. */
      -webkit-tap-highlight-color: transparent;
    }

    /* Real districts outside this app's 25 (Avcılar, Arnavutköy, Kartal,
       Sultanbeyli, Sancaktepe, Pendik, Tuzla, Şile), plus the Kocaeli-side
       landmass ("istanbul_disi") — not interactive, and no longer given a
       distinguishing tint; they just blend into the base map artwork. */
    .map-unaccommodated,
    .map-istanbul-disi {
      fill: transparent;
      stroke: transparent;
      pointer-events: none;
    }

    /* Hover: dim the artwork under the cursor */
    .neighborhood:hover { fill: rgba(var(--ink-rgb), 0.18); }
    /* Clicked/active: darker tint + outline */
    .neighborhood.active {
      fill: rgba(var(--ink-rgb), 0.32);
      stroke: var(--accent);
    }
    /* Home neighborhood: always darker than the rest, even at rest,
       plus a dashed outline so it reads as "yours" over the art. Uses
       --ink-red (the same red as SON DAKİKA/breaking news) instead of
       the neutral ink tint the other states use -- it's identical in
       both earth and mono palettes, so no separate mono override needed. */
    .neighborhood.home {
      fill: rgba(130, 55, 48, 0.16);
      stroke: var(--brown-4);
      stroke-width: 4;
      stroke-dasharray: 10 6;
    }
    .neighborhood.home:hover { fill: rgba(130, 55, 48, 0.26); }
    .neighborhood.home.active { fill: rgba(130, 55, 48, 0.38); stroke: var(--brown-4); stroke-dasharray: none; }

    /* Plain text, no frame/shadow — matches the HANE/KÜTÜPHANE/KAHVEHANE
       nav tab style (nav a above), not a floating pill. */
    .map-label {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── LEFT SIDEBAR (articles) ── */
    .sidebar-left {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    #breaking-news-feed {
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1;
      min-height: 0;
    }

    /* Still used by the "Kaynaklar" (sources) sub-heading inside an
       expanded article -- see renderBreakingNewsFeed(). */
    .sidebar-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-red);
      margin-bottom: 2px;
    }

    #breaking-news-feed { padding: 10px 14px 16px 14px; }

    /* Cards are a light grey, translucent square floating over the map
       photo, so their text uses a fixed dark palette (not the page's
       --ink tokens, which vary by earth/mono palette) regardless of
       OS light/dark preference or the active palette. */
    .article {
      background: var(--paper-card);
      border: 2px solid var(--card-border-color);
      border-bottom: 5px solid var(--card-border-color);
      padding: 16px 18px;
      margin-bottom: 12px;
      color: var(--card-fg);
      transition: background 0.15s, color 0.15s, transform 0.15s ease;
    }
    .article:last-child { margin-bottom: 0; }

    .article .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-red);
      margin-bottom: 6px;
      /* Series/category name always stays on one line -- truncates with
         an ellipsis instead of wrapping onto a second line when the
         timestamp on the other side of .meta-row squeezes its width. */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .article h3 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.34rem;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1.25;
      margin-bottom: 8px;
      color: var(--card-fg-heading);
      /* Sized large enough that wrapped lines naturally reach close to
         both edges on their own -- no justify/word-spacing stretching,
         which reads as artificial gaps between words. text-wrap:balance
         keeps line breaks even so a short trailing word (e.g. "ALINDI")
         doesn't get stranded alone on its own line. */
      text-wrap: balance;
    }

    .article p {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--card-fg);
    }

    .article.openable {
      cursor: pointer;
      /* Feed preview cards: kicker+timestamp stay pinned at the top via
         .meta-row, and the headline anchors to the bottom of the card
         whenever there's slack height to push into (e.g. cards
         stretched to a shared height). No-op when the card is exactly
         as tall as its content, which is the common case today. */
      display: flex;
      flex-direction: column;
    }
    .article.openable h3 { margin-top: auto; }
    /* Plain hover: just a lighter background + a small nudge inward
       toward the center — text/border stay put. */
    .article.openable:hover {
      background: #e8e8e8;
      transform: translateX(6px);
    }
    .article .meta-row {
      display: flex;
      justify-content: space-between;
      /* flex-start (not baseline) keeps the kicker pinned to the
         top-left and the timestamp pinned to the top-right regardless
         of either one's line-height. */
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .article .ago {
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--card-fg-muted);
      font-style: italic;
      /* Stays on one line and never gets squeezed by the kicker --
         the kicker truncates instead (see .kicker's text-overflow). */
      white-space: nowrap;
      flex-shrink: 0;
    }
    /* Only ever rendered inside the detail sheet (see buildNewsDetailHtml)
       — the sidebar preview card doesn't include it, so no visibility
       toggle is needed here. */
    .article .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--card-border);
    }
    .article .sources-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
      text-align: left;
    }
    .article .sources-toggle .sidebar-label { margin: 0; }
    .article .sources-toggle-icon {
      font-size: 0.7rem;
      color: var(--card-fg-muted);
      transition: transform 0.15s ease;
      flex-shrink: 0;
    }
    .article .sources.open .sources-toggle-icon { transform: rotate(180deg); }
    .article .sources-body {
      display: none;
      margin-top: 8px;
    }
    .article .sources.open .sources-body { display: block; }
    .article .src-item {
      padding: 6px 0;
      border-bottom: 1px dotted var(--card-border-soft);
      font-size: 0.78rem;
    }
    .article .src-item:last-child { border-bottom: none; }
    .article .src-item .src-name {
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.65rem;
      display: block;
      color: var(--card-fg-muted);
      margin-bottom: 2px;
    }
    .article .src-item a {
      color: var(--card-fg);
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      line-height: 1.4;
    }
    .article .src-item a:hover { opacity: 0.7; }
    .article .sources-empty {
      font-size: 0.75rem;
      font-style: italic;
      color: var(--card-fg-muted);
    }
    .article .timeline {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--card-border);
    }
    /* Vertical spine with a horizontal tick branching off to each dated
       entry (update or poll), newest first. Each item draws its own
       border-left segment (instead of one pseudo-element spanning a
       guessed top/bottom offset), so stacking items reproduces one
       continuous line that starts and ends exactly at the first/last
       tick — no eyeballed pixel offset to drift out of alignment. The
       tick sits in a flex row with the .ago date so it's centered on
       that line exactly too. */
    .article .timeline-item {
      border-left: 2px solid var(--ink-red);
      padding: 10px 0;
    }
    .article .timeline-item:first-child { padding-top: 0; }
    .article .timeline-item:last-child { padding-bottom: 0; }
    .article .timeline-item-date {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }
    .article .timeline-tick {
      flex: 0 0 12px;
      height: 2px;
      background: var(--ink-red);
    }
    .article .timeline-item .ago {
      display: block;
    }
    .article .timeline-item strong,
    .article .timeline-item p,
    .article .timeline-item .poll-block {
      display: block;
      margin-left: 26px;
    }
    .article .timeline-item strong {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.85rem;
      color: var(--card-fg-heading);
    }
    .article .timeline-item p {
      margin-top: 2px;
      font-size: 0.78rem;
    }
    .article .timeline-item .poll-block {
      margin-top: 6px;
      padding-top: 0;
      border-top: none;
    }

    /* Poll block — only ever rendered inside the detail sheet, filled
       in async after openDetail() by loadAndRenderPoll(). */
    .article .poll-block {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--card-border);
    }
    .article .poll-question {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-red);
      margin-bottom: 8px;
    }
    .article .poll-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .article .poll-opt-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      text-align: left;
      padding: 9px 12px;
      background: var(--paper-card);
      border: 1px solid var(--card-border-color);
      color: var(--card-fg);
      cursor: pointer;
      transition: background 0.15s;
    }
    .article .poll-opt-btn:hover:not(:disabled) { background: #e8e8e8; }
    .article .poll-opt-btn:disabled { cursor: default; opacity: 0.6; }
    .article .poll-result-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--card-fg);
      margin-bottom: 6px;
    }
    .article .poll-label-a, .article .poll-label-b { min-width: 0; }
    .article .poll-label-b { text-align: right; }
    .article .poll-label-mine { font-weight: 700; }
    .article .poll-bar-track {
      display: flex;
      height: 10px;
      background: var(--card-border-soft);
      overflow: hidden;
    }
    .article .poll-bar-fill-a {
      height: 100%;
      background: var(--ink-red);
      transition: width 0.3s ease;
    }
    .article .poll-bar-fill-b {
      height: 100%;
      background: var(--card-fg);
      transition: width 0.3s ease;
    }
    .article .poll-voters-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
    }
    .article .poll-voters {
      display: flex;
      align-items: center;
    }
    .article .poll-status.err { color: var(--ink-red); font-size: 0.72rem; margin-top: 6px; }

    /* ── RIGHT SIDEBAR (neighborhood info) ── */
    .sidebar-right {
      padding: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .sidebar-right-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nb-articles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nb-article {
      border-left: 3px solid #4C4C4C;
      padding-left: 6px;
    }

    .nb-article h4 {
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.15;
    }

    .nb-article p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
      line-height: 1.2;
    }

    .no-articles {
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Flashing neighborhood with breaking news */
    @keyframes flash-nb {
      0%, 100% { fill: rgba(185, 54, 49, 0.1); }
      50% { fill: rgba(185, 54, 49, 0.6); }
    }
    .neighborhood.flashing-news {
      animation: flash-nb 1.2s ease-in-out infinite;
      stroke: var(--ink-red);
      stroke-width: 3;
    }
    .neighborhood.flashing-news:hover {
      animation: none;
      fill: rgba(185, 54, 49, 0.5);
    }
    .neighborhood.flashing-news.active {
      animation: none;
      fill: rgba(185, 54, 49, 0.5);
      stroke: var(--ink-deep);
      stroke-width: 3;
    }

    /* Flashing news card in feed when its neighborhood is selected */
    @keyframes flash-card {
      0%, 100% { background: var(--paper-card); box-shadow: inset 3px 0 0 transparent; }
      50% { background: var(--paper-banner); box-shadow: inset 3px 0 0 var(--ink-red); }
    }
    .article.flashing-news-card {
      animation: flash-card 1.2s ease-in-out infinite;
    }

    /* Hovering a neighborhood-specific news/event card highlights that
       district on the map (see attachCardMapHover). Listed last among the
       .neighborhood rules so it reads clearly even over .home/.active/
       .flashing-news. */
    .neighborhood.card-hover {
      animation: none;
      fill: rgba(var(--ink-rgb), 0.32);
      stroke: var(--accent);
      stroke-width: 3;
    }

    /* ── MOBILE RESPONSIVE ──
       Stacked flow instead of desktop's floating-over-fullscreen-map
       layout: the map sits at the very top like a hero banner with the
       profile card floating over its empty/sea-colored band (same
       #f7f7f7 as the map artwork's own background, so the card reads as
       part of the map rather than a stacked box), then a news/events
       column pair below, all scrolling in #main-site itself, with the
       tab bar pinned fixed at the very bottom (its <header> already
       escapes to the viewport via position:fixed regardless of where
       .section-rule sits). */
    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      #login-overlay .masthead-login { font-size: 2rem; }
      .login-box { width: 90vw; max-width: 360px; padding: 24px 20px; }
      .q-buttons-inline { display: flex; gap: 8px; }

      #main-site {
        position: relative;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "map map"
          "news events";
        align-content: start;
        /* frames.css's gap (row + column) exposed a sliver of the raw
           page canvas (--page-bg, warm beige/mono gray) directly under
           the map -- a different color from the map's own #f7f7f7,
           breaking the edge-to-edge look right where it's most visible.
           Zero the row gap so the map's bottom edge sits flush against
           the content below it; the column gap (between news/events)
           is kept, just halved below. */
        row-gap: 0 !important;
        /* Halve frames.css's column-gap (--frame-gap, 10px) between the
           news and events columns -- the full gap read as too much
           breathing room between the two card stacks on mobile. */
        column-gap: calc(var(--frame-gap) / 2) !important;
        /* #main-site always fills the full viewport height (height:100%
           above), but its content (map + one short row of cards) often
           doesn't -- with align-content:start packing everything at the
           top, the leftover space at the bottom belongs to no grid item
           and was showing the raw page canvas instead of the map/card
           #f7f7f7. Coloring the container itself means any such gap
           matches by default instead of needing a fix per element. */
        background: #f7f7f7;
        /* Clears the fixed bottom tab bar so the last row of cards isn't
           hidden behind it. */
        padding-bottom: calc(52px + env(safe-area-inset-bottom) + 16px);
      }

      /* Map: same real desktop artwork + traced SVG hit-regions (no more
         placeholder draft image), now a normal in-flow square block
         instead of a fixed full-bleed background layer. Bleeds past
         #main-site's own left/right frame padding (frames.css) so it
         reaches the true screen edges instead of sitting in a gutter,
         and drops frames.css's card shadow (only meant for panels that
         look like discrete floating cards, not this edge-to-edge hero). */
      main {
        grid-area: map;
        position: static;
        height: auto;
        overflow: visible;
        margin-left: calc(-1 * var(--frame-pad, 10px));
        margin-right: calc(-1 * var(--frame-pad, 10px));
        /* Room for the floating profile card (now offset by the same
           safe-area amount, plus extra breathing room below the card)
           so it still sits over empty "sea", not over the districts
           themselves. */
        margin-top: calc(env(safe-area-inset-top) + 40px);
        box-shadow: none !important;
      }
      .map-panel {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
      }
      /* Neither this page nor kahvehane's is meant to scroll -- so once
         map-zoom.js zooms past 1x, it switches the panel to a fixed
         position pinned at its own current on-screen rect (computed in
         JS, not CSS) with overflow allowed to escape that little square.
         That's the same "position:fixed escapes the grid" trick the
         desktop full-bleed map already relies on (see main's z-index:0
         above, which keeps it correctly layered instead of jumping to
         the root stacking context), so the larger zoomed map can spill
         into the rest of the screen without ever growing #main-site's
         own scrollable content size. */
      .map-panel.ist-zoomed {
        position: fixed;
        overflow: visible;
      }
      .map-panel img.map-photo { display: block; }
      .map-panel svg.map-svg { display: block; }
      .map-mobile-draft { display: none; }
      .map-label {
        position: absolute;
        bottom: 8px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 1px;
      }

      /* Profile bar: floats over the top (empty/sea) band of the map
         instead of taking its own row -- absolutely positioned against
         #main-site (the nearest positioned ancestor), which places it
         right at the top since the map is the first grid row. #f7f7f7
         (the map's own background) made it blend invisibly into the
         map instead of reading as a card, so it's back to a light gray
         fill with the same chapter-box border the news/event cards use
         (2px + a heavier 5px bottom edge), just floating on the map
         rather than stacked in the column flow below it. */
      #ist-pc-mount {
        position: absolute;
        /* 12px margin from the map, plus the notch/status bar height so
           the floating card clears it as a unit instead of padding its
           insides (which just stretches the card with dead space). */
        top: calc(12px + env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        z-index: 20;
        max-height: none;
        overflow: visible;
        background: #eeeeee;
        border: 2px solid #1a1a1a;
        border-bottom: 5px solid #1a1a1a;
      }
      /* Capacitor's WKWebView reports env(safe-area-inset-top) as 0 for a
         real (measured, ~80-200ms) window after every fresh page load
         before self-correcting on its own -- with no gating, the card
         renders flush under the status bar/notch for that window,
         covering the map's top districts. safe-area-ready.js removes
         this class once the real value is confirmed (or after a
         timeout), so the card and map simply appear already in the
         right place instead of visibly jumping. */
      html.ist-safe-area-pending #ist-pc-mount,
      html.ist-safe-area-pending main {
        visibility: hidden;
      }
      /* frames.css drops a card shadow on #ist-pc-mount's child (the
         same treatment every other panel gets) -- here that shadow was
         casting a visible dark band onto the map below, breaking the
         color match above even though the fill itself was correct. */
      #ist-pc-mount > * {
        box-shadow: none !important;
      }

      /* .section-rule no longer renders a floating masthead bar -- its
         only visible content (the tab nav) is pulled out via the
         <header> position:fixed rule below and pinned to the viewport
         bottom regardless of where this sits. Taken out of grid flow so
         it doesn't claim a row of its own. */
      .section-rule {
        grid-area: auto;
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        padding: 0;
        overflow: visible;
      }

      /* News (left) + events (right): normal in-flow columns below the
         map, each stacking its own cards top to bottom. Explicit z-index
         (above main's own 0, see main{} above) so they stay on top of
         the map even once it's zoomed in and spilling past its own
         little square -- otherwise DOM order alone would leave one of
         the two columns stacked below it. */
      .col-left, .col-right {
        position: static;
        top: auto; bottom: auto; left: auto; right: auto;
        height: auto;
        width: auto;
        display: block;
        overflow: visible;
        z-index: 1;
      }
      .col-left { grid-area: news; }
      .col-right { grid-area: events; }
      /* Transparent (inherits the desktop rule's background:none) so
         these read as frameless text floating over the map, same as
         desktop -- #main-site's own background is the same #f7f7f7, so
         this looks identical at rest, and once map-zoom.js zooms the
         map past its little square, it now shows through here instead
         of being hidden behind a flat color. */

      /* #ist-pc-mount (profile-card.js) already covers the identity card
         on mobile — the desktop-only #library-card would otherwise
         duplicate it. */
      #library-card { display: none; }

      .sidebar-left {
        overflow: visible;
        display: block;
      }
      #breaking-news-feed { overflow: visible; }
      .sidebar-right { overflow: visible; display: block; }
      .sidebar-label {
        font-size: 9px;
        letter-spacing: 1.5px;
      }
      .article {
        padding: 8px 12px;
      }
      .article .kicker {
        font-size: 10px;
        margin-bottom: 2px;
        letter-spacing: 1px;
      }
      .article h3 {
        font-size: 18px;
        margin-bottom: 3px;
        line-height: 1.25;
      }
      .article p {
        font-size: 12px;
        line-height: 1.35;
      }
      .sidebar-right-inner {
        padding: 8px 12px;
        gap: 6px;
      }
      .no-articles { font-size: 11px; padding: 14px 8px; }

      /* Bottom tab bar — fixed at bottom, unchanged */
      header {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 52px;
        padding: 0 0 env(safe-area-inset-bottom);
        margin: 0;
        border-top: 1px solid var(--rule);
        border-bottom: none;
        background: var(--paper-navbar);
        z-index: 100;
        display: flex;
        align-items: stretch;
      }
      nav {
        display: flex;
        width: 100%;
        height: 100%;
        gap: 0;
        /* Pull KÜTÜPHANE/KAHVEHANE in from the screen's rounded corners --
           at full-bleed width:100% the outer tabs sat right under the
           curve. */
        padding: 0 20px;
        flex-wrap: nowrap;
        justify-content: stretch;
      }
      nav a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0;
        border: none;
        text-decoration: none;
      }
      nav a.active { color: var(--ink); font-weight: 700; }

      /* ── Mobile swipe pagination: only left/right columns slide; map, datetime bar, and nav stay ── */
      .col-left, .col-right {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left,
      html.ist-entering-forward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      html.ist-entering-backward .col-left,
      html.ist-entering-backward .col-right {
        transform: translateX(-100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left,
      body.ist-exiting-forward .col-right {
        transform: translateX(-100vw);
      }
      body.ist-exiting-backward .col-left,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ── Desktop swipe pagination: left column slides out/in toward the
       left edge, right column toward the right edge — regardless of nav
       direction; map, datetime bar, and nav stay ── */
    @media (min-width: 769px) {
      .col-left-slide, .col-right {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
        backface-visibility: hidden;
      }
      html.ist-entering-forward .col-left-slide,
      html.ist-entering-backward .col-left-slide {
        transform: translateX(-100vw);
        transition: none;
      }
      html.ist-entering-forward .col-right,
      html.ist-entering-backward .col-right {
        transform: translateX(100vw);
        transition: none;
      }
      body.ist-exiting-forward .col-left-slide,
      body.ist-exiting-backward .col-left-slide {
        transform: translateX(-100vw);
      }
      body.ist-exiting-forward .col-right,
      body.ist-exiting-backward .col-right {
        transform: translateX(100vw);
      }
    }

    /* ══════════════════════════════════════════════
       View Transitions API — cross-document slide
       The browser snapshots the outgoing page and holds
       it visible until the new page is ready, so there's
       no white flash between reloads. Only the columns
       animate; the map, nav, and datetime bar stay put
       because their content is identical across tabs. On
       mobile, direction comes from a class on <html> seeded
       by the outgoing page via sessionStorage (present before
       VT captures the new snapshot); desktop ignores direction
       entirely (see the media query below).
       ══════════════════════════════════════════════ */
    @view-transition { navigation: auto; }

    /* Suppress the default root crossfade — columns handle motion */
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    .col-left-slide { view-transition-name: ist-col-left; }
    .col-right { view-transition-name: ist-col-right; }

    /* Desktop: left column always exits/enters via the left edge, right
       column via the right edge — independent of nav direction, so no
       html.vt-forward/vt-backward gate is needed here. */
    @media (min-width: 769px) {
      @keyframes ist-vt-col-left-exit { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-col-left-enter { from { transform: translateX(-100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-col-right-exit { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-col-right-enter { from { transform: translateX(100vw); } to { transform: translateX(0); } }

      ::view-transition-old(ist-col-left) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-left-exit;
      }
      ::view-transition-new(ist-col-left) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-left-enter;
      }
      ::view-transition-old(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-right-exit;
      }
      ::view-transition-new(ist-col-right) {
        animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-col-right-enter;
      }
    }

    /* ── Events (right column) ── */
    #events-panel { padding: 10px 14px 16px 14px; }

    .event-item {
      display: grid;
      grid-template-columns: 38px 1fr;
      column-gap: 10px;
      padding: 14px 16px 14px 14px;
      margin-bottom: 12px;
      background: var(--paper-card);
      border: 2px solid var(--card-border-color);
      border-bottom: 5px solid var(--card-border-color);
      transition: background 0.15s, transform 0.15s ease;
    }
    .event-item:last-child { margin-bottom: 0; }
    .event-item .ev-date-block {
      text-align: center;
      padding-top: 14px;
      font-family: 'Source Serif 4', Georgia, serif;
      color: var(--card-fg-heading);
    }
    .event-item .ev-day {
      font-size: 1.7rem;
      font-weight: 400;
      line-height: 1;
    }
    .event-item .ev-mon {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--card-fg-muted);
      margin-top: 4px;
    }
    .event-item .ev-wd {
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--card-fg-muted);
      margin-top: 2px;
      opacity: 0.75;
    }
    .event-item .ev-body { min-width: 0; }
    .event-item .ev-kicker {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-red);
      margin-bottom: 5px;
    }
    .event-item .ev-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.22;
      margin-bottom: 0;
      color: var(--card-fg-heading);
    }
    .event-item .ev-meta {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.78rem;
      color: var(--card-fg-muted);
      line-height: 1.35;
    }
    .event-item.openable { cursor: pointer; }
    /* Plain hover: just a lighter background + a small nudge inward
       toward the center — text/border stay put. */
    .event-item.openable:hover {
      background: #e8e8e8;
      transform: translateX(-6px);
    }
    /* Only ever rendered inside the detail sheet (see buildEventDetailHtml)
       — the sidebar preview card doesn't include it, so no visibility
       toggle is needed here. */
    .event-item .ev-details {
      grid-column: 1 / -1;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--card-border);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--card-fg);
    }
    .event-item .ev-desc { margin-bottom: 10px; }
    .ev-rsvp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ev-rsvp-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 14px;
      background: transparent;
      color: var(--ink-red);
      border: 1px solid var(--ink-red);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .ev-rsvp-btn:hover { background: rgba(185, 54, 49, 0.15); }
    .ev-rsvp-btn.attending {
      background: var(--ink-red);
      color: #1a1a1a;
    }
    .ev-rsvp-btn.attending:hover { opacity: 0.85; }
    .ev-rsvp-btn:disabled { opacity: 0.6; cursor: default; }
    .ev-rsvp-count {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: var(--card-fg-muted);
    }
    .ev-attendees {
      display: flex;
      align-items: center;
    }
    /* Preview-card attendee stack: shown under the title on every
       breakpoint, in the space the compact card otherwise leaves empty.
       The detail overlay's .ev-attendees (inside .ev-rsvp-row) is
       unaffected since it isn't matched by this class. */
    .ev-attendees-preview {
      display: flex;
      margin-top: 10px;
    }
    .ev-attendees-preview:empty { display: none !important; }
    .ev-attendee-avatar,
    .poll-voter-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--paper-dark);
      border: 1.5px solid var(--paper-card, #fff);
      box-shadow: 0 0 0 1px var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--accent);
      overflow: hidden;
      margin-left: -8px;
    }
    .ev-attendee-avatar:first-child,
    .poll-voter-avatar:first-child { margin-left: 0; }
    .ev-attendee-avatar img,
    .poll-voter-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ev-attendee-avatar.ev-attendee-more,
    .poll-voter-avatar.poll-voter-more {
      font-size: 0.56rem;
      color: var(--card-fg-muted);
    }

    /* News (left) and event (right) cards slide in from their own
       column's outer screen edge on render, and slide back out the
       same way when the feed is about to be replaced -- see the
       animateFeedSwap() helper used by renderBreakingNewsFeed() /
       renderEvents(). Generic so it also covers the "no articles/
       events" empty-state message. */
    @keyframes card-slide-in-left {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes card-slide-in-right {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* backwards fill-mode holds the keyframe's "from" state during the
       staggered animation-delay set in JS, so a lower card stays hidden
       off-screen while it waits its turn instead of flashing visible
       in place first. */
    .card-entering-left { animation: card-slide-in-left 0.4s ease-out backwards; }
    .card-entering-right { animation: card-slide-in-right 0.4s ease-out backwards; }
    .card-leaving-left,
    .card-leaving-right {
      transition: transform 0.3s ease-in, opacity 0.3s ease-in;
      opacity: 0;
    }
    .card-leaving-left { transform: translateX(-100%); }
    .card-leaving-right { transform: translateX(100%); }

    @media (max-width: 768px) {
      @keyframes ist-vt-out-left { from { transform: translateX(0); } to { transform: translateX(-100vw); } }
      @keyframes ist-vt-in-left { from { transform: translateX(100vw); } to { transform: translateX(0); } }
      @keyframes ist-vt-out-right { from { transform: translateX(0); } to { transform: translateX(100vw); } }
      @keyframes ist-vt-in-right { from { transform: translateX(-100vw); } to { transform: translateX(0); } }

      /* Top padding matches #breaking-news-feed's (10px, set once above
         for all breakpoints) so the news and event cards' top edges
         align instead of the event column sitting higher. */
      #events-panel { padding: 10px 8px 10px 8px; }
      .event-item {
        grid-template-columns: 30px 1fr;
        column-gap: 8px;
        padding: 8px 9px;
        margin-bottom: 6px;
      }
      .event-item .ev-date-block { padding-top: 2px; }
      .event-item .ev-day { font-size: 1.05rem; line-height: 1; }
      .event-item .ev-mon { font-size: 0.5rem; margin-top: 2px; }
      .event-item .ev-wd { font-size: 0.46rem; margin-top: 1px; }
      .event-item .ev-kicker { font-size: 9px; letter-spacing: 1.5px; margin-bottom: 2px; }
      .event-item .ev-title { font-size: 16px; margin-bottom: 0; line-height: 1.2; }
      .ev-attendees-preview { margin-top: 6px; }
      .ev-attendees-preview .ev-attendee-avatar {
        width: 20px;
        height: 20px;
        font-size: 0.5rem;
        margin-left: -6px;
      }

      html.vt-forward::view-transition-old(ist-col-left),
      html.vt-forward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-left;
      }
      html.vt-forward::view-transition-new(ist-col-left),
      html.vt-forward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-left;
      }
      html.vt-backward::view-transition-old(ist-col-left),
      html.vt-backward::view-transition-old(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-out-right;
      }
      html.vt-backward::view-transition-new(ist-col-left),
      html.vt-backward::view-transition-new(ist-col-right) {
        animation: 320ms cubic-bezier(0.4, 0, 0.2, 1) both ist-vt-in-right;
      }
    }

    /* ── Small-phone overrides (≤ 400px, e.g. iPhone 15) ── */
    @media (max-width: 400px) {
      /* Tighten padding inside the narrower news/events columns */
      .sidebar-right-inner { padding: 6px 6px; }
    }

    /* ── Detail overlay: bottom sheet for a news article or event's full
       details, opened instead of the old expand-in-place toggle —
       mirrors Kahvehane's game overlay / Kütüphane's reader overlay.
       Background/border/shadow come from frames.css's shared flat-card
       rule (it targets .detail-overlay-sheet alongside the other two). */
    .detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
    }
    .detail-overlay[hidden] { display: none; }
    .detail-overlay-backdrop {
      /* Transparent, like the other two overlays — still catches
         outside clicks to close. */
      position: absolute;
      inset: 0;
      background: transparent;
    }
    .detail-overlay-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(680px, 86vw);
      height: min(88vh, 860px);
      overflow-y: auto;
      transform: translate(-50%, 100%);
      /* Ease-out-quint: fast off the bottom edge, then settles into place
         slowly instead of arriving at a constant speed. Slower overall
         duration than a typical UI transition so that initial burst
         doesn't feel abrupt. */
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .detail-overlay.open .detail-overlay-sheet { transform: translate(-50%, 0); }
    .detail-overlay-close {
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 2;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-overlay-close .close-icon {
      width: 22px;
      height: 22px;
      display: block;
    }
    .detail-overlay-body {
      padding: 48px 24px 24px;
    }
    /* Comfortable reading width for the card sitting inside the sheet,
       centered rather than stretched edge-to-edge. */
    .detail-overlay-body .article,
    .detail-overlay-body .event-item {
      max-width: 520px;
      margin: 0 auto;
    }
    @media (max-width: 768px) {
      .detail-overlay-sheet {
        /* Inset on 3 sides (frame-pad gap) so a sliver of the map/page
           canvas peeks through above and beside it, like a page rising
           from below -- flush at the bottom (see frames.css's
           border-bottom-width: 0 for this class) so it reads as
           continuing past the screen edge instead of stopping short.
           Rises to cover only the area below the map instead of nearly
           the full screen -- the map stays visible above it. Its top
           matches where the map hero's own box ends: #main-site's
           frame-pad top inset (frames.css) plus the map's own height
           (100vw, same square as .map-panel's width:100%;aspect-ratio:
           1/1) plus one more frame-pad gap. bottom:0 (rather than an
           explicit height) lets it still reach the true bottom behind
           the tab bar, matching the other overlays. */
        left: var(--frame-pad, 10px);
        right: var(--frame-pad, 10px);
        width: auto;
        top: calc(var(--frame-pad, 10px) + 100vw + var(--frame-pad, 10px));
        bottom: 0;
        height: auto;
        transform: translateY(100%);
      }
      .detail-overlay.open .detail-overlay-sheet { transform: translateY(0); }
    }
  </style>
  <link rel="stylesheet" href="frames.css">
</head>

<script>
// Wrapped in a scoping IIFE so this page's top-level declarations (sb,
// districtNames, etc.) don't leak to the global scope -- a future
// client-side navigation may execute this same script a second time in a
// document that already ran another carousel page's script, and without
// this wrapper a repeated `const` at global scope throws a
// duplicate-declaration SyntaxError.
(function () {
// Shared client (see router.js) — no page may declare its own createClient
// anymore, so that a future client-side navigation can run more than one
// page's script in the same document without a duplicate-declaration crash.
const sb = IstRouter.sb;

// ── Auth State ──
// Loading screen (loading-screen.js) covers the page — including on a
// refresh while already logged in — until the real session check
// resolves, then either reveals the site or bounces to the sign-in page.
let authSession = null;
const resolveLoading = LoadingScreen.start(() => {
  if (!authSession) { window.location.href = 'index.html'; return; }
  showSite(authSession.user);
});

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  authSession = session || null;
  resolveLoading();
}

// Tick the "X dk önce" labels every minute so they stay current. Named
// (not inline) so mount()/unmount() can register/unregister the exact
// same callback with IstRouter's shared clock instead of running its own
// setInterval, which a revisit via virtual navigation would duplicate.
function tickNewsAgo() {
  document.querySelectorAll('#breaking-news-feed .ago[data-iso]').forEach(el => {
    el.textContent = formatAgoTR(el.dataset.iso);
  });
}

let onI18NChangeForNews = null;

// Highlight home neighborhood: try metadata first, then profiles table
// (admin-created accounts may not have neighborhood in user_metadata --
// that fallback path is a real network round-trip).
let cachedHomeNeighborhood = null;
async function highlightHomeNeighborhood(user) {
  // Re-apply the last known highlight immediately (synchronously, before
  // any profiles-table fetch below) -- #ist-content's map is rebuilt
  // fresh on every mount and starts with no .home class, so without this
  // a revisit shows the map for a beat with no highlight, then fades it
  // in once the fetch resolves. That read as a visible flash; this makes
  // a revisit correct on the very first paint.
  if (cachedHomeNeighborhood) {
    const nbEl = document.getElementById(cachedHomeNeighborhood);
    if (nbEl) nbEl.classList.add('home');
  }
  let homeNb = user?.user_metadata?.yasadigi_ilce || user?.user_metadata?.neighborhood;
  if (!homeNb && user?.id) {
    const { data: profile } = await sb.from('profiles').select('neighborhood').eq('id', user.id).single();
    homeNb = profile?.neighborhood;
  }
  if (homeNb) {
    cachedHomeNeighborhood = homeNb;
    const nbEl = document.getElementById(homeNb);
    if (nbEl) nbEl.classList.add('home');
    const subEl = document.getElementById('user-nb-sublabel');
    if (subEl) subEl.textContent = districtNames[homeNb] || homeNb;
  }
}

// This page's repeatable "become the active page" work -- the part that
// re-runs on every virtual re-entry into anahane, not just the first real
// load (see showSite() below for the one-time login-gateway part: hiding
// the login overlay, mounting the profile card, the onboarding/mahalle-
// picker/admin-notification nudges).
function mount() {
  // First: its cached-value pre-apply (see highlightHomeNeighborhood) has
  // to land before router.js's post-mount MapZoom.init runs, or that
  // call's forced layout read locks in a frame with no .home class and
  // the class arriving a moment later reads as a visible flash.
  highlightHomeNeighborhood(window.__currentUser);
  onI18NChangeForNews = () => { renderEvents(); applyNewsFilter(activeNewsFilter || 'all'); };
  I18N.onChange(onI18NChangeForNews);
  IstRouter.onTick(tickNewsAgo);
  loadBreakingNews();
  loadEvents();
}

function unmount() {
  if (onI18NChangeForNews) { I18N.offChange(onI18NChangeForNews); onI18NChangeForNews = null; }
  IstRouter.offTick(tickNewsAgo);
}

async function showSite(user) {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('main-site').classList.add('active');
  // Capture user id so seenKey() can scope per-user.
  window.__currentUser = user;
  I18N.syncFromSupabase(sb, user.id);
  Palette.syncFromSupabase(sb, user.id);
  // Mount the shared mobile profile card. profile-card.js is deferred, so
  // wait until it's loaded (DOMContentLoaded guarantees that) — otherwise a
  // fast session check can beat the deferred script on mobile and the card
  // silently never mounts.
  function mountProfileCard() {
    if (window.IstProfileCard) {
      IstProfileCard.mount({ sb, I18N, page: 'anahane' });
      IstProfileCard.mountLibraryCard({ sb, I18N });
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mountProfileCard);
  } else {
    mountProfileCard();
  }
  mount();

  // First-login onboarding: locks the page until the user completes the flow.
  // No-op if profiles.onboarded_at is already set. The script also resumes
  // mid-flow on kahvehane / kutuphane and the post-tour finale on anahane.
  // onboarding.js is `defer`red, so on a slow connection it may not be
  // ready yet when this runs — poll briefly until it lands. Tied to the
  // real login gateway, not repeated on later virtual re-entries.
  (function tryOnb(tries) {
    if (window.IstOnboarding) {
      IstOnboarding.maybeRun({ sb, user, page: 'anahane' });
    } else if (tries > 0) {
      setTimeout(() => tryOnb(tries - 1), 60);
    }
  })(40);

  // Post-login mahalle picker: independent of onboarding.js (which only
  // ever runs once, on first login) so it also reaches existing users
  // whose ilçe gained mahalle data after they already signed up. No-ops
  // on its own if the ilçe has no mahalle rows yet or one is already set.
  (function tryMahallePicker(tries) {
    if (window.MahallePicker) {
      MahallePicker.maybeRun({ sb, user });
    } else if (tries > 0) {
      setTimeout(() => tryMahallePicker(tries - 1), 60);
    }
  })(40);

  // Admin one-shot notification popup — mascot bubble, shown once per user.
  (function tryNotif(tries) {
    if (window.IstAdminNotification) {
      IstAdminNotification.show({ sb });
    } else if (tries > 0) {
      setTimeout(() => tryNotif(tries - 1), 60);
    }
  })(40);
}

// ── Sign In ──
document.getElementById('auth-submit-btn').addEventListener('click', async () => {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit-btn');

  if (!email || !password) { errEl.textContent = 'Lütfen tüm alanları doldurun.'; return; }

  btn.textContent = ''; btn.appendChild(Object.assign(document.createElement('span'), {className:'spinner'}));
  const result = await sb.auth.signInWithPassword({ email, password });
  btn.textContent = 'Giriş';

  if (result.error) {
    errEl.textContent = result.error.message;
  } else {
    showSite(result.data.user);
  }
});

['auth-email','auth-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-submit-btn').click();
